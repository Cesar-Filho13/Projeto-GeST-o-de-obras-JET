window._exportDespCSV=(obra)=>{
  const d=buildDespesaLedger(DB.despesas.filter(x=>x.obra===obra));
  exportCSV(d.map(x=>[x.data,fmtD(x.data),x.descricao||'',x.nfe||'',x.loja||'',x.valor_conta?fmtV(x.valor_conta):'',fmtV(x.saldo),x.tipo||'Despesa']),
    ['Data ISO','Data','Descrição','NFe Nº','Loja','Conta Bancária','Saldo','Tipo'],`Despesas_${obra}`);
};
window._exportDespXLSX=(obra)=>{
  return exportDespesaWorkbook(obra,'all');
};
window._exportDespPDF=(obra)=>{
  if(!window.jspdf){toast('Carregando...','#f59e0b');return;}
  const{jsPDF}=window.jspdf;
  const d=buildDespesaLedger(DB.despesas.filter(x=>x.obra===obra));
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,M=14;
  // Header with logo style
  doc.setFillColor(26,46,107);doc.rect(0,0,W,20,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('JET',M+8,13,{align:'center'});
  doc.setFontSize(13);doc.text(`Adiantamento de Despesas — ${obra}`,M+22,13);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text(new Date().toLocaleDateString('pt-BR'),W-M,13,{align:'right'});
  // Table
  const totalConta=d.reduce((s,x)=>s+(Number(x.valor_conta)||0),0);
  const totalAdiant=d.reduce((s,x)=>s+(Number(x.movimento_adiantamento)||0),0);
  const saldoAtual=d.length?d[d.length-1].saldo:0;
  doc.autoTable({
    startY:24,margin:{left:M,right:M},
    head:[['Data','Descrição','NFe Nº','Loja','Conta Bancária','Saldo']],
    body:[...d.map(x=>[fmtD(x.data),x.descricao,x.nfe||'',x.loja||'',x.valor_conta?fmtV(x.valor_conta):'',fmtV(x.saldo)]),
      [{content:'TOTAL',colSpan:4,styles:{fontStyle:'bold',fillColor:[235,239,255]}},{content:fmtV(totalConta),styles:{fontStyle:'bold',halign:'right',fillColor:[235,239,255]}},{content:fmtV(saldoAtual),styles:{fontStyle:'bold',halign:'right',fillColor:[232,255,244],textColor:[15,156,114]}}]
    ],
    styles:{fontSize:9,cellPadding:3,textColor:[20,20,20]},
    headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,249,255]},
    columnStyles:{0:{cellWidth:22},2:{cellWidth:22},4:{cellWidth:32,halign:'right'},5:{cellWidth:32,halign:'right'}},
    tableLineColor:[200,210,240],tableLineWidth:.2,
    didParseCell:(data)=>{if(data.section==='body'&&data.column.index===5&&data.cell.raw&&data.cell.raw.startsWith('R$')&&d[data.row.index]?.tipo==='Adiantamento'){data.cell.styles.textColor=[180,120,0];data.cell.styles.fontStyle='bold';}},
    didDrawPage:(data)=>{doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`JET Gestão de Obras · ${obra} · Pág ${data.pageNumber}`,W/2,205,{align:'center'});}
  });
  doc.save(`Despesas_${obra.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('PDF exportado!');
};

f(confirm('Deletar transferencia ${escJs(group.key)}?')){${group.items.map(it=>`window._deleteEstoque('${it.id}');`).join('')}}">Excluir</button></td></tr>${expanded?`<tr><td colspan="8" style="padding:0 14px 14px;background:var(--bg2)"><div style="border:1px solid var(--border);border-radius:10px;padding:12px 14px;background:rgba(59,126,248,.03)"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Itens da transferência</div><div style="font-size:12px;color:var(--text3)">${group.meta.recebido_em?`Recebido em ${fmtD(group.meta.recebido_em)} por ${esc(group.meta.recebido_por||'-')}`:'Sem conferência final'}</div></div><table style="width:100%;min-width:auto"><thead><tr><th style="padding:6px 8px;font-size:10px;color:var(--text3)">Item</th><th style="padding:6px 8px;font-size:10px;color:var(--text3);width:70px;text-align:center">Qtd</th><th style="padding:6px 8px;font-size:10px;color:var(--text3);width:70px;text-align:center">Unid</th><th style="padding:6px 8px;font-size:10px;color:var(--text3)">Obs</th></tr></thead><tbody>${group.items.map(item=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 8px;font-size:12px;color:var(--text)">${esc(item.item||'-')}</td><td style="padding:6px 8px;font-size:12px;color:var(--text3);text-align:center">${Number(item.qtd||0)}</td><td style="padding:6px 8px;font-size:12px;color:var(--text3);text-align:center">${esc(item.unidade||'un')}</td><td style="padding:6px 8px;font-size:12px;color:var(--text3)">${esc(item.observacao||'-')}</td></tr>`).join('')}</tbody></table>${group.meta.recebimento_obs?`<div style="margin-top:10px;font-size:12px;color:var(--text3)"><strong style="color:var(--text)">Conferência:</strong> ${esc(group.meta.recebimento_obs)}</div>`:''}</div></td></tr>`:''}`;}).join('')}</tbody></table></div>`

}>⏸ Paralisada</option></select></div><div class="form-group" style="margin:0"><label>Engenheiro Responsável</label><input value="${esc(d.engenheiro||'')}" placeholder="Nome..." data-obra="${esc(obra)}" data-field="engenheiro" onblur="window._saveObraField(this)" onkeydown="if(event.key==='Enter')this.blur()"></div><div class="form-group" style="margin:0"><label>Gerente da Obra</label><input value="${esc(d.gerente||'')}" placeholder="Nome..." data-obra="${esc(obra)}" data-field="gerente" onblur="window._saveObraField(this)" onkeydown="if(event.key==='Enter')this.blur()"></div><div class="form-group" style="margin:0"><label>Outras Informações</label><input value="${esc(d.outros||'')}" placeholder="Contrato, prazo..." data-obra="${esc(obra)}" data-field="outros" onblur="window._saveObraField(this)" onkeydown="if(event.key==='Enter')this.blur()"></div><div class="form-group" style="margin:0"><label>Vencimento do Contrato</label><input type="date" value="${esc(d.data_vencimento||'')}" data-obra="${esc(obra)}" data-field="data_vencimento" onchange="window._saveObraField(this)"></div></div></div>`;

window._archiveObra=async obra=>{
  if(!obra)return;
  if(!confirm(`Arquivar obra ${obra}? Ela sairá da tela inicial deste navegador.`))return;
  saveArchivedObras(uniqObras([...getArchivedObras(),obra]));
  saveHiddenObras(uniqObras([...getHiddenObras(),obra]));
  toast('Obra arquivada. Para restaurar, adicione a obra novamente pelo gerenciamento.','#f59e0b');
  renderApp();
};
window._addObra=async()=>{const i=document.getElementById('new-obra-input');if(!i)return;const v=i.value.trim();if(!v)return;const cur=getCustomObras();if(getAllObras().includes(v)){toast('Obra já existe.','#f59e0b');return;}saveCustomObras([...cur,v]);saveHiddenObras(getHiddenObras().filter(o=>o!==v));saveArchivedObras(getArchivedObras().filter(o=>o!==v));await saveRemoteObras([...(DB.obraRegistry||[]),v]);i.value='';renderApp();toast(`Obra "${v}" adicionada!`);};
window._saveObraField=el=>{setObraField(el.dataset.obra,el.dataset.field,el.value);};
window._renameObra=async el=>{
  const orig=el.dataset.orig,novo=el.value.trim();
  if(!novo||orig===novo)return;
  if(getAllObras().includes(novo)){toast('Nome já existe.','#f59e0b');el.value=orig;return;}
  await Promise.allSettled(OBRA_LINKED_TABLES.map(table=>sb.from(table).update({obra:novo}).eq('obra',orig)));
  OBRA_LINKED_TABLES.forEach(table=>{DB[table]=DB[table].map(row=>row?.obra===orig?{...row,obra:novo}:row);});
  const custom=getCustomObras().map(o=>o===orig?novo:o);
  const hidden=getHiddenObras().map(o=>o===orig?novo:o);
  const archived=getArchivedObras().map(o=>o===orig?novo:o);
  const obraData=getObrasData().map(o=>o?.nome===orig?{...o,nome:novo}:o);
  saveCustomObras(custom);
  saveHiddenObras(hidden);
  saveArchivedObras(archived);
  saveObrasData(obraData);
  await saveRemoteObras((DB.obraRegistry||[]).map(o=>o===orig?novo:o));
  el.dataset.orig=novo;
  toast('Obra renomeada!');
  renderApp();
};
window._delObra=obra=>{_showDelDialog(obra);};

let _delPendObra=null,_delPendMeta=null,_delTimer=null,_delUndo=null;
function _showDelDialog(obra){
  document.getElementById('del-dlg')?.remove();
  clearInterval(_delTimer);
  const linkedMap=buildObraDeleteMap(obra);
  const rows=Object.entries(linkedMap).filter(([,ids])=>ids.length);
  const total=linkedObraCount(linkedMap);
  let secs=3;
  const el=document.createElement('div');
  el.id='del-dlg';
  const descText=total
    ?'Os registros vinculados serão movidos para <strong>Sem obra</strong>, assim a obra deixa de aparecer na tela inicial sem perder histórico.'
    :'A obra será removida do gerenciamento e da tela inicial. Você ainda pode desfazer em seguida.';
  let listRows;
  if(rows.length){
    listRows=rows.map(function(pair){
      const table=pair[0];
      const ids=pair[1];
      const label=LINKED_TABLE_LABELS[table]||table;
      return '<div class="delete-dialog-row"><span>'+label+'</span><strong>'+ids.length+'</strong></div>';
    }).join('');
  }else{
    listRows='<div class="delete-dialog-row"><span>Nenhum vínculo ativo</span><strong>Pronto para remover</strong></div>';
  }
  el.innerHTML=`<div class="delete-dialog-overlay"><div class="delete-dialog"><div class="delete-dialog-head"><div class="delete-dialog-icon">⚠</div><div class="delete-dialog-copy"><h3>Excluir obra</h3><div class="delete-dialog-name">${esc(obra)}</div><p>${descText}</p></div></div><div class="delete-dialog-meta"><div class="delete-dialog-chip"><strong>${total}</strong> registro(s) vinculados</div><div class="delete-dialog-chip"><strong>${rows.length}</strong> área(s) afetada(s)</div></div><div class="delete-dialog-list">${listRows}</div><div class="delete-dialog-timer"><div class="delete-dialog-ring"><svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"></circle><circle id="dl-ring" cx="36" cy="36" r="30" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="188.5" stroke-dashoffset="0" stroke-linecap="round"></circle></svg><div class="delete-dialog-ring-value" id="dl-num">${secs}</div></div><div class="delete-dialog-timer-copy"><strong>Confirmação em espera</strong><span id="dl-label">Aguarde ${secs} segundos para liberar a exclusão.</span></div></div><div class="delete-dialog-actions"><button class="btn btn-secondary" onclick="document.getElementById('del-dlg')?.remove();clearInterval(_delTimer)">Cancelar</button><button id="dl-btn" disabled class="btn btn-danger" style="opacity:.5;cursor:not-allowed">Excluir (${secs}s)</button></div></div></div>`;
  document.body.appendChild(el);
  _delPendObra=obra;
  _delPendMeta={linkedMap,total};
  _delTimer=setInterval(()=>{
    secs--;
    const num=document.getElementById('dl-num');
    const ring=document.getElementById('dl-ring');
    const label=document.getElementById('dl-label');
    const btn=document.getElementById('dl-btn');
    if(!num){clearInterval(_delTimer);return;}
    if(secs>0){
      num.textContent=secs;
      if(ring)ring.style.strokeDashoffset=188.5*(1-secs/3);
      if(label)label.textContent=`Aguarde ${secs} segundo${secs!==1?'s':''} para liberar a exclusão.`;
      if(btn)btn.textContent=`Excluir (${secs}s)`;
      return;
    }
    clearInterval(_delTimer);
    num.textContent='✓';
    num.style.color='#22c55e';
    if(ring){ring.style.strokeDashoffset=188.5;ring.style.stroke='#22c55e';}
    if(label)label.textContent='Pronto para confirmar. Você ainda poderá desfazer.';
    if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';btn.textContent='Confirmar exclusão';btn.onclick=()=>_execDel(obra,{linkedMap,total});}
  },1000);
}
async function _execDel(obraArg=null,metaArg=null){
  clearInterval(_delTimer);
  document.getElementById('del-dlg')?.remove();
  const obra=obraArg||_delPendObra;
  const meta=metaArg||_delPendMeta||{};
  if(!obra)return;
  const linkedMap=meta.linkedMap||buildObraDeleteMap(obra);
  const affectedTables=OBRA_LINKED_TABLES.filter(table=>(linkedMap[table]||[]).length);
  const results=await Promise.allSettled(affectedTables.map(table=>sb.from(table).update({obra:'Sem obra'}).in('id',linkedMap[table])));
  const failed=affectedTables.filter((table,index)=>results[index].status==='rejected'||results[index].value?.error);
  if(failed.length){toast('Não foi possível mover todos os vínculos da obra. Tente novamente.','#ef4444');return;}
  _delUndo={obra,linkedMap,wasCustom:getCustomObras().includes(obra),data:getObraData(obra),registryHad:(DB.obraRegistry||[]).includes(obra),hiddenHad:getHiddenObras().includes(obra)};
  OBRA_LINKED_TABLES.forEach(table=>{const ids=linkedMap[table]||[];if(ids.length)DB[table]=DB[table].map(row=>ids.includes(row.id)?{...row,obra:'Sem obra'}:row);});
  saveCustomObras(getCustomObras().filter(o=>o!==obra));
  saveObrasData(getObrasData().filter(o=>o?.nome!==obra));
  saveHiddenObras(uniqObras([...getHiddenObras(),obra]));
  await saveRemoteObras((DB.obraRegistry||[]).filter(o=>o!==obra));
  renderApp();
  _showUndo(obra,linkedObraCount(linkedMap));
}
function _showUndo(obra,total){
  document.getElementById('undo-t')?.remove();
  const el=document.createElement('div');
  el.id='undo-t';
  el.className='toast';
  el.style.cssText='bottom:80px;left:50%;transform:translateX(-50%);min-width:320px;gap:14px';
  const suffix=total?' · '+total+' vínculo(s) movido(s) para Sem obra':'';
  el.innerHTML='<span>Obra "'+esc(obra)+'" excluída'+suffix+'</span><button onclick="_undoDel()" style="background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;white-space:nowrap">↩ Desfazer</button>';
  document.body.appendChild(el);
  setTimeout(()=>{el.remove();_delUndo=null;},10000);
}
window._undoDel=async()=>{
  document.getElementById('undo-t')?.remove();
  const u=_delUndo;
  if(!u)return;
  const affectedTables=OBRA_LINKED_TABLES.filter(table=>(u.linkedMap?.[table]||[]).length);
  const results=await Promise.allSettled(affectedTables.map(table=>sb.from(table).update({obra:u.obra}).in('id',u.linkedMap[table])));
  const failed=affectedTables.filter((table,index)=>results[index].status==='rejected'||results[index].value?.error);
  if(failed.length){toast('Não foi possível restaurar todos os vínculos da obra.','#ef4444');return;}
  OBRA_LINKED_TABLES.forEach(table=>{const ids=u.linkedMap?.[table]||[];if(ids.length)DB[table]=DB[table].map(row=>ids.includes(row.id)?{...row,obra:u.obra}:row);});
  saveHiddenObras(getHiddenObras().filter(o=>o!==u.obra));
  saveArchivedObras(getArchivedObras().filter(o=>o!==u.obra));
  if(u.wasCustom)saveCustomObras(uniqObras([...getCustomObras(),u.obra]));
  if(u.data?.nome)saveObrasData([...getObrasData().filter(o=>o?.nome!==u.obra),u.data]);
  if(u.registryHad||u.wasCustom||linkedObraCount(u.linkedMap))await saveRemoteObras([...(DB.obraRegistry||[]),u.obra]);
  toast(`Obra "${u.obra}" restaurada!`);
  renderApp();
};

function exportCSV(rows,headers,filename){
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename+'.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

function xlsxSheetName(name){return String(name||'Dados').replace(/[\\/*?:\[\]]/g,' ').slice(0,31)||'Dados';}
function xlsxFileName(name){return String(name||'Dados').replace(/[<>:"/\\|?*]+/g,'_');}
function xlsxArgb(hex,fallback='1A2E6B'){
  const clean=String(hex||fallback).replace('#','').trim();
  const normalized=clean.length===3?clean.split('').map(c=>c+c).join(''):clean;
  return /^[0-9a-fA-F]{6}$/.test(normalized)?`FF${normalized.toUpperCase()}`:`FF${fallback}`;
}
function xlsxFill(hex){return{type:'pattern',pattern:'solid',fgColor:{argb:xlsxArgb(hex)}};}
function xlsxBorder(color='D7E0EE'){
  const c={argb:`FF${color}`};
  return{top:{style:'thin',color:c},left:{style:'thin',color:c},bottom:{style:'thin',color:c},right:{style:'thin',color:c}};
}
function xlsxDownload(buffer,filename){
  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function xlsxColumnsFromHeaders(headers,rows){
  return headers.map((header,index)=>{
    let max=String(header).length;
    rows.forEach(row=>{const value=String(row[index]!=null?row[index]:'');if(value.length>max)max=value.length;});
    return{header,key:`c${index}`,width:Math.min(Math.max(max+3,10),42)};
  });
}
async function exportStyledXLSX({sheetName='Dados',filename='Dados',title='JET Gestão de Obras',meta=[],columns=[],rows=[],sections=[]}){
  if(window.ExcelJS){
    const workbook=new window.ExcelJS.Workbook();
    workbook.creator='JET Gestão de Obras';
    workbook.created=new Date();
    const ws=workbook.addWorksheet(xlsxSheetName(sheetName));
    ws.properties.defaultRowHeight=22;
    ws.columns=columns.map(col=>({key:col.key,width:col.width||18}));
    const totalCols=Math.max(columns.length,1);
    let rowNumber=1;
    const mergeFullRow=row=>{if(totalCols>1)ws.mergeCells(row,1,row,totalCols);};
    const headerBg='1A2E6B';
    const sectionBg='E8EFFC';
    const bodyBorder='DEE7F2';

    mergeFullRow(rowNumber);
    const titleCell=ws.getCell(rowNumber,1);
    titleCell.value=title;
    titleCell.fill=xlsxFill(`#${headerBg}`);
    titleCell.font={name:'Aptos',size:16,bold:true,color:{argb:'FFFFFFFF'}};
    titleCell.alignment={vertical:'middle',horizontal:'left'};
    ws.getRow(rowNumber).height=26;

    meta.filter(Boolean).forEach(line=>{
      rowNumber++;
      mergeFullRow(rowNumber);
      const cell=ws.getCell(rowNumber,1);
      cell.value=Array.isArray(line)?line.filter(Boolean).join('   •   '):line;
      cell.font={name:'Aptos',size:10,color:{argb:'FF5E6B83'}};
      cell.alignment={vertical:'middle',horizontal:'left'};
    });

    rowNumber++;
    const headerRowNumber=rowNumber;
    const headerRow=ws.getRow(headerRowNumber);
    columns.forEach((col,index)=>{
      const cell=headerRow.getCell(index+1);
      cell.value=col.header;
      cell.fill=xlsxFill(`#${headerBg}`);
      cell.font={name:'Aptos',size:11,bold:true,color:{argb:'FFFFFFFF'}};
      cell.alignment={vertical:'middle',horizontal:col.align||'left'};
      cell.border=xlsxBorder(bodyBorder);
    });
    headerRow.height=22;

    const applyBodyCell=(cell,col,rawValue,rowIndex)=>{
      const value=rawValue==null?'':rawValue;
      if(col.type==='currency'&&value!==''){
        const num=Number(String(value).replace(/[^\d,.-]/g,'').replace(/\.(?=.*\.)/g,'').replace(',','.'));
        cell.value=Number.isFinite(num)?num:value;
        if(Number.isFinite(num))cell.numFmt='"R$" #,##0.00';
      }else{
        cell.value=value;
      }
      cell.font={name:'Aptos',size:10.5,color:{argb:'FF23344D'},bold:false};
      cell.alignment={vertical:'top',horizontal:col.align||'left',wrapText:col.wrap!==false};
      cell.border=xlsxBorder(bodyBorder);
      cell.fill=xlsxFill(rowIndex%2?'#FFFFFF':'#F7FAFF');
      if(col.badgeMap&&value!==''){
        const badge=col.badgeMap[value]||col.badgeMap[String(value)];
        if(badge){
          cell.fill=xlsxFill(badge.bg||'#EFF4FF');
          cell.font={name:'Aptos',size:10.5,bold:true,color:{argb:xlsxArgb(badge.c||'#23344D')}};
        }
      }
      if(col.type==='currency'&&value!==''){
        cell.font={...cell.font,bold:true,color:{argb:'FF14956B'}};
      }
      if(typeof col.style==='function')col.style(cell,value,rowIndex);
    };

    const pushRow=(record,rowIndex)=>{
      rowNumber++;
      const row=ws.getRow(rowNumber);
      columns.forEach((col,index)=>{
        const raw=typeof col.value==='function'?col.value(record,rowIndex):record[col.key];
        applyBodyCell(row.getCell(index+1),col,raw,rowIndex);
      });
      row.commit();
    };

    if(sections.length){
      let count=0;
      sections.forEach(section=>{
        rowNumber++;
        mergeFullRow(rowNumber);
        const sectionCell=ws.getCell(rowNumber,1);
        sectionCell.value=section.label;
        sectionCell.fill=xlsxFill(`#${sectionBg}`);
        sectionCell.font={name:'Aptos',size:11,bold:true,color:{argb:'FF1A2E6B'}};
        sectionCell.alignment={vertical:'middle',horizontal:'left'};
        sectionCell.border=xlsxBorder(bodyBorder);
        (section.rows||[]).forEach(record=>{count++;pushRow(record,count);});
      });
    }else if(rows.length){
      rows.forEach((record,index)=>pushRow(record,index+1));
    }else{
      rowNumber++;
      mergeFullRow(rowNumber);
      const emptyCell=ws.getCell(rowNumber,1);
      emptyCell.value='Nenhum registro encontrado.';
      emptyCell.font={name:'Aptos',size:10,italic:true,color:{argb:'FF73849E'}};
      emptyCell.alignment={vertical:'middle',horizontal:'center'};
      emptyCell.border=xlsxBorder(bodyBorder);
    }

    ws.autoFilter={from:{row:headerRowNumber,column:1},to:{row:headerRowNumber,column:totalCols}};
    ws.views=[{state:'frozen',ySplit:headerRowNumber}];
    const buffer=await workbook.xlsx.writeBuffer();
    xlsxDownload(buffer,`${xlsxFileName(filename)}.xlsx`);
    toast('Excel exportado!');
    return;
  }
  if(!window.XLSX){toast('Biblioteca não carregada.','#f59e0b');return;}
  const headerList=columns.map(col=>col.header);
  const dataRows=rows.map(row=>columns.map(col=>typeof col.value==='function'?col.value(row):row[col.key]));
  const ws=XLSX.utils.aoa_to_sheet([headerList,...dataRows]);
  ws['!cols']=columns.map(col=>({wch:col.width||16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,xlsxSheetName(sheetName));
  XLSX.writeFile(wb,`${xlsxFileName(filename)}.xlsx`);
  toast('Excel exportado!');
}
function exportXLSX(rows,headers,filename){
  return exportStyledXLSX({
    sheetName:'Dados',
    filename,
    title:'JET Gestão de Obras',
    meta:[`Exportado em ${new Date().toLocaleDateString('pt-BR')}`],
    columns:xlsxColumnsFromHeaders(headers,rows),
    rows:rows.map(row=>Object.fromEntries(row.map((value,index)=>[`c${index}`,value])))
  });
}

function exportTXT(rows,headers,filename){
  const sep='\t';
  const txt=[headers.join(sep),...rows.map(r=>r.map(v=>String(v==null?'':v)).join(sep))].join('\n');
  const blob=new Blob(['\uFEFF'+txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename+'.txt';a.click();URL.revokeObjectURL(url);
  toast('TXT exportado!');
}

function exportAditivosPDF(obra){

async function exportMateriaisPDF(obra,ids,opts={}){
  if(!window.jspdf){toast('Biblioteca n\u00E3o carregada.','#f59e0b');return;}
  const{jsPDF}=window.jspdf;
  let mats=DB.materiais.filter(m=>m.obra===obra);
  if(Array.isArray(ids)&&ids.length)mats=mats.filter(m=>ids.includes(m.id));
  if(!mats.length){toast('Nenhum material encontrado.','#f59e0b');return;}

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297,M=12;
  const obraLabel=String(obra||'SEM OBRA').trim().toUpperCase();
  const solicitante=mats[0]?.solicitante||'-';
  const dateSource=mats.find(m=>m?.data_solicitacao)?.data_solicitacao||todayISO();
  const headerDate=/^\d{4}-\d{2}-\d{2}$/.test(String(dateSource||''))?fmtD(dateSource):String(dateSource||new Date().toLocaleDateString('pt-BR'));
  const pend=mats.filter(m=>m.status==='Pendente').length;
  const aprov=mats.filter(m=>m.status==='Aprovado'||m.status==='Comprado').length;
  const upperFirst=v=>{
    const text=String(v||'').trim();
    return text?text.charAt(0).toUpperCase()+text.slice(1):'-';
  };
  const solicitanteLabel=upperFirst(solicitante);
  const reqFileKey=getMaterialReqKeyFromItems(mats,obra);
  const reqFiles=getMaterialReqFiles(reqFileKey);
  const printableImageExts=new Set(['png','jpg','jpeg','webp','gif']);
  const attachmentExt=file=>getExt(String(file?.name||file?.path||file?.url||'').split('?')[0].split('#')[0]);
  const attachmentLabel=(file,index)=>String(file?.name||`Anexo ${String(index+1).padStart(2,'0')}`);
  const isPrintableImageFile=file=>printableImageExts.has(attachmentExt(file));
  const isPdfAttachment=file=>attachmentExt(file)==='pdf';

  function drawLogo(){
    doc.setFillColor(26,46,107);
    doc.circle(M+13,20,13,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(255,255,255);
    doc.text('JET',M+13,22,{align:'center'});
  }

  function drawDateBox(){
    doc.setDrawColor(26,46,107);
    doc.setLineWidth(0.65);
    doc.roundedRect(W-M-34,8,34,14,2,2);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(70,80,110);
    doc.text(headerDate,W-M-17,17,{align:'center'});
  }

  function drawHeader(titleText,showDateBox=true){
    drawLogo();
    doc.setFont('helvetica','bold');
    doc.setFontSize(15);
    doc.setTextColor(20,30,70);
    const titleLines=doc.splitTextToSize(titleText,128);
    doc.text(titleLines,M+30,14);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(130,140,170);
    const companyY=titleLines.length>1?29:24;
    doc.text('JET Servi\u00E7os de Engenharia',M+30,companyY);
    doc.setDrawColor(26,46,107);
    doc.setLineWidth(0.55);
    doc.line(M+30,companyY+4,W-M,companyY+4);
    if(showDateBox)drawDateBox();
  }

  function drawSummary(items){
    const top=40;
    const width=(W-M*2)/items.length;
    doc.setFillColor(240,242,248);
    doc.roundedRect(M,top,W-M*2,12,3,3,'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    doc.setTextColor(75,85,105);
    items.forEach((item,index)=>doc.text(String(item),M+4+(index*width),top+7));
    return top+18;
  }

  function drawStamp(label){
    let y=doc.__lastTableY+16;
    if(y>H-38){doc.addPage('a4','portrait');y=28;}
    doc.setDrawColor(60,60,80);
    doc.setLineWidth(0.45);
    doc.line(M+8,y,W/2+28,y);
    const center=(M+8+W/2+28)/2;
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(75,85,105);
    doc.text(label,center,y+6,{align:'center'});
    doc.setFontSize(8);
    doc.setTextColor(120,130,150);
    doc.text('Data: '+headerDate,center,y+12,{align:'center'});
  }

  function toLines(value,width){
    const textValue=String(value==null?'':value);
    const lines=doc.splitTextToSize(textValue,width);
    return lines.length?lines:[''];
  }

  function drawMultiline(lines,x,y,width,align='left',lineHeight=3.2){
    const baseX=align==='center'?x+width/2:(align==='right'?x+width-2:x+2);
    lines.forEach((line,index)=>doc.text(line,baseX,y+4+(index*lineHeight),{align:align==='left'?'left':align}));
  }

  function drawManualTable(columns,rows,startY,redrawPage,kind){
    let y=startY;
    const headerHeight=11;

    const drawTableHead=()=>{
      let x=M;
      doc.setFont('helvetica','bold');
      doc.setFontSize(kind==='req'?7.1:7.4);
      columns.forEach(col=>{
        doc.setFillColor(26,46,107);
        doc.setDrawColor(180,190,220);
        doc.setLineWidth(0.25);
        doc.rect(x,y,col.width,headerHeight,'FD');
        doc.setTextColor(255,255,255);
        const headLines=toLines(col.label,col.width-4);
        drawMultiline(headLines,x,y,col.width,'center',2.9);
        x+=col.width;
      });
      y+=headerHeight;
    };

    drawTableHead();
    rows.forEach((row,rowIndex)=>{
      const cells=columns.map((col,idx)=>({ col, raw:row[idx], lines:toLines(row[idx],col.width-4) }));
      const rowHeight=Math.max(9,...cells.map(cell=>(cell.lines.length*3.15)+4));
      if(y+rowHeight>H-30){
        doc.addPage('a4','portrait');
        y=redrawPage();
        drawTableHead();
      }
      let x=M;
      cells.forEach((cell,idx)=>{
        const zebra=rowIndex%2===0?[248,249,252]:[255,255,255];
        let fill=zebra;
        let textColor=[30,30,30];
        let fontStyle='normal';
        if(kind==='req'){
          if(idx===4){
            if(cell.raw==='Cr\u00EDtico'){fill=[255,220,220];textColor=[180,0,0];fontStyle='bold';}
            else if(cell.raw==='Urgente'){fill=[255,243,205];textColor=[140,90,0];fontStyle='bold';}
          }
          if(idx===5){
            if(cell.raw==='Pendente')textColor=[180,120,0];
            else if(cell.raw==='Aprovado'||cell.raw==='Comprado')textColor=[0,130,70];
            else if(cell.raw==='Entregue')textColor=[0,100,180];
          }
          if(idx===6){
            const discColors={'El\u00E9trica':[0,100,200],'Hidr\u00E1ulica':[0,150,100],'Civil':[140,80,0],'EPI':[180,0,60],'Geral':[100,100,120],'L\u00F3gica':[120,50,180]};
            textColor=discColors[cell.raw]||[100,100,120];
            fontStyle='bold';
          }
        }
        doc.setFillColor(...fill);
        doc.setDrawColor(190,198,214);
        doc.setLineWidth(0.2);
        doc.rect(x,y,cell.col.width,rowHeight,'FD');
        doc.setFont('helvetica',fontStyle);
        doc.setFontSize(kind==='req'?7.05:7.8);
        doc.setTextColor(...textColor);
        drawMultiline(cell.lines,x,y,cell.col.width,cell.col.align||'left',3.1);
        x+=cell.col.width;
      });
      y+=rowHeight;
    });
    doc.__lastTableY=y;
    return y;
  }

  function fitIntoBox(width,height,maxW,maxH){
    const ratio=Math.min(maxW/Math.max(width,1),maxH/Math.max(height,1),1);
    return{w:width*ratio,h:height*ratio};
  }

  async function loadImageAttachment(file){
    const response=await fetch(file.url,{mode:'cors',credentials:'omit',cache:'no-store'});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    const blob=await response.blob();
    const objectUrl=URL.createObjectURL(blob);
    try{
      const img=await new Promise((resolve,reject)=>{
        const image=new Image();
        image.onload=()=>resolve(image);
        image.onerror=()=>reject(new Error('imagem indisponível'));
        image.src=objectUrl;
      });
      const naturalW=img.naturalWidth||img.width||1;
      const naturalH=img.naturalHeight||img.height||1;
      const maxPx=1600;
      const scale=Math.min(1,maxPx/Math.max(naturalW,naturalH));
      const canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round(naturalW*scale));
      canvas.height=Math.max(1,Math.round(naturalH*scale));
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      return{dataUrl:canvas.toDataURL('image/png'),width:canvas.width,height:canvas.height};
    }finally{
      URL.revokeObjectURL(objectUrl);
    }
  }

  function ensurePdfJs(){
    const configure=lib=>{
      if(lib?.GlobalWorkerOptions&&!lib.GlobalWorkerOptions.workerSrc){
        lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      return lib;
    };
    if(window.pdfjsLib)return Promise.resolve(configure(window.pdfjsLib));
    if(window._jetPdfJsPromise)return window._jetPdfJsPromise.then(configure);
    window._jetPdfJsPromise=new Promise((resolve,reject)=>{
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      script.onload=()=>window.pdfjsLib?resolve(window.pdfjsLib):reject(new Error('pdf.js indisponível'));
      script.onerror=()=>reject(new Error('não foi possível carregar pdf.js'));
      document.head.appendChild(script);
    });
    return window._jetPdfJsPromise.then(configure);
  }

  async function loadPdfAttachmentPages(file){
    const lib=await ensurePdfJs();
    const response=await fetch(file.url,{mode:'cors',credentials:'omit',cache:'no-store'});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    const data=await response.arrayBuffer();
    const pdf=await lib.getDocument({data}).promise;
    const pages=[];
    for(let pageNumber=1;pageNumber<=pdf.numPages;pageNumber++){
      const page=await pdf.getPage(pageNumber);
      const viewport=page.getViewport({scale:1.35});
      const canvas=document.createElement('canvas');
      canvas.width=Math.ceil(viewport.width);
      canvas.height=Math.ceil(viewport.height);
      const ctx=canvas.getContext('2d',{alpha:false});
      ctx.fillStyle='#fff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      await page.render({canvasContext:ctx,viewport}).promise;
      pages.push({dataUrl:canvas.toDataURL('image/png'),width:canvas.width,height:canvas.height,pageNumber,totalPages:pdf.numPages});
    }
    return pages;
  }

  function drawAttachmentPlaceholder(file,index,errorMsg=''){
    doc.addPage('a4','portrait');
    drawHeader(`ANEXO ${String(index+1).padStart(2,'0')} - ${obraLabel}`,false);
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.setTextColor(26,46,107);
    doc.text(attachmentLabel(file,index),M,48,{maxWidth:W-M*2});
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.2);
    doc.setTextColor(90,100,120);
    doc.text(`Tipo: ${(attachmentExt(file)||'arquivo').toUpperCase()} · Tamanho: ${fmtSz(file?.size||0)}`,M,58);
    if(file?.url){
      doc.setTextColor(37,99,235);
      if(typeof doc.textWithLink==='function')doc.textWithLink('Abrir anexo original',M,70,{url:file.url});
      else doc.text('Abrir anexo original: '+file.url,M,70,{maxWidth:W-M*2});
    }
    const noteColor=errorMsg?[180,90,0]:[110,120,140];
    doc.setTextColor(...noteColor);
    doc.text(errorMsg?`Prévia não incluída automaticamente: ${errorMsg}`:'Arquivo listado como anexo da solicitação.',M,83,{maxWidth:W-M*2});
  }

  async function appendMaterialAttachments(){
    if(!reqFiles.length)return;
    newPage();
    drawHeader('ANEXOS DA SOLICITAÇÃO - '+obraLabel,false);
    drawSummary([`Total de anexos: ${reqFiles.length}`,`Solicitante: ${solicitanteLabel}`,`Data: ${headerDate}`]);
    let y=64;
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(26,46,107);
    doc.text('Índice de anexos',M,y);
    y+=8;
    reqFiles.forEach((file,index)=>{
      if(y>H-26){
        doc.addPage('a4','portrait');
        drawHeader('ANEXOS DA SOLICITAÇÃO - '+obraLabel,false);
        y=44;
      }
      doc.setFont('helvetica','bold');
      doc.setFontSize(8.5);
      doc.setTextColor(30,40,65);
      doc.text(`${String(index+1).padStart(2,'0')}. ${attachmentLabel(file,index)}`,M,y,{maxWidth:W-M*2-18});
      doc.setFont('helvetica','normal');
      doc.setFontSize(7.5);
      doc.setTextColor(100,110,130);
      doc.text(`${fmtSz(file?.size||0)} · ${(isPrintableImageFile(file)||isPdfAttachment(file))?'prévia incluída nas páginas seguintes':'arquivo original listado com link'}`,M,y+5,{maxWidth:W-M*2});
      y+=13;
    });

    for(let i=0;i<reqFiles.length;i++){
      const file=reqFiles[i];
      if(isPdfAttachment(file)&&file?.url){
        try{
          const pages=await loadPdfAttachmentPages(file);
          for(const page of pages){
            doc.addPage('a4','portrait');
            drawHeader(`ANEXO ${String(i+1).padStart(2,'0')} - ${obraLabel}`,false);
            doc.setFont('helvetica','bold');
            doc.setFontSize(9);
            doc.setTextColor(26,46,107);
            doc.text(`${attachmentLabel(file,i)} - página ${page.pageNumber}/${page.totalPages}`,M,43,{maxWidth:W-M*2});
            const maxW=W-M*2;
            const maxH=224;
            const fit=fitIntoBox(page.width,page.height,maxW,maxH);
            const x=M+(maxW-fit.w)/2;
            const yPdf=50;
            doc.addImage(page.dataUrl,'PNG',x,yPdf,fit.w,fit.h);
            if(file.url&&typeof doc.link==='function')doc.link(x,yPdf,fit.w,fit.h,{url:file.url});
          }
        }catch(err){
          drawAttachmentPlaceholder(file,i,err?.message||'PDF indisponível');
        }
      }else if(isPrintableImageFile(file)&&file?.url){
        try{
          const image=await loadImageAttachment(file);
          doc.addPage('a4','portrait');
          drawHeader(`ANEXO ${String(i+1).padStart(2,'0')} - ${obraLabel}`,false);
          doc.setFont('helvetica','bold');
          doc.setFontSize(10);
          doc.setTextColor(26,46,107);
          doc.text(attachmentLabel(file,i),M,43,{maxWidth:W-M*2});
          const maxW=W-M*2;
          const maxH=214;
          const fit=fitIntoBox(image.width,image.height,maxW,maxH);
          const x=M+(maxW-fit.w)/2;
          const yImg=54;
          doc.addImage(image.dataUrl,'PNG',x,yImg,fit.w,fit.h);
          if(file.url&&typeof doc.link==='function')doc.link(x,yImg,fit.w,fit.h,{url:file.url});
        }catch(err){
          drawAttachmentPlaceholder(file,i,err?.message||'imagem indisponível');
        }
      }else{
        drawAttachmentPlaceholder(file,i);
      }
    }
  }

  const reqColumns=[
    {label:'#',width:8,align:'center'},
    {label:'DESCRI\u00C7\u00C3O',width:48},
    {label:'UNID',width:14,align:'center'},
    {label:'QTD',width:12,align:'center'},
    {label:'URG\u00CANCIA',width:18,align:'center'},
    {label:'STATUS',width:18,align:'center'},
    {label:'DISCIPLINA',width:24,align:'center'},
    {label:'SOLICITANTE',width:20},
    {label:'OBSERVA\u00C7\u00C3O',width:24}
  ];

  const confColumns=[
    {label:'ITEM',width:12,align:'center'},
    {label:'DESCRI\u00C7\u00C3O',width:72},
    {label:'UNIDADE',width:18,align:'center'},
    {label:'QUANTIDADE',width:18,align:'center'},
    {label:'RECEBIMENTO',width:28,align:'center'},
    {label:'OBSERVA\u00C7\u00C3O',width:38}
  ];

  const reqRows=mats.map((m,i)=>[
    String(i+1),
    m.item||'',
    normalizeMaterialUnit(m.unidade||'un'),
    String(m.quantidade||''),
    m.urgencia||'Normal',
    m.status||'Pendente',
    m.disciplina||'Geral',
    upperFirst(m.solicitante||''),
    m.observacao_item||m.observacao||''
  ]);

  const confRows=mats.map((m,i)=>[
    String(i+1),
    m.item||'',
    normalizeMaterialUnit(m.unidade||'un'),
    String(m.quantidade||''),
    '',
    ''
  ]);

  function startReqPage(){
    drawHeader((titleOverride||'Requisi\u00E7\u00E3o de Materiais')+' - '+obraLabel);
    return drawSummary([`Total: ${mats.length} itens`,`Pendentes: ${pend}`,`Aprovados/Comprados: ${aprov}`,`Data: ${headerDate}`,`Solicitante: ${solicitanteLabel}`]);
  }

  function startConferencePage(titleText){
    drawHeader(titleText+' - '+obraLabel);
    return drawSummary([`Total: ${mats.length} itens`,`Solicitante: ${solicitanteLabel}`,`Data: ${headerDate}`,`Anexos: ${reqFiles.length}`]);
  }

  const {req=true,viaObra=true,almox=true,rascunho=true,anexos=true,titleOverride='',filenamePrefix=''}=opts;
  let _firstPage=true;const newPage=()=>{if(!_firstPage)doc.addPage('a4','portrait');_firstPage=false;};

  if(req){newPage();let reqStart=startReqPage();drawManualTable(reqColumns,reqRows,reqStart,startReqPage,'req');drawStamp('Eng. ou Encarregado');}

  drawManualTable(confColumns,confRows,confStart,()=>startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia obra'),'conf');
  drawStamp('Almoxarife');}
  if(almox){newPage();let almoxStart=startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia via almoxarifado');
  drawManualTable(confColumns,confRows,almoxStart,()=>startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia via almoxarifado'),'conf');
  drawStamp('Almoxarife');}
  if(rascunho){newPage();
  drawHeader('CABE\u00C7ALHO + VIA RASCUNHO - '+obraLabel,false);
  drawSummary([`Obra: ${obraLabel}`,`Solicitante: ${solicitanteLabel}`,`Data: ${headerDate}`,`Itens base: ${mats.length}`]);
  doc.setFont('helvetica','bold');
  doc.setFontSize(24);

  doc.setFontSize(10);
  doc.setTextColor(105,115,140);
  doc.text('Folha livre para conferência preliminar e anotações internas.',W/2,91,{align:'center'});
  doc.setDrawColor(210,216,230);
  doc.setLineWidth(0.25);
  for(let y=112;y<=245;y+=12)doc.line(M,y,W-M,y);
  }
  if(anexos)await appendMaterialAttachments();

  const totalPages=doc.getNumberOfPages();
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(150,150,150);
    doc.text('JET Gest\u00E3o de Obras \u00B7 P\u00E1gina '+i+'/'+totalPages,W/2,H-8,{align:'center'});
  }

  doc.save((filenamePrefix||'Requisicao_Materiais_')+obra.replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  toast('PDF exportado!');
}

    });
    y=doc.lastAutoTable.finalY+4;
    // PARALISAÇÃO
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
    doc.text('Paralisação / condições / prazo',M,y+5);y+=8;

      body:[

         '',r.prazo_contratual||'',''],
        [{content:`TURNO\n${r.turno||'Noite'} ( x )`,styles:{fontStyle:'bold'}},{content:'Prorrogação',styles:{fontStyle:'bold'}},'',{content:'Dias restantes',styles:{fontStyle:'bold'}},''],
        [{content:'DURAÇÃO\nDas: '+r.horario_inicio+': '+r.horario_fim,styles:{fontStyle:'bold'}},{content:r.prazo_efetivo||'',styles:{fontStyle:'italic'}},{content:'Prazo efetivo',styles:{fontStyle:'bold'}},{content:'Dias de atraso',styles:{fontStyle:'bold'}},''],
        [{content:'MOTIVO (detalhe):',colSpan:5}],

            [{content:'TOTAL',styles:{fontStyle:'bold',fillColor:[240,245,255]}},{content:String(efJet.reduce((s,e)=>s+(parseInt(e.jet||0)),0)),styles:{fontStyle:'bold',halign:'center',fillColor:[240,245,255]}},{content:String(efJet.reduce((s,e)=>s+(parseInt(e.terceiros||0)),0)),styles:{fontStyle:'bold',halign:'center',fillColor:[240,245,255]}},{content:String(totalMO),styles:{fontStyle:'bold',halign:'center',fillColor:[230,240,255]}}]],

      columnStyles:{1:{halign:'center',cellWidth:30},2:{halign:'center',cellWidth:30},3:{halign:'center',cellWidth:30}},
      tableLineColor:[200,200,200],tableLineWidth:.15,
    });
    y=doc.lastAutoTable.finalY+4;
    // EFETIVO ADMINISTRATIVO
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Fiscalização / efetivo administrativo',M,y+5);y+=8;
    const efAdm=r.efetivo_admin||ADMIN.map(f=>({cargo:f,qtde:'',obs:''}));
    const totalAdm=efAdm.reduce((s,e)=>s+(parseInt(e.qtde)||0),0);
    doc.autoTable({startY:y,margin:{left:M,right:M},tableWidth:W-M*2,
      head:[['Cargo','Qtde','Observações']],
      body:[...efAdm.map(e=>[e.cargo,e.qtde||'',e.obs||'']),
            [{content:'TOTAL',styles:{fontStyle:'bold',fillColor:[240,245,255]}},{content:String(totalAdm),styles:{fontStyle:'bold',halign:'center',fillColor:[240,245,255]}},{content:`Efetivo total: ${totalAdm}`,styles:{fontStyle:'bold',fillColor:[240,245,255]}}]],
      styles:{fontSize:8,cellPadding:2.5,textColor:[20,20,20]},
      headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
      columnStyles:{1:{halign:'center',cellWidth:25}},
      tableLineColor:[200,200,200],tableLineWidth:.15,
    });
    y=doc.lastAutoTable.finalY+6;
    // ATIVIDADES
    if(r.atividades){
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Atividades (JET Serviços de Engenharia)',M,y+5);y+=8;
      const ativLines=r.atividades.split('\n').filter(Boolean);
      const lines=doc.splitTextToSize(ativLines.map((l,i)=>`${i+1} - ${l.replace(/^\d+\s*[-.]?\s*/,'')}`).join('\n'),W-M*2-4);
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.text(lines,M+4,y);y+=lines.length*4.5+6;
    }
    // OBSERVAÇÕES
    if(r.ocorrencias){
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text('Fiscalização / observações',M,y+5);y+=8;
      const ocLines=doc.splitTextToSize(r.ocorrencias,W-M*2-4);
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(ocLines,M+4,y);y+=ocLines.length*4.5+6;
    }
    // FOOTER
    const pg=doc.getNumberOfPages();
    for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`RDO - ${obra} - ${fmtD(r.data)} - ${r.rdo_numero||''}`,105,290,{align:'center'});}
  });
  const photoUrlCandidates=(foto)=>{
    const raw=typeof foto==='string'?foto:(foto?.url||foto?.thumb||foto?.drive_url||foto?.original_url||'');
    const drive=typeof foto==='string'?foto:(foto?.drive_url||foto?.original_url||raw);
    const id=rdoFotoDriveId(drive||raw);
    const urls=[];
    if(id){
      urls.push(`https://lh3.googleusercontent.com/d/${encodeURIComponent(id)}=w1200`);
      urls.push(`https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=w1200`);
    }
    [raw,typeof foto==='string'?'':foto?.thumb,typeof foto==='string'?'':foto?.url].forEach(url=>{if(url)urls.push(url);});
    return[...new Set(urls.filter(Boolean))];
  };
  const imageToDataUrl=async(foto)=>{
    let lastErr=null;
    for(const url of photoUrlCandidates(foto)){
      try{
        const resp=await fetch(url,{mode:'cors',credentials:'omit',cache:'no-store'});
        if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
        const blob=await resp.blob();
        if(!String(blob.type||'').startsWith('image/'))throw new Error('Resposta não é imagem');
        const dataUrl=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.onerror=rej;fr.readAsDataURL(blob);});
        let imgType='JPEG';
        if(String(blob.type).includes('png'))imgType='PNG';
        if(String(blob.type).includes('webp'))imgType='WEBP';
        return{dataUrl,imgType};
      }catch(err){lastErr=err;}
    }
    throw lastErr||new Error('Imagem indisponível');
  };
  const drawPhotoFallback=(foto,x,y,w,h)=>{
    const link=(typeof foto==='string'?foto:(foto?.drive_url||foto?.original_url||foto?.url||foto?.thumb||''));
    doc.setDrawColor(180,190,210);doc.setFillColor(247,250,255);doc.roundedRect(x,y,w,h,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,46,107);
    doc.text('Foto do Google Drive',x+4,y+8);
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(90,100,120);
    const name=typeof foto==='string'?'Foto importada':(foto?.name||'Foto importada');
    doc.text(doc.splitTextToSize(name,w-8).slice(0,2),x+4,y+15);
    if(link){
      doc.setTextColor(37,99,235);doc.setFont('helvetica','bold');
      if(doc.textWithLink)doc.textWithLink('Abrir foto no Drive',x+4,y+h-6,{url:link});
      else doc.text('Abrir foto no Drive',x+4,y+h-6);
    }
  };
  // Embed photos. Google Drive sometimes blocks browser-side capture; in that case we keep clickable placeholders instead of a blank PDF page.
  const _embedFotos=async()=>{
    for(const r of rdos){
      const fotos=r.fotos||[];
      if(!fotos.length)continue;
      doc.addPage();
      doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text(`Anexos (fotos) - ${fmtD(r.data)} - RDO Nº ${r.rdo_numero||''}`,M,14);
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
      doc.text(`${fotos.length} registro(s) fotográfico(s). Se alguma imagem não aparecer, use o link do Drive no quadro correspondente.`,M,20);
      let fx=M,fy=28,maxH=0,col=0,photoSeq=1;
      for(const foto of fotos){
        const imgW=85,imgH=58,cellH=84;
        const fotoLabel=`FOTO ${String(photoSeq++).padStart(2,'0')}`;
        if(fx+imgW>W-M){fx=M;fy+=maxH+6;maxH=0;col=0;}
        if(fy+cellH>286){doc.addPage();fy=14;doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text(`Anexos (fotos) - ${fmtD(r.data)}`,M,fy);fy+=8;}
        try{
          const img=await imageToDataUrl(foto);
          doc.addImage(img.dataUrl,img.imgType,fx,fy,imgW,imgH);
          const link=typeof foto==='string'?foto:(foto.drive_url||foto.original_url||foto.url||'');
          if(link&&doc.link)doc.link(fx,fy,imgW,imgH,{url:link});
        }catch(e){
          console.warn('Foto error:',e);
          drawPhotoFallback(foto,fx,fy,imgW,imgH);
        }
        const name=typeof foto==='string'?'':(foto.name||'');
        const desc=typeof foto==='string'?'':(foto.desc||foto.descricao||'');
        const caption=[name,desc].filter(Boolean).join(' - ');
        let labelY=fy+imgH+5;
        if(caption){
          doc.setFontSize(6.8);doc.setFont('helvetica','normal');doc.setTextColor(90,90,90);
          const capLines=doc.splitTextToSize(caption,imgW).slice(0,2);
          doc.text(capLines,fx,fy+imgH+4);
          labelY=fy+imgH+5+(capLines.length*3.4);
        }
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(26,46,107);
        doc.text(fotoLabel,fx,labelY);
        fx+=imgW+6;col++;maxH=Math.max(maxH,cellH);
        if(col>=2){fx=M;fy+=maxH+6;maxH=0;col=0;}
      }
    }
    doc.save(`RDO_${obra.replace(/\s+/g,'_')}_${rdos[0]?.rdo_numero||''}.pdf`);toast('PDF com fotos exportado!');
  };
  _embedFotos();
}

function renderExportMenu(type,obra,showCPF=false){
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">

window._exportFormat=(type,obra,fmt)=>{
  const hideDocs=document.getElementById('hide-doc-'+type)?.checked||false;
  if(fmt==='csv')window[type+'CSV'](obra,hideDocs);
  else if(fmt==='xlsx')window[type+'XLSX'](obra,hideDocs);
  else if(fmt==='pdf')window[type+'PDF'](obra,hideDocs);
};

function getMobileCardLabel(headers,td,index){
  const explicit=td.getAttribute('data-card-label');
  if(explicit)return explicit;
  const header=headers[index]||'';
  if(header)return header;
  const btns=td.querySelectorAll('button,[role="button"],a');
  if(btns.length>1)return'Ações';
  const titleEl=td.querySelector('[title]');
  if(titleEl?.getAttribute('title'))return titleEl.getAttribute('title');
  if(btns.length===1)return'Ação';
  const input=td.querySelector('input[placeholder],textarea[placeholder],select');
  if(input?.getAttribute('placeholder'))return input.getAttribute('placeholder');
  return '';
}

function applyMobileTableCards(){
  const isMobile=window.innerWidth<=768;
  document.querySelectorAll('.tbl-wrap').forEach(wrap=>{
    wrap.classList.remove('mobile-cards');
    const table=wrap.firstElementChild&&wrap.firstElementChild.tagName==='TABLE'?wrap.firstElementChild:wrap.querySelector('table');
    if(!table)return;
    const headerCells=Array.from(table.querySelectorAll('thead th'));
    const headers=headerCells.map(th=>(th.textContent||'').replace(/\s+/g,' ').trim());
    const styledMinWidth=(table.style.minWidth||'').match(/(\d+)/);
    const largeTable=headerCells.length>=6||headers.filter(Boolean).length>=5||(styledMinWidth&&Number(styledMinWidth[1])>=680);
    if(!isMobile||!largeTable){
      table.querySelectorAll('td').forEach(td=>{
        td.removeAttribute('data-label');
        const value=td.firstElementChild;
        if(value&&value.classList.contains('mobile-card-value')){
          while(value.firstChild)td.appendChild(value.firstChild);
          value.remove();
        }
      });
      return;
    }
    wrap.classList.add('mobile-cards');
    table.querySelectorAll('tbody > tr').forEach(tr=>{
      const cells=Array.from(tr.children).filter(el=>el.tagName==='TD');
      if(!cells.length)return;
      const singleSpan=cells.length===1&&cells[0].hasAttribute('colspan');
      if(singleSpan)return;
      cells.forEach((td,index)=>{
        const label=getMobileCardLabel(headers,td,index);
        if(label)td.setAttribute('data-label',label);else td.removeAttribute('data-label');
        if(!td.querySelector(':scope > .mobile-card-value')){
          const value=document.createElement('div');
          value.className='mobile-card-value';
          while(td.firstChild)value.appendChild(td.firstChild);
          td.appendChild(value);
        }
      });
    });
  });
}

function validatePropostaLogoFile(file){
  const ext=getExt(file?.name||'');
  if(!['png','jpg','jpeg','webp','svg'].includes(ext)){toast(`Tipo de logo não permitido: .${ext||'sem extensão'}`,'#ef4444');return false;}
  if(Number(file.size||0)>10*1024*1024){toast('Logo muito grande. Use imagem de até 10 MB.','#ef4444');return false;}
  if(ext!=='svg'&&file.type&&!String(file.type).startsWith('image/')){toast('Selecione uma imagem PNG, JPG, WebP ou SVG.','#ef4444');return false;}
  return true;
}
function sanitizeSvgLogo(svgText=''){
  const doc=new DOMParser().parseFromString(String(svgText||''),'image/svg+xml');
  if(doc.querySelector('parsererror'))throw new Error('SVG inválido');
  doc.querySelectorAll('script,foreignObject,iframe,object,embed,link,meta,base').forEach(node=>node.remove());
  doc.querySelectorAll('*').forEach(node=>{
    [...node.attributes].forEach(attr=>{
      const name=attr.name.toLowerCase();
      const value=String(attr.value||'').trim().toLowerCase();
      if(name.startsWith('on'))node.removeAttribute(attr.name);
      if((name==='href'||name==='xlink:href')&&(value.startsWith('javascript:')||value.startsWith('data:')))node.removeAttribute(attr.name);
      if(name==='style'&&/(javascript:|expression\s*\(|url\s*\(|@import)/i.test(attr.value))node.removeAttribute(attr.name);
    });
  });
  const root=doc.documentElement;
  if(!root||root.nodeName.toLowerCase()!=='svg')throw new Error('Arquivo não é SVG');
  return new XMLSerializer().serializeToString(root);
}
function renderPropostaLogoToPng(src,onDone,onError){
  const img=new Image();
  img.onload=()=>{
    const max=520;
    const scale=Math.min(1,max/Math.max(img.width||max,img.height||max));
    const canvas=document.createElement('canvas');
    canvas.width=Math.max(1,Math.round((img.width||max)*scale));
    canvas.height=Math.max(1,Math.round((img.height||max)*scale));
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    onDone(canvas.toDataURL('image/png'));
  };
  img.onerror=()=>onError&&onError();
  img.src=src;
}
window._loadPropostaLogo=(file)=>{
  if(!file)return;
  if(!validatePropostaLogoFile(file)){const input=document.getElementById('m-prop-logo-file');if(input)input.value='';return;}
  const ext=getExt(file.name);
  const done=data=>{window._setPropostaLogo(data);toast('Logo do cliente anexado.','#22c55e');};
  const fail=()=>toast('Não consegui ler esse logo. Tente PNG, JPG, WebP ou SVG simples.','#ef4444');
  const reader=new FileReader();
  if(ext==='svg'){
    reader.onload=()=>{
      try{
        const clean=sanitizeSvgLogo(String(reader.result||''));
        const svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(clean);
        renderPropostaLogoToPng(svgUrl,done,fail);
      }catch(err){fail();}
    };
    reader.onerror=fail;
    reader.readAsText(file);
    return;
  }
  reader.onload=()=>renderPropostaLogoToPng(String(reader.result||''),done,fail);
  reader.onerror=fail;
  reader.readAsDataURL(file);
};

window._refreshMaterialDuplicateWarning=(prefix='mat')=>{
  const isReq=prefix==='req';
  const rows=Array.from(document.querySelectorAll(isReq?'.req-item-row':'.mat-item-row'));
  const items=rows.map(row=>({item:row.querySelector(isReq?'.req-item-desc':'.mat-item-desc')?.value?.trim()||''})).filter(item=>item.item);
  const dups=findDuplicateMaterialSpecs(items).map(normalizeMaterialSpec);
  const dupSet=new Set(dups);
  rows.forEach(row=>{
    const input=row.querySelector(isReq?'.req-item-desc':'.mat-item-desc');
    if(!input)return;
    const isDup=dupSet.has(normalizeMaterialSpec(input.value));
    input.style.borderColor=isDup?'#f59e0b':'var(--border2)';

  });
  const box=document.getElementById(isReq?'req-dup-warning':'mat-dup-warning');

  const newDT=!data?data:(data===origDT.slice(0,10)?origDT:data+'T'+new Date().toISOString().slice(11,19));
  const oldReqKey=getMaterialReqKeyFromItems(origMats,S.obra);
  const rows=Array.from(document.querySelectorAll('.req-item-row'));
  const items=rows.map(row=>({
    id:row.dataset.id||'',
    item:row.querySelector('.req-item-desc')?.value?.trim()||'',
    quantidade:parseFloat(row.querySelector('.req-item-qtd')?.value)||0,
    unidade:normalizeMaterialUnit(row.querySelector('.req-item-unit')?.value||'un'),
    disciplina:row.querySelector('.req-item-disc')?.value||'Geral',
    status:row.querySelector('.req-item-status')?.value||'Pendente',
    observacao_item:row.querySelector('.req-item-obs')?.value||'',
  })).filter(item=>item.item);
  if(!items.length){toast('Adicione pelo menos um item.','#ef4444');return;}
  if(!confirmMaterialDuplicates(items))return;
  const btn=document.querySelector('.modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const buildPayload=item=>({
    item:item.item,
    quantidade:item.quantidade,
    unidade:item.unidade,
    disciplina:item.disciplina,
    status:item.status,
    observacao_item:item.observacao_item,
    solicitante:solic,
    data_solicitacao:newDT,
    urgencia:urg,
    observacao:obs
  });
  const sameMaterial=(prev,next)=>(
    (prev.item||'')===next.item &&
    Number(prev.quantidade||0)===Number(next.quantidade||0) &&
    (prev.unidade||'un')===next.unidade &&
    (prev.disciplina||'Geral')===next.disciplina &&
    (prev.status||'Pendente')===next.status &&
    (prev.observacao_item||'')===next.observacao_item &&
    (prev.solicitante||'')===next.solicitante &&
    (prev.data_solicitacao||null)===next.data_solicitacao &&
    (prev.urgencia||'Normal')===next.urgencia &&
    (prev.observacao||'')===next.observacao
  );
  try{
    const existingById=new Map(DB.materiais.map(m=>[m.id,m]));
    const updates=[];
    const inserts=[];
    items.forEach(item=>{
      const payload=buildPayload(item);
      if(item.id){
        const prev=existingById.get(item.id)||{};
        if(!sameMaterial(prev,payload))updates.push({id:item.id,payload});
      }else{
        inserts.push({id:uid(),obra:S.obra,...payload});
      }
    });
    if(updates.length){
      const results=await Promise.all(updates.map(u=>sb.from('materiais').update(u.payload).eq('id',u.id)));
      const failed=results.find(r=>r.error);
      if(failed){toast('Erro: '+failed.error.message,'#ef4444');return;}
      updates.forEach(u=>{DB.materiais=DB.materiais.map(m=>m.id===u.id?{...m,...u.payload}:m);});
    }
    if(inserts.length){
      const{error}=await sb.from('materiais').insert(inserts);
      if(error){toast('Erro: '+error.message,'#ef4444');return;}
      DB.materiais=[...inserts,...DB.materiais];
    }
    const keepIds=items.map(item=>item.id).filter(Boolean);
    const origIds=(S.modalData?.ids||[]);
    const deleteIds=origIds.filter(id=>!keepIds.includes(id));
    if(deleteIds.length){
      const{error}=await sb.from('materiais').delete().in('id',deleteIds);
      if(error){toast('Erro: '+error.message,'#ef4444');return;}
      DB.materiais=DB.materiais.filter(m=>!deleteIds.includes(m.id));
    }
    const newReqKey=getMaterialReqKey(S.obra,newDT||'sem-data');
    if(oldReqKey&&newReqKey&&oldReqKey!==newReqKey&&DB.materialReqFiles?.[oldReqKey]){
      const map={...DB.materialReqFiles};
      map[newReqKey]=[...(map[newReqKey]||[]),...(map[oldReqKey]||[])];
      delete map[oldReqKey];
      await saveRemoteMaterialReqFiles(map,{silent:true});
    }
    await saveMaterialReqFilesForKey(newReqKey,document.getElementById('m-rfiles')?.files||[]);
    toast('✓ Requisição atualizada! ('+items.length+' itens)');
    _closeModal();renderApp();
  }finally{
    if(btn&&document.body.contains(btn)){btn.disabled=false;btn.textContent='Salvar';}
  }
};

function funcionarioImportKey(value=''){
  return stripAccents(value).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
function funcionarioImportCpf(value=''){
  const digits=String(value||'').replace(/\D/g,'');
  if(!digits)return '';
  return digits.length<=11?digits.padStart(11,'0').slice(-11):digits.slice(-11);
}
function funcionarioExtractCpf(documento=''){
  const text=String(documento||'');
  const labeled=text.match(/CPF\s*:\s*([0-9.\-]+)/i);
  if(labeled)return funcionarioImportCpf(labeled[1]);
  const digits=text.replace(/\D/g,'');
  return digits.length>=11?digits.slice(-11):'';
}
function funcionarioImportDate(value=''){
  if(!value)return '';
  if(value instanceof Date&&!Number.isNaN(value.getTime()))return value.toLocaleDateString('pt-BR');
  const text=String(value||'').trim();
  const iso=text.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return `${iso[3]}/${iso[2]}/${iso[1]}`;
  const br=text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(br){
    let a=parseInt(br[1],10),b=parseInt(br[2],10),y=br[3];
    if(y.length===2)y=`20${y}`;
    if(b>12)return `${String(b).padStart(2,'0')}/${String(a).padStart(2,'0')}/${y}`;
    return `${String(a).padStart(2,'0')}/${String(b).padStart(2,'0')}/${y}`;
  }
  return text;
}
function funcionarioImportDoc(row){
  const parts=[];
  if(row.cpf)parts.push(`CPF: ${formatCPF(row.cpf)}`);
  if(row.rg)parts.push(`RG: ${row.rg}`);
  if(row.nascimento)parts.push(`Nasc.: ${row.nascimento}`);
  return parts.join(' | ');
}
function funcionarioImportOptions(){
  return{
    empresa:(document.getElementById('m-func-import-empresa')?.value||'JET').trim()||'JET',
    obra:(document.getElementById('m-func-import-obra')?.value||'GERAL').trim(),
    scope:(document.getElementById('m-func-import-scope')?.value||'geral').trim(),
    updateExisting:!!document.getElementById('m-func-import-update-existing')?.checked
  };
}
function funcionarioImportHeader(value=''){
  return funcionarioImportKey(value);
}
function buildFuncionariosImportRows(matrix=[]){
  const headerIndex=matrix.findIndex(row=>{
    const cols=(row||[]).map(funcionarioImportHeader);
    return cols.includes('nome')&&cols.some(v=>v==='funcao'||v.startsWith('funcao '));
  });
  if(headerIndex<0)throw new Error('Não encontrei o cabeçalho NOME / FUNÇÃO na planilha.');
  const headers=(matrix[headerIndex]||[]).map(funcionarioImportHeader);
  const findCol=(needles)=>headers.findIndex(h=>needles.some(n=>h===n||h.includes(n)));
  const colNome=findCol(['nome']);
  const colFuncao=findCol(['funcao']);
  const colNascimento=findCol(['data de nascimento','nascimento']);
  const colRg=findCol(['rg']);
  const colCpf=findCol(['cpf']);
  if(colNome<0||colFuncao<0)throw new Error('A planilha precisa ter as colunas NOME e FUNÇÃO.');
  const existingByCpf=new Map();
  const existingByName=new Map();
  (DB.funcionarios||[]).forEach(f=>{
    const cpf=funcionarioExtractCpf(f.documento);
    if(cpf&&!existingByCpf.has(cpf))existingByCpf.set(cpf,f);
    const nameKey=funcionarioImportKey(f.nome);
    if(nameKey&&!existingByName.has(nameKey))existingByName.set(nameKey,f);
  });
  const seen=new Set();
  return matrix.slice(headerIndex+1).map(row=>{
    const nome=String(row[colNome]||'').replace(/\s+/g,' ').trim();
    if(!nome)return null;
    const funcao=String(row[colFuncao]||'').replace(/\*+/g,'').replace(/\s+/g,' ').trim();
    const cpf=colCpf>=0?funcionarioImportCpf(row[colCpf]):'';
    const rg=colRg>=0?String(row[colRg]||'').replace(/\s+/g,' ').trim():'';
    const nascimento=colNascimento>=0?funcionarioImportDate(row[colNascimento]):'';
    const sheetKey=cpf||`nome:${funcionarioImportKey(nome)}`;
    const duplicate=seen.has(sheetKey);
    seen.add(sheetKey);
    const existing=(cpf&&existingByCpf.get(cpf))||existingByName.get(funcionarioImportKey(nome))||null;
    const draft={nome,funcao,cpf,rg,nascimento,duplicate,existingId:existing?.id||'',existingName:existing?.nome||''};
    draft.documento=funcionarioImportDoc(draft);
    return draft;
  }).filter(Boolean);
}
function funcionariosImportPreviewHtml(rows=[]){
  if(!rows.length)return'<div style="padding:14px;color:var(--text3);font-size:13px">Nenhum colaborador válido encontrado.</div>';
  const opts=funcionarioImportOptions();
  const novos=rows.filter(r=>!r.duplicate&&!r.existingId).length;
  const atualizaveis=opts.updateExisting?rows.filter(r=>!r.duplicate&&r.existingId).length:0;
  const ignorados=rows.length-novos-atualizaveis;
  return`<table><thead><tr><th>Nome</th><th>Função</th><th>CPF</th><th>RG</th><th>Nascimento</th><th>Status</th></tr></thead><tbody>${rows.map(r=>{
    const status=r.duplicate?'<span class="tag" style="color:#f87171">Duplicado na planilha</span>':r.existingId?(opts.updateExisting?'<span class="tag">Atualizar existente</span>':'<span class="tag">Já existe</span>'):'<span class="tag" style="color:#34d399">Novo</span>';
    return`<tr><td><strong>${esc(r.nome)}</strong>${r.existingName&&r.existingName!==r.nome?`<div style="font-size:10px;color:var(--text3)">Atual: ${esc(r.existingName)}</div>`:''}</td><td>${esc(r.funcao||'Sem função')}</td><td style="white-space:nowrap">${esc(formatCPF(r.cpf)||'—')}</td><td>${esc(r.rg||'—')}</td><td style="white-space:nowrap">${esc(r.nascimento||'—')}</td><td>${status}</td></tr>`;
  }).join('')}</tbody></table><div style="padding:10px 12px;color:var(--text3);font-size:12px;border-top:1px solid var(--border)">Prévia: ${rows.length} colaborador(es) · ${novos} novo(s) · ${atualizaveis} atualização(ões) · ${ignorados} ignorado(s). Empresa padrão: ${esc(opts.empresa)} · ${opts.scope==='obra'?'obra de destino':'vínculo padrão'}: ${esc(opts.obra||'Sem obra')}.</div>`;
}

  event?.stopPropagation?.();
  const file=document.getElementById('m-func-import-file')?.files?.[0];
  if(!file){toast('Selecione a planilha antes de importar.','#ef4444');return;}
  if(!window._funcImportDrafts?.length)await window._previewFuncionariosImport(file);
  const opts=funcionarioImportOptions();
  const drafts=(window._funcImportDrafts||[]).filter(r=>!r.duplicate);
  const inserts=drafts.filter(r=>!r.existingId).map(r=>({
    id:uid(),obra:opts.obra||'',nome:r.nome,funcao:r.funcao,empresa:opts.empresa,telefone:'',documento:r.documento,data_entrada:null,status:'Ativo'
  }));
  const updateDrafts=opts.updateExisting?drafts.filter(r=>r.existingId):[];
  if(!inserts.length&&!updateDrafts.length){toast('Nenhum colaborador novo ou existente para importar.','#f59e0b');return;}
  if(!confirm(`Importar ${inserts.length} novo(s) e atualizar ${updateDrafts.length} existente(s)?`))return;
  const btn=document.querySelector('.modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}
  if(inserts.length){
    const{error}=await sb.from('funcionarios').insert(inserts);
    if(error){if(btn){btn.disabled=false;btn.textContent=opts.scope==='obra'?'Importar para a obra':'Importar colaboradores';}toast('Erro ao importar colaboradores: '+error.message,'#ef4444');return;}
    DB.funcionarios=[...(DB.funcionarios||[]),...inserts];
  }
  if(updateDrafts.length){
    const updates=await Promise.all(updateDrafts.map(d=>{
      const atual=(DB.funcionarios||[]).find(f=>f.id===d.existingId)||{};
      const patch={nome:d.nome,funcao:d.funcao||atual.funcao||'',empresa:opts.empresa||atual.empresa||'JET',documento:d.documento||atual.documento||'',status:atual.status||'Ativo'};
      if(opts.scope==='obra'&&opts.obra)patch.obra=opts.obra;
      else if(!atual.obra&&opts.obra)patch.obra=opts.obra;
      return sb.from('funcionarios').update(patch).eq('id',d.existingId).then(res=>({res,d,patch}));
    }));
    const failed=updates.find(u=>u.res.error);
    if(failed){if(btn){btn.disabled=false;btn.textContent=opts.scope==='obra'?'Importar para a obra':'Importar colaboradores';}toast('Erro ao atualizar colaborador: '+failed.res.error.message,'#ef4444');return;}
    DB.funcionarios=(DB.funcionarios||[]).map(f=>{const u=updates.find(x=>x.d.existingId===f.id);return u?{...f,...u.patch}:f;});
  }
  DB.funcionarios=(DB.funcionarios||[]).sort((a,b)=>String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR'));
  S.officeRhObraFilter='Todas';
  S.officeRhStatusFilter='Todos';
  toast(`${inserts.length} colaborador(es) importado(s) e ${updateDrafts.length} atualizado(s)!`,'#22c55e');
  _closeModal();
  renderApp();
};

window._autoGerarCodigos=()=>{
  const inventario=getAlmoxInventario();
  const semCodigo=inventario.filter(i=>!getAlmoxItemCodigo(i));
  if(!semCodigo.length){toast('Todos os itens já têm código.','#22c55e');return;}
  const existing=new Set(inventario.map(i=>getAlmoxItemCodigo(i)).filter(Boolean));
  let counter=1;
  const nextCode=()=>{
    while(existing.has(`JET-${String(counter).padStart(6,'0')}`))counter++;
    const c=`JET-${String(counter).padStart(6,'0')}`;
    existing.add(c);counter++;
    return c;
  };
  semCodigo.forEach(i=>setAlmoxItemMeta(i.id,{codigo:nextCode()}));
  toast(`${semCodigo.length} código(s) gerado(s)!`,'#22c55e');
  renderApp();
};

window._renameAlmoxDeposito=async el=>{

window._setExpedicaoStatus=(num,status)=>{
  const key=getAlmoxTransferKey(num);
  const group=buildAlmoxExpedicaoGroups().find(item=>item.key===key);
  if(!group)return;
  const nextStatus=normalizeAlmoxTransferStatus(status);
  if(group.status===nextStatus){renderApp();return;}
  if(nextStatus==='Recebido'){
    window._openExpedicaoRecebimento(key);
    return;
  }
  const patch={status:nextStatus};
  if(nextStatus==='Em transito'&&!group.meta.transito_em)patch.transito_em=todayISO();
  if(nextStatus==='Separado'){
    patch.transito_em='';
    patch.recebido_em='';
    patch.recebido_por='';
    patch.recebimento_obs='';
  }
  setAlmoxTransferMeta(key,patch);
  if(nextStatus==='Em transito'&&group.status!=='Em transito'){
    group.items.forEach(item=>logAlmoxMovimento({
      tipo:'Despacho',
      itemId:item.id,
      item:item.item,
      obra_origem:group.meta.obra_origem||'ALMOX CENTRAL',
      obra_destino:item.obra||'',
      qtd:Number(item.qtd||0),
      unidade:item.unidade||'un',
      responsavel:item.responsavel||currentUser?.email?.split('@')[0]||'',
      numero_controle:key,
      saldo_anterior:Number(item.qtd||0),
      saldo_atual:Number(item.qtd||0),
      observacao:`Transferencia ${key} despachada para a obra.`,
      data:patch.transito_em||todayISO(),
      created_at:new Date().toISOString()
    }));
  }
  toast(`Transferencia ${key} atualizada para ${nextStatus}.`,'#22c55e');
  renderApp();
};

function mergeStockObservation(base,extra){return[base,extra].map(v=>String(v||'').trim()).filter(Boolean).join(' | ');}
let _almoxActionBusy=false;
async function withAlmoxActionLock(task){
  if(_almoxActionBusy){toast('Aguarde a conclusao da operacao atual.','#f59e0b');return false;}
  _almoxActionBusy=true;
  try{return await task();}finally{_almoxActionBusy=false;}
}
window._syncAlmoxEntradaSelection=()=>{
  const selectedId=document.getElementById('m-ent-item-id')?.value?.trim();
  const item=selectedId?getAlmoxInventario().find(row=>row.id===selectedId):null;
  const saldo=document.getElementById('m-ent-saldo');
  const name=document.getElementById('m-ent-item');
  const unit=document.getElementById('m-ent-unit');
  const obra=document.getElementById('m-ent-obra');
  const min=document.getElementById('m-ent-min');
  const num=document.getElementById('m-ent-num');
  if(saldo)saldo.value=item?`${item.qtd||0} ${item.unidade||'un'}`:'Novo recebimento';
  if(item){
    if(name)name.value=item.item||'';
    if(unit)unit.value=item.unidade||'un';
    if(obra)obra.value=item.obra||'GLOBAL';
    if(min)min.value=getAlmoxMinStock(item);
    if(num&&!num.value.trim())num.value=item.numero_controle||'';
  }else if(min&&!min.value){
    min.value=String(ALMOX_LOW_STOCK_QTD);
  }
};
window._syncAlmoxSaidaSelection=()=>{
