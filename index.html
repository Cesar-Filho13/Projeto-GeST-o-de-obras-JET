const LINKED_TABLE_LABELS={aditivos:'Aditivos',materiais:'Materiais',funcionarios:'Funcionários',rdo:'RDO',todos:'A Fazer',despesas:'Adiantamentos',estoque:'Estoque',pedidos:'Pedidos',cotacoes:'Cotações'};
function normalizePedidoItem(item={}){
  const raw=typeof item==='string'?{nome:item}:item||{};
  return{
    nome:String(raw.nome??raw.item??'').trim(),
    qtd:raw.qtd===''?'':(raw.qtd??''),
    unidade:String(raw.unidade??raw.unid??'un').trim()||'un',
    valor:raw.valor===''?'':(raw.valor??''),
    obs:String(raw.obs??raw.observacao??'').trim()
  };
}
function normalizePedidoItems(items=[]){
  return(Array.isArray(items)?items:[]).map(normalizePedidoItem).filter(item=>item.nome||item.qtd||item.valor||item.obs);
}
function calcPedidoTotal(items=[]){
  return normalizePedidoItems(items).reduce((sum,item)=>sum+(Number(item.qtd)||0)*(Number(item.valor)||0),0);
}
function normalizeCotacaoItem(entry={}){
  const raw=typeof entry==='string'?{fornecedor:entry}:entry||{};
  const itens=normalizeCommercialItems(raw.itens||raw.items||[]);
  const preco=moneyNumber(raw.preco??raw.valor_total??raw.total);
  const empresa=normalizeCommercialCompany(raw.empresa||raw.company||raw.empresa_id||raw.empresaId||null);
  return{
    fornecedor:String(raw.fornecedor||raw.nome||'').trim(),
    preco,
    prazo:String(raw.prazo||raw.prazo_dias||'').trim(),
    observacao:String(raw.observacao||raw.obs||'').trim(),
    itens,
    empresa_id:String(raw.empresa_id||raw.empresaId||empresa?.id||'').trim(),
    escolhido:!!raw.escolhido
  };
}
function normalizeCotacaoItems(items=[]){
  return(Array.isArray(items)?items:[]).map(normalizeCotacaoItem).filter(item=>item.fornecedor);
}
function normalizeCotacaoStatus(status){
  if(status==='Pendente')return'Solicitada';
  return COTACAO_STATUS_LIST.includes(status)?status:'Solicitada';
}
function cotacaoMelhorPreco(items=[]){
  const values=normalizeCotacaoItems(items).map(item=>item.preco).filter(v=>v!=null);
  return values.length?Math.min(...values):null;
}
function cotacaoVencedor(items=[]){
  const list=normalizeCotacaoItems(items);
  return list.find(item=>item.escolhido)||null;
}
async function saveCotacaoPatch(id,patch,{silent=false}={}){
  const idx=(DB.cotacoes||[]).findIndex(c=>c.id===id);
  if(idx<0)return false;
  const current=DB.cotacoes[idx];
  const next={...current,...patch};
  if('cotacoes' in patch)next.cotacoes=normalizeCotacaoItems(patch.cotacoes);
  if('status' in patch)next.status=normalizeCotacaoStatus(patch.status);
  DB.cotacoes[idx]=next;
  const payload={...patch};
  if('cotacoes' in payload)payload.cotacoes=next.cotacoes;
  if('status' in payload)payload.status=next.status;
  const {error}=await sb.from('cotacoes').update(payload).eq('id',id);
  if(error){
    DB.cotacoes[idx]=current;
    if(!silent)toast('Erro ao salvar cotação: '+error.message,'#ef4444');
    return false;
  }
  return true;
}
function buildObraDeleteMap(obra){
  return Object.fromEntries(OBRA_LINKED_TABLES.map(table=>[table,(DB[table]||[]).filter(row=>row?.obra===obra).map(row=>row.id)]));
}
function linkedObraCount(map={}){return Object.values(map||{}).reduce((sum,ids)=>sum+(Array.isArray(ids)?ids.length:0),0);}
async function savePedidoPatch(id,patch,{silent=false}={}){
  const idx=(DB.pedidos||[]).findIndex(p=>p.id===id);
  if(idx<0)return false;
  const current=DB.pedidos[idx];
  const next={...current,...patch};
  if('itens' in patch)next.itens=normalizePedidoItems(patch.itens);
  if('itens' in patch&&!'total' in patch)next.total=calcPedidoTotal(next.itens||[]);
  const payload={...patch};
  if('itens' in payload)payload.itens=next.itens;
  if('total' in payload||'itens' in payload)payload.total=next.total;
  DB.pedidos[idx]=next;
  const {error}=await sb.from('pedidos').update(payload).eq('id',id);
  if(error){DB.pedidos[idx]=current;if(!silent)toast('Erro ao salvar pedido: '+error.message,'#ef4444');return false;}
  return true;
}

let deletionHistory=[];
function scheduleUndo(type,data,timeout=10000){const id=uid();const undoItem={id,type,data,createdAt:Date.now(),timeout};deletionHistory.push(undoItem);const undoToast=document.createElement('div');undoToast.id='undo-'+id;undoToast.className='toast';undoToast.style.cssText='bottom:100px;left:50%;transform:translateX(-50%);min-width:300px;gap:12px';let remaining=Math.ceil(timeout/1000);const updateCountdown=()=>{undoToast.innerHTML=`<span>${type==='obra'?'🏗️':'👤'} ${type==='obra'?'Obra':'Funcionário'} excluído</span><div style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:var(--text3)">${remaining}s</span><button onclick="window._performUndo('${id}')" style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap">↩ Desfazer</button></div>`;};updateCountdown();document.body.appendChild(undoToast);const countdownInterval=setInterval(()=>{remaining--;if(remaining<=0){clearInterval(countdownInterval);undoToast.remove();deletionHistory=deletionHistory.filter(u=>u.id!==id);}else{updateCountdown();}},1000);}
window._performUndo=async(id)=>{const item=deletionHistory.find(u=>u.id===id);if(!item)return;const {type,data}=item;deletionHistory=deletionHistory.filter(u=>u.id!==id);document.getElementById('undo-'+id)?.remove();try{if(type==='obra'){saveCustomObras(uniqObras([...getCustomObras(),data.nome]));saveHiddenObras(getHiddenObras().filter(o=>o!==data.nome));saveArchivedObras(getArchivedObras().filter(o=>o!==data.nome));saveObrasData([...getObrasData().filter(o=>o?.nome!==data.nome),data]);await saveRemoteObras([...(DB.obraRegistry||[]),data.nome]);toast('✓ Obra restaurada!','#22c55e');}else if(type==='funcionario'){await sb.from('funcionarios').insert([data]);toast('✓ Funcionário restaurado!','#22c55e');}await loadAll();renderApp();}catch(e){toast('Erro ao desfazer: '+e.message,'#ef4444');}};

function makeCd(options,map,currentVal,onSelect,large=false){
  const id='cd-'+(++_cdSeq);
  _cdStore[id]={map,options};
  const t=map[currentVal]||{bg:'#161616',c:'#888'};
  return`<div class="cd-wrap">
<button id="${id}" class="cd-trigger${large?' cd-trigger-lg':''}" style="background:${t.bg};color:${t.c}" data-val="${esc(currentVal)}"
  onclick="event.stopPropagation();_openCd('${id}',(v)=>{${onSelect.replace(/VAL/g,'v')}})">
  <span class="cd-val">${esc(currentVal)}</span>
  <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="${t.c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,1 5,5 9,1"/></svg>
</button></div>`;
}

function _openCd(triggerId,onSelect){
  closeCd();
  const trigger=document.getElementById(triggerId);if(!trigger)return;
  const store=_cdStore[triggerId];if(!store)return;
  const{map,options}=store;
  const rect=trigger.getBoundingClientRect();
  const menu=document.createElement('div');menu.className='cd-menu';
  menu.style.left=rect.left+'px';menu.style.top=(rect.bottom+4)+'px';
  let lastGroup='';
  menu.innerHTML=options.map((opt,idx)=>{
    const t=map[opt]||{bg:'#1a1a1a',c:'#888',d:'#555'};
    const isSel=trigger.dataset.val===opt;
    const group=t.group||'';
    const groupHtml=group&&group!==lastGroup?`${idx?'<div class="cd-divider"></div>':''}<div class="cd-group">${esc(group)}</div>`:'';
    lastGroup=group||lastGroup;
    return`${groupHtml}<div class="cd-option" data-opt="${esc(opt)}" style="background:${t.bg};color:${t.c}" onclick="event.stopPropagation();_cdPick('${triggerId}',this)">
<span class="cd-option-dot" style="background:${t.d||t.c}"></span>
<span style="flex:1">${esc(opt)}</span>
${isSel?'<span style="color:#22c55e">✓</span>':''}
</div>`;
  }).join('');
  document.body.appendChild(menu);_cdActive=menu;_cdOnSelectFn=onSelect;
  requestAnimationFrame(()=>{const mr=menu.getBoundingClientRect();if(mr.right>window.innerWidth-8)menu.style.left=(window.innerWidth-mr.width-8)+'px';if(mr.bottom>window.innerHeight-8)menu.style.top=(rect.top-mr.height-4)+'px';});
}

function _cdPick(triggerId,optEl){
  const val=optEl.dataset.opt;
  closeCd();
  const trigger=document.getElementById(triggerId);
  if(trigger){
    const store=_cdStore[triggerId];
    const t=store?.map[val]||{bg:'#161616',c:'#888'};
    trigger.style.background=t.bg;trigger.style.color=t.c;trigger.dataset.val=val;
    const label=trigger.querySelector('.cd-val');if(label)label.textContent=val;
    const svg=trigger.querySelector('svg');if(svg)svg.style.stroke=t.c;
  }
  if(_cdOnSelectFn)_cdOnSelectFn(val);
}

const UPDATE_FIELD_ALLOWLIST={
  aditivos:new Set(['nome','numero','status','valor','solicitacao','proposta','responsavel','data']),
  materiais:new Set(['item','quantidade','unidade','disciplina','urgencia','status','observacao_item']),
  funcionarios:new Set(['status']),
  todos:new Set(['responsavel','status','prioridade']),
  despesas:new Set(['descricao','nfe','loja','valor_conta']),
  estoque:new Set(['item','qtd','unidade']),
  pedidos:new Set(['numero','data','observacao','fornecedor','obra','responsavel','status','total']),
  fornecedores:new Set(['nome','telefone','email','cnpj','ativo'])
};
function canUpdateField(table,field){return UPDATE_FIELD_ALLOWLIST[table]?.has(field)===true;}
async function updateField(table,id,field,value){
  if(!canUpdateField(table,field)){
    console.warn('[JET] updateField bloqueado:',{table,field,id});
    toast('Campo não permitido para edição rápida.','#ef4444');
    return false;
  }
  const row=DB[table]?.find(r=>r.id===id);
  if(table==='materiais'&&field==='unidade')value=normalizeMaterialUnit(value);
  if(table==='materiais'&&field==='item'&&row){
    const key=normalizeMaterialSpec(value);
    const hasDuplicate=key&&DB.materiais.some(m=>m.id!==id&&m.obra===row.obra&&(m.data_solicitacao||'')===(row.data_solicitacao||'')&&normalizeMaterialSpec(m.item)===key);
    if(hasDuplicate&&!confirm(`Atenção: "${value}" já existe nesta solicitação.\n\nDeseja salvar mesmo assim?`))return false;
  }
  const oldVal=row?row[field]:undefined;
  if(row)row[field]=value;
  const{error}=await sb.from(table).update({[field]:value}).eq('id',id);
  if(error){toast('Erro ao salvar: '+error.message,'#ef4444');if(row)row[field]=oldVal;return false;}
  return true;
}

function setupRT(){
  ['aditivos','materiais','funcionarios','rdo','todos','despesas','estoque','pedidos','fornecedores','cotacoes'].forEach(table=>{
    sb.channel('rt-'+table).on('postgres_changes',{event:'*',schema:'public',table},({eventType:et,new:n,old:o})=>{
      if(et==='INSERT'){if(!DB[table].find(r=>r.id===n.id))DB[table].unshift(n);}
      else if(et==='UPDATE'){const i=DB[table].findIndex(r=>r.id===n.id);if(i>=0)DB[table][i]=n;}
      else if(et==='DELETE')DB[table]=DB[table].filter(r=>r.id!==o.id);
      renderApp();
    }).subscribe();
  });
}

  if(!email||!pass){renderAuth('Preencha e-mail e senha.');return;}
  renderAuth('',true);

    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});

function getMentionDirectory(){
  const fromFuncionarios=(DB.funcionarios||[]).flatMap(f=>[f.email,f.usuario,f.user,f.nome]).filter(Boolean);
  const seen=new Set();
  return [...fromFuncionarios,...MENTION_FALLBACK_HANDLES]
    .map(value=>{
      const raw=String(value||'').trim().toLowerCase();
      if(!raw)return null;
      const email=raw.includes('@')?raw:'';
      const label=(email?email.split('@')[0]:raw).trim();
      const token=normalizeMentionToken(label);
      if(!token||seen.has(token))return null;
      seen.add(token);
      return {token,label,email};
    })
    .filter(Boolean)
    .sort((a,b)=>a.label.localeCompare(b.label));
}
function getTeamMembers(){return getMentionDirectory().map(item=>item.label);}
function getMentionSuggestions(query=''){
  const q=String(query||'').toLowerCase();
  return getTeamMembers().filter(name=>name.toLowerCase().includes(q));
}
function addISODate(iso,days=1){
  if(!iso)return'';
  const d=new Date(String(iso).slice(0,10)+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

}
function hideMentionMenus(){

  ['home-mention-menu','home-modal-mention-menu','mention-menu'].forEach(id=>{

}
function isNoticeRead(item,userToken=normalizeMentionToken(getCurrentUserHandle())){return(item.readBy||[]).includes(userToken);}
function isNoticeMention(item,userToken=normalizeMentionToken(getCurrentUserHandle())){return(item.mentions||[]).includes(userToken);}
function sortHomeNotices(list=[]){
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  return cleanNotices(list).sort((a,b)=>
    Number(b.pinned)-Number(a.pinned)
    || Number(isNoticeMention(b,userToken))-Number(isNoticeMention(a,userToken))
    || Number(!isNoticeRead(a,userToken))-Number(!isNoticeRead(b,userToken))
    || noticePriorityRank(b.prioridade)-noticePriorityRank(a.prioridade)
    || String(b.created_at||'').localeCompare(String(a.created_at||''))
  );
}
function renderNoticeText(text=''){
  return esc(text).replace(/\n/g,'<br>').replace(/@([\w.-]+)/g,'<span class="comment-mention">@$1</span>');
}
function getHomeNoticeStats(){
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  const list=DB.avisos||[];
  return{
    unread:list.filter(item=>!isNoticeRead(item,userToken)).length,
    mentions:list.filter(item=>isNoticeMention(item,userToken)).length,
    pinned:list.filter(item=>item.pinned).length
  };
}
function getFilteredHomeNotices(){
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  const filter=S.homeNoticeFilter||'all';
  let list=sortHomeNotices(DB.avisos||[]);
  if(filter==='unread')list=list.filter(item=>!isNoticeRead(item,userToken));
  if(filter==='mentions')list=list.filter(item=>isNoticeMention(item,userToken));
  return list;
}
let _homeMentionActive=false,_homeMentionStart=-1,_homeMentionQuery='',_homeMentionIdx=0;
window._homeNoticeInput=(el)=>{
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,150)+'px';
  const val=el.value,pos=el.selectionStart,before=val.slice(0,pos),atIdx=before.lastIndexOf('@');
  if(atIdx>=0&&(atIdx===0||/\s/.test(before[atIdx-1]))){
    const q=before.slice(atIdx+1);
    if(!/\s/.test(q)){
      _homeMentionActive=true;_homeMentionStart=atIdx;_homeMentionQuery=q;_homeMentionIdx=0;
      _showHomeMentions(getMentionSuggestions(q));
      return;
    }
  }
  _homeMentionActive=false;
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(menu)menu.style.display='none';
};
window._homeNoticeKey=(e)=>{
  if(_homeMentionActive){
    const items=getMentionSuggestions(_homeMentionQuery);
    if(e.key==='ArrowDown'){e.preventDefault();_homeMentionIdx=(_homeMentionIdx+1)%Math.max(items.length,1);_showHomeMentions(items);return;}
    if(e.key==='ArrowUp'){e.preventDefault();_homeMentionIdx=(_homeMentionIdx-1+Math.max(items.length,1))%Math.max(items.length,1);_showHomeMentions(items);return;}
    if(e.key==='Enter'&&items.length){e.preventDefault();_pickHomeMention(items[_homeMentionIdx]);return;}
    if(e.key==='Escape'){e.preventDefault();hideMentionMenus();return;}
  }
};
function _showHomeMentions(items){
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(!menu)return;
  if(!items.length){menu.style.display='none';return;}
  menu.style.display='block';
  menu.innerHTML=items.map((name,index)=>`<div class="mention-item${index===_homeMentionIdx?' active':''}" onmousedown="event.preventDefault();_pickHomeMention('${escJs(name)}')"><div class="m-avatar">${esc(name.charAt(0).toUpperCase())}</div>@${esc(name)}</div>`).join('');
}
function _pickHomeMention(name){
  const el=getHomeNoticeFieldRefs().textEl;
  if(!el)return;
  const val=el.value,after=val.slice(el.selectionStart);
  el.value=val.slice(0,_homeMentionStart)+'@'+name+' '+after;
  _homeMentionActive=false;
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(menu)menu.style.display='none';
  el.focus();
  window._homeNoticeInput(el);
}
window._toggleHomeNotices=(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  S.homeNoticeOpen=!S.homeNoticeOpen;
  renderApp();
};
window._openHomeNoticeModal=(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  S.homeNoticeOpen=false;
  S.modal='home-notice';
  S.modalData={};
  renderApp();
  setTimeout(()=>document.getElementById('m-home-aviso-text')?.focus(),0);
};
window._setHomeNoticeFilter=(filter)=>{S.homeNoticeFilter=filter;renderApp();};
window._postHomeNotice=async(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  const btn=event?.currentTarget||null;
  if(btn){btn.disabled=true;btn.dataset.originalText=btn.textContent;btn.textContent='Publicando...';}
  try{
    const{textEl,priorityEl,pinEl,inModal}=getHomeNoticeFieldRefs();
    if(!textEl){
      window._openHomeNoticeModal();
      toast('Formulario de aviso reaberto. Tente publicar novamente.','#f59e0b');
      return;
    }
    const texto=textEl.value.trim();
    if(!texto){toast('Escreva um aviso antes de publicar.','#f59e0b');textEl.focus();return;}
    const autorLabel=getCurrentUserHandle();
    const autor=normalizeMentionToken(autorLabel)||'sistema';
    const notice=cleanNotice({
      id:'hv-'+uid(),
      texto,
      autor,
      autorLabel,
      prioridade:priorityEl?.value||'Media',
      pinned:!!pinEl?.checked,
      readBy:[autor],
      mentions:parseMentions(texto),
      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    });
    DB.avisos=cleanNotices([notice,...(DB.avisos||[])]);
    saveLocalHomeNotices(DB.avisos);
    queueHomeNoticesSync(true);
    if(textEl){textEl.value='';textEl.style.height='auto';}
    if(priorityEl)priorityEl.value='Media';
    if(pinEl)pinEl.checked=false;
    if(inModal)S.modal=null;
    S.homeNoticeOpen=true;
    toast('Aviso publicado.','#22c55e');
    renderApp();
  }catch(err){
    console.error('[JET] Erro ao publicar aviso:',err);
    const msg=String(err?.message||err||'erro desconhecido').slice(0,120);
    toast(`Nao consegui publicar o aviso: ${msg}`,'#ef4444');
  }finally{
    if(btn&&document.body.contains(btn)){
      btn.disabled=false;
      btn.textContent=btn.dataset.originalText||'Publicar aviso';
    }
  }
};
window._toggleNoticeRead=(id)=>{
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  DB.avisos=(DB.avisos||[]).map(item=>{
    if(item.id!==id)return item;
    const readBy=new Set((item.readBy||[]).map(normalizeMentionToken));
    if(readBy.has(userToken))readBy.delete(userToken);else readBy.add(userToken);
    return cleanNotice({...item,readBy:[...readBy],updated_at:new Date().toISOString()});
  });
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync();
  renderApp();
};
window._toggleNoticePinned=(id)=>{
  DB.avisos=(DB.avisos||[]).map(item=>item.id===id?cleanNotice({...item,pinned:!item.pinned,updated_at:new Date().toISOString()}):item);
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync();
  renderApp();
};
window._deleteNotice=(id)=>{
  const item=(DB.avisos||[]).find(entry=>entry.id===id);
  if(!item)return;
  if(!confirm(`Remover aviso de @${item.autorLabel||item.autor}?`))return;
  DB.avisos=(DB.avisos||[]).filter(entry=>entry.id!==id);
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync(true);
  renderApp();
};
window._markAllNoticesRead=()=>{
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  DB.avisos=(DB.avisos||[]).map(item=>{
    const readBy=new Set((item.readBy||[]).map(normalizeMentionToken));
    readBy.add(userToken);
    return cleanNotice({...item,readBy:[...readBy]});
  });
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync(true);
  renderApp();
};

function renderComprasModule(pedidos,fornecedores,cotacoes){
  const tab=S.comprasTab||'pedidos';
  const ativos=fornecedores.filter(f=>f.ativo!==false);
  const abertas=cotacoes.filter(c=>!['Fechada','Cancelada'].includes(normalizeCotacaoStatus(c.status))).length;
  const totalCompra=pedidos.reduce((sum,p)=>sum+((p.total!=null&&p.total!=='')?Number(p.total):calcPedidoTotal(p.itens||[])),0);
  const tabCounts={pedidos:pedidos.length,fornecedores:ativos.length,cotacoes:cotacoes.length};
  const subnav=['pedidos','fornecedores','cotacoes'].map(id=>{
    const defs={
      pedidos:{icon:'📋',label:'Pedidos'},
      fornecedores:{icon:'🏢',label:'Fornecedores'},
      cotacoes:{icon:'💵',label:'Cotações'}
    }[id];
    return `<button class="obra-nav-btn${tab===id?' active':''}" onclick="S.comprasTab='${id}';renderApp()"><span class="nav-icon">${defs.icon}</span>${defs.label}<span class="nav-count">${tabCounts[id]||0}</span></button>`;

  const section=tab==='pedidos'
    ? `<div class="panel-head"><div><div class="section-title">📋 Pedidos de Compra</div><div class="section-sub">${pedidos.length} pedido(s) · ${fmtV(totalCompra)} movimentados</div></div></div>${renderPedidosDashboard(pedidos)}`
    : tab==='fornecedores'

  return `<div><div class="section-header"><div><div class="section-title">🧾 Orçamentos Comerciais</div><div class="section-sub">Cadastre o orçamento com dados gerais, fornecedores e itens detalhados em popup.</div></div></div>${!cotacoes.length?`<div class="empty-state"><p>Nenhum orçamento cadastrado.</p><button class="btn btn-primary" onclick="S.modal='new-cotacao';S.modalData={obra:S.obra||''};renderApp()">+ Criar primeiro orçamento</button></div>`:`<div class="quote-board">${cotacoes.map(c=>renderCotacaoComercialCard(c)).join('')}</div>`}</div>`;

function renderCotacaoComercialCard(c){
  const id=escJs(c.id);
  const fornecedores=normalizeCotacaoItems(c.cotacoes||[]);
  const baseItems=getCotacaoBaseItems(c);
  const melhor=cotacaoMelhorPreco(fornecedores);

  const company=getCotacaoCompany(c);
  const expanded=window._cotExpanded&&window._cotExpanded[c.id];
  return `<div class="quote-card"><div class="quote-card-head"><div><div class="quote-card-title">${esc(c.item||'Cotação sem título')}</div><div class="quote-card-sub">${esc(c.obra||'Sem obra')} · ${fmtD(c.data)}${company?` · ${esc(company.short||company.nome)}`:''}${vencedor?` · vencedor: ${esc(vencedor.fornecedor)}`:''}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">${makeCd(COTACAO_STATUS_LIST,COTACAO_STATUS_MAP,normalizeCotacaoStatus(c.status),`window._updateCotacaoStatus('${id}',VAL)`)}<button class="btn btn-secondary btn-sm" onclick="window._toggleCotacaoExpand('${id}')">${expanded?'Ocultar':'Expandir'}</button><button class="btn btn-secondary btn-sm" onclick="window.cotacaoPDF('${id}')">PDF</button><button class="btn btn-secondary btn-sm" onclick="window.cotacaoXLSX('${id}')">Excel</button><button class="btn btn-secondary btn-sm" onclick="window.cotacaoTXT('${id}')">TXT</button></div></div><div class="quote-metrics"><span class="quote-metric">${baseItems.length} item(ns)</span><span class="quote-metric">${fornecedores.length} fornecedor(es)</span><span class="quote-metric">${melhor!=null?`Melhor ${fmtV(melhor)}`:'Aguardando preço'}</span></div>${expanded?renderCotacaoComercialExpanded(c,fornecedores,baseItems):''}</div>`;
}
function renderCotacaoComercialExpanded(c,fornecedores=[],baseItems=[]){
  const id=escJs(c.id);
  const itemRows=baseItems.length?baseItems.map(item=>`<tr><td>${esc(item.nome)}</td><td>${esc(item.descricao||'')}</td><td style="text-align:center">${esc(item.quantidade)}</td><td style="text-align:center">${esc(item.unidade)}</td></tr>`).join(''):`<tr><td colspan="4" class="quote-empty">Sem itens detalhados nesta cotação.</td></tr>`;
  const vendorRows=fornecedores.length?fornecedores.map((item,index)=>`<tr class="${item.escolhido?'quote-winner':''}"><td style="font-weight:700;color:var(--text)">${esc(item.fornecedor)}</td><td><input class="ci ci-num" type="number" step="0.01" value="${item.preco!=null?item.preco:''}" placeholder="0,00" onblur="window._updateCotacaoFornecedorField('${id}',${index},'preco',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td><td><input class="ci field-muted" value="${esc(item.prazo||'')}" placeholder="Ex: 3 dias" onblur="window._updateCotacaoFornecedorField('${id}',${index},'prazo',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td><td><input class="ci field-muted" value="${esc(item.observacao||'')}" placeholder="Condições, frete, garantia..." onblur="window._updateCotacaoFornecedorField('${id}',${index},'observacao',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td><td><button class="btn ${item.escolhido?'btn-success':'btn-secondary'} btn-sm" onclick="window._setCotacaoVencedor('${id}',${index})">${item.escolhido?'Selecionado':'Marcar vencedor'}</button></td></tr>`).join(''):`<tr><td colspan="5" class="quote-empty">Nenhum fornecedor selecionado.</td></tr>`;
  const company=getCotacaoCompany(c);
  return `<div class="commercial-quote-expanded">${company?renderCommercialCompanyPreview(company):''}<div class="quote-vendor-table"><table><thead><tr><th>Item</th><th>Descrição</th><th style="width:80px">Qtd</th><th style="width:80px">Unid</th></tr></thead><tbody>${itemRows}</tbody></table></div><div class="quote-vendor-table" style="margin-top:12px"><table><thead><tr><th>Fornecedor</th><th style="width:130px">Valor total</th><th style="width:130px">Prazo</th><th>Observação</th><th style="width:140px">Vencedor</th></tr></thead><tbody>${vendorRows}</tbody></table></div></div>`;
}
function getCotacaoBaseItems(c){
  const fornecedores=normalizeCotacaoItems(c?.cotacoes||[]);
  const first=fornecedores.find(f=>f.itens&&f.itens.length);
  if(first)return normalizeCommercialItems(first.itens);
  return normalizeCommercialItems(c?.itens||[]);
}
function getCotacaoCompany(c){
  const fornecedores=normalizeCotacaoItems(c?.cotacoes||[]);
  const found=fornecedores.find(f=>f.empresa||f.empresa_id);
  return normalizeCommercialCompany(found?.empresa||found?.empresa_id||c?.empresa||c?.empresa_id||null);
}

function getOfficeTeamSummary(){
  const obras=getAllObras();
  return obras.map(obra=>{
    const funcs=(DB.funcionarios||[]).filter(f=>f.obra===obra).sort((a,b)=>String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR'));
    const active=funcs.filter(f=>(f.status||'Ativo')==='Ativo').length;
    const attention=funcs.filter(f=>['Ausente','Afastado'].includes(f.status)).length;
    const desligados=funcs.filter(f=>f.status==='Desligado').length;
    return{obra,funcs,total:funcs.length,active,attention,desligados};
  });
}
function formatOfficeTenure(dateValue){
  if(!dateValue)return 'Sem data';
  const d=new Date(dateValue);
  if(Number.isNaN(d.getTime()))return fmtD(dateValue);
  const now=new Date();
  let months=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
  if(now.getDate()<d.getDate())months--;
  months=Math.max(0,months);
  if(months<1)return 'Novo';
  if(months<12)return `${months} mês${months===1?'':'es'}`;
  const years=Math.floor(months/12);
  const rest=months%12;
  return rest?`${years}a ${rest}m`:`${years} ano${years===1?'':'s'}`;
}

function renderOfficeTeamDistribution(){
  const rows=getOfficeTeamSummary();
  const cards=rows.map(row=>{
    const groups={};
    row.funcs.forEach(f=>{
      const fn=String(f.funcao||'Sem função').trim()||'Sem função';
      if(!groups[fn])groups[fn]={total:0,ativos:0,atencao:0,desligados:0};
      groups[fn].total++;
      if((f.status||'Ativo')==='Ativo')groups[fn].ativos++;
      else if(['Ausente','Afastado'].includes(f.status))groups[fn].atencao++;
      else if(f.status==='Desligado')groups[fn].desligados++;
    });
    const chips=Object.entries(groups).sort((a,b)=>b[1].total-a[1].total||a[0].localeCompare(b[0],'pt-BR')).map(([funcao,g])=>`<span class="office-dist-chip"><strong>${esc(funcao)}</strong>${g.total} total · ${g.ativos} ativos</span>`).join('')||`<span class="office-dist-chip muted">Sem equipe cadastrada</span>`;
    return `<div class="office-dist-card"><div class="office-dist-head"><strong>${esc(row.obra)}</strong><span>${row.total} funcionário(s)</span></div><div class="office-dist-chips">${chips}</div></div>`;
  }).join('');
  return `<div class="office-dist-list">${cards}</div>`;
}

function getOfficeExportConfig(scope='funcionarios'){
  const today=new Date().toLocaleDateString('pt-BR');
  if(scope==='avisos'){
    const rows=sortHomeNotices(DB.avisos||[]).map((n,i)=>({idx:i+1,data:fmtD(n.created_at),autor:n.autorLabel||n.autor||'',prioridade:n.prioridade||'Media',mencoes:(n.mentions||[]).map(m=>'@'+m).join(', '),aviso:n.texto||''}));
    return{title:'Avisos internos - Escritório',filename:'Avisos_Escritorio',meta:[`Exportado em ${today}`,`${rows.length} aviso(s)`],columns:[{header:'#',key:'idx',width:8,align:'center'},{header:'Data',key:'data',width:14},{header:'Autor',key:'autor',width:20},{header:'Prioridade',key:'prioridade',width:14},{header:'Menções',key:'mencoes',width:28},{header:'Aviso',key:'aviso',width:58}],rows};
  }
  if(scope==='distribuicao'){
    const rows=[];
    getOfficeTeamSummary().forEach(item=>{
      const groups={};
      item.funcs.forEach(f=>{
        const funcao=String(f.funcao||'Sem função').trim()||'Sem função';
        if(!groups[funcao])groups[funcao]={obra:item.obra,funcao,total:0,ativos:0,atencao:0,desligados:0};
        groups[funcao].total++;
        if((f.status||'Ativo')==='Ativo')groups[funcao].ativos++;
        else if(['Ausente','Afastado'].includes(f.status))groups[funcao].atencao++;
        else if(f.status==='Desligado')groups[funcao].desligados++;
      });
      const values=Object.values(groups);
      if(values.length)rows.push(...values);else rows.push({obra:item.obra,funcao:'Sem equipe cadastrada',total:0,ativos:0,atencao:0,desligados:0});
    });
    return{title:'Distribuição das Equipes por Obra',filename:'Distribuicao_Equipes_Obras',meta:[`Exportado em ${today}`,`${rows.length} linha(s)`],columns:[{header:'Obra',key:'obra',width:24},{header:'Função',key:'funcao',width:28},{header:'Total',key:'total',width:10,align:'center'},{header:'Ativos',key:'ativos',width:10,align:'center'},{header:'Atenção',key:'atencao',width:10,align:'center'},{header:'Desligados',key:'desligados',width:12,align:'center'}],rows};
  }
  const filtered=scope==='funcionarios-filtrado';
  const rows=getOfficeFuncionarioRows(filtered);
  const selectedObra=S.officeRhObraFilter||'Todas';
  const selectedStatus=S.officeRhStatusFilter||'Todos';
  const meta=filtered?[`Exportado em ${today}`,`${rows.length} funcionário(s) no filtro`,`Obra: ${selectedObra}`,`Status: ${selectedStatus}`]:[`Exportado em ${today}`,`${DB.funcionarios.length} funcionário(s) gerais da empresa`];
  return{title:filtered?'Funcionários Filtrados - RH':'Funcionários Gerais da Empresa - RH',filename:filtered?'Funcionarios_RH_Filtro':'Funcionarios_Gerais_Empresa',meta,columns:[{header:'Obra',key:'obra',width:24},{header:'Nome',key:'nome',width:32},{header:'Função',key:'funcao',width:26},{header:'Empresa',key:'empresa',width:18},{header:'Telefone',key:'telefone',width:18},{header:'CPF / Documento',key:'documento',width:20},{header:'Entrada',key:'entrada',width:14},{header:'Tempo',key:'tempo',width:14},{header:'Status',key:'status',width:14,badgeMap:FS},{header:'Documentação',key:'documentacao',width:16},{header:'Contato',key:'contato',width:12}],rows};
}

window.officeEquipePDF=(scope='funcionarios')=>{
  if(!window.jspdf){toast('Biblioteca não carregada.','#f59e0b');return;}
  const cfg=getOfficeExportConfig(scope);
  if(!cfg.rows.length){toast('Sem dados para exportar.','#f59e0b');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,M=14;
  doc.setFillColor(26,46,107);doc.circle(M+10,14,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);doc.text('JET',M+10,16,{align:'center'});
  doc.setFontSize(15);doc.setTextColor(20,32,60);doc.text(cfg.title,M+26,12);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,110,130);doc.text(cfg.meta.join(' · '),M+26,18);
  doc.setDrawColor(26,46,107);doc.setLineWidth(.6);doc.line(M,26,W-M,26);
  doc.autoTable({startY:30,margin:{left:M,right:M},head:[cfg.columns.map(c=>c.header)],body:cfg.rows.map(r=>cfg.columns.map(c=>String(r[c.key]??''))),styles:{fontSize:8,cellPadding:2.4,textColor:[20,32,60]},headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[245,248,255]},didDrawPage:(d)=>{doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`JET Gestão de Obras · Pág ${d.pageNumber}`,W/2,205,{align:'center'});}});
  doc.save(`${cfg.filename}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('PDF exportado!');
};

window._officeGo=(action)=>{
  const firstObra=getAllObras()[0]||'';
  if(action==='compras'){S.page='dashboard';S.modulo='compras';S.comprasTab='pedidos';S.obra=null;}
  else if(action==='fornecedores'){S.page='dashboard';S.modulo='compras';S.comprasTab='fornecedores';S.obra=null;}
  else if(action==='obras'){S.page='dashboard';S.modulo='obras';S.obra=null;}
  else if(action==='gerenciar'){S.page='gerenciar-obras';S.modulo='obras';S.obra=null;}
  else if(action==='funcionarios'&&firstObra){S.page='obra';S.modulo='obras';S.obra=firstObra;S.obraTab='funcionarios';S.selectedAditivo=null;}
  else if(action==='despesas'&&firstObra){S.page='obra';S.modulo='obras';S.obra=firstObra;S.obraTab='despesas';S.selectedAditivo=null;}
  else if(action==='avisos'){S.page='home';S.homeNoticeOpen=true;}
  else if(action==='team-expand'){S.page='dashboard';S.modulo='escritorio';S.escritorioTab='rh';S.officeOpen={...(S.officeOpen||{}),funcionarios:true};}
  else if(action==='team-distrib'){S.page='dashboard';S.modulo='escritorio';S.escritorioTab='rh';S.officeOpen={...(S.officeOpen||{}),distribuicao:true};}
  else if(action==='new-notice'){window._openHomeNoticeModal();return;}
  else{S.page='dashboard';S.modulo='obras';S.obra=null;}
  renderApp();
};

function _thCol(field,icon,label,minW){
  const w=window._colWidths&&window._colWidths[field]?`width:${window._colWidths[field]}px;min-width:${window._colWidths[field]}px`:`min-width:${minW}px`;
  const ico=TH_ICONS[field];
  return`<th style="${w}" data-field="${field}" class="sortable" onclick="window._sortBy&&window._sortBy('${field}')">
<div class="th-inner">
  ${ico?`<span class="th-icon" style="color:${ico.color}">${ico.svg}</span>`:`<span class="th-icon">${icon}</span>`}

<div class="col-resize" onmousedown="window._startResize&&window._startResize(event,'${field}')"></div>
</th>`;
}

    if(!handle)return;
    handle.addEventListener('mousedown',e=>{

  return`<div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
  <span style="font-size:13px;font-weight:600;color:var(--text2)">${rows.length} item${rows.length!==1?'s':''}</span>
  ${total>0?`<span style="font-size:13px;font-weight:700;color:#34d399">Total: ${fmtV(total)}</span>`:''}
</div>
<div class="tbl-wrap"><table>
<thead><tr><th style="min-width:200px">Descrição</th><th style="width:70px">Unid.</th><th style="width:80px">Qtd.</th><th style="width:110px">Valor Unit.</th><th style="width:110px">Subtotal</th><th>Observação</th><th style="width:36px"></th></tr></thead>
<tbody>
${rows.map(r=>{const sub=Number(r.quantidade||0)*Number(r.valor_unit||0);return`<tr>
<td>${ci(r.id,'nome','Item...','100%')}</td>
<td>${ci(r.id,'unidade','un','100%')}</td>

<td style="text-align:right;font-weight:600;color:${sub>0?'#34d399':'var(--text3)'}">${sub>0?fmtV(sub):'—'}</td>
<td>${ci(r.id,'observacao','Observação...','100%')}</td>
<td><button onclick="window._plDel('${a.id}','${r.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button></td>
</tr>`;}).join('')}
</tbody></table></div>
<button onclick="window._plAdd('${a.id}')" class="btn-pulse"
  style="margin-top:10px;background:linear-gradient(135deg,#1d4ed8,#3b7ef8);border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:700;padding:9px 18px;border-radius:9px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:7px;transition:all .15s"
  onmouseover="this.style.transform='scale(1.03)';this.style.background='linear-gradient(135deg,#1e40af,#2563eb)'"
  onmouseout="this.style.transform='scale(1)';this.style.background='linear-gradient(135deg,#1d4ed8,#3b7ef8)'">
  <span style="font-size:18px;line-height:1">+</span> Adicionar item
</button>
</div>`;
}

window._plAdd=async(aid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=[...(a.planilha||[]),{id:uid(),nome:'',unidade:'',quantidade:'',valor_unit:'',observacao:''}];await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;renderApp();};
window._plDel=async(aid,rid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=(a.planilha||[]).filter(r=>r.id!==rid);await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;renderApp();};
window._plUp=async(aid,rid,field,val)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=(a.planilha||[]).map(r=>r.id===rid?{...r,[field]:val}:r);await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;};

// ─── ARQUIVOS ─────────────────────────────────────────────────────────────
const FC={pdf:{bg:'#3b1515',c:'#f87171',l:'PDF'},png:{bg:'#0a2214',c:'#4ade80',l:'IMG'},jpg:{bg:'#0a2214',c:'#4ade80',l:'IMG'},jpeg:{bg:'#0a2214',c:'#4ade80',l:'IMG'},dwg:{bg:'#0e1f3d',c:'#60a5fa',l:'DWG'},dxf:{bg:'#0e1f3d',c:'#60a5fa',l:'DXF'},xlsx:{bg:'#062018',c:'#34d399',l:'XLS'},docx:{bg:'#1a0f3d',c:'#a78bfa',l:'DOC'}};
function fstyle(n){const e=getExt(n);return FC[e]||{bg:'#1a1a1a',c:'#777',l:e.slice(0,3).toUpperCase()||'?'};}

function renderArquivos(a){
  const files=a.arquivos||[];
  const imgs=files.filter(f=>isImg(f.name));
  const docs=files.filter(f=>!isImg(f.name));
  return`<div>
<div class="upload-zone-outer" id="uz-${a.id}" style="border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .15s" onclick="document.getElementById('fi-${a.id}').click()" onmouseover="this.style.borderColor='var(--blue)';this.style.background='#0e1a30'" onmouseout="this.style.borderColor='var(--border2)';this.style.background='transparent'">
<input type="file" id="fi-${a.id}" multiple accept="${UPLOAD_ACCEPT}" style="display:none" onchange="window._upload(event,'${a.id}')">
<div style="font-size:13px;color:var(--text3)">📎 Clique ou arraste arquivos aqui</div>
<div style="font-size:11px;color:var(--text3);margin-top:4px">PDF, DWG, DXF, imagens, planilhas e ZIP até 20 MB</div>
</div>
${imgs.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:10px">${imgs.map(f=>`<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--bg2);border:1px solid var(--border)" class="img-th">
<a href="${esc(f.url)}" target="_blank"><img src="${esc(f.url)}" style="width:100%;height:100%;object-fit:cover;display:block"></a>
<button onclick="window._delFile('${a.id}','${f.id}')" style="position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.75);border:none;color:#f87171;cursor:pointer;font-size:12px;display:none" class="img-del">×</button>
<div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:10px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.8));overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div>
</div>`).join('')}</div>`:''}
<div style="display:flex;flex-direction:column;gap:6px">
${docs.map(f=>{const st=fstyle(f.name);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px">
<div style="width:30px;height:30px;border-radius:6px;background:${st.bg};color:${st.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${st.l}</div>
<span style="flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
<span style="font-size:11px;color:var(--text3)">${fmtSz(f.size||0)}</span>
<a href="${esc(f.url)}" target="_blank" class="btn btn-sm btn-secondary" style="text-decoration:none">Abrir</a>
<button onclick="window._delFile('${a.id}','${f.id}')" class="btn btn-sm btn-danger">×</button>
</div>`;}).join('')}
</div></div>`;
}

window._upload=async(e,aid)=>{for(const f of e.target.files)await _doUpload(aid,f);e.target.value='';};
async function _doUpload(aid,file){
  if(!validateUploadFile(file))return;
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  toast(`Enviando ${file.name}...`,'#60a5fa');
  const path=`${aid}/${uid()}_${sanitizeStorageName(file.name)}`;
  const{error:ue}=await sb.storage.from(BUCKET).upload(path,file);if(ue){toast('Erro: '+ue.message,'#ef4444');return;}
  const{data:ud}=sb.storage.from(BUCKET).getPublicUrl(path);
  const fo={id:uid(),name:file.name,size:file.size,path,url:ud.publicUrl};
  const arqs=[...(a.arquivos||[]),fo];
  await sb.from('aditivos').update({arquivos:arqs}).eq('id',aid);a.arquivos=arqs;
  toast(`${file.name} enviado!`);renderApp();
}
window._delFile=async(aid,fid)=>{if(!confirm('Remover arquivo?'))return;const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const fo=(a.arquivos||[]).find(f=>f.id===fid);if(fo)await sb.storage.from(BUCKET).remove([fo.path]);const arqs=(a.arquivos||[]).filter(f=>f.id!==fid);await sb.from('aditivos').update({arquivos:arqs}).eq('id',aid);a.arquivos=arqs;toast('Removido.','#f59e0b');renderApp();};

// ─── COMENTÁRIOS ──────────────────────────────────────────────────────────
let _mentionActive=false,_mentionStart=-1,_mentionQuery='',_mentionIdx=0;

function renderComentarios(a){
  const cs=a.comentarios||[];
  const autor=currentUser?currentUser.email.split('@')[0]:'';
  return`<div>
${cs.length===0?'<p style="font-size:13px;color:var(--text3);margin-bottom:20px;font-style:italic">Nenhum comentário ainda.</p>':''}
${cs.map((c,ci)=>{const parsed=esc(c.texto).replace(/@([\w.]+)/g,'<span class="comment-mention">@$1</span>');const isAuthor=c.autor===(currentUser?.email?.split('@')[0]||'');return`<div class="comment">
<div class="avatar">${esc(c.autor.charAt(0).toUpperCase())}</div>
<div style="flex:1"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px"><span style="font-size:13px;font-weight:600;color:var(--text)">${esc(c.autor)}</span><span style="font-size:11px;color:var(--text3)">${fmtD(c.data?.slice(0,10))}</span><span style="margin-left:auto;display:flex;gap:4px"><button onclick="window._editComment('${a.id}',${ci})" style="background:none;border:none;color:#3b82f6;cursor:pointer;font-size:12px;padding:2px" title="Editar">✏️</button><button onclick="window._deleteComment('${a.id}',${ci})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:2px" title="Excluir">🗑️</button></span></div><p id="comment-text-${ci}" style="font-size:13px;color:var(--text2);line-height:1.6">${parsed}</p></div>
</div>`;}).join('')}
<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-top:16px;border-top:1px solid var(--border)">
  <div class="avatar">${autor?getInitials(currentUser?.email):'?'}</div>
  <span style="font-size:12px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:100px;font-weight:500">${esc(autor||'Anônimo')}</span>
</div>
<div style="display:flex;gap:8px;align-items:flex-end">
  <div class="comment-input-wrap">
    <div id="mention-menu" class="mention-menu"></div>
    <textarea id="c-text" class="comment-input" placeholder="Comentário... @ para mencionar" rows="1" oninput="window._cInput(this)" onkeydown="window._cKey(event)"></textarea>
  </div>
  <button class="btn btn-primary btn-sm" onclick="window._sendComment('${a.id}')" style="height:42px;flex-shrink:0">Enviar</button>
</div></div>`;
}

window._cInput=(el)=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';const val=el.value,pos=el.selectionStart,before=val.slice(0,pos),atIdx=before.lastIndexOf('@');if(atIdx>=0&&(atIdx===0||/\s/.test(before[atIdx-1]))){const q=before.slice(atIdx+1);if(!/\s/.test(q)){_mentionActive=true;_mentionStart=atIdx;_mentionQuery=q;_mentionIdx=0;_showMentions(getMentionSuggestions(q));return;}}  _mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';};
window._cKey=(e)=>{if(_mentionActive){const ms=getMentionSuggestions(_mentionQuery);if(e.key==='ArrowDown'){e.preventDefault();_mentionIdx=(_mentionIdx+1)%Math.max(ms.length,1);_showMentions(ms);return;}if(e.key==='ArrowUp'){e.preventDefault();_mentionIdx=(_mentionIdx-1+Math.max(ms.length,1))%Math.max(ms.length,1);_showMentions(ms);return;}if(e.key==='Enter'&&ms.length){e.preventDefault();_pickMention(ms[_mentionIdx]);return;}if(e.key==='Escape'){_mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';return;}}if(e.key==='Enter'&&!e.shiftKey&&!_mentionActive){e.preventDefault();window._sendComment(S.selectedAditivo);}};
function _showMentions(ms){const m=document.getElementById('mention-menu');if(!m)return;if(!ms.length){m.style.display='none';return;}m.style.display='block';m.innerHTML=ms.map((n,i)=>`<div class="mention-item${i===_mentionIdx?' active':''}" onmousedown="event.preventDefault();_pickMention('${escJs(n)}')"><div class="m-avatar">${n.charAt(0).toUpperCase()}</div>@${esc(n)}</div>`).join('');}
function _pickMention(name){const el=document.getElementById('c-text');if(!el)return;const val=el.value,after=val.slice(el.selectionStart);el.value=val.slice(0,_mentionStart)+'@'+name+' '+after;_mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';el.focus();}
window._sendComment=async(aid)=>{const el=document.getElementById('c-text');const txt=el?.value?.trim();if(!txt)return;const autor=currentUser?currentUser.email.split('@')[0]:'Anônimo';const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const cs=[...(a.comentarios||[]),{id:uid(),autor,texto:txt,data:new Date().toISOString().slice(0,10)}];await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);a.comentarios=cs;el.value='';el.style.height='auto';_mentionActive=false;renderApp();};

window._deleteComment=async(aid,idx)=>{
  if(!confirm('Excluir comentário?'))return;
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=[...(a.comentarios||[])];cs.splice(idx,1);
  await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);
  a.comentarios=cs;toast('Comentário excluído.','#f59e0b');renderApp();
};

window._editComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=a.comentarios||[];
  const c=cs[idx];if(!c)return;
  const el=document.getElementById('comment-text-'+idx);
  if(!el)return;
  // Replace text with textarea
  const old=c.texto;
  el.innerHTML=`<textarea id="cedit-${idx}" style="width:100%;min-height:60px;padding:8px 10px;border:2px solid #3b82f6;border-radius:8px;background:#0a0a0f;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:vertical">${esc(old)}</textarea><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="window._saveEditComment('${aid}',${idx})">Salvar</button><button class="btn btn-secondary btn-sm" onclick="renderApp()">Cancelar</button></div>`;
  const ta=document.getElementById('cedit-'+idx);
  if(ta){ta.focus();ta.selectionStart=ta.value.length;}
};

window._saveEditComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=a.comentarios||[];
  const ta=document.getElementById('cedit-'+idx);
  if(!ta||!ta.value.trim())return;
  cs[idx]={...cs[idx],texto:ta.value.trim()};
  await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);
  a.comentarios=cs;toast('Comentário atualizado!');renderApp();
};

function renderMateriais(mat,obra){

  const byDate={};
  mat.forEach(m=>{const d=m.data_solicitacao||'9999';if(!byDate[d])byDate[d]=[];byDate[d].push(m);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const collapKey='mat-date-collapsed-'+obra;

function getLocalRDOStatuses(){
  try{return JSON.parse(localStorage.getItem('jet-rdo-status')||'{}')||{};}catch(_){return{};}
}
function setLocalRDOStatus(id,status){
  const map=getLocalRDOStatuses();
  map[id]=status;
  localStorage.setItem('jet-rdo-status',JSON.stringify(map));
}
function getRDOStatus(rdo){
  if(!rdo)return'Elaboração';
  return rdo.status||getLocalRDOStatuses()[rdo.id]||'Elaboração';
}
window._setRDOStatus=async(id,status)=>{
  const rdo=(DB.rdo||[]).find(r=>r.id===id);
  if(!rdo)return;
  const oldStatus=rdo.status;
  rdo.status=status;
  setLocalRDOStatus(id,status);
  const{error}=await sb.from('rdo').update({status}).eq('id',id);
  if(error){
    console.warn('[JET] Não foi possível sincronizar status do RDO:',error);
    rdo.status=oldStatus;
    toast('Status salvo neste dispositivo. Se quiser sincronizar entre todos, precisamos liberar a coluna status no Supabase.','#f59e0b');
    return false;
  }
  toast('Status do RDO atualizado.','#22c55e');
  return true;
};

  </div>
</div>
<div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
  ${makeCd(['Pendente','Em andamento','Concluído'],TODO_STATUS_MAP,t.status||'Pendente',`window._setTodoStatus('${t.id}',VAL)`)}
  <button onclick="window._deleteTodo('${t.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:14px;line-height:1" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button>
</div>
</div>`;
  };

  // Group by date
  if(!window._todoCollapsed)window._todoCollapsed={};
  const byDate={};
  todos.forEach(t=>{const d=t.data||'9999';if(!byDate[d])byDate[d]=[];byDate[d].push(t);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const hoje=new Date().toISOString().slice(0,10);
  const totalPend=todos.filter(t=>t.status!=='Concluído').length;
  const totalConc=todos.filter(t=>t.status==='Concluído').length;

  const groups=dates.map(dt=>{
    const items=byDate[dt].sort((a,b)=>{const o={'Crítico':0,'Urgente':1,'Normal':2,'Baixa':3};return(o[a.prioridade]||2)-(o[b.prioridade]||2);});
    const pend=items.filter(t=>t.status!=='Concluído').length;
    const conc=items.filter(t=>t.status==='Concluído').length;
    const cid='todo-'+obra+'-'+dt;
    const isHoje=dt===hoje;
    const collapsed=window._todoCollapsed[cid]===false?false:true;
    return`<div style="margin-bottom:6px;border:1px solid ${isHoje?'#2563eb':' var(--border)'};border-radius:10px;overflow:hidden">
<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${isHoje?'#0e1f3d':'var(--bg2)'};cursor:pointer" onclick="window._toggleTodoGroup('${escJs(cid)}')">
  <svg style="flex-shrink:0;transition:transform .2s;transform:rotate(${collapsed?'0':'90'}deg)" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="${isHoje?'#60a5fa':'#555'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,2 7,5 2,8"/></svg>
  <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${isHoje?'#60a5fa':'#fff'}">${dt==='9999'?'Sem data':fmtD(dt)}${isHoje?' — Hoje':''}</span>
  <span class="tag">${items.length} tarefa${items.length!==1?'s':''}</span>
  ${pend>0?`<span style="font-size:11px;color:#fbbf24;background:#2a1d06;padding:1px 8px;border-radius:100px;font-weight:600">⏳ ${pend} pendente${pend!==1?'s':''}</span>`:''}
  ${pend===0?`<span style="font-size:11px;color:#34d399;background:#062018;padding:1px 8px;border-radius:100px;font-weight:600">✓ Tudo concluído</span>`:''}
  <span style="margin-left:auto;display:flex;gap:4px"><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window._copyTodoGroup('${escJs(obra)}','${escJs(items.map(i=>i.id).join(','))}')" title="Copiar lista">Copiar</button><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window.todoExportPDF('${escJs(obra)}')" title="PDF">PDF</button><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window.todoExportTXT('${escJs(obra)}')" title="TXT">TXT</button></span>
</div>
${collapsed?'':
`<div style="padding:0 14px;background:var(--bg2)">${items.map(taskRow).join('')}</div>`}
</div>`;
  }).join('');

  return`<div>
<div class="section-header">
  <div><div class="section-title">✅ A Fazer — Frente de Serviço</div>
  <div class="section-sub">${totalPend} pendente${totalPend!==1?'s':''} · ${totalConc} concluído${totalConc!==1?'s':''}</div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-secondary btn-sm" onclick="window._shareWhatsapp('${escJs(obra)}')">📱 WhatsApp</button>
    <button class="btn btn-primary" onclick="_openModal('new-todo')">+ Nova Tarefa</button>
  </div>
</div>

<div class="card" style="margin-bottom:16px">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <input id="todo-quick" placeholder="✏ Adicionar tarefa rápida... (Enter)" style="flex:1;min-width:200px;height:40px" onkeydown="if(event.key==='Enter')window._quickTodo(this)">
    <div id="todo-quick-prior-wrap" style="flex-shrink:0">${makeCd(['Normal','Urgente','Crítico','Baixa'],TODO_PRIOR,'Normal',`document.getElementById('todo-quick-prior-wrap').dataset.val=VAL;this.closest('.card').querySelector('#todo-quick')?.focus()`)}</div>
    <input id="todo-quick-resp" placeholder="Responsável..." style="width:150px;height:40px" list="todo-resp-list" value="${esc(currentUser?.email?.split('@')[0]||'')}">

      ${[...new Set([
        ...(currentUser?[currentUser.email.split('@')[0]]:[]),
        ...DB.rdo.map(r=>r.autor).filter(Boolean),
        ...DB.todos.map(t=>t.responsavel).filter(Boolean),

        ...DB.aditivos.map(a=>a.responsavel).filter(Boolean)

${todos.length===0?'<div class="empty-state"><p>Nenhuma tarefa cadastrada.</p></div>':groups}

window.todoExportTXT=(obra)=>{const t=DB.todos.filter(t=>t.obra===obra);exportTXT(t.map(x=>[x.descricao,x.responsavel,x.prioridade,x.status,x.data]),['Tarefa','Responsável','Prioridade','Status','Data'],'AFazer_'+obra);};
window._sortBy=(field)=>{
  if(!window._sortState)window._sortState={field:null,dir:1};
  if(window._sortState.field===field)window._sortState.dir*=-1;
  else{window._sortState.field=field;window._sortState.dir=1;}
  const tbl=document.querySelector('#ad-tbl tbody');
  if(!tbl)return;
  const rows=Array.from(tbl.querySelectorAll('tr'));
  rows.sort((a,b)=>{
    const ai=Array.from(a.closest('table').querySelectorAll('th')).findIndex(th=>th.dataset.field===field);
    if(ai<0)return 0;
    let va=a.cells[ai]?.querySelector('input')?.value||'';
    let vb=b.cells[ai]?.querySelector('input')?.value||'';
    if(field==='valor'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;return(va-vb)*window._sortState.dir;}
    return va.localeCompare(vb,'pt-BR',{numeric:true})*window._sortState.dir;
  });
  rows.forEach(r=>tbl.appendChild(r));
};

window._startResize=(e,field)=>{
  e.preventDefault();e.stopPropagation();
  const th=e.target.closest('th');if(!th)return;
  const startX=e.clientX,startW=th.getBoundingClientRect().width;
  e.target.classList.add('resizing');
  if(!window._colWidths)window._colWidths={};
  const move=ev=>{const w=Math.max(60,startW+ev.clientX-startX);th.style.width=w+'px';th.style.minWidth=w+'px';window._colWidths[field]=w;};
  const up=()=>{e.target.classList.remove('resizing');document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
};

window._toggleTodo=async(id)=>{
  const t=DB.todos.find(x=>x.id===id);if(!t)return;
  const ns=t.status==='Concluído'?'Pendente':'Concluído';
  await updateField('todos',id,'status',ns);
  DB.todos=DB.todos.map(x=>x.id===id?{...x,status:ns}:x);renderApp();
};
window._setTodoStatus=async(id,val)=>{
  await updateField('todos',id,'status',val);
  DB.todos=DB.todos.map(x=>x.id===id?{...x,status:val}:x);renderApp();
};
window._setPrioridade=async(id,val)=>{
  await updateField('todos',id,'prioridade',val);
  DB.todos=DB.todos.map(x=>x.id===id?{...x,prioridade:val}:x);renderApp();
};
window._deleteTodo=async(id)=>{
  if(!confirm('Excluir tarefa?'))return;
  await sb.from('todos').delete().eq('id',id);
  DB.todos=DB.todos.filter(t=>t.id!==id);renderApp();
};
window._quickTodo=async(el)=>{
  const obra=S.obra;
  const desc=el.value.trim();if(!desc||!obra)return;
  const prior=document.getElementById('todo-quick-prior-wrap')?.dataset?.val||'Normal';
  const resp=document.getElementById('todo-quick-resp')?.value||currentUser?.email?.split('@')[0]||'';
  el.value='';el.disabled=true;
  const obj={id:uid(),obra,descricao:desc,responsavel:resp,status:'Pendente',prioridade:prior,data:new Date().toISOString().slice(0,10)};
  const{error}=await sb.from('todos').insert(obj);
  if(error){toast('Erro: '+error.message,'#ef4444');el.disabled=false;el.value=desc;return;}
  // Add to local state only if not already there (RT may have already added it)
  if(!DB.todos.find(t=>t.id===obj.id))DB.todos.unshift(obj);
  toast('✓ Tarefa adicionada!');
  S.obraTab='todo'; // guarantee we stay on todo tab
  renderApp();
  setTimeout(()=>{const inp=document.getElementById('todo-quick');if(inp){inp.disabled=false;inp.focus();}},80);
};
window._printPedidoPDF=(pedidoId)=>{
  const p=DB.pedidos.find(pd=>pd.id===pedidoId);
  if(!p){toast('Pedido não encontrado','#ef4444');return;}
  if(!window.jspdf){toast('Biblioteca jsPDF não carregada.','#f59e0b');return;}
  const {jsPDF}=window.jspdf;
  const itens=normalizePedidoItems(p.itens||[]);
  const total=(p.total!=null&&p.total!=='')?Number(p.total):calcPedidoTotal(itens);
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=16;
  doc.setFillColor(26,46,107);doc.circle(M+9,16,9,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);doc.text('JET',M+9,18,{align:'center'});

  doc.setFontSize(8.5);doc.setTextColor(120,128,148);doc.text(new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR'),W-M,14,{align:'right'});
  doc.setDrawColor(216,225,238);doc.line(M,28,W-M,28);

  const cards=[
    {label:'Fornecedor',value:p.fornecedor||'—',accent:[20,20,60]},
    {label:'Obra Destinada',value:p.obra||'—',accent:[20,20,60]},
    {label:'Responsável',value:p.responsavel||'—',accent:[20,20,60]},
    {label:'Status',value:p.status||'Pendente',accent:[180,120,0]},
    {label:'Data do Pedido',value:fmtD(p.data),accent:[20,20,60]},
    {label:'Valor Total',value:fmtV(total),accent:[20,149,107]}
  ];
  const cardW=(W-M*2-8)/3;
  cards.forEach((card,index)=>{
    const col=index%3,row=Math.floor(index/3);
    const x=M+(cardW+4)*col,y=34+22*row;
    doc.setFillColor(251,252,254);doc.setDrawColor(220,226,235);doc.roundedRect(x,y,cardW,18,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(110,120,140);doc.text(card.label.toUpperCase(),x+4,y+5);

    doc.text(String(card.value||'—'),x+4,y+12);
  });

  doc.autoTable({
    startY:82,
    head:[['#','Descrição','Qtd','Unid','Valor Un.','Subtotal','Obs']],
    body:itens.map((item,index)=>{
      const subtotal=(Number(item.qtd)||0)*(Number(item.valor)||0);
      return [String(index+1),item.nome||'',item.qtd||'',item.unidade||'un',item.valor!==''?fmtV(item.valor):'—',subtotal?fmtV(subtotal):'—',item.obs||''];
    }),
    styles:{fontSize:9,cellPadding:3,textColor:[30,30,30],lineColor:[220,226,235],lineWidth:.2},
    headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,250,253]},
    columnStyles:{0:{cellWidth:10,halign:'center'},2:{cellWidth:16,halign:'center'},3:{cellWidth:16,halign:'center'},4:{cellWidth:24,halign:'right'},5:{cellWidth:24,halign:'right'}}
  });

  let y=doc.lastAutoTable.finalY+8;
  doc.setDrawColor(26,46,107);doc.setLineWidth(0.5);doc.line(M,y,W-M,y);
  y+=8;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(20,20,60);doc.text('TOTAL',W-M-38,y);
  doc.setTextColor(20,149,107);doc.text(fmtV(total),W-M,y,{align:'right'});

  if(p.observacao){
    y+=10;
    doc.setFillColor(249,250,252);doc.setDrawColor(225,230,238);doc.roundedRect(M,y,W-M*2,18,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(110,120,140);doc.text('OBSERVAÇÃO GERAL',M+4,y+5);

  for(let i=1;i<=pages;i++){
    doc.setPage(i);

    doc.text(`Documento gerado pelo sistema JET Gestão de Obras · Página ${i}/${pages}`,W/2,287,{align:'center'});
  }

  toast('PDF exportado!');
};

// ─── ADIANTAMENTO DE DESPESAS ────────────────────────────────────────────

// ── EXPORT DESPESAS ──────────────────────────────────────────────────────
function sortDespesaItems(items=[]){
  return[...(Array.isArray(items)?items:[])].sort((a,b)=>{
    const da=String(a.data||'9999-12-31');
    const db=String(b.data||'9999-12-31');
    if(da!==db)return da.localeCompare(db);
    return String(a.created_at||a.id||'').localeCompare(String(b.created_at||b.id||''));
  });
}
function isGenericAdiantamentoDesc(value=''){
  const key=stripAccents(String(value||'')).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  return /^adiantamento de despesas/.test(key)||key==='adiantamento pix'||key==='pix adiantamento';
}
function despesaDisplayDesc(item={}){
  const desc=String(item.descricao||'').trim();
  if(String(item.tipo||'')==='Despesa'&&isGenericAdiantamentoDesc(desc)&&(item.loja||item.nfe)){
    return `Despesa - ${item.loja||item.nfe}`;
  }
  return desc;
}
function buildDespesaLedger(items=[]){
  let saldoAnterior=0;
  const rows=[];
  sortDespesaItems(items).forEach(item=>{
    let isAdiant=String(item.tipo||'Despesa')==='Adiantamento';
    const saldoInformado=item.valor_adiantamento!=null&&item.valor_adiantamento!==''?Number(item.valor_adiantamento):null;
    let conta=moneyNumber(item.valor_conta)||0;
    let movimentoAdiant=0;
    let saldoAtual=saldoAnterior;
    if(isAdiant){
      const hasOnlySaldo=conta===0&&saldoInformado!=null;
      const hasEvidenceOfExpense=!!(String(item.loja||'').trim()||String(item.nfe||'').trim());
      saldoAtual=saldoInformado!=null?saldoInformado:saldoAnterior;
      const diff=saldoAtual-saldoAnterior;
      if(hasOnlySaldo&&diff<-.005){
        // Algumas planilhas trazem uma linha só com o saldo após o gasto.
        // Ela não é um novo adiantamento; é uma despesa cujo valor é a queda do saldo.
        isAdiant=false;
        conta=Math.abs(diff);
      }else{
        movimentoAdiant=diff;
        if(saldoAnterior===0&&saldoAtual>0&&movimentoAdiant<=0)movimentoAdiant=saldoAtual;
        if(movimentoAdiant<=.005&&hasOnlySaldo&&(hasEvidenceOfExpense||isGenericAdiantamentoDesc(item.descricao))){
          return; // linha espelho/sem movimento importada por engano
        }
        if(movimentoAdiant<0)movimentoAdiant=0;
      }
    }else{
      saldoAtual=saldoInformado!=null?saldoInformado:(saldoAnterior-conta);
    }
    const row={...item,tipo:isAdiant?'Adiantamento':'Despesa',valor_conta:conta||null,movimento_adiantamento:movimentoAdiant||0,saldo:saldoAtual||0};
    row.descricao=despesaDisplayDesc(row)||row.descricao;
    saldoAnterior=row.saldo;
    rows.push(row);
  });
  return rows;
}
function despesaMonthLabel(ym){
  if(!ym||ym==='9999-99')return'Sem data';
  const [year,month]=ym.split('-');
  const names=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${names[Math.max(0,Number(month)-1)]} ${year}`;
}
function despesaExportResponsible(){
  const raw=String(currentUser?.user_metadata?.name||currentUser?.email?.split('@')[0]||getCurrentUserHandle()||'Responsável').replace(/[._-]+/g,' ');
  return raw.split(/\s+/).filter(Boolean).map(part=>part.charAt(0).toUpperCase()+part.slice(1).toLowerCase()).join(' ')||'Responsável';
}
function despesaRowsForExport(obra,month='all'){
  const ledger=buildDespesaLedger(DB.despesas.filter(d=>d.obra===obra));
  return month==='all'?ledger:ledger.filter(item=>(item.data||'').slice(0,7)===month);
}
function despesaExportBaseName(obra,month='all'){
  const scope=month==='all'?'completo':month;
  return xlsxFileName(`prestacao_contas_${obra}_${scope}`.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').toLowerCase());
}
function despesaAttachmentEntries(rows=[]){
  const used=new Set();
  const entries=[];
  let seq=1;
  rows.forEach(row=>{
    getDespesaFiles(row.id).forEach(file=>{
      const base=sanitizeStorageName(file.name||`anexo_${seq}`);
      let name=`${String(seq).padStart(3,'0')}_${base}`;
      let guard=1;
      while(used.has(name.toLowerCase()))name=`${String(seq).padStart(3,'0')}_${guard++}_${base}`;
      used.add(name.toLowerCase());
      entries.push({seq:seq++,row,file,name,packagePath:`anexos/${name}`,url:file.url||''});
    });
  });
  return entries;
}
function downloadBinaryBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
