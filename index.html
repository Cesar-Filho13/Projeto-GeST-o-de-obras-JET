html[data-theme="light"] .func-action-group,
html[data-theme="light"] .func-toggle-card{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);box-shadow:0 12px 28px rgba(38,58,96,.08)}
html[data-theme="light"] .baixada-summary-card{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);border-color:rgba(59,126,248,.14)}
html[data-theme="light"] .baixada-policy{background:linear-gradient(180deg,rgba(59,126,248,.08) 0%,rgba(59,126,248,.03) 100%)}
html[data-theme="light"] .comment{background:rgba(39,87,217,.04);border-color:rgba(39,87,217,.08)}
html[data-theme="light"] .rdo-card{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%)}
html[data-theme="light"] .auth-screen{background:radial-gradient(circle at top left,rgba(79,140,255,.12) 0%,transparent 30%),linear-gradient(135deg,#eef4ff 0%,#f7f9fd 100%)}
html[data-theme="light"] .auth-btn:disabled{background:#d9e3f5;color:#6d7c93}
.baixada-card{padding:22px 22px 18px}
.baixada-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.baixada-head-copy{max-width:560px}
.baixada-sub{font-size:13px;color:var(--text3);line-height:1.6}
.baixada-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.baixada-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.baixada-summary-card{background:linear-gradient(180deg,rgba(10,19,32,.92) 0%,rgba(7,13,24,.98) 100%);border:1px solid rgba(59,126,248,.14);border-radius:16px;padding:16px 18px;position:relative;overflow:hidden}
.baixada-summary-card::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:999px;background:var(--accent,#60a5fa)}
.baixada-summary-label{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.baixada-summary-value{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1}
.baixada-summary-note{font-size:12px;color:var(--text2);margin-top:6px}
.baixada-policy{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1px solid rgba(79,140,255,.16);border-radius:14px;background:linear-gradient(180deg,rgba(79,140,255,.08) 0%,rgba(79,140,255,.03) 100%);margin-bottom:16px}
.baixada-policy-icon{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(79,140,255,.14);color:#60a5fa;font-size:15px;flex-shrink:0}
.baixada-policy strong{display:block;color:var(--text);margin-bottom:4px}
.baixada-policy span{font-size:13px;color:var(--text2);line-height:1.6}
.baixada-filter-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.baixada-filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.baixada-date-input{min-width:145px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:9px 10px;color:var(--text);font-size:13px}
.baixada-date-input:focus{border-color:var(--blue);background:var(--input-focus)}
.baixada-days-pill{display:inline-flex;align-items:center;justify-content:center;min-width:88px;padding:7px 12px;border-radius:999px;background:rgba(52,211,153,.12);color:#8ef0cc;border:1px solid rgba(52,211,153,.2);font-size:12px;font-weight:800}
.baixada-days-input{width:100%;min-width:96px;padding:9px 12px;border-radius:999px;border:1px solid rgba(52,211,153,.2);background:rgba(52,211,153,.08);color:#8ef0cc;font-size:12px;font-weight:800;text-align:center}
.baixada-days-input:focus{border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.12);background:rgba(52,211,153,.12)}
.baixada-person{display:flex;flex-direction:column;gap:6px;min-width:0}
.baixada-person-name{font-weight:800;color:var(--text);line-height:1.2}
.baixada-person-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--text3)}
.baixada-live-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:rgba(192,132,252,.14);color:#d8b4fe;border:1px solid rgba(192,132,252,.24);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.baixada-empty{padding:34px 20px}
html[data-theme="light"] .baixada-days-input{background:rgba(20,149,107,.08);color:#14956b;border-color:rgba(20,149,107,.18)}
.compras-subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.compras-filter-bar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.compras-kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}
.forn-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.forn-card{border:1px solid var(--border);border-radius:18px;background:var(--panel-grad);padding:18px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;gap:14px}
.forn-card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.forn-card-name{font-size:16px;font-weight:800;color:var(--text);line-height:1.2}
.forn-card-meta{display:grid;gap:8px}
.forn-meta-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;color:var(--text2)}
.forn-meta-row span:last-child{color:var(--text);font-weight:600;text-align:right}
.quote-board{display:grid;gap:12px}
.quote-card{border:1px solid var(--border);border-radius:18px;background:var(--panel-grad);padding:18px;box-shadow:var(--shadow-soft)}
.quote-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.quote-card-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3}
.quote-card-sub{font-size:12px;color:var(--text3);margin-top:4px}
.quote-metrics{display:flex;gap:8px;flex-wrap:wrap}
.quote-metric{padding:6px 10px;border-radius:999px;background:rgba(79,140,255,.08);border:1px solid rgba(79,140,255,.14);font-size:11px;font-weight:700;color:var(--text2)}
.quote-vendor-table{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface)}
.quote-vendor-table table{min-width:760px}
.quote-vendor-table th{background:rgba(26,46,107,.9);color:#fff}
.quote-winner{border-color:rgba(20,149,107,.26)!important;box-shadow:0 0 0 1px rgba(20,149,107,.12) inset}
.quote-empty{padding:18px;border:1px dashed var(--border);border-radius:14px;text-align:center;color:var(--text3)}
html[data-theme="light"] .quote-vendor-table th{background:#edf3ff;color:#1a2e6b}

/* ── Propostas: tabela + painel deslizante (Field-style) ── */
.propostas-shell{display:flex;position:relative;min-height:300px;gap:0}
.propostas-table-wrap{flex:1;min-width:0}
.propostas-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.propostas-filter-pills{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.propostas-filter-pill{padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font:700 11px 'Inter',sans-serif;cursor:pointer;transition:all .15s}
.propostas-filter-pill:hover{border-color:var(--border2);color:var(--text)}
.propostas-filter-pill.active{background:rgba(79,140,255,.16);border-color:rgba(79,140,255,.32);color:#93c5fd}
.propostas-tbl-outer{overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--bg2)}
.propostas-tbl{width:100%;border-collapse:collapse}
.propostas-tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
.propostas-tbl th:first-child{border-radius:14px 0 0 0}
.propostas-tbl th:last-child{border-radius:0 14px 0 0}
.propostas-tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);vertical-align:middle;white-space:nowrap}
.propostas-tbl tbody tr:last-child td{border-bottom:none}
.proposta-row{cursor:pointer;transition:background .12s}
.proposta-row:hover td{background:rgba(79,140,255,.055)}
.proposta-row.selected td{background:rgba(79,140,255,.11)}
.proposta-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--text3)}
.proposta-nome{font-size:12px;font-weight:700;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;display:block}
.proposta-cliente-cell{color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;display:block}
.proposta-total-cell{font-family:'DM Mono',monospace;font-size:12px;font-weight:800;color:#34d399}
.proposta-status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
.proposta-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pst-rascunho{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.22)}.pst-rascunho .proposta-status-dot{background:#3b82f6}
.pst-enviada{background:rgba(245,158,11,.1);color:#fcd34d;border:1px solid rgba(245,158,11,.22)}.pst-enviada .proposta-status-dot{background:#f59e0b}
.pst-aprovada{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.2)}.pst-aprovada .proposta-status-dot{background:#22c55e}
.pst-recusada{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}.pst-recusada .proposta-status-dot{background:#ef4444}
.pst-vencida{background:rgba(249,115,22,.1);color:#fdba74;border:1px solid rgba(249,115,22,.18)}.pst-vencida .proposta-status-dot{background:#f97316}
/* Painel deslizante */
.propostas-detail-panel{position:fixed;top:56px;right:0;width:460px;max-width:100vw;height:calc(100vh - 56px);background:var(--bg2);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:-8px 0 32px rgba(0,0,0,.22)}
.propostas-detail-panel.open{transform:translateX(0)}
.pdp-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px}
.pdp-header-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:800;color:#93c5fd;text-transform:uppercase;margin-bottom:2px}
.pdp-header-title{font-size:14px;font-weight:900;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdp-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.pdp-close:hover{background:var(--surface2);color:var(--text)}
.pdp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.pdp-tab{padding:10px 14px;border:none;background:none;color:var(--text3);font:700 12px 'Inter',sans-serif;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .14s;flex-shrink:0}
.pdp-tab:hover{color:var(--text2)}
.pdp-tab.active{color:#60a5fa;border-bottom-color:#3b82f6}
.pdp-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.pdp-section-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pdp-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.pdp-client-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:rgba(79,140,255,.04)}
.pdp-client-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pdp-client-avatar{width:40px;height:40px;border-radius:10px;background:rgba(59,130,246,.14);border:1px solid rgba(59,130,246,.22);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#60a5fa;flex-shrink:0;overflow:hidden}
.pdp-client-avatar img{width:100%;height:100%;object-fit:contain}
.pdp-client-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.2}
.pdp-client-cnpj{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.pdp-info-row{display:grid;grid-template-columns:88px 1fr;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.pdp-info-row:last-child{border-bottom:none}
.pdp-info-label{color:var(--text3);font-weight:700}
.pdp-info-value{color:var(--text2);word-break:break-word}
.pdp-items-tbl{width:100%;border-collapse:collapse;font-size:11px}
.pdp-items-tbl th{padding:6px 8px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.pdp-items-tbl td{padding:8px;border-bottom:1px solid rgba(255,255,255,.06);color:var(--text2)}
.pdp-items-tbl tr:last-child td{border-bottom:none}
.pdp-items-total{display:flex;justify-content:space-between;align-items:center;padding:10px 8px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700;color:var(--text2)}
.pdp-items-total strong{color:#34d399;font-size:14px}
.pdp-actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
html[data-theme="light"] .propostas-tbl-outer{background:#fff}
html[data-theme="light"] .propostas-tbl th{background:#f1f5fb}
html[data-theme="light"] .proposta-row:hover td{background:#f0f5ff}
html[data-theme="light"] .proposta-row.selected td{background:#e8f0fe}
html[data-theme="light"] .propostas-detail-panel{background:#fff;box-shadow:-4px 0 24px rgba(0,0,40,.1)}
html[data-theme="light"] .pdp-client-card{background:#f7faff}
/* compat: keep old classes used elsewhere */
.commercial-card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.proposal-number{font-family:'DM Mono',monospace;font-size:11px;color:#93c5fd;text-transform:uppercase;letter-spacing:.08em}
.proposal-actions{display:flex;gap:8px;flex-wrap:wrap}
.commercial-subnav{margin-bottom:18px}
.commercial-form-note{border:1px solid rgba(59,130,246,.16);background:rgba(59,130,246,.08);border-radius:14px;padding:10px 12px;color:var(--text2);font-size:12px;line-height:1.5;margin-bottom:14px}
/* Autocomplete cliente */
.cliente-ac-wrap{position:relative}
.cliente-ac-list{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:400;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;box-shadow:0 14px 36px rgba(0,0,0,.28);max-height:230px;overflow-y:auto;display:none}
.cliente-ac-list.show{display:block}
.cliente-ac-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.cliente-ac-item:last-child{border-bottom:none}
.cliente-ac-item:hover{background:rgba(79,140,255,.1)}
.cliente-ac-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.cliente-ac-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
/* Catálogo de produtos */
.prod-cat-overlay{position:fixed;inset:0;z-index:350;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
.prod-cat-box{width:min(680px,100%);max-height:82vh;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.prod-cat-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.prod-cat-search{flex:1;height:38px;border:1px solid var(--border);border-radius:10px;background:rgba(0,0,0,.25);color:var(--text);font:600 13px 'Inter',sans-serif;padding:0 12px;outline:none}
.prod-cat-search:focus{border-color:var(--border2)}
.prod-cat-body{flex:1;overflow-y:auto;padding:8px}
.prod-cat-row{display:grid;grid-template-columns:1fr 60px 80px 80px;gap:10px;align-items:center;padding:9px 10px;border-radius:10px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.prod-cat-row:last-child{border-bottom:none}
.prod-cat-row:hover{background:rgba(79,140,255,.08)}
.prod-cat-nome{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.prod-cat-desc{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.prod-cat-und{font-size:10px;color:var(--text3);text-align:center}
.prod-cat-tipo{font-size:9px;padding:2px 7px;border-radius:999px;background:rgba(79,140,255,.1);border:1px solid rgba(79,140,255,.16);color:#93c5fd;white-space:nowrap;text-align:center}
.prod-cat-valor{font-family:'DM Mono',monospace;font-size:11px;font-weight:800;color:#34d399;text-align:right}
.prod-cat-empty{padding:28px;text-align:center;color:var(--text3);font-size:12px}
html[data-theme="light"] .cliente-ac-list{background:#fff;box-shadow:0 8px 24px rgba(0,0,40,.15)}
html[data-theme="light"] .prod-cat-box{background:#fff}
html[data-theme="light"] .prod-cat-search{background:#f7faff}
.commercial-company-card{display:grid;gap:4px;border:1px solid rgba(59,130,246,.16);background:rgba(79,140,255,.07);border-radius:14px;padding:10px 12px;color:var(--text2);font-size:12px;line-height:1.35}
.commercial-company-card strong{color:var(--text);font-size:13px}
.commercial-company-card span{color:var(--text3)}
html[data-theme="light"] .commercial-company-card{background:#f4f8ff;border-color:#d8e6ff}
.client-logo-uploader{display:grid;grid-template-columns:112px 1fr;gap:12px;align-items:center;border:1px solid var(--border);border-radius:16px;background:rgba(79,140,255,.06);padding:12px}
.client-logo-preview{width:96px;height:96px;border-radius:14px;border:1px dashed rgba(79,140,255,.35);background:rgba(15,23,42,.16);display:grid;place-items:center;overflow:hidden;color:var(--text3);font-size:11px;font-weight:800;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.client-logo-preview img{width:100%;height:100%;object-fit:contain;background:#fff}
.client-logo-actions{display:grid;gap:8px}
.client-logo-actions small{color:var(--text3);line-height:1.4}
html[data-theme="light"] .client-logo-uploader{background:#f7faff;border-color:#d8e6ff}
html[data-theme="light"] .client-logo-preview{background:#fff;border-color:#c5d7f4;color:#6b7a90}
.commercial-item-head,.commercial-item-row{display:grid;grid-template-columns:105px 1.05fr 1.25fr 74px 78px 110px 34px;gap:6px;align-items:center;margin-bottom:6px}
.commercial-item-head span{font-size:10px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:0 2px}
.commercial-item-row input,.commercial-item-row select{min-width:0}
.commercial-total-preview{display:flex;justify-content:flex-end;gap:12px;align-items:center;border-top:1px solid var(--border);padding-top:12px;margin-top:8px;color:var(--text2);font-weight:700}
.commercial-total-preview strong{font-size:20px;color:#34d399}
.commercial-quote-expanded{margin-top:14px;display:grid;gap:12px}
html[data-theme="light"] .proposal-card{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);box-shadow:0 18px 42px rgba(29,78,216,.12)}
html[data-theme="light"] .proposal-number{color:#2563eb}
html[data-theme="light"] .proposal-meta span,html[data-theme="light"] .proposal-values span{background:#eef5ff;border-color:#d7e5ff;color:#405574}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── RDO ── */
.rdo-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.rdo-card:hover{border-color:var(--border2);background:var(--bg3)}
.rdo-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:6px}
.rdo-activity-card{margin-top:12px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:linear-gradient(180deg,rgba(96,165,250,.08),rgba(15,23,42,.04));cursor:pointer}
.rdo-activity-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;color:var(--text);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.rdo-activity-hint{font-size:11px;color:var(--text3);font-weight:700;text-transform:none;letter-spacing:0}
.rdo-preview{font-size:13px;color:var(--text2);line-height:1.55;white-space:pre-line;overflow:hidden;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical}
html[data-theme="light"] .rdo-activity-card{background:linear-gradient(180deg,#f7fbff,#eef5ff);border-color:#d8e6ff}
.rdo-status-slot{min-width:170px;display:grid;gap:5px;margin-left:auto}
.rdo-status-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.rdo-status-slot .cd-trigger{height:30px;border-radius:999px;justify-content:flex-start;width:auto;min-width:138px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
.rdo-status-slot .cd-val::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;margin-right:7px;opacity:.75}
html[data-theme="light"] .rdo-status-slot .cd-trigger{box-shadow:inset 0 0 0 1px rgba(37,99,235,.12)}
.weather-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.weather-opt{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}
.weather-opt.active{border-color:var(--blue);background:rgba(79,140,255,.12);color:#60a5fa}

/* ── Auth ── */
.auth-screen{position:fixed;inset:0;background:radial-gradient(circle at top left,rgba(79,140,255,.16) 0%,transparent 30%),linear-gradient(135deg,#060810 0%,#0a0f1a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.auth-card{background:var(--panel-grad);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;position:relative;overflow:hidden;box-shadow:0 24px 60px rgba(4,10,24,.42)}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,#2563eb,#7c3aed,#2563eb);background-size:200%;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-circle{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);border:1px solid rgba(79,140,255,.45);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:20px;font-weight:900;color:#fff;letter-spacing:-1px;box-shadow:0 12px 28px rgba(59,126,248,.26)}
.auth-title{font-size:22px;font-weight:800;color:var(--text);text-align:center;letter-spacing:-.5px;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:30px}
.auth-field{margin-bottom:16px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.auth-field input{padding:12px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:11px;font-size:14px;transition:all .2s}
.auth-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,126,248,.1)}
.auth-pass-wrap{position:relative}
.auth-pass-wrap input{padding-right:44px}
.auth-pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;transition:color .2s}.auth-pass-toggle:hover{color:var(--text2)}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue) 0%,#1d4ed8 100%);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-top:4px;box-shadow:0 4px 12px rgba(59,126,248,.3)}
.auth-btn:hover{background:linear-gradient(135deg,#2d66f8 0%,#1a3fc4 100%);box-shadow:0 6px 20px rgba(59,126,248,.4);transform:translateY(-1px)}
.auth-btn:disabled{background:#1a2a4a;color:#444;cursor:not-allowed;transform:none;box-shadow:none}
.auth-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.24);border-radius:10px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.auth-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text3)}

/* ── User menu ── */
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);border:1.5px solid #3b7ef8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 8px 18px rgba(59,126,248,.22)}
.user-avatar:hover{border-color:#60a5fa;box-shadow:0 6px 16px rgba(59,126,248,.3);transform:scale(1.05)}
.online-presence{display:flex;align-items:center;gap:8px;min-height:30px}
.online-users{display:flex;align-items:center;gap:0}
.online-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#17356f 0%,#2254d6 100%);border:2px solid #22c55e;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:#fff;margin-left:-6px;cursor:default;flex-shrink:0;box-shadow:0 0 0 2px rgba(34,197,94,.1);letter-spacing:.02em}
.online-avatar:first-child{margin-left:0}
.online-more{background:#111827;border-color:rgba(148,163,184,.45);color:var(--text2)}
.online-count-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#86efac;font-weight:800;background:rgba(5,32,20,.92);padding:4px 10px;border-radius:999px;border:1px solid rgba(34,197,94,.32);box-shadow:0 8px 22px rgba(34,197,94,.12);white-space:nowrap}
.online-count-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.7)}
html[data-theme="light"] .online-count-pill{background:#e9fdf1;color:#047857;border-color:#bbf7d0;box-shadow:0 8px 20px rgba(16,185,129,.12)}
html[data-theme="light"] .online-more{background:#eef4ff;color:#1e3a8a}
.user-dropdown{position:absolute;top:calc(100%+8px);right:0;background:var(--panel-grad);border:1px solid var(--border2);border-radius:14px;padding:4px;min-width:200px;z-index:500;box-shadow:0 16px 36px rgba(4,10,24,.32);backdrop-filter:blur(14px)}
.user-dd-info{padding:10px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.user-dd-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}.user-dd-item:hover{background:rgba(59,126,248,.1);color:var(--text);transform:translateX(2px)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--overlay) 0%,rgba(2,6,14,.72) 100%);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel-grad);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 24px 60px rgba(4,10,24,.44)}
.modal-wide{max-width:780px!important}
.modal-preview{max-width:min(1080px,96vw)!important;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.modal-preview .modal-title{margin-bottom:14px}
.modal-preview .modal-footer{flex-shrink:0}
.receipt-preview-shell{min-height:0;display:flex;flex-direction:column;gap:14px}
.receipt-preview-header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:rgba(59,126,248,.06)}
.receipt-preview-name{font-size:14px;font-weight:850;color:var(--text);line-height:1.35;word-break:break-word}
.receipt-preview-size{font-size:12px;color:var(--text3);margin-top:3px}
.receipt-preview-stage{display:flex;justify-content:center;align-items:flex-start;min-height:360px;max-height:calc(92vh - 220px);overflow:auto;background:linear-gradient(180deg,#f8fafc 0%,#eef4ff 100%);border:1px solid rgba(148,163,184,.45);border-radius:18px;padding:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.85)}
.receipt-preview-img{width:min(100%,760px);max-width:none;height:auto;border-radius:12px;background:#fff;box-shadow:0 18px 44px rgba(15,23,42,.18);image-rendering:auto}
.receipt-preview-pdf{width:100%;height:calc(92vh - 220px);min-height:520px;border:1px solid rgba(148,163,184,.45);border-radius:18px;background:#fff}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.req-items-head{display:grid;grid-template-columns:2fr 55px 65px 100px 100px 1fr 28px;gap:4px;margin-bottom:4px;padding:0 2px}
.req-items-list{display:flex;flex-direction:column;gap:6px}
.req-item-row{display:grid;grid-template-columns:2fr 55px 65px 100px 100px 1fr 28px;gap:4px;margin-bottom:0}
.req-item-field{display:flex;flex-direction:column;gap:4px;min-width:0}
.req-item-label{display:none;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.req-item-remove{background:rgba(235,87,87,.08);border:1px solid rgba(235,87,87,.18);border-radius:8px;color:#f87171;cursor:pointer;font-size:16px;padding:0;width:28px}
.req-add-btn{background:none;border:1px dashed var(--border2);border-radius:7px;color:var(--text3);cursor:pointer;font-size:12px;padding:8px;font-family:'Inter',sans-serif;width:100%;margin-top:6px;transition:all .15s}
.req-add-btn:hover{border-color:var(--blue);color:var(--text)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel-grad);border:1px solid var(--border2);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 16px 36px rgba(4,10,24,.32);animation:slideUp .25s ease;backdrop-filter:blur(14px)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Comment ── */
.comment{display:flex;gap:10px;margin-bottom:14px;padding:12px;background:rgba(79,140,255,.04);border:1px solid rgba(79,140,255,.08);border-radius:12px;transition:all .2s}
.comment:hover{background:rgba(79,140,255,.07)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1a2e6b 0%,#2a3f8a 100%);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid rgba(59,126,248,.3);box-shadow:0 4px 8px rgba(59,126,248,.1)}
.comment-mention{color:#60a5fa;font-weight:600;background:rgba(59,126,248,.15);border-radius:4px;padding:2px 6px;border:1px solid rgba(59,126,248,.3)}
.comment-input-wrap{position:relative;flex:1}
.comment-input{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border2);border-radius:11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:42px;max-height:120px;transition:all .2s}
.comment-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,126,248,.1)}
.mention-menu{position:absolute;bottom:calc(100%+6px);left:0;background:var(--panel-grad);border:1px solid var(--border2);border-radius:12px;padding:4px;min-width:240px;max-height:min(340px,52vh);overflow-y:auto;z-index:500;box-shadow:0 12px 30px rgba(4,10,24,.28);display:none;backdrop-filter:blur(14px)}
.mention-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s}.mention-item:hover,.mention-item.active{background:rgba(59,126,248,.1);transform:translateX(2px)}
.m-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1a2e6b 0%,#2a3f8a 100%);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid rgba(59,126,248,.2)}

/* ── Misc ── */
.loader{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loader::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid rgba(59,126,248,.2);border-top-color:#3b7ef8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;border:1px dashed rgba(36,48,80,.5);border-radius:12px;background:rgba(59,126,248,.02);transition:all .2s}
.empty-state:hover{border-color:rgba(59,126,248,.3);background:rgba(59,126,248,.05)}
.empty-state p{color:var(--text3);font-size:14px;margin-bottom:16px}
.tag{font-size:11px;color:var(--text3);background:linear-gradient(135deg,rgba(59,126,248,.1) 0%,rgba(59,126,248,.05) 100%);padding:3px 10px;border-radius:6px;white-space:nowrap;font-weight:600;border:1px solid rgba(59,126,248,.2);transition:all .2s}
.tag:hover{background:rgba(59,126,248,.15);color:var(--text2)}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite;flex-shrink:0;box-shadow:0 0 8px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 rgba(59,126,248,.4)}70%{box-shadow:0 0 0 8px rgba(59,126,248,0)}}
.btn-pulse{animation:pulseBtn 2s infinite}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(36,48,80,.5) 20%,rgba(36,48,80,.5) 80%,transparent);margin:20px 0}
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .obra-grid{grid-template-columns:1fr}
  .form-grid-2,.form-grid-3{grid-template-columns:1fr}
  .obra-nav{gap:6px;display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .obra-nav::-webkit-scrollbar{display:none}
  .obra-nav-btn{padding:8px 12px;font-size:12px;flex:0 0 auto;white-space:nowrap}
  .page{padding:16px 12px 100px}
  .topbar{height:58px;min-height:58px;padding:8px 12px;flex-wrap:nowrap;align-items:center;gap:8px}
  .topbar-logo{min-width:0;flex:0 1 auto}
  .topbar-name{font-size:12px;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar-sep{display:none}
  .topbar-crumb{display:none}
  .topbar-right{width:auto;margin-left:auto;justify-content:flex-end;flex-wrap:nowrap;gap:8px}
  .topbar-user{padding:0;border-right:none;font-size:11px;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .theme-toggle{width:36px;height:36px;border-radius:12px}
  .user-avatar{width:36px;height:36px}
  .online-presence{gap:6px;min-height:28px}
  .online-avatar{width:26px;height:26px;font-size:9.5px;margin-left:-7px}
  .online-avatar:first-child{margin-left:0}
  .online-count-pill{font-size:10px;padding:3px 7px}
  .section-header{flex-direction:column;align-items:flex-start}
  .section-header>div:last-child{width:100%;flex-wrap:wrap}
  .section-header .btn{flex:1;justify-content:center}
  .func-actions-bar{width:100%}
  .manage-obra-actions{width:100%}
  .manage-obra-btn{flex:1}
  .pedido-inline-toolbar{flex-direction:column;align-items:stretch}
  .pedido-inline-total{justify-content:center}
  .delete-dialog-actions{flex-direction:column}
  .func-action-group,.func-toggle-card,.func-create-btn{width:100%}
  .func-toolbar-btn,.func-create-btn{justify-content:flex-start;width:100%}
  .baixada-summary-grid{grid-template-columns:1fr 1fr}
  .baixada-head,.baixada-filter-row{flex-direction:column;align-items:stretch}
  .baixada-actions{width:100%}
  .baixada-actions .btn{width:100%;justify-content:center}

const MAX_UPLOAD_SIZE=20*1024*1024;

function validateUploadFile(file,{imagesOnly=false}={}){
  if(!file)return false;
  const name=String(file.name||'arquivo');
  const ext=getExt(name);
  const max=imagesOnly?MAX_IMAGE_UPLOAD_SIZE:MAX_UPLOAD_SIZE;
  const allowed=imagesOnly?ALLOWED_IMAGE_EXTS:ALLOWED_UPLOAD_EXTS;
  if(file.size>max){toast(`Arquivo muito grande: ${name}. Limite ${fmtSz(max)}.`,'#ef4444');return false;}
  if(!allowed.includes(ext)){toast(`Tipo de arquivo não permitido: .${ext||'sem extensão'}`,'#ef4444');return false;}
  if(imagesOnly&&file.type&&!file.type.startsWith('image/')){toast(`Arquivo inválido: ${name}`,'#ef4444');return false;}
  return true;
}

let COMMERCIAL_COMPANIES=[];
function cleanCommercialCompany(row={}){
  const endereco=row?.endereco&&typeof row.endereco==='object'?row.endereco:{};
  const contato=row?.contato_json&&typeof row.contato_json==='object'?row.contato_json:{};
  const company={
    id:String(row?.id||row?.slug||'').trim(),
    short:String(row?.short||row?.sigla||'').trim(),
    nome:String(row?.nome||row?.razao_social||row?.name||'').trim(),
    cnpj:formatCNPJ(row?.cnpj||''),
    inscricao_estadual:String(row?.inscricao_estadual||row?.ie||'').trim(),
    rua:String(row?.rua||endereco.rua||endereco.logradouro||'').trim(),
    bairro:String(row?.bairro||endereco.bairro||'').trim(),
    cidade:String(row?.cidade||endereco.cidade||'').trim(),
    cep:String(row?.cep||endereco.cep||'').trim(),
    email:String(row?.email||contato.email||'').trim(),
    telefone:String(row?.telefone||contato.telefone||'').trim(),
    contato:String(row?.contato||contato.nome||'').trim(),
    active:row?.active!==false
  };
  if(!company.id)company.id=normalizeMentionToken(company.short||company.nome||company.cnpj);
  if(!company.short)company.short=(company.nome||company.id).split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  return company.id&&company.nome&&company.active?company:null;
}

function formatCommercialCompanyAddress(company={}){
  const base=[company.rua,company.bairro?`Bairro ${company.bairro}`:'',company.cidade].filter(Boolean).join(' - ');
  return company.cep?`${base}, ${company.cep}`:base;
}
function getCommercialCompany(idOrName=''){
  const key=String(idOrName||'').trim();
  if(!key)return null;
  const clean=key.replace(/\D/g,'');
  return COMMERCIAL_COMPANIES.find(c=>c.id===key||c.short===key||c.nome===key||String(c.cnpj||'').replace(/\D/g,'')===clean)||null;
}
function normalizeCommercialCompany(raw=null){
  if(!raw)return null;
  const base=typeof raw==='string'?getCommercialCompany(raw):(raw?.id?getCommercialCompany(raw.id):getCommercialCompany(raw?.cnpj||raw?.nome||''));
  const merged={...(base||{}),...(typeof raw==='object'?raw:{})};
  if(!merged.nome&&!merged.cnpj&&!merged.id)return null;
  return {...merged,endereco:merged.endereco||formatCommercialCompanyAddress(merged)};
}

async function saveRemoteObras(list){
  const cleaned=uniqObras(cleanObraList(list));
  DB.obraRegistry=[...cleaned];
  try{
    const blob=new Blob([JSON.stringify(cleaned,null,2)],{type:'application/json'});
    const {error}=await sb.storage.from(BUCKET).upload(OBRA_REGISTRY_PATH,blob,{upsert:true,contentType:'application/json'});
    if(error)throw error;
  }catch(err){
    console.warn('[JET] Registro de obras não salvo:',err?.message||err);
  }
}
async function syncObraRegistry(){
  const localNames=getObrasData().map(o=>o?.nome).filter(Boolean);
  const retObras=getRetornoObras(); // obras de retorno são sempre reais
  const depositos=getAlmoxDepositos();
  const merged=uniqObras([...(DB.obraRegistry||[]),...getCustomObras(),...localNames,...getDbObras(),...retObras]).filter(o=>!depositos.has(o)&&o!=='Sem obra');
  if(!sameObraList(DB.obraRegistry,merged))await saveRemoteObras(merged);
}
function getDbObras(){
  const tables=['aditivos','materiais','funcionarios','rdo','todos','despesas','pedidos','cotacoes','ferramentas'];
  return uniqObras(tables.flatMap(t=>(DB[t]||[]).map(r=>r?.obra).filter(Boolean)));
}
function getRetornoObras(){
  // Nomes em itens regulares (não-RET-*) são locais de armazenamento — depósitos, não obras
  const depositoNames=new Set(
    (DB.estoque||[]).filter(e=>!String(e.numero_controle||'').startsWith('RET-'))
                    .map(e=>String(e.obra||'').trim()).filter(Boolean)
  );
  // Obra de retorno = aparece em RET-* mas NUNCA como local de armazenamento regular
  return(DB.estoque||[]).filter(e=>String(e.numero_controle||'').startsWith('RET-'))
                        .map(e=>String(e.obra||'').trim())
                        .filter(n=>n&&!depositoNames.has(n));
}
function getAlmoxDepositos(){
  // NÃO usa DB.obraRegistry aqui — evita dependência circular (registry pode ter nomes errados)
  // Fontes independentes: fichas criadas, customObras, tabelas de transação, retornos confirmados
  const obraFichas=new Set(getObrasData().map(o=>o?.nome).filter(Boolean));
  const realObras=new Set([...obraFichas,...getCustomObras(),...getDbObras(),...getRetornoObras()]);
  const s=new Set(['ALMOX CENTRAL']);
  // Só analisa itens regulares (não RET-*): são esses que indicam local de armazenamento
  getAlmoxInventario().filter(e=>!String(e.numero_controle||'').startsWith('RET-')).forEach(e=>{
    const n=String(e?.obra||'').trim();
    if(n&&!realObras.has(n))s.add(n);
  });
  return s;
}

function getAlmoxFilteredMovimentos(){
  const filters=getAlmoxMovementFilters();
  let rows=cleanAlmoxMovimentos(DB.almoxMovimentos||[]).sort((a,b)=>String(b.data||b.created_at||'').localeCompare(String(a.data||a.created_at||'')));
  if(filters.obra)rows=rows.filter(item=>item.obra_origem===filters.obra||item.obra_destino===filters.obra);
  if(filters.tipo&&filters.tipo!=='Todos')rows=rows.filter(item=>item.tipo===filters.tipo);
  if(filters.dataInicio)rows=rows.filter(item=>(item.data||'')>=filters.dataInicio);
  if(filters.dataFim)rows=rows.filter(item=>(item.data||'')<=filters.dataFim);
  return rows;
}
function buildAlmoxExpedicaoGroups(){
  const grouped={};
  getAlmoxExpedicao().forEach(item=>{const key=item.numero_controle||item.id;if(!grouped[key])grouped[key]=[];grouped[key].push(item);});
  return Object.keys(grouped).map(key=>{
    const items=grouped[key].slice().sort((a,b)=>String(a.item||'').localeCompare(String(b.item||'')));
    const meta=getAlmoxTransferMeta(key,items);
    return{
      key,
      items,
      first:items[0]||{},
      totalQtd:items.reduce((sum,item)=>sum+Number(item.qtd||0),0),
      status:meta.status,
      meta
    };
  }).sort((a,b)=>String(b.first?.saida||b.first?.created_at||'').localeCompare(String(a.first?.saida||a.first?.created_at||'')));
}
function getAlmoxTransferCounts(groups=buildAlmoxExpedicaoGroups()){
  return groups.reduce((acc,group)=>{acc[group.status]=(acc[group.status]||0)+1;return acc;},{Separado:0,'Em transito':0,Recebido:0});
}
function formatAlmoxTransferTimeline(meta={}){
  const parts=[];
  if(meta.transito_em)parts.push(`Despachado ${fmtD(meta.transito_em)}`);
  if(meta.recebido_em)parts.push(`Recebido ${fmtD(meta.recebido_em)}`);
  return parts.join(' - ')||'Aguardando despacho';
}

function cleanNotice(row={}){
  const texto=String(row?.texto||'').trim();
  const autorRaw=String(row?.autor||'').trim()||'sistema';
  const autor=normalizeMentionToken(autorRaw)||'sistema';
  const replies=(Array.isArray(row?.replies)?row.replies:[]).map(cleanNoticeReply).filter(reply=>reply.texto).slice(0,80);
  const mentions=filterAllowedMentions([...(Array.isArray(row?.mentions)?row.mentions:[]),...parseMentions(texto),...replies.flatMap(reply=>reply.mentions||[])]);
  const readBy=[...new Set((Array.isArray(row?.readBy)?row.readBy:[]).map(normalizeMentionToken).filter(Boolean))];
  return{
    id:String(row?.id||('hv-'+uid())),
    texto,
    autor,
    autorLabel:String(row?.autorLabel||autorRaw||autor).trim()||autor,
    mentions,
    prioridade:HOME_NOTICE_PRIORITIES.includes(row?.prioridade)?row.prioridade:'Media',
    pinned:!!row?.pinned,
    readBy,
    replies,
    created_at:row?.created_at||new Date().toISOString(),
    updated_at:row?.updated_at||new Date().toISOString(),
  };
}
function cleanNotices(list){
  return(Array.isArray(list)?list:[])
    .map(cleanNotice)
    .filter(item=>item.texto)
    .sort((a,b)=>Number(b.pinned)-Number(a.pinned)||noticePriorityRank(b.prioridade)-noticePriorityRank(a.prioridade)||String(b.created_at||'').localeCompare(String(a.created_at||'')))
    .slice(0,120);
}

function normalizeCommercialItem(row={}){
  const raw=typeof row==='string'?{nome:row}:row||{};
  const quantidade=raw.quantidade===''?'':(Number(raw.quantidade??raw.qtd??1)||0);
  const valor=raw.valor_unitario===''?'':moneyNumber(raw.valor_unitario??raw.valor??raw.preco??0);
  return{
    id:String(raw.id||uid()),
    tipo:String(raw.tipo||'Serviço').trim()||'Serviço',
    nome:String(raw.nome||raw.item||'').trim(),
    descricao:String(raw.descricao||raw.desc||raw.observacao||'').trim(),
    quantidade,
    unidade:normalizeMaterialUnit(raw.unidade||raw.unid||'un'),
    valor_unitario:valor==null?'':valor,
    observacao:String(raw.obs||raw.observacao_item||'').trim()
  };
}
function normalizeCommercialItems(list=[]){return(Array.isArray(list)?list:[]).map(normalizeCommercialItem).filter(item=>item.nome||item.descricao||item.quantidade||item.valor_unitario||item.observacao);}
function calcCommercialItemsTotal(items=[],tipoFilter=null){return normalizeCommercialItems(items).filter(item=>!tipoFilter||item.tipo===tipoFilter).reduce((sum,item)=>sum+(Number(item.quantidade)||0)*(Number(item.valor_unitario)||0),0);}

function cleanDespesaFileMap(map={}){const out={};Object.entries(map||{}).forEach(([despId,files])=>{const cleaned=(Array.isArray(files)?files:[]).map(cleanDespesaFile).filter(f=>f.name&&f.path&&f.url);if(cleaned.length)out[despId]=cleaned;});return out;}
function despesaFileMergeKey(file={}){return String(file.path||'').trim()||`${despImportFileKey(file.name||'')}|${Number(file.size||0)||0}`;}
function mergeDespesaFileMaps(...maps){
  const out={};
  maps.map(cleanDespesaFileMap).forEach(map=>{
    Object.entries(map).forEach(([despId,files])=>{
      if(!out[despId])out[despId]=[];
      const seen=new Set(out[despId].map(despesaFileMergeKey));
      files.forEach(file=>{
        const key=despesaFileMergeKey(file);
        if(!key||seen.has(key))return;
        seen.add(key);
        out[despId].push(file);
      });
    });
  });
  return cleanDespesaFileMap(out);
}

function rememberPendingDespesaFiles(ids=[],map=DB.despesaFiles||{}){
  const pending=getPendingDespesaFiles();
  const next={...pending};
  [...new Set((ids||[]).filter(Boolean).map(String))].forEach(id=>{
    if(map[id]?.length)next[id]=mergeDespesaFileMaps({[id]:next[id]||[]},{[id]:map[id]})[id]||[];
  });
  savePendingDespesaFiles(next);
}
function clearPendingDespesaFiles(ids=[]){
  const pending=getPendingDespesaFiles();
  [...new Set((ids||[]).filter(Boolean).map(String))].forEach(id=>delete pending[id]);
  savePendingDespesaFiles(pending);
}
function normalizeMaterialUnit(value='un'){
  const raw=String(value||'un').trim();
  const key=raw.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,'');
  const normalized=MATERIAL_UNIT_ALIASES[key]||MATERIAL_UNIT_ALIASES[raw]||raw;
  return MATERIAL_UNIT_OPTIONS.includes(normalized)?normalized:'un';
}
function materialUnitOptions(value='un'){
  const selected=normalizeMaterialUnit(value);
  return MATERIAL_UNIT_OPTIONS.map(unit=>`<option value="${esc(unit)}"${unit===selected?' selected':''}>${esc(unit)}</option>`).join('');
}
function materialUnitSelect(className,value='un',style='',extra=''){
  return `<select class="${className}" style="${style}" ${extra}>${materialUnitOptions(value)}</select>`;
}
function normalizeMaterialSpec(value=''){
  return String(value||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').replace(/[^\w\s.-]/g,'').trim();
}
function findDuplicateMaterialSpecs(items=[]){
  const seen=new Map(),dups=new Map();
  items.forEach(item=>{
    const label=String(item?.item||item?.desc||'').trim();
    const key=normalizeMaterialSpec(label);
    if(!key)return;
    if(seen.has(key))dups.set(key,seen.get(key));
    else seen.set(key,label);
  });
  return [...dups.values()];
}
function confirmMaterialDuplicates(items=[]){
  const dups=findDuplicateMaterialSpecs(items);
  if(!dups.length)return true;
  return confirm(`Atenção: existe material duplicado na mesma requisição:\n\n${dups.map(v=>'• '+v).join('\n')}\n\nDeseja salvar mesmo assim?`);
}
function materialReqKeyPart(value=''){
  return String(value||'sem-data').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9_-]+/g,'-').replace(/^-+|-+$/g,'')||'sem-data';
}
function getMaterialReqKey(obra,date){

function cleanAlmoxMeta(meta={}){
  const itemMeta={};
  Object.entries(meta?.itemMeta||{}).forEach(([id,row])=>{
    const minRaw=row?.estoque_minimo;
    const min=Number(minRaw??-1);
    const hasMin=minRaw!=null&&minRaw!==''&&Number.isFinite(min)&&min>=0;
    const codigo=String(row?.codigo||'').trim();
    if(hasMin||codigo){
      const entry={updated_at:row?.updated_at||new Date().toISOString()};
      if(hasMin)entry.estoque_minimo=min;
      if(codigo)entry.codigo=codigo;
      itemMeta[String(id)]=entry;
    }
  });
  const transferMeta={};
  Object.entries(meta?.transferMeta||{}).forEach(([num,row])=>{
    const key=getAlmoxTransferKey(num);
    if(!key)return;
    transferMeta[key]={
      status:normalizeAlmoxTransferStatus(row?.status),
      obra_origem:String(row?.obra_origem||'').trim(),
      transito_em:String(row?.transito_em||'').slice(0,10),
      recebido_em:String(row?.recebido_em||'').slice(0,10),
      recebido_por:String(row?.recebido_por||'').trim(),
      recebimento_obs:String(row?.recebimento_obs||'').trim(),
      updated_at:row?.updated_at||new Date().toISOString()
    };
  });
  const depositoMeta={};
  Object.entries(meta?.depositoMeta||{}).forEach(([nome,row])=>{
    if(!nome)return;
    depositoMeta[String(nome)]={
      responsavel:String(row?.responsavel||'').trim(),
      localizacao:String(row?.localizacao||'').trim(),
      observacao:String(row?.observacao||'').trim(),
      updated_at:row?.updated_at||new Date().toISOString()
    };
  });
  return{itemMeta,transferMeta,depositoMeta};
}

  });

}

async function loadRemoteBaixadas(){
  try{
    const {data,error}=await sb.storage.from(BUCKET).download(BAIXADAS_PATH);
    if(error){
      const msg=String(error.message||'');
      if(/not found|404/i.test(msg)){DB.baixadas=getLocalBaixadas();return;}

async function loadRemoteDespesaFiles(){
  const localMap=getLocalDespesaFiles();
  const pendingMap=getPendingDespesaFiles();
  try{
    const {data,error}=await sb.storage.from(BUCKET).download(DESPESA_FILES_PATH);
    if(error){
      const msg=String(error.message||'');
      if(/not found|404/i.test(msg)){DB.despesaFiles=mergeDespesaFileMaps(localMap,pendingMap);saveLocalDespesaFiles(DB.despesaFiles);return;}
      throw error;
    }
    // Fonte de verdade: Storage remoto. LocalStorage serve só como fallback se o remoto falhar.
    // Isso evita que um anexo removido volte sozinho por cache antigo do navegador.
    DB.despesaFiles=mergeDespesaFileMaps(cleanDespesaFileMap(JSON.parse(await data.text())),pendingMap);
    saveLocalDespesaFiles(DB.despesaFiles);
    const pendingIds=Object.keys(pendingMap);
    if(pendingIds.length){
      const synced=await saveRemoteDespesaFiles(DB.despesaFiles,{silent:true,replaceIds:pendingIds});
      if(synced)clearPendingDespesaFiles(pendingIds);
    }
  }catch(err){
    DB.despesaFiles=mergeDespesaFileMaps(localMap,pendingMap);
    saveLocalDespesaFiles(DB.despesaFiles);
    console.warn('[JET] Arquivos de adiantamento não carregados:',err?.message||err);
  }
}
async function saveRemoteDespesaFiles(map,{silent=false,mergeRemote=true,replaceIds=[]}={}){
  const cleaned=cleanDespesaFileMap(map);
  const forceIds=[...new Set((replaceIds||[]).filter(Boolean).map(String))];
  let finalMap=cleaned;
  try{
    if(mergeRemote){
      try{
        const {data,error}=await sb.storage.from(BUCKET).download(DESPESA_FILES_PATH);
        if(!error&&data){
          const remoteMap=cleanDespesaFileMap(JSON.parse(await data.text()));
          finalMap=mergeDespesaFileMaps(remoteMap,cleaned);
          forceIds.forEach(id=>{
            if(cleaned[id]?.length)finalMap[id]=cleaned[id];
            else delete finalMap[id];
          });
        }
      }catch(err){
        console.warn('[JET] Merge remoto de anexos ignorado:',err?.message||err);
      }
    }
    DB.despesaFiles={...finalMap};
    saveLocalDespesaFiles(DB.despesaFiles);
    const blob=new Blob([JSON.stringify(finalMap,null,2)],{type:'application/json'});
    const {error}=await sb.storage.from(BUCKET).upload(DESPESA_FILES_PATH,blob,{upsert:true,contentType:'application/json'});
    if(error)throw error;
    return true;
  }catch(err){
    console.warn('[JET] Arquivos de adiantamento não salvos:',err?.message||err);
    DB.despesaFiles={...cleaned};
    saveLocalDespesaFiles(DB.despesaFiles);

    return false;
  }
}

function sortBaixadaRows(a,b){const da=a.data_ida||'9999-12-31',db=b.data_ida||'9999-12-31';return da!==db?da.localeCompare(db):(a.nome||'').localeCompare(b.nome||'');}
function getActiveBaixadaRows(obra){

  return active.map(f=>{
    const found=obraRows.find(r=>r.funcId===f.id||(!r.funcId&&r.nome===f.nome));
    return cleanBaixada(found||{obra,funcId:f.id||'',nome:f.nome||'',funcao:f.funcao||'',status:'Solicitado'});
  }).sort(sortBaixadaRows);

function isBaixadaLive(row,day=todayISO()){return!!(row?.data_ida&&row?.data_volta&&day>=row.data_ida&&day<row.data_volta);}
function syncBaixadasWithFuncionarios(obra){
  const active=getActiveFuncionarios(obra);
  const all=cleanBaixadas(DB.baixadas||[]);
  const next=all.filter(r=>r.obra!==obra);
  const obraRows=all.filter(r=>r.obra===obra);
  let changed=false;
  active.forEach(f=>{
    const idx=obraRows.findIndex(r=>r.funcId===f.id||(!r.funcId&&r.nome===f.nome));
    if(idx===-1){
      obraRows.push(cleanBaixada({obra,funcId:f.id||'',nome:f.nome||'',funcao:f.funcao||'',status:'Solicitado'}));
      changed=true;
      return;
    }
    const merged=cleanBaixada({...obraRows[idx],obra,funcId:f.id||'',nome:f.nome||'',funcao:f.funcao||''});
    if(JSON.stringify(merged)!==JSON.stringify(cleanBaixada(obraRows[idx]))){obraRows[idx]=merged;changed=true;}
  });
  DB.baixadas=[...next,...obraRows.map(cleanBaixada)];
  if(changed)saveLocalBaixadas(DB.baixadas);
  return{rows:getActiveBaixadaRows(obra),changed};
}

    document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);

function normalizePedidoItem(item={}){
  const raw=typeof item==='string'?{nome:item}:item||{};
  return{
    nome:String(raw.nome??raw.item??'').trim(),
    qtd:raw.qtd===''?'':(raw.qtd??''),
    unidade:normalizeMaterialUnit(raw.unidade??raw.unid??'un'),
    valor:raw.valor===''?'':(raw.valor??''),
    obs:String(raw.obs??raw.observacao??'').trim()
  };
}
function normalizePedidoItems(items=[]){
  return(Array.isArray(items)?items:[]).map(normalizePedidoItem).filter(item=>item.nome||item.qtd||item.valor||item.obs);
}
function calcPedidoTotal(items=[]){
  return normalizePedidoItems(items).reduce((sum,item)=>sum+(Number(item.qtd)||0)*(Number(item.valor)||0),0);
}
function normalizeCotacaoItem(entry={}){
  const raw=typeof entry==='string'?{fornecedor:entry}:entry||{};
  const itens=normalizeCommercialItems(raw.itens||raw.items||[]);
  const preco=moneyNumber(raw.preco??raw.valor_total??raw.total);
  const empresa=normalizeCommercialCompany(raw.empresa||raw.company||raw.empresa_id||raw.empresaId||null);
  return{
    fornecedor:String(raw.fornecedor||raw.nome||'').trim(),
    preco,
    prazo:String(raw.prazo||raw.prazo_dias||'').trim(),
    observacao:String(raw.observacao||raw.obs||'').trim(),
    itens,
    empresa_id:String(raw.empresa_id||raw.empresaId||empresa?.id||'').trim(),
    escolhido:!!raw.escolhido
  };
}
function normalizeCotacaoItems(items=[]){
  return(Array.isArray(items)?items:[]).map(normalizeCotacaoItem).filter(item=>item.fornecedor);
}
function normalizeCotacaoStatus(status){
  if(status==='Pendente')return'Solicitada';
  return COTACAO_STATUS_LIST.includes(status)?status:'Solicitada';
}
function cotacaoMelhorPreco(items=[]){
  const values=normalizeCotacaoItems(items).map(item=>item.preco).filter(v=>v!=null);
  return values.length?Math.min(...values):null;
}
function cotacaoVencedor(items=[]){
  const list=normalizeCotacaoItems(items);
  return list.find(item=>item.escolhido)||null;
}
async function saveCotacaoPatch(id,patch,{silent=false}={}){
  const idx=(DB.cotacoes||[]).findIndex(c=>c.id===id);
  if(idx<0)return false;
  const current=DB.cotacoes[idx];
  const next={...current,...patch};
  if('cotacoes' in patch)next.cotacoes=normalizeCotacaoItems(patch.cotacoes);
  if('status' in patch)next.status=normalizeCotacaoStatus(patch.status);
  DB.cotacoes[idx]=next;
  const payload={...patch};
  if('cotacoes' in payload)payload.cotacoes=next.cotacoes;
  if('status' in payload)payload.status=next.status;
  const {error}=await sb.from('cotacoes').update(payload).eq('id',id);
  if(error){
    DB.cotacoes[idx]=current;
    if(!silent)toast('Erro ao salvar cotação: '+error.message,'#ef4444');
    return false;
  }
  return true;
}
function buildObraDeleteMap(obra){
  return Object.fromEntries(OBRA_LINKED_TABLES.map(table=>[table,(DB[table]||[]).filter(row=>row?.obra===obra).map(row=>row.id)]));
}
function linkedObraCount(map={}){return Object.values(map||{}).reduce((sum,ids)=>sum+(Array.isArray(ids)?ids.length:0),0);}
async function savePedidoPatch(id,patch,{silent=false}={}){
  const idx=(DB.pedidos||[]).findIndex(p=>p.id===id);
  if(idx<0)return false;
  const current=DB.pedidos[idx];
  const next={...current,...patch};
  if('itens' in patch)next.itens=normalizePedidoItems(patch.itens);
  if('itens' in patch&&!'total' in patch)next.total=calcPedidoTotal(next.itens||[]);
  const payload={...patch};
  if('itens' in payload)payload.itens=next.itens;
  if('total' in payload||'itens' in payload)payload.total=next.total;
  DB.pedidos[idx]=next;
  const {error}=await sb.from('pedidos').update(payload).eq('id',id);
  if(error){DB.pedidos[idx]=current;if(!silent)toast('Erro ao salvar pedido: '+error.message,'#ef4444');return false;}
  return true;
}

const UPDATE_FIELD_ALLOWLIST={
  aditivos:new Set(['nome','numero','status','valor','solicitacao','proposta','responsavel','data']),
  materiais:new Set(['item','quantidade','unidade','disciplina','urgencia','status','observacao_item']),
  funcionarios:new Set(['status']),
  todos:new Set(['responsavel','status','prioridade']),
  despesas:new Set(['descricao','nfe','loja','valor_conta']),
  estoque:new Set(['item','qtd','unidade']),
  pedidos:new Set(['numero','data','observacao','fornecedor','obra','responsavel','status','total']),
  fornecedores:new Set(['nome','telefone','email','cnpj','ativo']),
  ferramentas:new Set(['item','numero_serie','patrimonio','status','funcionario_nome','data_alocacao','motivo_baixa','observacao'])
};
function canUpdateField(table,field){return UPDATE_FIELD_ALLOWLIST[table]?.has(field)===true;}
async function updateField(table,id,field,value){
  if(!canUpdateField(table,field)){
    console.warn('[JET] updateField bloqueado:',{table,field,id});
    toast('Campo não permitido para edição rápida.','#ef4444');
    return false;
  }
  const row=DB[table]?.find(r=>r.id===id);
  if(table==='materiais'&&field==='unidade')value=normalizeMaterialUnit(value);
  if(table==='materiais'&&field==='item'&&row){
    const key=normalizeMaterialSpec(value);
    const hasDuplicate=key&&DB.materiais.some(m=>m.id!==id&&m.obra===row.obra&&(m.data_solicitacao||'')===(row.data_solicitacao||'')&&normalizeMaterialSpec(m.item)===key);
    if(hasDuplicate&&!confirm(`Atenção: "${value}" já existe nesta solicitação.\n\nDeseja salvar mesmo assim?`))return false;
  }
  const oldVal=row?row[field]:undefined;
  if(row)row[field]=value;
  const{error}=await sb.from(table).update({[field]:value}).eq('id',id);
  if(error){toast('Erro ao salvar: '+error.message,'#ef4444');if(row)row[field]=oldVal;return false;}
  if(table==='materiais'&&field==='status'){_appendMaterialStatusHistory(id,value);if(value==='Aprovado')_onMaterialAprovado(id);}
  if(table==='estoque')renderApp();
  return true;
}

async function _onMaterialAprovado(matId){
  const mat=DB.materiais.find(m=>m.id===matId);
  if(!mat||!mat.item)return;
  if(mat.almox_baixado){
    toast('Estoque já foi baixado para este item.','#f59e0b');
    return;
  }
  const normItem=normalizeMaterialSpec(mat.item);
  const estoqueItem=(DB.estoque||[]).find(e=>normalizeMaterialSpec(e.item)===normItem);
  if(!estoqueItem)return;
  const qtdDeduzir=parseFloat(mat.quantidade)||0;
  const novaQtd=Math.max(0,Number(estoqueItem.qtd||0)-qtdDeduzir);
  const{error}=await sb.from('estoque').update({qtd:novaQtd}).eq('id',estoqueItem.id);
  if(error)return;
  estoqueItem.qtd=novaQtd;
  // Mark this material as already deducted to prevent double-deduction
  const{error:me}=await sb.from('materiais').update({almox_baixado:true}).eq('id',matId);
  if(!me)mat.almox_baixado=true;
  toast(`Estoque: "${estoqueItem.item}" → ${novaQtd} ${estoqueItem.unidade||'un'}`,'#22c55e');
  const minimo=getAlmoxMinStock(estoqueItem);
  if(novaQtd<=minimo){
    const cot={id:uid(),obra:mat.obra,item:`Reposição: ${mat.item}`,cotacoes:[],status:'Solicitada',data:todayISO(),origem:'auto-reposicao',created_at:new Date().toISOString()};
    const{error:ce}=await sb.from('cotacoes').insert(cot);
    if(!ce){
      if(!DB.cotacoes.find(c=>c.id===cot.id))DB.cotacoes.unshift(cot);
      toast(`⚠ Estoque mínimo: cotação criada para "${mat.item}"`,'#f59e0b');
    }
  }
  renderApp();
}

async function _appendMaterialStatusHistory(matId,newStatus){
  const mat=DB.materiais.find(m=>m.id===matId);
  if(!mat)return;
  const history=Array.isArray(mat.status_history)?mat.status_history:[];
  const entry={status:newStatus,usuario:currentUser?.email||'Usuário',data:new Date().toISOString()};
  const newHistory=[...history,entry];
  const{error}=await sb.from('materiais').update({status_history:newHistory}).eq('id',matId);
  if(!error)mat.status_history=newHistory;
}

function setupRT(){
  ['aditivos','materiais','funcionarios','rdo','todos','despesas','estoque','pedidos','fornecedores','cotacoes','ferramentas'].forEach(table=>{
    sb.channel('rt-'+table).on('postgres_changes',{event:'*',schema:'public',table},({eventType:et,new:n,old:o})=>{
      if(et==='INSERT'){if(!DB[table].find(r=>r.id===n.id))DB[table].unshift(n);}
      else if(et==='UPDATE'){const i=DB[table].findIndex(r=>r.id===n.id);if(i>=0)DB[table][i]=n;}
      else if(et==='DELETE')DB[table]=DB[table].filter(r=>r.id!==o.id);
      renderApp();
    }).subscribe();
  });
}

function getMentionDirectory(){
  const seen=new Set();
  return MENTION_USER_EMAILS
    .map(value=>{
      const raw=String(value||'').trim().toLowerCase();
      if(!raw)return null;
      const email=raw.includes('@')?raw:'';
      const label=(email?email.split('@')[0]:raw).trim();
      const token=normalizeMentionToken(label);
      if(!token||seen.has(token))return null;
      seen.add(token);
      return {token,label,email};
    })
    .filter(Boolean)
    .sort((a,b)=>a.label.localeCompare(b.label));
}
function getTeamMembers(){return getMentionDirectory().map(item=>item.label);}
function getMentionSuggestions(query=''){
  const q=String(query||'').toLowerCase();
  return getTeamMembers().filter(name=>name.toLowerCase().includes(q));
}
function addISODate(iso,days=1){
  if(!iso)return'';

function sortHomeNotices(list=[]){

    || Number(isNoticeMention(b,userToken))-Number(isNoticeMention(a,userToken))
    || Number(!isNoticeRead(a,userToken))-Number(!isNoticeRead(b,userToken))
    || noticePriorityRank(b.prioridade)-noticePriorityRank(a.prioridade)

  );

  return{

    mentions:list.filter(item=>isNoticeMention(item,userToken)).length,
    attention,

}

  el.style.height=Math.min(el.scrollHeight,150)+'px';
  const val=el.value,pos=el.selectionStart,before=val.slice(0,pos),atIdx=before.lastIndexOf('@');
  if(atIdx>=0&&(atIdx===0||/\s/.test(before[atIdx-1]))){
    const q=before.slice(atIdx+1);
    if(!/\s/.test(q)){
      _homeMentionActive=true;_homeMentionStart=atIdx;_homeMentionQuery=q;_homeMentionIdx=0;
      _showHomeMentions(getMentionSuggestions(q));
      return;
    }
  }
  _homeMentionActive=false;
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(menu)menu.style.display='none';
};
window._homeNoticeKey=(e)=>{
  if(_homeMentionActive){
    const items=getMentionSuggestions(_homeMentionQuery);
    if(e.key==='ArrowDown'){e.preventDefault();_homeMentionIdx=(_homeMentionIdx+1)%Math.max(items.length,1);_showHomeMentions(items);return;}
    if(e.key==='ArrowUp'){e.preventDefault();_homeMentionIdx=(_homeMentionIdx-1+Math.max(items.length,1))%Math.max(items.length,1);_showHomeMentions(items);return;}
    if(e.key==='Enter'&&items.length){e.preventDefault();_pickHomeMention(items[_homeMentionIdx]);return;}
    if(e.key==='Escape'){e.preventDefault();hideMentionMenus();return;}
  }
};
function _showHomeMentions(items){
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(!menu)return;
  if(!items.length){menu.style.display='none';return;}
  menu.style.display='block';
  menu.innerHTML=items.map((name,index)=>`<div class="mention-item${index===_homeMentionIdx?' active':''}" onmousedown="event.preventDefault();_pickHomeMention('${escJs(name)}')"><div class="m-avatar">${esc(name.charAt(0).toUpperCase())}</div>@${esc(name)}</div>`).join('');
}
function _pickHomeMention(name){
  const el=getHomeNoticeFieldRefs().textEl;
  if(!el)return;
  const val=el.value,after=val.slice(el.selectionStart);
  el.value=val.slice(0,_homeMentionStart)+'@'+name+' '+after;
  _homeMentionActive=false;
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(menu)menu.style.display='none';
  el.focus();
  window._homeNoticeInput(el);
}
window._toggleHomeNotices=(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  S.homeNoticeOpen=!S.homeNoticeOpen;
  renderApp();
};
window._openHomeNoticeModal=(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  S.homeNoticeOpen=false;
  S.modal='home-notice';
  S.modalData={};
  renderApp();
  setTimeout(()=>document.getElementById('m-home-aviso-text')?.focus(),0);
};
window._replyNotice=(id,event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  const item=(DB.avisos||[]).find(entry=>entry.id===id);
  if(!item)return;
  S.homeNoticeOpen=false;
  S.modal='home-notice';
  S.modalData={replyTo:id,prefill:`@${item.autorLabel||item.autor} `};
  renderApp();
  setTimeout(()=>{
    const el=document.getElementById('m-home-aviso-text');
    if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length;}
  },0);
};
window._setHomeNoticeFilter=(filter)=>{S.homeNoticeFilter=filter;renderApp();};
window._postHomeNotice=async(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  const btn=event?.currentTarget||null;
  if(btn){btn.disabled=true;btn.dataset.originalText=btn.textContent;btn.textContent='Publicando...';}
  try{
    const{textEl,priorityEl,pinEl,inModal}=getHomeNoticeFieldRefs();
    if(!textEl){
      window._openHomeNoticeModal();
      toast('Formulario de aviso reaberto. Tente publicar novamente.','#f59e0b');
      return;
    }
    const texto=textEl.value.trim();
    if(!texto){toast('Escreva um aviso antes de publicar.','#f59e0b');textEl.focus();return;}
    const invalidMentions=getInvalidMentions(texto);
    if(invalidMentions.length){
      toast(`Menção não cadastrada: @${invalidMentions[0]}. Use apenas usuários autorizados.`, '#ef4444');
      textEl.focus();
      return;
    }
    const autorLabel=getCurrentUserHandle();
    const autor=normalizeMentionToken(autorLabel)||'sistema';
    const replyTo=String(S.modalData?.replyTo||'').trim();
    if(replyTo){
      const reply=cleanNoticeReply({id:'hr-'+uid(),texto,autor,autorLabel,mentions:parseMentions(texto),created_at:new Date().toISOString()});
      let found=false;
      DB.avisos=cleanNotices((DB.avisos||[]).map(item=>{
        if(item.id!==replyTo)return item;
        found=true;
        return cleanNotice({...item,replies:[...(item.replies||[]),reply],readBy:[autor],updated_at:new Date().toISOString()});
      }));
      if(!found){toast('Aviso original não encontrado.','#ef4444');return;}
    }else{
      const notice=cleanNotice({
        id:'hv-'+uid(),
        texto,
        autor,
        autorLabel,
        prioridade:priorityEl?.value||'Media',
        pinned:!!pinEl?.checked,
        readBy:[autor],
        mentions:parseMentions(texto),
        created_at:new Date().toISOString(),
        updated_at:new Date().toISOString()
      });
      DB.avisos=cleanNotices([notice,...(DB.avisos||[])]);
    }
    saveLocalHomeNotices(DB.avisos);
    const synced=await saveRemoteHomeNotices(DB.avisos,{silent:false});
    if(textEl){textEl.value='';textEl.style.height='auto';}
    if(priorityEl)priorityEl.value='Media';
    if(pinEl)pinEl.checked=false;
    if(inModal)S.modal=null;
    S.homeNoticeOpen=true;
    S.homeNoticeFilter='all';
    toast(replyTo?(synced?'Resposta publicada.':'Resposta salva neste aparelho.'):(synced?'Aviso publicado.':'Aviso salvo neste aparelho.'),synced?'#22c55e':'#f59e0b');
    renderApp();
  }catch(err){
    console.error('[JET] Erro ao publicar aviso:',err);
    const msg=String(err?.message||err||'erro desconhecido').slice(0,120);
    toast(`Nao consegui publicar o aviso: ${msg}`,'#ef4444');
  }finally{
    if(btn&&document.body.contains(btn)){
      btn.disabled=false;
      btn.textContent=btn.dataset.originalText||'Publicar aviso';
    }
  }
};
window._toggleNoticeRead=(id)=>{
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  DB.avisos=(DB.avisos||[]).map(item=>{
    if(item.id!==id)return item;
    const readBy=new Set((item.readBy||[]).map(normalizeMentionToken));
    if(readBy.has(userToken))readBy.delete(userToken);else readBy.add(userToken);
    return cleanNotice({...item,readBy:[...readBy],updated_at:new Date().toISOString()});
  });
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync();
  renderApp();
};
window._toggleNoticePinned=(id)=>{
  DB.avisos=(DB.avisos||[]).map(item=>item.id===id?cleanNotice({...item,pinned:!item.pinned,updated_at:new Date().toISOString()}):item);
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync();
  renderApp();
};
window._deleteNotice=(id)=>{
  const item=(DB.avisos||[]).find(entry=>entry.id===id);
  if(!item)return;
  if(!confirm(`Remover aviso de @${item.autorLabel||item.autor}?`))return;
  DB.avisos=(DB.avisos||[]).filter(entry=>entry.id!==id);
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync(true);
  renderApp();
};
window._markAllNoticesRead=()=>{
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  DB.avisos=(DB.avisos||[]).map(item=>{
    const readBy=new Set((item.readBy||[]).map(normalizeMentionToken));
    readBy.add(userToken);
    return cleanNotice({...item,readBy:[...readBy]});
  });
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync(true);
  renderApp();
};

  const pedidoId=escJs(p.id);

function getCotacaoBaseItems(c){

function getCotacaoCompany(c){

function formatOfficeTenure(dateValue){
  if(!dateValue)return 'Sem data';
  const d=new Date(dateValue);
  if(Number.isNaN(d.getTime()))return fmtD(dateValue);
  const now=new Date();
  let months=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
  if(now.getDate()<d.getDate())months--;
  months=Math.max(0,months);
  if(months<1)return 'Novo';
  if(months<12)return `${months} mês${months===1?'':'es'}`;
  const years=Math.floor(months/12);
  const rest=months%12;
  return rest?`${years}a ${rest}m`:`${years} ano${years===1?'':'s'}`;
}

function renderOfficeTeamDistribution(){

      groups[fn].total++;

window._officeGo=(action)=>{

  if(action==='compras'){S.page='dashboard';S.modulo='compras';S.comprasTab='pedidos';S.obra=null;}
  else if(action==='fornecedores'){S.page='dashboard';S.modulo='compras';S.comprasTab='fornecedores';S.obra=null;}
  else if(action==='obras'){S.page='dashboard';S.modulo='obras';S.obra=null;}
  else if(action==='gerenciar'){S.page='gerenciar-obras';S.modulo='obras';S.obra=null;}
  else if(action==='funcionarios'&&firstObra){S.page='obra';S.modulo='obras';S.obra=firstObra;S.obraTab='funcionarios';S.selectedAditivo=null;}
  else if(action==='despesas'&&firstObra){S.page='obra';S.modulo='obras';S.obra=firstObra;S.obraTab='despesas';S.selectedAditivo=null;}
  else if(action==='avisos'){S.page='home';S.homeNoticeOpen=true;}
  else if(action==='team-expand'){S.page='dashboard';S.modulo='escritorio';S.escritorioTab='rh';S.officeOpen={...(S.officeOpen||{}),funcionarios:true};}
  else if(action==='team-distrib'){S.page='dashboard';S.modulo='escritorio';S.escritorioTab='rh';S.officeOpen={...(S.officeOpen||{}),distribuicao:true};}
  else if(action==='new-notice'){window._openHomeNoticeModal();return;}
  else{S.page='dashboard';S.modulo='obras';S.obra=null;}
  renderApp();
};

function renderAlertas(){
  const hoje=new Date();
  const diffDays=iso=>{if(!iso)return null;const d=new Date(iso);return Math.floor((hoje-d)/(864e5));};
  const daysUntil=iso=>{if(!iso)return null;const d=new Date(iso);return Math.ceil((d-hoje)/(864e5));};
  const matAlerts=(DB.materiais||[]).filter(m=>m.status==='Pendente'&&(diffDays(m.data_solicitacao)||0)>7).sort((a,b)=>(diffDays(b.data_solicitacao)||0)-(diffDays(a.data_solicitacao)||0)).slice(0,6);
  const ferrAlerts=(DB.ferramentas||[]).filter(f=>f.status==='Alocado'&&(diffDays(f.data_alocacao)||0)>30).sort((a,b)=>(diffDays(b.data_alocacao)||0)-(diffDays(a.data_alocacao)||0)).slice(0,6);
  const rdoAlerts=getAllObras().filter(o=>{if((getObraData(o).status||'Ativa')!=='Ativa')return false;const rdos=(DB.rdo||[]).filter(r=>r.obra===o&&r.data);if(!rdos.length)return true;return(diffDays(rdos.map(r=>r.data).sort().pop())||0)>7;}).slice(0,6);
  const docAlerts=getAllObras().map(o=>{const d=getObraData(o);if(!d.data_vencimento)return null;const du=daysUntil(d.data_vencimento);if(du===null||du>60)return null;return{obra:o,du};}).filter(Boolean).sort((a,b)=>a.du-b.du).slice(0,6);
  const total=matAlerts.length+ferrAlerts.length+rdoAlerts.length+docAlerts.length;
  if(total===0)return`<div class="card" style="padding:12px 16px;margin:4px 0;display:flex;align-items:center;gap:10px"><span style="font-size:16px">✅</span><div><div style="font-weight:700;font-size:13px;color:var(--green)">Tudo em dia</div><div style="font-size:11px;color:var(--text3)">Nenhum alerta pendente.</div></div></div>`;
  const row=(icon,msg)=>`<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)""><span style="flex-shrink:0;margin-top:1px">${icon}</span><span style="font-size:12px;color:var(--text2)">${msg}</span></div>`;
  const rows=[];
  matAlerts.forEach(m=>rows.push(row('⏳',`Material <strong style="color:var(--text)">${esc(m.item||'?')}</strong> pendente há <strong style="color:#fbbf24">${diffDays(m.data_solicitacao)}d</strong> · <span style="cursor:pointer;color:var(--blue-light)" onclick="S.obra='${escJs(m.obra)}';S.page='obra';S.obraTab='materiais';renderApp()">${esc(m.obra)}</span>`)));
  ferrAlerts.forEach(f=>rows.push(row('🔧',`Ferramenta <strong style="color:var(--text)">${esc(f.item||'?')}</strong> alocada há <strong style="color:#f87171">${diffDays(f.data_alocacao)}d</strong>${f.funcionario_nome?' · '+esc(f.funcionario_nome):''} · <span style="cursor:pointer;color:var(--blue-light)" onclick="S.obra='${escJs(f.obra)}';S.page='obra';S.obraTab='ferramentas';renderApp()">${esc(f.obra)}</span>`)));
  rdoAlerts.forEach(o=>rows.push(row('📝',`Obra <strong style="color:var(--text)">${esc(o)}</strong> sem RDO nos últimos 7 dias · <span style="cursor:pointer;color:var(--blue-light)" onclick="S.obra='${escJs(o)}';S.page='obra';S.obraTab='rdo';renderApp()">Abrir RDO</span>`)));
  docAlerts.forEach(({obra,du})=>rows.push(row(du<=0?'🔴':'🟠',`Contrato de <strong style="color:var(--text)">${esc(obra)}</strong> ${du<=0?`<strong style="color:#ef4444">vencido há ${-du} dia${-du!==1?'s':''}</strong>`:`vence em <strong style="color:#f97316">${du} dia${du!==1?'s':''}</strong>`} · <span style="cursor:pointer;color:var(--blue-light)" onclick="S.page='gerenciar-obras';renderApp()">Gerenciar</span>`)));
  return`<div class="card" style="padding:14px;margin:4px 0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span>⚠️</span><div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.5px">${total} Alerta${total!==1?'s':''}</div></div>${rows.join('')}</div>`;
}
