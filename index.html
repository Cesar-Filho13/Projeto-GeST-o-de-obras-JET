*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;
  --bg2:#0d182a;
  --bg3:#132238;
  --surface:#0f1d31;
  --surface2:#172844;
  --surface-soft:rgba(79,140,255,.08);
  --border:#23344d;
  --border2:#35527c;
  --text:#ebf2ff;
  --text2:#b2c2d8;
  --text3:#73849e;
  --blue:#2757d9;
  --blue-light:#4f8cff;
  --blue-dark:#173c8d;

  --red:#eb5757;
  --amber:#f2b84b;

  --panel-grad:linear-gradient(180deg,rgba(13,24,42,.98) 0%,rgba(9,17,29,.98) 100%);

  --input-focus:#0f1d31;

}
html[data-theme="light"]{

  --border2:#b7c6dc;
  --text:#11203a;
  --text2:#44566f;

  --blue:#2757d9;
  --blue-light:#3b82f6;

body{font-family:'Inter',-apple-system,sans-serif;background:
  radial-gradient(circle at top left,rgba(79,140,255,.14) 0%,transparent 28%),
  radial-gradient(circle at top right,rgba(32,180,134,.08) 0%,transparent 24%),
  var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:
  linear-gradient(180deg,rgba(255,255,255,.02) 0%,transparent 22%),
  radial-gradient(circle at 20% 0%,rgba(79,140,255,.08) 0%,transparent 30%);z-index:-1}
#root{min-height:100vh}

/* ── Layout ── */
.topbar{height:56px;background:var(--chrome-grad);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);box-shadow:0 10px 24px rgba(4,10,24,.08)}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;transition:all .2s}
.topbar-logo:hover{transform:scale(1.05)}
.topbar-logo-circle{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;letter-spacing:-.5px;box-shadow:0 8px 18px rgba(59,126,248,.22);transition:all .2s}
.topbar-logo-circle:hover{box-shadow:0 6px 16px rgba(59,126,248,.3)}
.topbar-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.topbar-sep{width:1px;height:20px;background:rgba(115,132,158,.35);margin:0 4px}
.topbar-crumb{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px}
.topbar-crumb span{color:var(--text2);cursor:pointer;transition:all .2s;padding:2px 4px;border-radius:4px}.topbar-crumb span:hover{color:var(--text);background:rgba(59,126,248,.1)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.theme-toggle{width:40px;height:40px;border-radius:10px;background:var(--surface-soft);border:1px solid rgba(79,140,255,.28);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-light);font-size:18px;transition:all .2s;padding:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.theme-toggle:hover{background:rgba(79,140,255,.16);border-color:rgba(79,140,255,.46);transform:scale(1.05)}
.page{max-width:1400px;margin:0 auto;padding:32px 24px 80px}
.page-hero{text-align:center;padding:32px 0 36px}
.page-hero-head{display:inline-flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.page-hero-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);border:1px solid rgba(79,140,255,.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;letter-spacing:-1px;flex-shrink:0;box-shadow:0 14px 28px rgba(39,87,217,.18)}
.page-hero-title{font-size:36px;font-weight:900;color:var(--text);letter-spacing:-1.2px;line-height:1.02}
.page-hero-sub{font-size:14px;color:var(--text3);margin-bottom:24px;font-weight:500;letter-spacing:.3px}
.page-hero-divider{height:1px;background:linear-gradient(to right,transparent,var(--border2) 20%,var(--border2) 80%,transparent);margin-bottom:28px}
.page-hero-actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.page-hero-actions-group{display:flex;gap:6px;flex-wrap:wrap}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.landing-shell{min-height:100vh;background:radial-gradient(circle at top left,rgba(79,140,255,.18) 0%,transparent 30%),radial-gradient(circle at top right,rgba(32,180,134,.09) 0%,transparent 24%),linear-gradient(135deg,#091228 0%,#081020 45%,#060c1a 100%);display:flex;flex-direction:column}
.landing-header{padding:32px 48px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.landing-brand{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.landing-word{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.landing-pill{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);border:1px solid rgba(79,140,255,.45);border-radius:14px;padding:6px 18px;display:flex;align-items:center;gap:2px;box-shadow:0 14px 30px rgba(39,87,217,.22)}
.landing-pill span{font-family:'Inter',sans-serif;font-size:28px;font-weight:900;color:#fff;letter-spacing:-2px}
.landing-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.landing-meta-sep{width:1px;height:24px;background:rgba(255,255,255,.15)}
.landing-user{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;padding:0 12px;border-right:1px solid rgba(255,255,255,.15)}
.landing-divider{margin:28px 48px 0;height:1px;background:linear-gradient(to right,rgba(255,255,255,.2),rgba(255,255,255,.05))}
.landing-main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 32px 64px}
.landing-layout{display:grid;grid-template-columns:minmax(0,1.8fr) minmax(340px,.95fr);gap:32px;width:100%;max-width:1360px;align-items:start}
.landing-grid-wrap{display:flex;align-items:center;justify-content:center;min-height:100%}
.landing-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:32px;width:100%;max-width:1100px}
.landing-module{display:flex;flex-direction:column;align-items:center;gap:20px;cursor:pointer}
.landing-module-icon{width:140px;height:140px;display:flex;align-items:center;justify-content:center;transition:transform .3s;border-radius:38px;background:linear-gradient(180deg,rgba(17,29,50,.94) 0%,rgba(8,16,29,.98) 100%);border:1px solid rgba(79,140,255,.16);box-shadow:0 24px 40px rgba(4,10,24,.26)}
.landing-module-icon svg{max-width:64px;max-height:64px}
.landing-module-btn{border:none;border-radius:100px;padding:12px 28px;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;cursor:pointer;white-space:nowrap;transition:all .2s;min-width:140px;display:inline-flex;align-items:center;justify-content:center}
.landing-module-btn.soon{background:linear-gradient(135deg,#21357c 0%,#192a62 100%)!important}
.landing-module-desc{font-size:11px;text-align:center;max-width:160px;color:rgba(255,255,255,.42);font-weight:500;line-height:1.5}
.landing-module-desc.soon{color:rgba(255,255,255,.28)}
.landing-notices{position:relative;background:linear-gradient(180deg,rgba(11,20,35,.96) 0%,rgba(7,12,23,.98) 100%);border:1px solid rgba(84,124,217,.18);border-radius:28px;padding:24px;box-shadow:0 28px 70px rgba(4,10,24,.32);overflow:hidden}
.landing-notices::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(79,140,255,.16),transparent 34%),radial-gradient(circle at bottom left,rgba(34,197,94,.08),transparent 26%);pointer-events:none}
.landing-notices > *{position:relative;z-index:1}
.landing-notices-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}
.landing-notices-kicker{font-size:10px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:#7dd3fc;margin-bottom:8px}
.landing-notices-title{font-size:24px;font-weight:900;letter-spacing:-.03em;color:#fff;margin-bottom:6px}
.landing-notices-sub{font-size:13px;line-height:1.55;color:rgba(255,255,255,.6);max-width:40ch}
.landing-notices-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;min-width:250px}
.landing-notice-stat{padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.14)}
.landing-notice-stat strong{display:block;font-size:18px;font-weight:800;color:#fff;line-height:1}
.landing-notice-stat span{display:block;margin-top:4px;font-size:11px;color:rgba(255,255,255,.48);text-transform:uppercase;letter-spacing:.7px}
.landing-notice-composer{padding:16px;border-radius:20px;background:rgba(255,255,255,.035);border:1px solid rgba(148,163,184,.16);backdrop-filter:blur(10px);margin-bottom:16px}
.landing-notice-composer textarea{background:rgba(5,10,18,.72)}
.landing-notice-toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:12px}
.landing-notice-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.landing-notice-select{min-width:140px}
.landing-notice-pin{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);padding:8px 12px;border:1px solid rgba(148,163,184,.18);border-radius:12px;background:rgba(255,255,255,.03)}
.landing-notice-pin input{accent-color:#3b82f6}
.landing-notice-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.landing-notice-filter{padding:8px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.16);background:rgba(255,255,255,.03);color:rgba(255,255,255,.62);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s}
.landing-notice-filter.active{background:rgba(59,130,246,.16);border-color:rgba(59,130,246,.32);color:#dbeafe;box-shadow:0 10px 24px rgba(37,99,235,.18)}
.landing-notice-list{display:flex;flex-direction:column;gap:10px;max-height:560px;overflow:auto;padding-right:4px}
.landing-notice-item{padding:16px 16px 14px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.12);transition:all .2s}
.landing-notice-item.unread{border-color:rgba(59,130,246,.24);box-shadow:inset 0 0 0 1px rgba(59,130,246,.1)}
.landing-notice-item.mention{background:linear-gradient(180deg,rgba(37,99,235,.08) 0%,rgba(255,255,255,.03) 100%)}
.landing-notice-item:hover{transform:translateY(-1px);border-color:rgba(148,163,184,.2)}
.landing-notice-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.landing-notice-author{display:flex;align-items:center;gap:10px}
.landing-notice-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#214bba 0%,#163a9a 100%);border:1px solid rgba(96,165,250,.3);font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.landing-notice-author strong{display:block;font-size:13px;color:#fff}
.landing-notice-author small{display:block;font-size:11px;color:rgba(255,255,255,.42);margin-top:1px}
.landing-notice-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.landing-notice-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;border:1px solid transparent}
.landing-notice-badge.priority-alta{background:rgba(239,68,68,.14);color:#fca5a5;border-color:rgba(239,68,68,.24)}
.landing-notice-badge.priority-media{background:rgba(245,158,11,.14);color:#fcd34d;border-color:rgba(245,158,11,.24)}
.landing-notice-badge.priority-baixa{background:rgba(34,197,94,.14);color:#86efac;border-color:rgba(34,197,94,.24)}
.landing-notice-badge.pinned{background:rgba(59,130,246,.16);color:#bfdbfe;border-color:rgba(59,130,246,.28)}
.landing-notice-badge.mention{background:rgba(125,211,252,.12);color:#bae6fd;border-color:rgba(125,211,252,.22)}
.landing-notice-text{font-size:14px;line-height:1.65;color:rgba(255,255,255,.86);margin-bottom:12px}
.landing-notice-meta{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.landing-notice-tags{display:flex;gap:6px;flex-wrap:wrap}
.landing-notice-tag{padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.045);border:1px solid rgba(148,163,184,.14);font-size:11px;color:rgba(255,255,255,.66)}
.landing-notice-actions{display:flex;gap:8px;flex-wrap:wrap}
.landing-notice-actions .btn{padding:6px 10px;font-size:11px}
.landing-notice-empty{padding:24px 18px;border-radius:20px;border:1px dashed rgba(148,163,184,.22);background:rgba(255,255,255,.02);text-align:center}
.landing-notice-empty strong{display:block;font-size:15px;color:#fff;margin-bottom:6px}
.landing-notice-empty span{font-size:12px;color:rgba(255,255,255,.5)}
.landing-footer{padding:20px 48px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:12px}
.landing-footer-copy{font-size:11px;color:rgba(255,255,255,.25);font-weight:500}
.landing-main{padding:42px 30px 58px}
.landing-layout{display:block;max-width:1080px}
.landing-grid-wrap{display:block}
.landing-grid{gap:24px;max-width:none}
.landing-meta{gap:10px;position:relative}
.landing-notice-shell{position:relative}

.landing-notice-trigger-icon{display:flex;align-items:center;justify-content:center;line-height:0}
.landing-notice-trigger-icon svg{width:18px;height:18px}

.landing-notices{position:absolute;top:calc(100% + 12px);right:0;width:min(356px,calc(100vw - 28px));background:linear-gradient(180deg,rgba(11,20,35,.98) 0%,rgba(7,12,23,.99) 100%);border:1px solid rgba(84,124,217,.16);border-radius:20px;padding:14px;box-shadow:0 24px 60px rgba(4,10,24,.34);overflow:hidden;z-index:60}

.landing-notice-meta-line{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}

.landing-notice-stat strong{font-size:11px;font-weight:800;color:#fff;line-height:1}
.landing-notice-head-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.landing-notice-composer{padding:12px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid rgba(148,163,184,.14);margin-bottom:12px}

.landing-notice-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.landing-notice-select{min-width:124px}
.landing-notice-pin{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);padding:7px 10px;border:1px solid rgba(148,163,184,.18);border-radius:12px;background:rgba(255,255,255,.03)}
.landing-notice-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.landing-notice-filter{padding:7px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.16);background:rgba(255,255,255,.03);color:rgba(255,255,255,.62);font-size:10px;font-weight:700;cursor:pointer;transition:all .18s}
.landing-notice-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow:auto;padding-right:4px}
.landing-notice-item{padding:12px 12px 11px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.12);transition:all .2s}
.landing-notice-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.landing-notice-author{display:flex;align-items:center;gap:8px}
.landing-notice-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#214bba 0%,#163a9a 100%);border:1px solid rgba(96,165,250,.3);font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.landing-notice-author strong{display:block;font-size:12px;color:#f8fafc;font-weight:800}
.landing-notice-author small{display:block;font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.landing-notice-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.landing-notice-badge{padding:5px 8px;border-radius:999px;font-size:9px;font-weight:800;letter-spacing:.35px;text-transform:uppercase}
.landing-notice-text{font-size:12px;line-height:1.55;color:rgba(255,255,255,.78);margin-bottom:10px}
.landing-notice-meta{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;flex-wrap:wrap}
.landing-notice-tags{display:flex;gap:5px;flex-wrap:wrap}
.landing-notice-tag{padding:4px 8px;border-radius:999px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.18);font-size:9px;color:#93c5fd}
.landing-notice-actions{display:flex;gap:6px;flex-wrap:wrap}
.landing-notice-actions .btn{padding:5px 9px;font-size:10px}
.landing-notice-empty{padding:22px 14px;border-radius:18px;border:1px dashed rgba(148,163,184,.22);background:rgba(255,255,255,.02);text-align:center}
.landing-notice-empty strong{display:block;font-size:14px;color:#fff;margin-bottom:5px}
.landing-notice-empty span{font-size:11px;color:rgba(255,255,255,.5)}
@media (max-width: 980px){.landing-notices{right:auto;left:0;width:min(420px,calc(100vw - 32px))}}
.landing-main{padding:40px 28px 56px}
.landing-layout{grid-template-columns:minmax(0,1.95fr) minmax(300px,360px);gap:24px;max-width:1280px}
.landing-grid{gap:24px;max-width:980px}
.landing-module{gap:16px}
.landing-module-icon{width:128px;height:128px;border-radius:34px;box-shadow:0 18px 32px rgba(4,10,24,.24)}
.landing-module-btn{padding:11px 24px;font-size:11px;letter-spacing:1.7px;min-width:132px}
.landing-module-desc{max-width:150px;line-height:1.45}
.landing-notices{max-width:360px;padding:18px;border-radius:24px;border-color:rgba(84,124,217,.16);box-shadow:0 20px 48px rgba(4,10,24,.24)}
.landing-notices-head{gap:12px;margin-bottom:12px}
.landing-notices-title{font-size:20px;margin-bottom:0}
.landing-notices-stats{grid-template-columns:repeat(3,minmax(70px,1fr));gap:6px;min-width:0;max-width:226px}
.landing-notice-stat{padding:8px 10px;border-radius:14px}
.landing-notice-stat strong{font-size:15px}
.landing-notice-stat span{margin-top:3px;font-size:10px;letter-spacing:.65px}
.landing-notice-composer{padding:12px;border-radius:18px;margin-bottom:12px}
.landing-notice-toolbar{gap:8px;margin-top:10px}
.landing-notice-controls{gap:8px}
.landing-notice-select{min-width:124px}
.landing-notice-pin{gap:7px;font-size:11px;padding:7px 10px}
.landing-notice-filters{gap:6px;margin-bottom:12px}
.landing-notice-filter{padding:7px 10px;font-size:10px;transition:all .18s}
.landing-notice-list{gap:8px;max-height:420px}
.landing-notice-item{padding:12px 12px 11px;border-radius:18px}
.landing-notice-top{gap:10px;margin-bottom:8px}
.landing-notice-author{gap:8px}
.landing-notice-avatar{width:32px;height:32px;font-size:11px}
.landing-notice-author strong{font-size:12px}
.landing-notice-author small{font-size:10px}
.landing-notice-badges{gap:5px}
.landing-notice-badge{padding:5px 8px;font-size:9px;letter-spacing:.35px}
.landing-notice-text{font-size:12px;line-height:1.55;margin-bottom:10px}
.landing-notice-meta{gap:10px}
.landing-notice-tags{gap:5px}
.landing-notice-tag{padding:4px 8px;font-size:9px}
.landing-notice-actions{gap:6px}
.landing-notice-actions .btn{padding:5px 9px;font-size:10px}
.landing-notice-empty{padding:22px 14px;border-radius:18px}
.landing-notice-empty strong{font-size:14px;margin-bottom:5px}
.landing-notice-empty span{font-size:11px}
.landing-theme-toggle{box-shadow:none}
.topbar-user{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:12px;font-weight:500;padding:0 12px;border-right:1px solid var(--border)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid transparent;transition:all .2s;font-family:'Inter',sans-serif;outline:none;text-decoration:none;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none}
.btn:active::before{opacity:1}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--blue) 0%,#1d4ed8 100%);color:#fff;border-color:var(--blue);box-shadow:0 4px 12px rgba(59,126,248,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#2d66f8 0%,#1a3fc4 100%);box-shadow:0 6px 20px rgba(59,126,248,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0);box-shadow:0 2px 8px rgba(59,126,248,.2)}
.btn-secondary{background:rgba(255,255,255,.02);color:var(--text2);border-color:var(--border2);transition:all .2s}
.btn-secondary:hover{background:var(--surface-soft);color:var(--text);border-color:#3b7ef8;box-shadow:0 4px 12px rgba(59,126,248,.16)}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(235,87,87,.32)}
.btn-danger:hover{background:rgba(235,87,87,.08);border-color:var(--red);box-shadow:0 4px 12px rgba(239,68,68,.12)}
.btn-success{background:rgba(32,180,134,.12);color:#3cd4a0;border-color:rgba(32,180,134,.22);box-shadow:0 4px 12px rgba(52,211,153,.08)}
.btn-success:hover{background:rgba(32,180,134,.18);border-color:#34d399;box-shadow:0 6px 16px rgba(52,211,153,.16)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px}

/* ── Cards ── */
.card{background:var(--card-grad);border:1px solid var(--border2);border-radius:16px;padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow-soft);transition:all .2s;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;right:0;width:100px;height:100px;background:radial-gradient(circle,rgba(59,126,248,.03) 0%,transparent 70%);pointer-events:none}
.card:hover{border-color:#3b7ef8;box-shadow:0 8px 32px rgba(59,126,248,.15);transform:translateY(-1px)}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── Obra cards on dashboard ── */
.obra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:24px}
.obra-card{background:var(--panel-grad);border:1px solid var(--border);border-radius:18px;padding:22px;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;box-shadow:var(--shadow-soft)}
.obra-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,currentColor,transparent);opacity:.8}
.obra-card::after{content:'';position:absolute;top:-50%;right:-50%;width:200px;height:200px;background:radial-gradient(circle,currentColor 20%,transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none}
.obra-card:hover{border-color:var(--border2);transform:translateY(-4px) scale(1.01);box-shadow:var(--shadow);background:linear-gradient(180deg,rgba(18,31,50,.98) 0%,rgba(10,17,29,.98) 100%)}
.obra-card:hover::after{opacity:.1}
.obra-card-code{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;opacity:.7}
.obra-card-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.3px;margin-bottom:12px;line-height:1.2}
.obra-card-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.obra-stat{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(59,126,248,.05);border-radius:6px;transition:all .2s}
.obra-stat:hover{background:rgba(59,126,248,.12);color:var(--text2)}
.obra-stat strong{color:var(--text2);font-weight:600;background:linear-gradient(135deg,#60a5fa 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.obra-card-footer{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.obra-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:inline-block;background:rgba(59,126,248,.15);border:1px solid rgba(59,126,248,.3);transition:all .2s}
.obra-badge:hover{background:rgba(59,126,248,.25)}

/* ── Obra inner nav ── */
.obra-nav{display:flex;gap:8px;padding:0 0 18px;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap;overflow:visible;align-items:center}
.obra-nav-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid transparent;transition:all .2s;font-family:'Inter',sans-serif;color:var(--text3);background:transparent;white-space:nowrap;flex-shrink:0;position:relative}
.obra-nav-btn::after{content:'';position:absolute;bottom:-24px;left:0;right:0;height:2px;background:var(--blue);transform:scaleX(0);transition:transform .2s;transform-origin:left}
.obra-nav-btn:hover{background:var(--surface-soft);color:var(--text);border-color:rgba(79,140,255,.22)}
.obra-nav-btn.active{background:rgba(79,140,255,.14);color:#60a5fa;border-color:rgba(79,140,255,.38);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.obra-nav-btn.active::after{transform:scaleX(1)}
.obra-nav-btn .nav-icon{font-size:16px}
.obra-nav-btn .nav-count{font-size:10px;background:rgba(59,126,248,.2);padding:2px 8px;border-radius:100px;color:#60a5fa;font-weight:600;border:1px solid rgba(59,126,248,.3)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--panel-grad);box-shadow:var(--shadow-soft)}
table{width:100%;border-collapse:collapse;min-width:700px}
thead tr{background:linear-gradient(180deg,rgba(10,18,30,.98) 0%,rgba(11,19,31,.98) 100%);border-bottom:1px solid var(--border2)}
th{padding:13px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap;position:relative;user-select:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.6px}
.th-inner{display:flex;align-items:center;gap:6px}
.th-icon{font-size:13px;flex-shrink:0;line-height:1}
.th-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.col-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;border-right:2px solid transparent;transition:border-color .1s}
.col-resize:hover,.col-resize.resizing{border-color:var(--blue)}
.ci-num{text-align:right}
th:hover{background:linear-gradient(180deg,rgba(15,24,38,.98) 0%,rgba(15,22,34,.98) 100%);color:var(--text2)}
tbody tr{border-bottom:1px solid rgba(115,132,158,.22);transition:all .15s}
tbody tr:hover{background:rgba(79,140,255,.08);border-bottom-color:rgba(79,140,255,.2)}
tbody tr:last-child{border-bottom:none}
td{padding:12px;font-size:13px;vertical-align:middle}
.mobile-card-value{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.mobile-card-value>*{max-width:100%}

/* ── Inline edit ── */
.ci{background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text);font-size:13px;width:100%;outline:none;padding:4px 7px;font-family:'Inter',sans-serif;transition:all .1s}
.ci:hover{background:var(--surface);border-color:var(--border)}
.ci:focus{background:var(--input-focus);border-color:var(--blue)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);transition:all .2s}
.badge:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}

/* ── Custom dropdown ── */
.cd-wrap{position:relative;display:inline-block;width:100%}
.cd-trigger{display:inline-flex;align-items:center;justify-content:space-between;gap:6px;padding:4px 8px 4px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;font-family:'Inter',sans-serif;width:100%;white-space:nowrap;transition:all .15s;user-select:none}
.cd-trigger:hover{filter:brightness(1.15);border-color:rgba(255,255,255,.1)}
.cd-trigger-lg{border-radius:9px;padding:8px 14px 8px 16px;font-size:13px;font-weight:700}
.cd-menu{position:fixed;z-index:2000;background:var(--panel-grad);border:1px solid var(--border2);border-radius:14px;padding:6px;box-shadow:0 20px 48px rgba(2,8,23,.34);min-width:220px;overflow:hidden;animation:cdFade .12s ease;backdrop-filter:blur(14px)}
@keyframes cdFade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.cd-option{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;margin-bottom:3px;transition:all .1s}
.cd-option:hover{filter:brightness(1.12);background:rgba(79,140,255,.1);transform:translateX(2px)}
.cd-option-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cd-group{padding:6px 10px 4px;font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--text3)}
.cd-divider{height:1px;background:linear-gradient(to right,transparent,var(--border2) 24%,var(--border2) 76%,transparent);margin:4px 2px 8px}

/* ── FAB ── */
.fab{position:fixed;bottom:28px;right:28px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue) 0%,#1d4ed8 100%);color:#fff;font-size:26px;border:none;cursor:pointer;z-index:200;box-shadow:0 8px 24px rgba(59,126,248,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;overflow:hidden}
.fab::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.2) 0%,transparent 70%);opacity:0;transition:opacity .3s}
.fab:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(59,126,248,.5)}
.fab:active{transform:scale(0.95)}
.fab-pulse{animation:fabPulse 2s infinite}
@keyframes fabPulse{0%{box-shadow:0 0 0 0 rgba(59,126,248,.7)}70%{box-shadow:0 0 0 10px rgba(59,126,248,0)}100%{box-shadow:0 0 0 0 rgba(59,126,248,0)}}

/* ── Forms ── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:10px;background:var(--input-bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:all .2s;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
input:focus,select:focus,textarea:focus{border-color:var(--blue);background:var(--input-focus);box-shadow:0 0 0 3px rgba(59,126,248,.08)}
select option{background:var(--surface);color:var(--text)}
textarea{resize:vertical;min-height:80px}

/* ── Section headers ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.section-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.section-sub{font-size:13px;color:var(--text3);margin-top:3px;transition:color .2s}.section-sub:hover{color:var(--text2)}
.almox-band{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(320px,1fr);gap:16px;margin-bottom:18px}
.almox-spotlight{background:linear-gradient(135deg,rgba(79,140,255,.14) 0%,rgba(15,29,49,.88) 38%,rgba(8,16,29,.96) 100%);border:1px solid rgba(79,140,255,.24);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-soft);position:relative;overflow:hidden}
.almox-spotlight::after{content:'';position:absolute;top:-40px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(79,140,255,.18) 0%,transparent 70%);pointer-events:none}
.almox-spotlight-kicker{font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:#8fb6ff;margin-bottom:10px}
.almox-spotlight-title{font-size:24px;font-weight:900;letter-spacing:-.7px;color:var(--text);margin-bottom:8px;max-width:620px}
.almox-spotlight-copy{font-size:13px;line-height:1.6;color:var(--text2);max-width:620px}
.almox-quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.almox-quick-card{border:1px solid var(--border);border-radius:16px;background:var(--panel-grad);padding:16px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;gap:6px;min-height:128px}
.almox-quick-label{font-size:11px;font-weight:800;letter-spacing:.65px;text-transform:uppercase;color:var(--text3)}
.almox-quick-value{font-size:24px;font-weight:900;letter-spacing:-.8px;color:var(--text)}
.almox-quick-copy{font-size:12px;line-height:1.5;color:var(--text2)}
.almox-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.almox-toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.almox-filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.almox-inline-note{font-size:11px;color:var(--text3);line-height:1.5}
.almox-transfer-card{border:1px solid var(--border);border-radius:16px;background:var(--panel-grad);box-shadow:var(--shadow-soft);overflow:hidden}
.almox-transfer-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(115,132,158,.16);background:linear-gradient(180deg,rgba(255,255,255,.02) 0%,rgba(255,255,255,0) 100%);flex-wrap:wrap}
.almox-transfer-body{padding:14px 16px}
.almox-transfer-metrics{display:flex;gap:8px;flex-wrap:wrap}
.almox-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:rgba(79,140,255,.1);border:1px solid rgba(79,140,255,.18);font-size:11px;font-weight:700;color:var(--text2)}
.almox-chip strong{color:var(--text)}
.almox-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.almox-timeline{display:flex;gap:10px;flex-wrap:wrap}
.almox-timeline-step{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2)}
.almox-timeline-step.is-active{background:rgba(79,140,255,.12);border-color:rgba(79,140,255,.26);color:#8fb6ff}
.almox-empty-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}

/* ── Escritório ── */
.office-shell{display:grid;gap:18px}
.office-nav{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px;padding:6px;border:1px solid var(--border);background:rgba(79,140,255,.04);border-radius:18px}
.office-nav-btn{border:none;background:transparent;color:var(--text3);padding:10px 16px;border-radius:13px;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .18s}
.office-nav-btn.active{background:linear-gradient(135deg,rgba(39,87,217,.22),rgba(79,140,255,.12));color:var(--text);box-shadow:inset 0 0 0 1px rgba(79,140,255,.22)}
.office-nav-ico{width:26px;height:26px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;background:rgba(79,140,255,.10);border:1px solid rgba(79,140,255,.14);font-size:10px;font-weight:900;color:#8fb6ff;letter-spacing:-.2px;flex-shrink:0}
.office-nav-label{white-space:nowrap}
.office-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:16px;align-items:start}
.office-panel{border:1px solid var(--border);border-radius:20px;background:var(--panel-grad);box-shadow:var(--shadow-soft);padding:18px;position:relative;overflow:hidden}
.office-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(79,140,255,.10),transparent 34%);pointer-events:none}
.office-panel>*{position:relative;z-index:1}
.office-panel-title{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.4px;margin-bottom:4px}
.office-panel-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.office-metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
.office-metric{border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.025);padding:14px}
.office-metric span{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:8px}
.office-metric strong{display:block;font-size:22px;font-weight:900;color:var(--text);line-height:1}
.office-metric small{display:block;margin-top:8px;color:var(--text3);font-size:11px;line-height:1.35}
.office-list{display:grid;gap:9px}
.office-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border:1px solid rgba(115,132,158,.16);border-radius:14px;background:rgba(255,255,255,.025)}
.office-row-main{min-width:0}
.office-row-main strong{display:block;color:var(--text);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.office-row-main span{display:block;color:var(--text3);font-size:11px;margin-top:2px}
.office-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(79,140,255,.1);border:1px solid rgba(79,140,255,.18);font-size:11px;font-weight:800;color:#8fb6ff;white-space:nowrap}
.office-side-actions{display:grid;gap:10px}
.office-action{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.025);padding:13px 14px;cursor:pointer;transition:all .18s;text-align:left;color:var(--text);font-family:'Inter',sans-serif}
.office-action:hover{border-color:rgba(79,140,255,.35);background:rgba(79,140,255,.08);transform:translateY(-1px)}
.office-action strong{display:block;font-size:13px;margin-bottom:2px}
.office-action span{display:block;font-size:11px;color:var(--text3)}
.office-action-icon{width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(79,140,255,.12);border:1px solid rgba(79,140,255,.18);color:#8fb6ff;font-weight:900;flex-shrink:0}
.func-actions-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch}
.func-action-group{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;padding:6px;border:1px solid rgba(59,126,248,.14);border-radius:18px;background:linear-gradient(180deg,rgba(11,19,32,.88) 0%,rgba(9,16,28,.94) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 12px 28px rgba(2,8,23,.18)}
.func-toolbar-btn{min-width:130px;justify-content:flex-start;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.02)}
.func-toolbar-copy{display:flex;flex-direction:column;align-items:flex-start;gap:3px;line-height:1.05}
.func-toolbar-copy strong{font-size:12px;color:var(--text);font-weight:800}
.func-toolbar-copy small{font-size:10px;color:var(--text3);font-weight:600}
.func-toolbar-icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(79,140,255,.12);color:#60a5fa;font-size:14px;flex-shrink:0;border:1px solid rgba(79,140,255,.16)}
.func-toggle-card{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:16px;border:1px solid rgba(59,126,248,.16);background:linear-gradient(180deg,rgba(11,19,32,.88) 0%,rgba(9,16,28,.94) 100%);color:var(--text2);min-width:220px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 12px 28px rgba(2,8,23,.18)}
.func-toggle-card input{appearance:none;width:18px;height:18px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);position:relative;cursor:pointer;flex-shrink:0}
.func-toggle-card input:checked{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-light) 100%);border-color:var(--blue-light);box-shadow:0 0 0 4px rgba(79,140,255,.12)}
.func-toggle-card input:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800}
.func-create-btn{padding:10px 16px;border-radius:16px;min-width:182px;justify-content:flex-start}
.func-create-btn .func-toolbar-icon{background:rgba(255,255,255,.16);color:#fff;border-color:rgba(255,255,255,.18)}
.func-row-actions{display:flex;gap:6px;justify-content:flex-end}
.manage-obra-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.manage-obra-btn{min-width:104px;justify-content:center}
.manage-obra-btn.btn-danger{background:rgba(235,87,87,.08)}
.pedido-inline-shell{display:flex;flex-direction:column;gap:14px}
.pedido-inline-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.pedido-inline-card{border:1px solid var(--border);border-radius:12px;background:linear-gradient(180deg,rgba(59,126,248,.05) 0%,rgba(59,126,248,.02) 100%);padding:12px 14px}
.pedido-inline-card label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.55px;margin-bottom:6px}
.pedido-inline-card .pedido-inline-hint{font-size:11px;color:var(--text3);margin-top:6px}
.pedido-inline-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pedido-inline-total{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(20,149,107,.1);border:1px solid rgba(20,149,107,.18);color:var(--green);font-weight:800}
.pedido-inline-table{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--panel-grad)}
.pedido-inline-table table{min-width:820px}
.pedido-inline-table th{background:rgba(26,46,107,.9);color:#fff}
.pedido-inline-row-actions{display:flex;gap:6px;justify-content:center}
.pedido-inline-add{align-self:flex-start}
.field-strong{color:var(--text)!important;font-weight:700}
.field-muted{color:var(--text2)!important}
.delete-dialog-overlay{position:fixed;inset:0;background:rgba(5,9,18,.76);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.delete-dialog{width:100%;max-width:430px;background:linear-gradient(180deg,rgba(14,20,33,.98) 0%,rgba(10,16,27,.98) 100%);border:1px solid rgba(239,68,68,.18);border-radius:22px;padding:26px;box-shadow:0 28px 80px rgba(0,0,0,.45);animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
.delete-dialog-head{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.delete-dialog-icon{width:52px;height:52px;border-radius:18px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);display:flex;align-items:center;justify-content:center;color:#f87171;font-size:22px;flex-shrink:0}
.delete-dialog-copy h3{font-size:18px;font-weight:800;color:var(--text);margin-bottom:5px}
.delete-dialog-copy p{font-size:13px;color:var(--text2);line-height:1.6}
.delete-dialog-name{font-size:16px;font-weight:800;color:#fca5a5;margin:2px 0 8px}
.delete-dialog-meta{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 18px}
.delete-dialog-chip{padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.03);font-size:11px;color:var(--text2)}
.delete-dialog-chip strong{color:var(--text)}
.delete-dialog-list{display:grid;gap:8px;margin-bottom:18px}
.delete-dialog-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)}
.delete-dialog-row span{font-size:12px;color:var(--text2)}
.delete-dialog-row strong{font-size:12px;color:var(--text)}
.delete-dialog-timer{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);margin-bottom:18px}
.delete-dialog-ring{position:relative;width:70px;height:70px;flex-shrink:0}
.delete-dialog-ring svg{width:70px;height:70px;transform:rotate(-90deg)}
.delete-dialog-ring-value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#f87171}
.delete-dialog-timer-copy strong{display:block;color:var(--text);font-size:13px;margin-bottom:3px}
.delete-dialog-timer-copy span{font-size:12px;color:var(--text3)}
.delete-dialog-actions{display:flex;gap:10px}
.delete-dialog-actions .btn{flex:1;justify-content:center}
html[data-theme="light"] .landing-theme-toggle{background:#fff;color:var(--text);border-color:var(--border)}
html[data-theme="light"] .pedido-inline-table th{background:#edf3ff;color:#1a2e6b}
html[data-theme="light"] .delete-dialog{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);border-color:rgba(220,74,74,.16);box-shadow:0 24px 70px rgba(38,58,96,.18)}
html[data-theme="light"] .delete-dialog-row,
html[data-theme="light"] .delete-dialog-timer{background:rgba(17,32,58,.03);border-color:rgba(17,32,58,.06)}
html[data-theme="light"] .tbl-wrap.mobile-cards tbody tr{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%)}

  background:
    radial-gradient(circle at top left,rgba(79,140,255,.16) 0%,transparent 26%),

    linear-gradient(180deg,#f3f7fd 0%,#eef4fb 46%,#f5f8fd 100%);
}
html[data-theme="light"] body::before{
  background:
    linear-gradient(180deg,rgba(255,255,255,.56) 0%,transparent 22%),

html[data-theme="light"] thead tr{background:linear-gradient(180deg,#eef4ff 0%,#e7eefb 100%);border-bottom:1px solid #d7e0ee}

html[data-theme="light"] th:hover{background:linear-gradient(180deg,#f6f9ff 0%,#eaf1ff 100%);color:#11203a}
html[data-theme="light"] tbody tr:hover{background:rgba(39,87,217,.05);border-bottom-color:rgba(39,87,217,.14)}
html[data-theme="light"] .topbar{box-shadow:0 12px 28px rgba(55,78,120,.08)}
html[data-theme="light"] .landing-shell{background:radial-gradient(circle at top left,rgba(79,140,255,.15) 0%,transparent 28%),radial-gradient(circle at top right,rgba(20,149,107,.07) 0%,transparent 22%),linear-gradient(180deg,#f7fbff 0%,#eef5ff 45%,#f7faff 100%)}
html[data-theme="light"] .landing-word{color:#11203a}
html[data-theme="light"] .landing-user{color:var(--text2);border-right-color:rgba(17,32,58,.12)}
html[data-theme="light"] .landing-divider{background:linear-gradient(to right,rgba(39,87,217,.14),rgba(39,87,217,.05))}
html[data-theme="light"] .landing-footer{border-top-color:rgba(17,32,58,.08)}
html[data-theme="light"] .landing-footer-copy{color:rgba(17,32,58,.46)}
html[data-theme="light"] .landing-module-icon{background:linear-gradient(180deg,#2451c8 0%,#163a9a 100%);border-color:rgba(39,87,217,.18);box-shadow:0 24px 42px rgba(39,87,217,.16)}
html[data-theme="light"] .landing-module-desc{color:var(--text2)}
html[data-theme="light"] .landing-module-desc.soon{color:var(--text3)}
html[data-theme="light"] .landing-module-btn{box-shadow:0 10px 24px rgba(39,87,217,.16)}
html[data-theme="light"] .landing-module-btn.soon{background:linear-gradient(135deg,#dce7ff 0%,#cbd9ff 100%)!important;color:#163a9a}
html[data-theme="light"] .landing-notices{background:linear-gradient(180deg,rgba(255,255,255,.96) 0%,rgba(244,248,255,.98) 100%);border-color:rgba(39,87,217,.16);box-shadow:0 26px 60px rgba(38,58,96,.12)}
html[data-theme="light"] .landing-notices-title{color:#11203a}
html[data-theme="light"] .landing-notice-stat{background:rgba(39,87,217,.04);border-color:rgba(39,87,217,.12);color:#6b7c95}
html[data-theme="light"] .landing-notice-stat strong{color:#11203a}
html[data-theme="light"] .landing-notice-composer{background:rgba(39,87,217,.03);border-color:rgba(39,87,217,.12)}
html[data-theme="light"] .landing-notice-composer textarea{background:#fff}
html[data-theme="light"] .landing-notice-pin{background:#fff;color:#31425c;border-color:rgba(39,87,217,.14)}
html[data-theme="light"] .landing-notice-filter{background:#fff;color:#576882;border-color:rgba(39,87,217,.12)}
html[data-theme="light"] .landing-notice-filter.active{background:rgba(39,87,217,.1);color:#163a9a;border-color:rgba(39,87,217,.2)}
html[data-theme="light"] .landing-notice-item{background:#fff;border-color:rgba(39,87,217,.08)}
html[data-theme="light"] .landing-notice-item.unread{border-color:rgba(39,87,217,.22)}
html[data-theme="light"] .landing-notice-item.mention{background:linear-gradient(180deg,rgba(39,87,217,.06) 0%,#fff 100%)}
html[data-theme="light"] .landing-notice-author strong{color:#11203a}
html[data-theme="light"] .landing-notice-author small{color:#6b7c95}
html[data-theme="light"] .landing-notice-text{color:#25364e}
html[data-theme="light"] .landing-notice-tag{background:rgba(39,87,217,.04);border-color:rgba(39,87,217,.12);color:#576882}
html[data-theme="light"] .landing-notice-empty{background:#fff;border-color:rgba(39,87,217,.18)}
html[data-theme="light"] .landing-notice-empty strong{color:#11203a}
html[data-theme="light"] .landing-notice-empty span{color:#6b7c95}
html[data-theme="light"] .landing-notice-trigger-count{border-color:#fff}
html[data-theme="light"] .notice-toggle{background:#fff;color:#183152;border-color:rgba(39,87,217,.14)}
html[data-theme="light"] .notice-toggle:hover,
html[data-theme="light"] .notice-toggle.open{background:#eef4ff;border-color:rgba(39,87,217,.22)}
html[data-theme="light"] .office-nav{background:rgba(39,87,217,.04);border-color:rgba(39,87,217,.12)}
html[data-theme="light"] .office-panel{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);border-color:rgba(39,87,217,.12)}
html[data-theme="light"] .office-metric,
html[data-theme="light"] .office-row,
html[data-theme="light"] .office-action{background:#fff;border-color:rgba(39,87,217,.10)}
html[data-theme="light"] .office-action:hover{background:rgba(39,87,217,.05)}
html[data-theme="light"] .obra-card{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);border-color:rgba(39,87,217,.12);box-shadow:0 14px 32px rgba(38,58,96,.08)}
html[data-theme="light"] .obra-card:hover{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);border-color:rgba(39,87,217,.2);box-shadow:0 18px 36px rgba(38,58,96,.12)}
html[data-theme="light"] .obra-card-code{color:#7b8ba1;opacity:.88}
html[data-theme="light"] .obra-stat{background:rgba(39,87,217,.05);color:#64748b}
html[data-theme="light"] .obra-stat:hover{background:rgba(39,87,217,.1);color:#334155}
html[data-theme="light"] .obra-card-footer{border-top-color:rgba(39,87,217,.1)}
html[data-theme="light"] .func-action-group,
html[data-theme="light"] .func-toggle-card{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);box-shadow:0 12px 28px rgba(38,58,96,.08)}
html[data-theme="light"] .baixada-summary-card{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);border-color:rgba(59,126,248,.14)}
html[data-theme="light"] .baixada-policy{background:linear-gradient(180deg,rgba(59,126,248,.08) 0%,rgba(59,126,248,.03) 100%)}
html[data-theme="light"] .comment{background:rgba(39,87,217,.04);border-color:rgba(39,87,217,.08)}
html[data-theme="light"] .rdo-card{background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%)}
html[data-theme="light"] .auth-screen{background:radial-gradient(circle at top left,rgba(79,140,255,.12) 0%,transparent 30%),linear-gradient(135deg,#eef4ff 0%,#f7f9fd 100%)}
html[data-theme="light"] .auth-btn:disabled{background:#d9e3f5;color:#6d7c93}
.baixada-card{padding:22px 22px 18px}
.baixada-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.baixada-head-copy{max-width:560px}
.baixada-sub{font-size:13px;color:var(--text3);line-height:1.6}
.baixada-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.baixada-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.baixada-summary-card{background:linear-gradient(180deg,rgba(10,19,32,.92) 0%,rgba(7,13,24,.98) 100%);border:1px solid rgba(59,126,248,.14);border-radius:16px;padding:16px 18px;position:relative;overflow:hidden}
.baixada-summary-card::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:999px;background:var(--accent,#60a5fa)}
.baixada-summary-label{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.baixada-summary-value{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1}
.baixada-summary-note{font-size:12px;color:var(--text2);margin-top:6px}
.baixada-policy{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1px solid rgba(79,140,255,.16);border-radius:14px;background:linear-gradient(180deg,rgba(79,140,255,.08) 0%,rgba(79,140,255,.03) 100%);margin-bottom:16px}
.baixada-policy-icon{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(79,140,255,.14);color:#60a5fa;font-size:15px;flex-shrink:0}
.baixada-policy strong{display:block;color:var(--text);margin-bottom:4px}
.baixada-policy span{font-size:13px;color:var(--text2);line-height:1.6}
.baixada-filter-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.baixada-filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.baixada-date-input{min-width:145px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:9px 10px;color:var(--text);font-size:13px}
.baixada-date-input:focus{border-color:var(--blue);background:var(--input-focus)}
.baixada-days-pill{display:inline-flex;align-items:center;justify-content:center;min-width:88px;padding:7px 12px;border-radius:999px;background:rgba(52,211,153,.12);color:#8ef0cc;border:1px solid rgba(52,211,153,.2);font-size:12px;font-weight:800}
.baixada-days-input{width:100%;min-width:96px;padding:9px 12px;border-radius:999px;border:1px solid rgba(52,211,153,.2);background:rgba(52,211,153,.08);color:#8ef0cc;font-size:12px;font-weight:800;text-align:center}
.baixada-days-input:focus{border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.12);background:rgba(52,211,153,.12)}
.baixada-person{display:flex;flex-direction:column;gap:6px;min-width:0}
.baixada-person-name{font-weight:800;color:var(--text);line-height:1.2}
.baixada-person-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--text3)}
.baixada-live-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:rgba(192,132,252,.14);color:#d8b4fe;border:1px solid rgba(192,132,252,.24);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.baixada-empty{padding:34px 20px}
html[data-theme="light"] .baixada-days-input{background:rgba(20,149,107,.08);color:#14956b;border-color:rgba(20,149,107,.18)}
.compras-subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.compras-filter-bar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.compras-kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}
.forn-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.forn-card{border:1px solid var(--border);border-radius:18px;background:var(--panel-grad);padding:18px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;gap:14px}
.forn-card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.forn-card-name{font-size:16px;font-weight:800;color:var(--text);line-height:1.2}
.forn-card-meta{display:grid;gap:8px}
.forn-meta-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;color:var(--text2)}
.forn-meta-row span:last-child{color:var(--text);font-weight:600;text-align:right}
.quote-board{display:grid;gap:12px}
.quote-card{border:1px solid var(--border);border-radius:18px;background:var(--panel-grad);padding:18px;box-shadow:var(--shadow-soft)}
.quote-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.quote-card-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3}
.quote-card-sub{font-size:12px;color:var(--text3);margin-top:4px}
.quote-metrics{display:flex;gap:8px;flex-wrap:wrap}
.quote-metric{padding:6px 10px;border-radius:999px;background:rgba(79,140,255,.08);border:1px solid rgba(79,140,255,.14);font-size:11px;font-weight:700;color:var(--text2)}
.quote-vendor-table{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface)}
.quote-vendor-table table{min-width:760px}
.quote-vendor-table th{background:rgba(26,46,107,.9);color:#fff}
.quote-winner{border-color:rgba(20,149,107,.26)!important;box-shadow:0 0 0 1px rgba(20,149,107,.12) inset}
.quote-empty{padding:18px;border:1px dashed var(--border);border-radius:14px;text-align:center;color:var(--text3)}
html[data-theme="light"] .quote-vendor-table th{background:#edf3ff;color:#1a2e6b}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── RDO ── */
.rdo-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.rdo-card:hover{border-color:var(--border2);background:var(--bg3)}
.rdo-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:6px}
.rdo-preview{font-size:13px;color:var(--text2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.weather-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.weather-opt{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}
.weather-opt.active{border-color:var(--blue);background:rgba(79,140,255,.12);color:#60a5fa}

/* ── Auth ── */
.auth-screen{position:fixed;inset:0;background:radial-gradient(circle at top left,rgba(79,140,255,.16) 0%,transparent 30%),linear-gradient(135deg,#060810 0%,#0a0f1a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.auth-card{background:var(--panel-grad);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;position:relative;overflow:hidden;box-shadow:0 24px 60px rgba(4,10,24,.42)}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,#2563eb,#7c3aed,#2563eb);background-size:200%;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-circle{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);border:1px solid rgba(79,140,255,.45);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:20px;font-weight:900;color:#fff;letter-spacing:-1px;box-shadow:0 12px 28px rgba(59,126,248,.26)}
.auth-title{font-size:22px;font-weight:800;color:var(--text);text-align:center;letter-spacing:-.5px;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:30px}
.auth-field{margin-bottom:16px}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.auth-field input{padding:12px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:11px;font-size:14px;transition:all .2s}
.auth-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,126,248,.1)}
.auth-pass-wrap{position:relative}
.auth-pass-wrap input{padding-right:44px}
.auth-pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;transition:color .2s}.auth-pass-toggle:hover{color:var(--text2)}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue) 0%,#1d4ed8 100%);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-top:4px;box-shadow:0 4px 12px rgba(59,126,248,.3)}
.auth-btn:hover{background:linear-gradient(135deg,#2d66f8 0%,#1a3fc4 100%);box-shadow:0 6px 20px rgba(59,126,248,.4);transform:translateY(-1px)}
.auth-btn:disabled{background:#1a2a4a;color:#444;cursor:not-allowed;transform:none;box-shadow:none}
.auth-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.24);border-radius:10px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.auth-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text3)}

/* ── User menu ── */
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);border:1.5px solid #3b7ef8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 8px 18px rgba(59,126,248,.22)}
.user-avatar:hover{border-color:#60a5fa;box-shadow:0 6px 16px rgba(59,126,248,.3);transform:scale(1.05)}
.user-dropdown{position:absolute;top:calc(100%+8px);right:0;background:var(--panel-grad);border:1px solid var(--border2);border-radius:14px;padding:4px;min-width:200px;z-index:500;box-shadow:0 16px 36px rgba(4,10,24,.32);backdrop-filter:blur(14px)}
.user-dd-info{padding:10px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.user-dd-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}.user-dd-item:hover{background:rgba(59,126,248,.1);color:var(--text);transform:translateX(2px)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--overlay) 0%,rgba(2,6,14,.72) 100%);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel-grad);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 24px 60px rgba(4,10,24,.44)}
.modal-wide{max-width:780px!important}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.req-items-head{display:grid;grid-template-columns:2fr 55px 65px 100px 100px 1fr 28px;gap:4px;margin-bottom:4px;padding:0 2px}
.req-items-list{display:flex;flex-direction:column;gap:6px}
.req-item-row{display:grid;grid-template-columns:2fr 55px 65px 100px 100px 1fr 28px;gap:4px;margin-bottom:0}
.req-item-field{display:flex;flex-direction:column;gap:4px;min-width:0}
.req-item-label{display:none;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.req-item-remove{background:rgba(235,87,87,.08);border:1px solid rgba(235,87,87,.18);border-radius:8px;color:#f87171;cursor:pointer;font-size:16px;padding:0;width:28px}
.req-add-btn{background:none;border:1px dashed var(--border2);border-radius:7px;color:var(--text3);cursor:pointer;font-size:12px;padding:8px;font-family:'Inter',sans-serif;width:100%;margin-top:6px;transition:all .15s}
.req-add-btn:hover{border-color:var(--blue);color:var(--text)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel-grad);border:1px solid var(--border2);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 16px 36px rgba(4,10,24,.32);animation:slideUp .25s ease;backdrop-filter:blur(14px)}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Comment ── */
.comment{display:flex;gap:10px;margin-bottom:14px;padding:12px;background:rgba(79,140,255,.04);border:1px solid rgba(79,140,255,.08);border-radius:12px;transition:all .2s}
.comment:hover{background:rgba(79,140,255,.07)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1a2e6b 0%,#2a3f8a 100%);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid rgba(59,126,248,.3);box-shadow:0 4px 8px rgba(59,126,248,.1)}
.comment-mention{color:#60a5fa;font-weight:600;background:rgba(59,126,248,.15);border-radius:4px;padding:2px 6px;border:1px solid rgba(59,126,248,.3)}
.comment-input-wrap{position:relative;flex:1}
.comment-input{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border2);border-radius:11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:42px;max-height:120px;transition:all .2s}
.comment-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,126,248,.1)}
.mention-menu{position:absolute;bottom:calc(100%+6px);left:0;background:var(--panel-grad);border:1px solid var(--border2);border-radius:12px;padding:4px;min-width:200px;z-index:500;box-shadow:0 12px 30px rgba(4,10,24,.28);display:none;backdrop-filter:blur(14px)}
.mention-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s}.mention-item:hover,.mention-item.active{background:rgba(59,126,248,.1);transform:translateX(2px)}
.m-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1a2e6b 0%,#2a3f8a 100%);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid rgba(59,126,248,.2)}

/* ── Misc ── */
.loader{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loader::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid rgba(59,126,248,.2);border-top-color:#3b7ef8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;border:1px dashed rgba(36,48,80,.5);border-radius:12px;background:rgba(59,126,248,.02);transition:all .2s}
.empty-state:hover{border-color:rgba(59,126,248,.3);background:rgba(59,126,248,.05)}
.empty-state p{color:var(--text3);font-size:14px;margin-bottom:16px}
.tag{font-size:11px;color:var(--text3);background:linear-gradient(135deg,rgba(59,126,248,.1) 0%,rgba(59,126,248,.05) 100%);padding:3px 10px;border-radius:6px;white-space:nowrap;font-weight:600;border:1px solid rgba(59,126,248,.2);transition:all .2s}
.tag:hover{background:rgba(59,126,248,.15);color:var(--text2)}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite;flex-shrink:0;box-shadow:0 0 8px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 rgba(59,126,248,.4)}70%{box-shadow:0 0 0 8px rgba(59,126,248,0)}}
.btn-pulse{animation:pulseBtn 2s infinite}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(36,48,80,.5) 20%,rgba(36,48,80,.5) 80%,transparent);margin:20px 0}
@media(max-width:768px){

  .obra-grid{grid-template-columns:1fr}
  .form-grid-2,.form-grid-3{grid-template-columns:1fr}
  .obra-nav{gap:6px;display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .obra-nav::-webkit-scrollbar{display:none}
  .obra-nav-btn{padding:8px 12px;font-size:12px;flex:0 0 auto;white-space:nowrap}

  .theme-toggle{width:36px;height:36px;border-radius:12px}

  #online-users-bar,#online-count-bar{display:none!important}
  .section-header{flex-direction:column;align-items:flex-start}
  .section-header>div:last-child{width:100%;flex-wrap:wrap}

  .func-actions-bar{width:100%}

  .manage-obra-btn{flex:1}

  .baixada-summary-grid{grid-template-columns:1fr 1fr}

  .page-hero-actions-group::-webkit-scrollbar{display:none}
  .page-hero-actions>.btn,.page-hero-actions-group .btn{width:auto;min-width:94px;flex:0 0 auto;justify-content:center}
  .panel-head{flex-direction:column;align-items:stretch}
  .panel-head .btn{width:100%;justify-content:center}
  .stat-card{padding:12px 14px}
  .stat-value{font-size:21px}
  .modal{padding:20px 16px;border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%!important;max-height:92vh;border-radius:16px 16px 0 0}
  .modal-overlay{align-items:flex-end;padding:0}

  .tbl-wrap.mobile-cards tbody td{display:grid!important;grid-template-columns:minmax(88px,104px) 1fr;align-items:flex-start;gap:10px;padding:8px 0;width:100%;border-bottom:1px solid rgba(36,48,80,.35)}

/* ── Skeleton Loaders ── */

  let rows=cleanAlmoxMovimentos(DB.almoxMovimentos||[]);
  if(filters.obra)rows=rows.filter(item=>item.obra_origem===filters.obra||item.obra_destino===filters.obra);
  if(filters.tipo&&filters.tipo!=='Todos')rows=rows.filter(item=>item.tipo===filters.tipo);
  return rows;
}
function buildAlmoxExpedicaoGroups(){
  const grouped={};
  getAlmoxExpedicao().forEach(item=>{const key=item.numero_controle||item.id;if(!grouped[key])grouped[key]=[];grouped[key].push(item);});
  return Object.keys(grouped).map(key=>{
    const items=grouped[key].slice().sort((a,b)=>String(a.item||'').localeCompare(String(b.item||'')));
    const meta=getAlmoxTransferMeta(key,items);
    return{
      key,
      items,
      first:items[0]||{},
      totalQtd:items.reduce((sum,item)=>sum+Number(item.qtd||0),0),
      status:meta.status,
      meta
    };
  }).sort((a,b)=>String(b.first?.saida||b.first?.created_at||'').localeCompare(String(a.first?.saida||a.first?.created_at||'')));
}
function getAlmoxTransferCounts(groups=buildAlmoxExpedicaoGroups()){
  return groups.reduce((acc,group)=>{acc[group.status]=(acc[group.status]||0)+1;return acc;},{Separado:0,'Em transito':0,Recebido:0});
}
function formatAlmoxTransferTimeline(meta={}){
  const parts=[];
  if(meta.transito_em)parts.push(`Despachado ${fmtD(meta.transito_em)}`);
  if(meta.recebido_em)parts.push(`Recebido ${fmtD(meta.recebido_em)}`);
  return parts.join(' - ')||'Aguardando despacho';
}
function cleanBaixada(row={}){
  const dataIda=String(row?.data_ida||'').slice(0,10);
  const dias=normalizeBaixadaDays(row?.dias);
  let dataVolta=String(row?.data_volta||'').slice(0,10);
  if(dataIda&&!dataVolta)dataVolta=addDaysISO(dataIda,dias);
  return{
    id:String(row?.id||('bx-'+uid())),
    obra:String(row?.obra||'').trim(),
    funcId:String(row?.funcId||'').trim(),
    nome:String(row?.nome||'').trim(),
    funcao:String(row?.funcao||'').trim(),
    data_ida:dataIda,
    data_volta:dataVolta,
    dias,
    status:BAIXADA_STATUS.includes(row?.status)?row.status:'Solicitado',
    updated_at:row?.updated_at||new Date().toISOString()
  };
}

function noticePriorityRank(priority){return priority==='Alta'?3:priority==='Baixa'?1:2;}
function cleanNotice(row={}){
  const texto=String(row?.texto||'').trim();
  const autorRaw=String(row?.autor||'').trim()||'sistema';
  const autor=normalizeMentionToken(autorRaw)||'sistema';
  const mentions=[...new Set([...(Array.isArray(row?.mentions)?row.mentions:[]).map(normalizeMentionToken),...parseMentions(texto)])].filter(Boolean);
  const readBy=[...new Set((Array.isArray(row?.readBy)?row.readBy:[]).map(normalizeMentionToken).filter(Boolean))];
  return{
    id:String(row?.id||('hv-'+uid())),
    texto,
    autor,
    autorLabel:String(row?.autorLabel||autorRaw||autor).trim()||autor,
    mentions,
    prioridade:HOME_NOTICE_PRIORITIES.includes(row?.prioridade)?row.prioridade:'Media',
    pinned:!!row?.pinned,
    readBy,
    created_at:row?.created_at||new Date().toISOString(),
    updated_at:row?.updated_at||new Date().toISOString(),
  };
}
function cleanNotices(list){
  return(Array.isArray(list)?list:[])
    .map(cleanNotice)
    .filter(item=>item.texto)
    .sort((a,b)=>Number(b.pinned)-Number(a.pinned)||noticePriorityRank(b.prioridade)-noticePriorityRank(a.prioridade)||String(b.created_at||'').localeCompare(String(a.created_at||'')))

}

function cleanAlmoxMeta(meta={}){
  const itemMeta={};
  Object.entries(meta?.itemMeta||{}).forEach(([id,row])=>{
    const min=Number(row?.estoque_minimo||0);
    if(Number.isFinite(min)&&min>=0)itemMeta[String(id)]={estoque_minimo:min,updated_at:row?.updated_at||new Date().toISOString()};
  });
  const transferMeta={};
  Object.entries(meta?.transferMeta||{}).forEach(([num,row])=>{
    const key=getAlmoxTransferKey(num);
    if(!key)return;
    transferMeta[key]={
      status:normalizeAlmoxTransferStatus(row?.status),
      obra_origem:String(row?.obra_origem||'').trim(),
      transito_em:String(row?.transito_em||'').slice(0,10),
      recebido_em:String(row?.recebido_em||'').slice(0,10),
      recebido_por:String(row?.recebido_por||'').trim(),
      recebimento_obs:String(row?.recebimento_obs||'').trim(),
      updated_at:row?.updated_at||new Date().toISOString()
    };
  });
  return{itemMeta,transferMeta};
}

function getActiveFuncionarios(obra){return DB.funcionarios.filter(f=>f.obra===obra&&(f.status||'Ativo')==='Ativo');}
function sortBaixadaRows(a,b){const da=a.data_ida||'9999-12-31',db=b.data_ida||'9999-12-31';return da!==db?da.localeCompare(db):(a.nome||'').localeCompare(b.nome||'');}
function getActiveBaixadaRows(obra){
  const active=getActiveFuncionarios(obra);
  const obraRows=cleanBaixadas(DB.baixadas||[]).filter(r=>r.obra===obra);
  return active.map(f=>{
    const found=obraRows.find(r=>r.funcId===f.id||(!r.funcId&&r.nome===f.nome));
    return cleanBaixada(found||{obra,funcId:f.id||'',nome:f.nome||'',funcao:f.funcao||'',status:'Solicitado'});
  }).sort(sortBaixadaRows);
}
function isBaixadaLive(row,day=todayISO()){return!!(row?.data_ida&&row?.data_volta&&day>=row.data_ida&&day<row.data_volta);}
function syncBaixadasWithFuncionarios(obra){
  const active=getActiveFuncionarios(obra);
  const all=cleanBaixadas(DB.baixadas||[]);
  const next=all.filter(r=>r.obra!==obra);
  const obraRows=all.filter(r=>r.obra===obra);
  let changed=false;
  active.forEach(f=>{
    const idx=obraRows.findIndex(r=>r.funcId===f.id||(!r.funcId&&r.nome===f.nome));
    if(idx===-1){
      obraRows.push(cleanBaixada({obra,funcId:f.id||'',nome:f.nome||'',funcao:f.funcao||'',status:'Solicitado'}));
      changed=true;
      return;
    }
    const merged=cleanBaixada({...obraRows[idx],obra,funcId:f.id||'',nome:f.nome||'',funcao:f.funcao||''});
    if(JSON.stringify(merged)!==JSON.stringify(cleanBaixada(obraRows[idx]))){obraRows[idx]=merged;changed=true;}
  });
  DB.baixadas=[...next,...obraRows.map(cleanBaixada)];
  if(changed)saveLocalBaixadas(DB.baixadas);
  return{rows:getActiveBaixadaRows(obra),changed};
}

}

function sortAditivosDisplay(list=[]){return[...(Array.isArray(list)?list:[])].sort((a,b)=>{const na=getTrailingNumber(a?.numero||a?.nome||a?.id);const nb=getTrailingNumber(b?.numero||b?.nome||b?.id);if(na!=null||nb!=null){const diff=(nb??-1)-(na??-1);if(diff!==0)return diff;}const da=String(b?.data||b?.created_at||'');const db=String(a?.data||a?.created_at||'');if(da!==db)return da.localeCompare(db);return String(b?.created_at||b?.id||'').localeCompare(String(a?.created_at||a?.id||''));});}

async function copyText(text,label='Copiado para a área de transferência.'){
  try{
    if(navigator.clipboard?.writeText)await navigator.clipboard.writeText(text);
    else{
      const ta=document.createElement('textarea');
      ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    }
    toast(label,'#22c55e');
  }catch(err){
    console.warn('[JET] Falha ao copiar:',err?.message||err);
    toast('Não foi possível copiar agora.','#ef4444');
  }
}
