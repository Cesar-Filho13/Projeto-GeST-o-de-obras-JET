function funcionarioImportKey(value=''){
  return stripAccents(value).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
function funcionarioImportCpf(value=''){
  const digits=String(value||'').replace(/\D/g,'');
  if(!digits)return '';
  return digits.length<=11?digits.padStart(11,'0').slice(-11):digits.slice(-11);
}
function funcionarioExtractCpf(documento=''){
  const text=String(documento||'');
  const labeled=text.match(/CPF\s*:\s*([0-9.\-]+)/i);
  if(labeled)return funcionarioImportCpf(labeled[1]);
  const digits=text.replace(/\D/g,'');
  return digits.length>=11?digits.slice(-11):'';
}
function funcionarioImportDate(value=''){
  if(!value)return '';
  if(value instanceof Date&&!Number.isNaN(value.getTime()))return value.toLocaleDateString('pt-BR');
  const text=String(value||'').trim();
  const iso=text.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return `${iso[3]}/${iso[2]}/${iso[1]}`;
  const br=text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(br){
    let a=parseInt(br[1],10),b=parseInt(br[2],10),y=br[3];
    if(y.length===2)y=`20${y}`;
    if(b>12)return `${String(b).padStart(2,'0')}/${String(a).padStart(2,'0')}/${y}`;
    return `${String(a).padStart(2,'0')}/${String(b).padStart(2,'0')}/${y}`;
  }
  return text;
}
function funcionarioImportDoc(row){
  const parts=[];
  if(row.cpf)parts.push(`CPF: ${formatCPF(row.cpf)}`);
  if(row.rg)parts.push(`RG: ${row.rg}`);
  if(row.nascimento)parts.push(`Nasc.: ${row.nascimento}`);
  return parts.join(' | ');
}
function funcionarioImportOptions(){
  return{
    empresa:(document.getElementById('m-func-import-empresa')?.value||'JET').trim()||'JET',
    obra:(document.getElementById('m-func-import-obra')?.value||'GERAL').trim(),
    updateExisting:!!document.getElementById('m-func-import-update-existing')?.checked
  };
}
function funcionarioImportHeader(value=''){
  return funcionarioImportKey(value);
}
function buildFuncionariosImportRows(matrix=[]){
  const headerIndex=matrix.findIndex(row=>{
    const cols=(row||[]).map(funcionarioImportHeader);
    return cols.includes('nome')&&cols.some(v=>v==='funcao'||v.startsWith('funcao '));
  });
  if(headerIndex<0)throw new Error('Não encontrei o cabeçalho NOME / FUNÇÃO na planilha.');
  const headers=(matrix[headerIndex]||[]).map(funcionarioImportHeader);
  const findCol=(needles)=>headers.findIndex(h=>needles.some(n=>h===n||h.includes(n)));
  const colNome=findCol(['nome']);
  const colFuncao=findCol(['funcao']);
  const colNascimento=findCol(['data de nascimento','nascimento']);
  const colRg=findCol(['rg']);
  const colCpf=findCol(['cpf']);
  if(colNome<0||colFuncao<0)throw new Error('A planilha precisa ter as colunas NOME e FUNÇÃO.');
  const existingByCpf=new Map();
  const existingByName=new Map();
  (DB.funcionarios||[]).forEach(f=>{
    const cpf=funcionarioExtractCpf(f.documento);
    if(cpf&&!existingByCpf.has(cpf))existingByCpf.set(cpf,f);
    const nameKey=funcionarioImportKey(f.nome);
    if(nameKey&&!existingByName.has(nameKey))existingByName.set(nameKey,f);
  });
  const seen=new Set();
  return matrix.slice(headerIndex+1).map(row=>{
    const nome=String(row[colNome]||'').replace(/\s+/g,' ').trim();
    if(!nome)return null;
    const funcao=String(row[colFuncao]||'').replace(/\*+/g,'').replace(/\s+/g,' ').trim();
    const cpf=colCpf>=0?funcionarioImportCpf(row[colCpf]):'';
    const rg=colRg>=0?String(row[colRg]||'').replace(/\s+/g,' ').trim():'';
    const nascimento=colNascimento>=0?funcionarioImportDate(row[colNascimento]):'';
    const sheetKey=cpf||`nome:${funcionarioImportKey(nome)}`;
    const duplicate=seen.has(sheetKey);
    seen.add(sheetKey);
    const existing=(cpf&&existingByCpf.get(cpf))||existingByName.get(funcionarioImportKey(nome))||null;
    const draft={nome,funcao,cpf,rg,nascimento,duplicate,existingId:existing?.id||'',existingName:existing?.nome||''};
    draft.documento=funcionarioImportDoc(draft);
    return draft;
  }).filter(Boolean);
}
function funcionariosImportPreviewHtml(rows=[]){
  if(!rows.length)return'<div style="padding:14px;color:var(--text3);font-size:13px">Nenhum colaborador válido encontrado.</div>';
  const opts=funcionarioImportOptions();
  const novos=rows.filter(r=>!r.duplicate&&!r.existingId).length;
  const atualizaveis=opts.updateExisting?rows.filter(r=>!r.duplicate&&r.existingId).length:0;
  const ignorados=rows.length-novos-atualizaveis;
  return`<table><thead><tr><th>Nome</th><th>Função</th><th>CPF</th><th>RG</th><th>Nascimento</th><th>Status</th></tr></thead><tbody>${rows.map(r=>{
    const status=r.duplicate?'<span class="tag" style="color:#f87171">Duplicado na planilha</span>':r.existingId?(opts.updateExisting?'<span class="tag">Atualizar existente</span>':'<span class="tag">Já existe</span>'):'<span class="tag" style="color:#34d399">Novo</span>';
    return`<tr><td><strong>${esc(r.nome)}</strong>${r.existingName&&r.existingName!==r.nome?`<div style="font-size:10px;color:var(--text3)">Atual: ${esc(r.existingName)}</div>`:''}</td><td>${esc(r.funcao||'Sem função')}</td><td style="white-space:nowrap">${esc(formatCPF(r.cpf)||'—')}</td><td>${esc(r.rg||'—')}</td><td style="white-space:nowrap">${esc(r.nascimento||'—')}</td><td>${status}</td></tr>`;
  }).join('')}</tbody></table><div style="padding:10px 12px;color:var(--text3);font-size:12px;border-top:1px solid var(--border)">Prévia: ${rows.length} colaborador(es) · ${novos} novo(s) · ${atualizaveis} atualização(ões) · ${ignorados} ignorado(s). Empresa padrão: ${esc(opts.empresa)} · vínculo padrão: ${esc(opts.obra||'Sem obra')}.</div>`;
}
window._refreshFuncionariosImportPreview=()=>{const target=document.getElementById('m-func-import-preview');if(target&&window._funcImportDrafts)target.innerHTML=funcionariosImportPreviewHtml(window._funcImportDrafts);};
window._previewFuncionariosImport=async(file)=>{
  const target=document.getElementById('m-func-import-preview');
  if(!target)return;
  if(!file){target.innerHTML='<div style="padding:14px;color:var(--text3);font-size:13px">Selecione a planilha para ver a prévia.</div>';return;}
  if(!window.XLSX){toast('Leitor de planilha não carregado. Atualize a página.','#ef4444');return;}
  try{
    target.innerHTML='<div style="padding:14px;color:var(--text3);font-size:13px">Lendo planilha...</div>';
    const buf=await file.arrayBuffer();
    const wb=window.XLSX.read(buf,{type:'array',cellDates:true});
    const sheetName=wb.SheetNames[0];
    const matrix=window.XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:'',raw:false,dateNF:'dd/mm/yyyy'});
    window._funcImportDrafts=buildFuncionariosImportRows(matrix);
    target.innerHTML=funcionariosImportPreviewHtml(window._funcImportDrafts);
  }catch(err){
    console.error(err);
    window._funcImportDrafts=[];
    target.innerHTML=`<div style="padding:14px;color:#f87171;font-size:13px">Não consegui ler a planilha: ${esc(err.message||err)}</div>`;
  }
};
window._importFuncionariosPlanilha=async(event)=>{
  event?.stopPropagation?.();
  const file=document.getElementById('m-func-import-file')?.files?.[0];
  if(!file){toast('Selecione a planilha antes de importar.','#ef4444');return;}
  if(!window._funcImportDrafts?.length)await window._previewFuncionariosImport(file);
  const opts=funcionarioImportOptions();
  const drafts=(window._funcImportDrafts||[]).filter(r=>!r.duplicate);
  const inserts=drafts.filter(r=>!r.existingId).map(r=>({
    id:uid(),obra:opts.obra||'',nome:r.nome,funcao:r.funcao,empresa:opts.empresa,telefone:'',documento:r.documento,data_entrada:null,status:'Ativo'
  }));
  const updateDrafts=opts.updateExisting?drafts.filter(r=>r.existingId):[];
  if(!inserts.length&&!updateDrafts.length){toast('Nenhum colaborador novo ou existente para importar.','#f59e0b');return;}
  if(!confirm(`Importar ${inserts.length} novo(s) e atualizar ${updateDrafts.length} existente(s)?`))return;
  const btn=document.querySelector('.modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}
  if(inserts.length){
    const{error}=await sb.from('funcionarios').insert(inserts);
    if(error){if(btn){btn.disabled=false;btn.textContent='Importar colaboradores';}toast('Erro ao importar colaboradores: '+error.message,'#ef4444');return;}
    DB.funcionarios=[...(DB.funcionarios||[]),...inserts];
  }
  if(updateDrafts.length){
    const updates=await Promise.all(updateDrafts.map(d=>{
      const atual=(DB.funcionarios||[]).find(f=>f.id===d.existingId)||{};
      const patch={nome:d.nome,funcao:d.funcao||atual.funcao||'',empresa:opts.empresa||atual.empresa||'JET',documento:d.documento||atual.documento||'',status:atual.status||'Ativo'};
      if(!atual.obra&&opts.obra)patch.obra=opts.obra;
      return sb.from('funcionarios').update(patch).eq('id',d.existingId).then(res=>({res,d,patch}));
    }));
    const failed=updates.find(u=>u.res.error);
    if(failed){if(btn){btn.disabled=false;btn.textContent='Importar colaboradores';}toast('Erro ao atualizar colaborador: '+failed.res.error.message,'#ef4444');return;}
    DB.funcionarios=(DB.funcionarios||[]).map(f=>{const u=updates.find(x=>x.d.existingId===f.id);return u?{...f,...u.patch}:f;});
  }
  DB.funcionarios=(DB.funcionarios||[]).sort((a,b)=>String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR'));
  S.officeRhObraFilter='Todas';
  S.officeRhStatusFilter='Todos';
  toast(`${inserts.length} colaborador(es) importado(s) e ${updateDrafts.length} atualizado(s)!`,'#22c55e');
  _closeModal();
  renderApp();
};

window._setAlmoxMinStock=(id,value)=>{
  const item=DB.estoque.find(e=>e.id===id);
  if(!item)return;
  const raw=String(value??'').trim();
  if(raw===''){
    removeAlmoxItemMeta(id);

window._openExpedicaoRecebimento=(num)=>{

window._setExpedicaoStatus=(num,status)=>{
  const key=getAlmoxTransferKey(num);
  const group=buildAlmoxExpedicaoGroups().find(item=>item.key===key);
  if(!group)return;
  const nextStatus=normalizeAlmoxTransferStatus(status);
  if(group.status===nextStatus){renderApp();return;}
  if(nextStatus==='Recebido'){
    window._openExpedicaoRecebimento(key);
    return;
  }
  const patch={status:nextStatus};
  if(nextStatus==='Em transito'&&!group.meta.transito_em)patch.transito_em=todayISO();
  if(nextStatus==='Separado'){
    patch.transito_em='';
    patch.recebido_em='';
    patch.recebido_por='';
    patch.recebimento_obs='';
  }
  setAlmoxTransferMeta(key,patch);
  if(nextStatus==='Em transito'&&group.status!=='Em transito'){
    group.items.forEach(item=>logAlmoxMovimento({
      tipo:'Despacho',
      itemId:item.id,
      item:item.item,
      obra_origem:group.meta.obra_origem||'ALMOX CENTRAL',
      obra_destino:item.obra||'',
      qtd:Number(item.qtd||0),
      unidade:item.unidade||'un',
      responsavel:item.responsavel||currentUser?.email?.split('@')[0]||'',
      numero_controle:key,
      saldo_anterior:Number(item.qtd||0),
      saldo_atual:Number(item.qtd||0),
      observacao:`Transferencia ${key} despachada para a obra.`,
      data:patch.transito_em||todayISO(),
      created_at:new Date().toISOString()
    }));
  }
  toast(`Transferencia ${key} atualizada para ${nextStatus}.`,'#22c55e');
  renderApp();
};

window._saveAlmoxSaida=async(id)=>withAlmoxActionLock(async()=>{
  const selectedId=document.getElementById('m-sai-item-id')?.value?.trim()||id||'';
  const est=selectedId?getAlmoxInventario().find(item=>item.id===selectedId):null;
  if(!est){toast('Selecione um item do estoque.','#ef4444');return;}
  const qtd=Number(document.getElementById('m-sai-qtd')?.value||0);
  const data=document.getElementById('m-sai-data')?.value;
  const obra=document.getElementById('m-sai-obra')?.value?.trim();
  const origem=(est.obra||'ALMOX CENTRAL').trim()||'ALMOX CENTRAL';
  const resp=document.getElementById('m-sai-resp')?.value||est.responsavel||'';
  const enteredNum=document.getElementById('m-sai-num')?.value?.trim()||'';
  const num=(enteredNum&&enteredNum!==String(est.numero_controle||''))?enteredNum:('EXP-'+uid().slice(0,6).toUpperCase());
  const obs=document.getElementById('m-sai-obs')?.value||'';
  const saldoAtual=Number(est.qtd)||0;
  if(!(qtd>0)||!data||!obra){toast('Preencha quantidade, data e obra destino.','#ef4444');return;}
  if(qtd>saldoAtual){toast('A saida nao pode ser maior que o saldo disponivel.','#ef4444');return;}
  const stockPatch={qtd:saldoAtual-qtd,saida:data,responsavel:resp,observacao:mergeStockObservation(est.observacao,obs||`Saida de ${qtd} ${est.unidade||'un'} para ${obra} em ${fmtD(data)}`)};
  const previous={qtd:est.qtd,saida:est.saida||null,responsavel:est.responsavel||'',observacao:est.observacao||''};
  const {error:updateError}=await sb.from('estoque').update(stockPatch).eq('id',est.id);
  if(updateError){toast('Erro: '+updateError.message,'#ef4444');return;}
  const mov={id:uid(),obra,item:est.item,qtd,unidade:est.unidade||'un',tipo:'Expedicao',numero_controle:num,responsavel:resp,observacao:obs||'',entrada:est.entrada||data,saida:data,created_at:new Date().toISOString()};
  const {error:insertError}=await sb.from('estoque').insert(mov);
  if(insertError){
    await sb.from('estoque').update(previous).eq('id',est.id);
    toast('Erro ao registrar saida: '+insertError.message,'#ef4444');
    return;
  }
  DB.estoque=DB.estoque.map(item=>item.id===est.id?{...item,...stockPatch}:item);
  DB.estoque.unshift(mov);
  setAlmoxTransferMeta(num,{status:'Separado',obra_origem:origem,transito_em:'',recebido_em:'',recebido_por:'',recebimento_obs:''});
  logAlmoxMovimento({tipo:'Saida',itemId:est.id,item:est.item,obra_origem:origem,obra_destino:obra,qtd,unidade:est.unidade||'un',responsavel:resp,numero_controle:num,saldo_anterior:saldoAtual,saldo_atual:saldoAtual-qtd,observacao:obs||`Material separado para a transferencia ${num}.`,data,created_at:new Date().toISOString()});
  toast('Saida registrada e transferencia criada.','#22c55e');
  _closeModal();renderApp();
});

window._calcPedidoTotal=()=>{
  const rows=Array.from(document.querySelectorAll('.ped-item-row'));
  let total=0;
  rows.forEach(r=>{
    const qtd=parseFloat(r.querySelector('.ped-item-qtd')?.value)||1;
    const val=parseFloat(r.querySelector('.ped-item-valor')?.value)||0;
    total+=qtd*val;
  });
  const el=document.getElementById('m-ptotal');
  if(el&&total>0)el.value=total.toFixed(2);
};

window._getPedidoItems=()=>{
  return Array.from(document.querySelectorAll('.ped-item-row')).map(r=>({
    nome:r.querySelector('.ped-item-desc')?.value?.trim()||'',
    qtd:parseFloat(r.querySelector('.ped-item-qtd')?.value)||0,
    unidade:r.querySelector('.ped-item-unit')?.value||'un',
    valor:parseFloat(r.querySelector('.ped-item-valor')?.value)||0,
    obs:r.querySelector('.ped-item-obs')?.value||''
  })).filter(i=>i.nome);
};

async function saveDespesaFilesForId(despId,files){
  const selected=Array.from(files||[]).filter(Boolean);
  if(!selected.length)return true;
  const queue=selected.filter(file=>validateUploadFile(file));
  if(!queue.length)return false;
  const next=[...getDespesaFiles(despId)];
  let uploaded=0;
  for(const file of queue){
    const path=`despesas/${despId}/${uid()}_${sanitizeStorageName(file.name)}`;
    const {error:ue}=await sb.storage.from(BUCKET).upload(path,file);
    if(ue){toast(`Erro ao enviar ${file.name}: ${ue.message}`,'#ef4444');continue;}
    const {data:ud}=sb.storage.from(BUCKET).getPublicUrl(path);
    next.push(cleanDespesaFile({id:uid(),name:file.name,size:file.size||0,path,url:ud.publicUrl}));
    uploaded++;
  }
  await saveRemoteDespesaFiles({...DB.despesaFiles,[despId]:next},{silent:true});
  if(uploaded)toast(`${uploaded} arquivo(s) vinculado(s) ao lançamento.`,'#22c55e');
  return uploaded===queue.length;
}

function stripAccents(value=''){return String(value||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function rdoImportCell(row,...keys){
  for(const key of keys){
    if(row&&row[key]!=null&&String(row[key]).trim()!=='')return row[key];
  }
  const wanted=keys.map(k=>stripAccents(k).toLowerCase());
  const found=Object.keys(row||{}).find(k=>wanted.includes(stripAccents(k).toLowerCase()));
  return found?row[found]:'';
}
function rdoImportISO(value){
  if(!value&&value!==0)return'';
  if(value instanceof Date&&!isNaN(value))return value.toISOString().slice(0,10);
  if(typeof value==='number'){
    const ms=Math.round((value-25569)*86400*1000);
    return new Date(ms).toISOString().slice(0,10);
  }
  const text=String(value).trim();
  let m=text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m=text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return'';
}

function rdoFuncaoClass(funcao=''){
  const f=stripAccents(funcao).toLowerCase();
  if((/\beng|engenheiro/.test(f))&&/eletr/.test(f))return{admin:'Engº Eletricista'};
  if(/\beng|engenheiro/.test(f))return{admin:'Engº Civil'};
  if(/coord/.test(f))return{admin:'Coord. de Obras'};
  if(/encarregado/.test(f)&&/hidraul|encan/.test(f))return{admin:'Encarregado de Hidráulica'};
  if(/encarregado/.test(f)&&/eletr/.test(f))return{admin:'Encarregado de Elétrica'};
  if(/ajud|aux/.test(f)&&/eletr/.test(f))return{mo:'Ajud. Eletricista'};
  if(/eletr/.test(f))return{mo:'Eletricista'};
  if(/ajud|aux/.test(f)&&/(hidraul|encan)/.test(f))return{mo:'Ajudantes (Hidráulica)'};
  if(/hidraul|encan/.test(f))return{mo:'Encanador'};
  if(/pedr/.test(f))return{mo:'Pedreiro'};
  if(/pint/.test(f))return{mo:'Pintor'};
  if(/carpint|montador/.test(f))return{mo:'Carpinteiro / Montador'};
  if(/sold/.test(f))return{mo:'Soldador'};
  if(/armad/.test(f))return{mo:'Armador'};
  if(/marcen/.test(f))return{mo:'Marceneiro'};
  if(/guinch/.test(f))return{mo:'Guincheiro'};
  if(/limpeza/.test(f))return{mo:'Aux. limpeza'};
  if(/apont/.test(f))return{mo:'Apontador'};
  if(/laborator/.test(f))return{mo:/aux/.test(f)?'Aux. laboratorista':'Laboratorista'};
  if(/maquina/.test(f))return{mo:'Op. máquinas'};
  if(/elevador/.test(f))return{mo:'Op. elevador'};
  if(/betoneira/.test(f))return{mo:'Op. betoneira'};
  if(/bomba/.test(f))return{mo:'Op. bombas'};
  return{mo:'Ajud. Eletricista'};
}
function rdoFindFuncionarioByName(nome='',obra=''){
  const target=rdoPersonKey(nome);
  if(!target)return null;
  const parts=target.split(' ').filter(Boolean);
  const pool=(DB.funcionarios||[]).filter(f=>String(f.status||'Ativo')!=='Desligado');
  let best=null,bestScore=0;
  pool.forEach(f=>{
    const key=rdoPersonKey(f.nome||'');
    if(!key)return;
    let score=0;
    if(key===target)score=100;
    else if(key.split(' ')[0]===parts[0])score=72;
    else if(key.includes(target)||target.includes(key))score=58;
    else if(parts.some(p=>p.length>2&&key.split(' ').includes(p)))score=38;
    if(f.obra===obra)score+=12;
    if(String(f.status||'Ativo')==='Ativo')score+=4;
    if(score>bestScore){bestScore=score;best=f;}
  });
  return bestScore>=38?best:null;
}
function rdoBuildEfetivoByPeople(nomes=[],obra='',autor='Eng. Cesar'){
  const FUNCOES=['Armador','Marceneiro','Eletricista','Ajud. Eletricista','Encanador','Ajudantes (Hidráulica)','Pedreiro','Pintor','Carpinteiro / Montador','Soldador','Guincheiro','Op. de guindaste','Op. máquinas','Op. elevador','Op. montagem','Op. betoneira','Op. bombas','Aux. limpeza','Apontador','Laboratorista','Aux. laboratorista'];
  const ADMIN=['Engº Civil','Engº Eletricista','Coord. de Obras','Encarregado de Elétrica','Encarregado de Hidráulica'];
  const mo=Object.fromEntries(FUNCOES.map(f=>[f,{funcao:f,jet:0,terceiros:0}]));
  const adm=Object.fromEntries(ADMIN.map(c=>[c,{cargo:c,qtde:0,obs:''}]));
  const unmatched=[];
  nomes.forEach(raw=>{
    const terceiro=/terc|terceir/i.test(stripAccents(raw));
    const clean=String(raw||'').replace(/\([^)]*\)/g,'').trim();
    const nameKey=rdoPersonKey(clean);
    if(nameKey==='cesar'){
      adm['Engº Eletricista'].qtde+=1;adm['Engº Eletricista'].obs=autor;return;
    }
    if(nameKey==='joedson'){
      adm['Encarregado de Elétrica'].qtde+=1;adm['Encarregado de Elétrica'].obs='Joedson';return;
    }
    if(nameKey==='severino'){
      adm['Encarregado de Hidráulica'].qtde+=1;adm['Encarregado de Hidráulica'].obs='Severino';return;
    }
    const func=rdoFindFuncionarioByName(clean,obra);
    const cls=rdoFuncaoClass(func?.funcao||'');
    const isThird=terceiro||(/terceir|terc/i.test(stripAccents(func?.empresa||'')));
    if(cls.admin){
      adm[cls.admin].qtde+=1;
      adm[cls.admin].obs=[adm[cls.admin].obs,clean].filter(Boolean).join(', ');
      return;
    }
    const key=cls.mo||'Ajud. Eletricista';
    if(isThird)mo[key].terceiros+=1;else mo[key].jet+=1;
    if(!func)unmatched.push(clean);
  });
  const efJet=FUNCOES.map(f=>({funcao:f,jet:mo[f].jet?String(mo[f].jet):'',terceiros:mo[f].terceiros?String(mo[f].terceiros):''}));
  const efAdm=ADMIN.map(c=>({cargo:c,qtde:adm[c].qtde?String(adm[c].qtde):'',obs:adm[c].obs||''}));
  const jet=efJet.reduce((s,e)=>s+(parseInt(e.jet)||0),0);
  const terceiros=efJet.reduce((s,e)=>s+(parseInt(e.terceiros)||0),0);
  const admin=efAdm.reduce((s,e)=>s+(parseInt(e.qtde)||0),0);
  const distribuicao=efJet.filter(e=>(parseInt(e.jet)||0)+(parseInt(e.terceiros)||0)>0).map(e=>`${e.funcao}: ${(parseInt(e.jet)||0)+(parseInt(e.terceiros)||0)}`).concat(efAdm.filter(e=>parseInt(e.qtde)||0).map(e=>`${e.cargo}: ${e.qtde}`));
  return{efetivo_jet:efJet,efetivo_admin:efAdm,jet,terceiros,admin,distribuicao,unmatched};
}
function rdoEnsureAdmin(dist,cargo,nome){
  if(!dist||!cargo)return dist;
  const row=(dist.efetivo_admin||[]).find(e=>e.cargo===cargo);
  if(row&&!(parseInt(row.qtde)||0)){
    row.qtde='1';
    row.obs=nome||row.obs||'';
    dist.admin=(dist.admin||0)+1;
  }else if(row&&nome&&!String(row.obs||'').includes(nome)){
    row.obs=[row.obs,nome].filter(Boolean).join(', ');
  }
  dist.distribuicao=(dist.efetivo_jet||[]).filter(e=>(parseInt(e.jet)||0)+(parseInt(e.terceiros)||0)>0).map(e=>`${e.funcao}: ${(parseInt(e.jet)||0)+(parseInt(e.terceiros)||0)}`).concat((dist.efetivo_admin||[]).filter(e=>parseInt(e.qtde)||0).map(e=>`${e.cargo}: ${e.qtde}`));
  return dist;
}
function rdoImportBuildRows(rawRows=[]){
  const opts=rdoImportOptions();
  const existingRows=(DB.rdo||[]).filter(r=>r.obra===opts.obra);
  const existingMap=Object.fromEntries(existingRows.map(r=>[String(r.data||'').slice(0,10),r]));
  const seen=new Set();
  return rawRows.map(row=>{
    const data=rdoImportISO(rdoImportCell(row,'Data do turno','Data'));
    if(!data||data<opts.start)return null;
    const equipe=String(rdoImportCell(row,'Equipe (nomes normalizados)','Equipe','Funcionários','Funcionarios')||'');
    const nomes=equipe.split(/\r?\n|;/).map(n=>n.trim()).filter(Boolean);
    const qtdPlan=parseInt(rdoImportCell(row,'Qtd','Quantidade'))||nomes.length;
    const obs=String(rdoImportCell(row,'Observações','Observacoes')||'');
    const efetivo=qtdPlan||nomes.length;
    const dist=rdoBuildEfetivoByPeople(nomes,opts.obra,opts.autor);
    if(opts.incluirSeverino&&!nomes.some(n=>rdoPersonKey(n)==='severino'))rdoEnsureAdmin(dist,'Encarregado de Hidráulica','Severino');
    const duplicated=!!existingMap[data]||seen.has(data);
    seen.add(data);
    return{
      data,obra:opts.obra,tempo:opts.tempo,turno:opts.turno,autor:opts.autor,cliente:opts.cliente,contrato:opts.contrato,prazo:opts.prazo,
      efetivo:Math.max(efetivo,dist.jet+dist.terceiros+dist.admin),jet:dist.jet,terceiros:dist.terceiros,admin:dist.admin,nomes,skipped:duplicated,existingId:existingMap[data]?.id||'',distribuicao:dist.distribuicao,unmatched:dist.unmatched,
      dia_semana:['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date(data+'T12:00:00').getDay()],
      efetivo_jet:dist.efetivo_jet,
      efetivo_admin:dist.efetivo_admin
    };
  }).filter(Boolean).sort((a,b)=>a.data.localeCompare(b.data));
}

window._importRDOPlanilha=async(event)=>{
  event?.stopPropagation?.();
  const file=document.getElementById('m-rdo-import-file')?.files?.[0];
  if(!file){toast('Selecione a planilha antes de importar.','#ef4444');return;}
  if(!window._rdoImportDrafts.length)await window._previewRDOImport(file);
  const opts=rdoImportOptions();
  const existing=new Set((DB.rdo||[]).filter(r=>r.obra===opts.obra).map(r=>String(r.data||'').slice(0,10)));
  const seen=new Set();
  const updateExisting=!!document.getElementById('m-rdo-import-update-existing')?.checked;
  const drafts=(window._rdoImportDrafts||[]).filter(r=>!r.existingId&&!existing.has(r.data)&&!seen.has(r.data)&&(seen.add(r.data)||true));
  const updateDrafts=updateExisting?(window._rdoImportDrafts||[]).filter(r=>r.existingId):[];
  if(!drafts.length&&!updateDrafts.length){toast('Nenhum RDO novo ou existente para atualizar.','#f59e0b');return;}
  if(!confirm(`Importar ${drafts.length} RDO(s) novo(s) e atualizar ${updateDrafts.length} existente(s) em ${opts.obra}?`))return;
  const currentNums=(DB.rdo||[]).filter(r=>r.obra===opts.obra).map(r=>parseInt(r.rdo_numero)||0);
  let nextNum=Math.max(0,...currentNums)+1;
  const rows=drafts.map(d=>({
    id:uid(),obra:opts.obra,data:d.data,tempo:opts.tempo,efetivo:d.efetivo,
    rdo_numero:nextNum++,cliente:opts.cliente,contrato:opts.contrato,turno:opts.turno,dia_semana:d.dia_semana,
    paralisacao:false,prazo_contratual:opts.prazo,efetivo_jet:d.efetivo_jet,efetivo_admin:d.efetivo_admin,
    atividades:'',ocorrencias:'',fotos:[],autor:opts.autor
  }));
  if(rows.length){
    const{error}=await sb.from('rdo').insert(rows);
    if(error){toast('Erro ao importar RDOs: '+error.message,'#ef4444');return;}
    DB.rdo=[...rows,...DB.rdo];
  }
  if(updateDrafts.length){
    const updates=await Promise.all(updateDrafts.map(d=>{
      const patch={tempo:opts.tempo,efetivo:d.efetivo,turno:opts.turno,dia_semana:d.dia_semana,paralisacao:false,prazo_contratual:opts.prazo,efetivo_jet:d.efetivo_jet,efetivo_admin:d.efetivo_admin,autor:opts.autor,cliente:opts.cliente,contrato:opts.contrato};
      return sb.from('rdo').update(patch).eq('id',d.existingId).then(res=>({res,d,patch}));
    }));
    const failed=updates.find(u=>u.res.error);
    if(failed){toast('Erro ao atualizar RDO existente: '+failed.res.error.message,'#ef4444');return;}
    DB.rdo=DB.rdo.map(r=>{const u=updates.find(x=>x.d.existingId===r.id);return u?{...r,...u.patch}:r;});
  }
  toast(`${rows.length} RDO(s) importado(s) e ${updateDrafts.length} atualizado(s)!`,'#22c55e');
  _closeModal();
};

window._rdoFotoImportRaw=[];
window._rdoFotoImportGroups=[];
function rdoFotoImportOptions(){
  return{
    obra:document.getElementById('m-rdo-foto-import-obra')?.value?.trim()||S.obra||'APL - AV. Paulista',
    start:document.getElementById('m-rdo-foto-import-start')?.value||'2026-04-09',
    atividades:!!document.getElementById('m-rdo-foto-import-atividades')?.checked,
    protegerAtividades:!!document.getElementById('m-rdo-foto-import-proteger')?.checked
  };
}
function rdoFotoCell(sheet,row,col){
  const cell=sheet?.[window.XLSX.utils.encode_cell({r:row,c:col})];
  if(!cell)return'';
  return cell.w??cell.v??'';
}
function rdoFotoLink(sheet,row,col){
  const cell=sheet?.[window.XLSX.utils.encode_cell({r:row,c:col})];
  const link=cell?.l?.Target||cell?.l?.target||'';
  if(link)return String(link);
  const value=cell?.v??cell?.w??'';
  return /^https?:\/\//i.test(String(value||''))?String(value):'';
}
function rdoFotoHeaderKey(value=''){
  return stripAccents(value).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
function rdoFotoTime(value=''){
  if(!value&&value!==0)return'';
  if(value instanceof Date&&!Number.isNaN(value.getTime())){
    return `${String(value.getHours()).padStart(2,'0')}:${String(value.getMinutes()).padStart(2,'0')}:${String(value.getSeconds()).padStart(2,'0')}`;
  }
  if(typeof value==='number'){
    const total=Math.round((value%1)*86400);
    const h=Math.floor(total/3600),m=Math.floor((total%3600)/60),s=total%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  const text=String(value||'').trim();
  const m=text.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  return m?`${m[1].padStart(2,'0')}:${m[2]}:${(m[3]||'00').padStart(2,'0')}`:text;
}
function rdoFotoDriveId(url=''){
  const text=String(url||'');
  let m=text.match(/\/file\/d\/([^/?#]+)/i);
  if(m)return m[1];
  m=text.match(/[?&]id=([^&#]+)/i);
  return m?decodeURIComponent(m[1]):'';
}
function rdoFotoThumb(url=''){
  const id=rdoFotoDriveId(url);
  return id?`https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=w1000`:url;
}
function rdoFotoKey(f){
  const raw=f?.drive_url||f?.original_url||f?.url||'';
  const id=rdoFotoDriveId(raw);
  if(id)return`drive:${id}`;
  const name=String(f?.name||'').trim().toLowerCase();
  if(name)return`name:${name}`;
  return`url:${String(raw).trim().toLowerCase()}`;
}
function rdoFotoCleanComment(value=''){
  return String(value||'')
    .replace(/[\u200e-\u200f\u202a-\u202e\u2066-\u2069]/g,'')
    .replace(/@\s*/g,'@')
    .replace(/@[\wÀ-ÿ ._-]+/g,'')
    .replace(/\s+/g,' ')
    .replace(/\s+([,.;:!?])/g,'$1')
    .trim();
}
function rdoFotoActivitySuggestion(photos=[]){
  const seen=new Set();
  const lines=[];
  photos
    .map(photo=>({hora:photo.hora||'',desc:rdoFotoCleanComment(photo.desc)}))
    .filter(item=>item.desc&&item.desc.length>3)
    .forEach(item=>{
      const key=stripAccents(item.desc).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
      if(!key||seen.has(key))return;
      seen.add(key);
      const text=item.desc.charAt(0).toUpperCase()+item.desc.slice(1);
      lines.push(item.hora?`${item.hora} - ${text}`:text);
    });
  if(!lines.length)return'';
  const limited=lines.slice(0,10);
  const more=lines.length>10?'\n- Demais registros fotográficos complementares do dia.':'';
  return`Atividades executadas conforme registros fotográficos:\n${limited.map(line=>`- ${line}`).join('\n')}${more}`;
}
function rdoFotoParseSheet(sheet){
  const ref=sheet?.['!ref'];
  if(!ref)throw new Error('A planilha está vazia.');
  const range=window.XLSX.utils.decode_range(ref);
  let headerRow=-1;
  for(let r=range.s.r;r<=Math.min(range.e.r,range.s.r+40);r++){
    const labels=[];
    for(let c=range.s.c;c<=range.e.c;c++)labels.push(rdoFotoHeaderKey(rdoFotoCell(sheet,r,c)));
    if(labels.includes('data')&&labels.some(label=>label.includes('arquivo'))&&labels.some(label=>label.includes('drive')||label.includes('abrir')))headerRow=r;
    if(headerRow>=0)break;
  }
  if(headerRow<0)throw new Error('Não encontrei o cabeçalho Data / Arquivo / Abrir no Drive.');
  const headers=[];
  for(let c=range.s.c;c<=range.e.c;c++)headers.push(rdoFotoHeaderKey(rdoFotoCell(sheet,headerRow,c)));
  const findCol=(names,fallback)=> {
    const idx=headers.findIndex(h=>names.some(n=>h===n||h.includes(n)));
    return idx>=0?range.s.c+idx:fallback;
  };
  const colData=findCol(['data'],0),colDia=findCol(['dia'],1),colHora=findCol(['horario','hora'],2),colAutor=findCol(['enviado por','autor'],3),colDesc=findCol(['legenda','descricao'],4),colArquivo=findCol(['arquivo'],5),colLink=findCol(['drive','abrir'],6);
  const photos=[];
  for(let r=headerRow+1;r<=range.e.r;r++){
    const arquivo=String(rdoFotoCell(sheet,r,colArquivo)||'').trim();
    const link=String(rdoFotoLink(sheet,r,colLink)||'').trim();
    if(!arquivo||!/^https?:\/\//i.test(link))continue;
    const data=rdoImportISO(rdoFotoCell(sheet,r,colData));
    if(!data)continue;
    const hora=rdoFotoTime(rdoFotoCell(sheet,r,colHora));
    photos.push({
      data,
      dia:String(rdoFotoCell(sheet,r,colDia)||'').trim(),
      hora,
      enviado_por:String(rdoFotoCell(sheet,r,colAutor)||'').trim(),
      desc:String(rdoFotoCell(sheet,r,colDesc)||'').trim(),
      name:arquivo,
      url:rdoFotoThumb(link),
      thumb:rdoFotoThumb(link),
      drive_url:link,
      original_url:link,
      source:'google-drive'
    });
  }
  return photos;
}
function rdoFotoBuildGroups(raw=[]){
  const opts=rdoFotoImportOptions();
  const rdos=(DB.rdo||[]).filter(r=>(r.obra||'')===opts.obra);
  const rdoByDate=new Map(rdos.map(r=>[String(r.data||'').slice(0,10),r]));
  const grouped=new Map();
  raw.filter(p=>p.data&&p.data>=opts.start).forEach(photo=>{
    if(!grouped.has(photo.data)){
      const rdo=rdoByDate.get(photo.data)||null;
      grouped.set(photo.data,{data:photo.data,rdo,rdoId:rdo?.id||'',rdoNumero:rdo?.rdo_numero||'',fotos:[],novas:[],duplicadas:[],semRdo:[],atividadeSugestao:'',atividadeStatus:''});
    }
    grouped.get(photo.data).fotos.push(photo);
  });
  const sheetSeen=new Set();
  grouped.forEach(group=>{
    if(!group.rdo){group.semRdo=[...group.fotos];return;}
    const existing=new Set((group.rdo.fotos||[]).map(rdoFotoKey).filter(Boolean));
    group.fotos.forEach(photo=>{
      const key=rdoFotoKey(photo);
      const scoped=`${group.rdoId}:${key}`;
      if(existing.has(key)||sheetSeen.has(scoped))group.duplicadas.push(photo);
      else{group.novas.push(photo);sheetSeen.add(scoped);}
    });
    group.atividadeSugestao=rdoFotoActivitySuggestion(group.fotos);
    if(!opts.atividades)group.atividadeStatus='desativado';
    else if(!group.atividadeSugestao)group.atividadeStatus='sem-legendas';
    else if(String(group.rdo?.atividades||'').trim()&&opts.protegerAtividades)group.atividadeStatus='protegida';
    else group.atividadeStatus='atualizar';
  });
  return [...grouped.values()].sort((a,b)=>a.data.localeCompare(b.data));
}

  return`<table><thead><tr><th>Data</th><th>RDO</th><th>Fotos na planilha</th><th>Novas</th><th>Duplicadas</th><th>Sem RDO</th><th>Atividades</th><th>Status</th></tr></thead><tbody>${groups.map(g=>{
    const status=!g.rdo?'<span class="tag" style="color:#f87171">Sem RDO nesta data</span>':g.novas.length?'<span class="tag" style="color:#34d399">Pronto para anexar</span>':'<span class="tag">Nada novo</span>';
    const atividadeTag=g.atividadeStatus==='atualizar'?'<span class="tag" style="color:#60a5fa">Gerar rascunho</span>':g.atividadeStatus==='protegida'?'<span class="tag">Já preenchida</span>':g.atividadeStatus==='sem-legendas'?'<span class="tag">Sem legenda</span>':g.atividadeStatus==='desativado'?'<span class="tag">Desativado</span>':'<span class="tag">—</span>';
    return`<tr><td>${fmtD(g.data)}</td><td>${g.rdo?`RDO Nº ${esc(g.rdoNumero||'—')}`:'—'}</td><td><strong>${g.fotos.length}</strong></td><td style="color:#34d399;font-weight:800">${g.novas.length}</td><td style="color:#fbbf24;font-weight:800">${g.duplicadas.length}</td><td style="color:#f87171;font-weight:800">${g.semRdo.length}</td><td>${atividadeTag}</td><td>${status}</td></tr>`;
  }).join('')}</tbody></table><div style="padding:10px 12px;color:var(--text3);font-size:12px;border-top:1px solid var(--border)">Prévia: ${total} foto(s) · ${novas} nova(s) para anexar · ${duplicadas} duplicada(s) ignorada(s) · ${semRdo} sem RDO correspondente · ${atividades} RDO(s) com rascunho de atividades. Nada será excluído.</div>`;
}
window._refreshRDOFotoImportPreview=()=>{
  const target=document.getElementById('m-rdo-foto-import-preview');
  if(!target||!window._rdoFotoImportRaw?.length)return;
  window._rdoFotoImportGroups=rdoFotoBuildGroups(window._rdoFotoImportRaw);
  target.innerHTML=rdoFotoPreviewHtml(window._rdoFotoImportGroups);
};
window._previewRDOFotoImport=async(file)=>{
  const target=document.getElementById('m-rdo-foto-import-preview');
  if(!target)return;
  if(!file){target.innerHTML='<div style="padding:14px;color:var(--text3);font-size:13px">Selecione a planilha para ver a prévia.</div>';return;}
  if(!window.XLSX){toast('Leitor de planilha não carregado. Atualize a página.','#ef4444');return;}
  try{
    target.innerHTML='<div style="padding:14px;color:var(--text3);font-size:13px">Lendo links do Drive...</div>';
    const buf=await file.arrayBuffer();
    const wb=window.XLSX.read(buf,{type:'array',cellDates:true});
    const sheetName=wb.SheetNames.includes('Índice de Fotos')?'Índice de Fotos':(wb.SheetNames.includes('Indice de Fotos')?'Indice de Fotos':wb.SheetNames[0]);
    window._rdoFotoImportRaw=rdoFotoParseSheet(wb.Sheets[sheetName]);
    window._rdoFotoImportGroups=rdoFotoBuildGroups(window._rdoFotoImportRaw);
    target.innerHTML=rdoFotoPreviewHtml(window._rdoFotoImportGroups);
  }catch(err){
    console.error(err);
    window._rdoFotoImportRaw=[];
    window._rdoFotoImportGroups=[];
    target.innerHTML=`<div style="padding:14px;color:#f87171;font-size:13px">Não consegui ler a planilha: ${esc(err.message||err)}</div>`;
  }
};
window._importRDOFotosPlanilha=async(event)=>{
  event?.stopPropagation?.();
  const file=document.getElementById('m-rdo-foto-import-file')?.files?.[0];
  if(!file){toast('Selecione a planilha antes de importar.','#ef4444');return;}
  if(!window._rdoFotoImportRaw?.length)await window._previewRDOFotoImport(file);
  const groups=rdoFotoBuildGroups(window._rdoFotoImportRaw||[]);
  const opts=rdoFotoImportOptions();
  const updates=groups.map(group=>{
    const current=(DB.rdo||[]).find(r=>r.id===group.rdoId);
    if(!current)return null;
    const existing=new Set((current.fotos||[]).map(rdoFotoKey).filter(Boolean));
    const nextFotos=[];
    group.fotos.forEach(photo=>{
      const key=rdoFotoKey(photo);
      if(key&&!existing.has(key)){
        nextFotos.push(photo);
        existing.add(key);
      }
    });
    let atividades=null;
    const suggestion=rdoFotoActivitySuggestion(group.fotos);
    const currentAtiv=String(current.atividades||'').trim();
    if(opts.atividades&&suggestion){
      if(!currentAtiv)atividades=suggestion;
      else if(!opts.protegerAtividades&&!currentAtiv.includes(suggestion.slice(0,40)))atividades=`${currentAtiv}\n\n${suggestion}`;
    }
    return(nextFotos.length||atividades!=null)?{rdo:current,nextFotos,atividades}:null;
  }).filter(Boolean);
  const count=updates.reduce((s,u)=>s+u.nextFotos.length,0);
  const ativCount=updates.filter(u=>u.atividades!=null).length;
  if(!count&&!ativCount){toast('Nenhuma foto nova ou atividade para atualizar.','#f59e0b');return;}
  if(!confirm(`Anexar ${count} foto(s) nova(s) e atualizar atividades de ${ativCount} RDO(s)? Links duplicados serão ignorados.`))return;
  const btn=document.querySelector('.modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Anexando...';}
  const results=await Promise.all(updates.map(u=>{
    const fotos=[...(u.rdo.fotos||[]),...u.nextFotos];
    const patch={fotos};
    if(u.atividades!=null)patch.atividades=u.atividades;
    return sb.from('rdo').update(patch).eq('id',u.rdo.id).then(res=>({res,u,patch}));
  }));
  const failed=results.find(item=>item.res.error);
  if(failed){
    if(btn){btn.disabled=false;btn.textContent='Anexar fotos';}
    toast('Erro ao anexar fotos: '+failed.res.error.message,'#ef4444');
    return;
  }
  DB.rdo=(DB.rdo||[]).map(r=>{
    const saved=results.find(item=>item.u.rdo.id===r.id);
    return saved?{...r,...saved.patch}:r;
  });
  toast(`${count} foto(s) anexada(s) e ${ativCount} atividade(s) atualizada(s)!`,'#22c55e');
  _closeModal();
  renderApp();
};

// ─── RENDER APP ───────────────────────────────────────────────────────────
// ─── ONLINE PRESENCE ──────────────────────────────────────────────────────
let _onlineUsers = {};
let _presenceChannel = null;

function setupPresence(){
  if(!currentUser) return;
  const userName = currentUser.email.split('@')[0];
  if(_presenceChannel){
    try{sb.removeChannel(_presenceChannel);}catch(_){}
    _presenceChannel=null;
  }
  const channel = sb.channel('online-users', {config:{presence:{key: currentUser.id}}});
  _presenceChannel=channel;
  channel
    .on('presence', {event:'sync'}, ()=>{
      const state = channel.presenceState();
      _onlineUsers = {};
      Object.values(state).forEach(presences=>{
        presences.forEach(p=>{if(p.name)_onlineUsers[p.name]=p;});
      });
      updateOnlinePresenceUI();
    })
    .subscribe(async status=>{
      if(status === 'SUBSCRIBED'){
        await channel.track({name: userName, at: Date.now()});
        _onlineUsers[userName]={name:userName,at:Date.now()};
        updateOnlinePresenceUI();
      }
    });
}

function getOnlineUsers(){
  const map={..._onlineUsers};
  if(currentUser){
    const userName=currentUser.email.split('@')[0];
    if(userName&&!map[userName])map[userName]={name:userName,at:Date.now(),self:true};
  }
  return Object.values(map).filter(u=>u?.name).sort((a,b)=>String(a.name).localeCompare(String(b.name)));
}
function getOnlineInitials(name=''){
  const handle=String(name||'').split('@')[0].trim();
  const letters=handle.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'').slice(0,2);
  return (letters||'?').toUpperCase();
}
function renderOnlineUsers(){
  const users = getOnlineUsers();
  if(!users.length) return '';
  return users.slice(0,5).map(u=>`<div class="online-avatar" title="${esc(u.name)} (online)">${esc(getOnlineInitials(u.name))}</div>`).join('')
  + (users.length>5?`<div class="online-avatar online-more">+${users.length-5}</div>`:'');
}
function renderOnlineCount(){
  const n=getOnlineUsers().length;
  return n>0?`<span class="online-count-pill">${n} online</span>`:'';
}
function updateOnlinePresenceUI(){
  document.querySelectorAll('[data-online-users]').forEach(el=>{el.innerHTML=renderOnlineUsers();});
  document.querySelectorAll('[data-online-count]').forEach(el=>{el.innerHTML=renderOnlineCount();});
}

let _historyBootstrapped=false,_historyApplying=false,_lastHistoryKey='';
function compactModalData(data={}){
  const picked={};
  ['id','obra','ids'].forEach(key=>{if(data&&data[key]!=null)picked[key]=data[key];});
  return picked;
}
function createNavSnapshot(){
  return{
    page:S.page||'home',
    modulo:S.modulo||'obras',
    escritorioTab:S.escritorioTab||'financeiro',
    comprasTab:S.comprasTab||'pedidos',
    obra:S.obra||null,
    obraTab:S.obraTab||'aditivos',
    selectedAditivo:S.selectedAditivo||null,
    detailTab:S.detailTab||'info',
    almoxTab:S.almoxTab||'inventario',
    funcSection:S.funcSection||'equipe',
    modal:S.modal||null,
    modalData:compactModalData(S.modalData||{})
  };
}
function navSnapshotKey(snapshot=createNavSnapshot()){return JSON.stringify(snapshot);}
function applyNavSnapshot(snapshot={}){
  S={
    ...S,
    page:snapshot.page||'home',
    modulo:snapshot.modulo||'obras',
    escritorioTab:snapshot.escritorioTab||'financeiro',
    comprasTab:snapshot.comprasTab||'pedidos',
    obra:snapshot.obra||null,
    obraTab:snapshot.obraTab||'aditivos',
    selectedAditivo:snapshot.selectedAditivo||null,
    detailTab:snapshot.detailTab||'info',
    almoxTab:snapshot.almoxTab||'inventario',
    funcSection:snapshot.funcSection||'equipe',
    modal:snapshot.modal||null,
    modalData:snapshot.modalData||{}
  };
  if(S.page!=='obra'){S.selectedAditivo=null;}
  if(S.page==='dashboard'&&S.modulo!=='compras')S.comprasTab=S.comprasTab||'pedidos';
}
function syncAppHistory({replace=false}={}){
  if(_historyApplying||!currentUser)return;
  const snapshot=createNavSnapshot();
  const key=navSnapshotKey(snapshot);
  if(replace||!_historyBootstrapped){
    history.replaceState({__jet:true,snapshot},'',location.href);
    _historyBootstrapped=true;
    _lastHistoryKey=key;
    return;
  }
  if(key===_lastHistoryKey)return;
  history.pushState({__jet:true,snapshot},'',location.href);
  _lastHistoryKey=key;
}
window.addEventListener('popstate',event=>{
  if(!event.state?.__jet||!currentUser)return;
  _historyApplying=true;
  applyNavSnapshot(event.state.snapshot||{});
  renderApp();
  _historyApplying=false;
});

function renderApp(){
  if(!currentUser){renderAuth();return;}
  let content='';
  if(S.page==='home'){
    document.getElementById('root').innerHTML=renderHome()+renderModal();
    updateOnlinePresenceUI();
    applyMobileTableCards();
    syncAppHistory({replace:!_historyBootstrapped});
    return;
  }
  else if(S.page==='dashboard')content=renderDashboard();
  else if(S.page==='obra')content=renderObraInner();
  else if(S.page==='gerenciar-obras')content=renderGerenciarObras();

  document.getElementById('root').innerHTML=topbarHtml()+content+renderModal();
  updateOnlinePresenceUI();
  applyMobileTableCards();
  syncAppHistory({replace:!_historyBootstrapped});
}

window.addEventListener('resize',()=>{
  clearTimeout(window._mobileTableResize);
  window._mobileTableResize=setTimeout(()=>applyMobileTableCards(),80);
});

// ─── INIT ─────────────────────────────────────────────────────────────────
// Clear stale tab orders from localStorage (old versions had extra tabs)
try{Object.keys(localStorage).filter(k=>k.startsWith('jet-tab-order-')).forEach(k=>localStorage.removeItem(k));}catch{}
try{
  const customRaw=JSON.parse(localStorage.getItem('jet-obras')||'[]');
  const customClean=cleanObraList(customRaw);
  if(customClean.length!==customRaw.length)localStorage.setItem('jet-obras',JSON.stringify(customClean));
  const hiddenRaw=JSON.parse(localStorage.getItem('jet-obras-hidden')||'[]');
  const hiddenClean=cleanObraList(hiddenRaw);
  if(hiddenClean.length!==hiddenRaw.length)localStorage.setItem('jet-obras-hidden',JSON.stringify(hiddenClean));
  const dataRaw=JSON.parse(localStorage.getItem('jet-obras-data')||'[]');
  const dataClean=cleanObraData(dataRaw);
  if(dataClean.length!==dataRaw.length)localStorage.setItem('jet-obras-data',JSON.stringify(dataClean));
}catch{}

(async()=>{
  try{
    // Wait for Supabase to be ready
    if(typeof supabase==='undefined'){
      await new Promise(r=>{const check=()=>typeof supabase!=='undefined'?r():setTimeout(check,100);check();});
    }
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user){currentUser=session.user;await loadAll();setupRT();try{setupPresence();}catch(e){}renderApp();}
    else renderAuth();
    sb.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT'){currentUser=null;renderAuth();}
      else if(event==='SIGNED_IN'&&session?.user&&!currentUser){
        currentUser=session.user;S.page='home';loadAll().then(()=>{setupRT();try{setupPresence();}catch(e){}renderApp();});
      }
    });
  }catch(e){console.warn('[JET] Init error:',e);renderAuth();}
})();
</script>
<script>

let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  // Show install button in topbar after a delay
  setTimeout(() => {
    const btn = document.getElementById('pwa-install-btn');

window._installPWA = async () => {
  if(!_installPrompt) {
    toast('Para instalar: toque em "Compartilhar" → "Adicionar à Tela de Início"', '#60a5fa');
    return;
  }
  _installPrompt.prompt();
  const {outcome} = await _installPrompt.userChoice;
  if(outcome === 'accepted') {
    toast('✓ JET Obras instalado!', '#22c55e');
    document.getElementById('pwa-install-btn').style.display = 'none';
  }
  _installPrompt = null;

function applyTheme(theme){
  const html=document.documentElement;
  html.setAttribute('data-theme',theme);
  const themeColor=document.querySelector('meta[name="theme-color"]');
  if(themeColor)themeColor.setAttribute('content',theme==='light'?'#f3f6fb':'#07111f');
}
async function checkForAppUpdate(){
  if(!/^https?:$/i.test(location.protocol))return;
  if(_appUpdateCheckInFlight)return;
  _appUpdateCheckInFlight=true;
  try{
    const probeUrl=new URL(location.href);
    probeUrl.searchParams.set('jet_build_probe',Date.now());
    probeUrl.searchParams.delete('build');
    probeUrl.searchParams.delete('_refresh');
    const res=await fetch(probeUrl.toString(),{cache:'no-store',headers:{'cache-control':'no-cache','pragma':'no-cache'}});
    const html=await res.text();
    const match=html.match(/<meta name="jet-build" content="([^"]+)"/i);
    const remoteBuild=(match?.[1]||'').trim();
    if(!remoteBuild||remoteBuild===APP_BUILD_PLACEHOLDER||remoteBuild===APP_BUILD)return;
    requestAppUpdateReload(remoteBuild);
  }catch(err){
    console.warn('[JET] Verificação de atualização falhou:',err?.message||err);
  }finally{
    _appUpdateCheckInFlight=false;
  }
}

function isAppUpdateReloadSafe(){
  const active=document.activeElement;
  const isEditing=active&&['INPUT','TEXTAREA','SELECT'].includes(active.tagName);
  const hasModal=!!document.querySelector('.modal,.modal-backdrop,.modal-overlay,[role="dialog"]');
  return !isEditing&&!hasModal;
}
async function clearAppRuntimeCaches(){
  try{
    if(!('caches' in window))return;
    const keys=await caches.keys();
    await Promise.all(keys.map(k=>caches.delete(k)));
  }catch(err){
    console.warn('[JET] Limpeza de cache do app falhou:',err?.message||err);
  }
}
async function applyAppUpdateReload(remoteBuild){
  const reloadKey=`jet-build-reload:${remoteBuild}`;
  if(sessionStorage.getItem(reloadKey))return;
  sessionStorage.setItem(reloadKey,'1');
  await clearAppRuntimeCaches();
  const nextUrl=new URL(location.href);
  nextUrl.searchParams.set('build',remoteBuild);
  nextUrl.searchParams.set('_refresh',Date.now());
  toast('Nova versão encontrada. Atualizando automaticamente...','#60a5fa');
  setTimeout(()=>location.replace(nextUrl.pathname+nextUrl.search+nextUrl.hash),700);
}
function requestAppUpdateReload(remoteBuild){
  _pendingAppBuild=remoteBuild;
  if(isAppUpdateReloadSafe()){
    applyAppUpdateReload(remoteBuild);
    return;
  }
  toast('Nova versão pronta. Atualizo assim que você fechar o formulário.','#60a5fa');
  scheduleAppUpdateCheck(APP_UPDATE_RETRY_MS);
}
function tryPendingAppUpdateReload(){
  if(_pendingAppBuild&&isAppUpdateReloadSafe())applyAppUpdateReload(_pendingAppBuild);
}
function scheduleAppUpdateCheck(delay=800){
  clearTimeout(_appUpdateScheduleTimer);
  _appUpdateScheduleTimer=setTimeout(()=>checkForAppUpdate(),delay);
}

window._toggleTheme = () => {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('jet-theme', newTheme);
  renderApp();
};

// Carregar tema salvo ao iniciar
const savedTheme = localStorage.getItem('jet-theme') || 'dark';
applyTheme(savedTheme);
scheduleAppUpdateCheck(1200);
setInterval(()=>checkForAppUpdate(),APP_UPDATE_CHECK_MS);
window.addEventListener('focus',()=>scheduleAppUpdateCheck(500));
window.addEventListener('online',()=>scheduleAppUpdateCheck(500));
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden)scheduleAppUpdateCheck(500);
});
document.addEventListener('focusout',()=>setTimeout(tryPendingAppUpdateReload,500),true);
document.addEventListener('click',()=>setTimeout(tryPendingAppUpdateReload,500),true);

window.addEventListener('appinstalled', () => {
  toast('✓ App instalado com sucesso!', '#22c55e');
  _installPrompt = null;
});
