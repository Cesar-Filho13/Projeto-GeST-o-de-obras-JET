async function exportDespesaWorkbook(obra,month='all'){
  const rows=despesaRowsForExport(obra,month);
  if(!rows.length){toast('Nenhum lançamento para gerar a planilha.','#f59e0b');return;}
  if(!window.ExcelJS){return window._despExportXLSX(obra,month==='all'?'all':rows[0]?.data||'all');}
  const attachments=despesaAttachmentEntries(rows);
  const result=await buildDespesaPrestacaoWorkbookBuffer(obra,rows,{month,attachments});
  xlsxDownload(result.buffer,result.filename);
  toast(`Planilha gerada com aba de anexos (${attachments.length} arquivo(s)).`);
}
window._exportDespesaPackage=async(obra,month='all')=>{
  const rows=despesaRowsForExport(obra,month);
  if(!rows.length){toast('Nenhum lançamento para gerar a prestação.','#f59e0b');return;}
  const attachments=despesaAttachmentEntries(rows);
  if(!window.ExcelJS){return exportDespesaWorkbook(obra,month);}
  toast('Montando pacote de prestação...','#3b82f6');
  const result=await buildDespesaPrestacaoWorkbookBuffer(obra,rows,{month,attachments});
  if(!window.JSZip){xlsxDownload(result.buffer,result.filename);toast('Planilha gerada. Atualize a página se quiser o pacote ZIP.','#f59e0b');return;}
  const base=result.filename.replace(/\.xlsx$/,'');
  const zip=new window.JSZip();
  const root=zip.folder(base);
  root.file(result.filename,result.buffer);
  const anexos=root.folder('anexos');
  const indexLines=['Arquivo\tData\tDescrição\tValor\tTipo\tLink'];
  let ok=0;
  const failed=[];
  for(const entry of attachments){
    const valor=entry.row.tipo==='Adiantamento'?(Number(entry.row.movimento_adiantamento)||Number(entry.row.saldo)||0):(Number(entry.row.valor_conta)||0);
    indexLines.push([entry.name,fmtD(entry.row.data),entry.row.descricao||'',fmtV(valor),entry.row.tipo||'Despesa',entry.url||''].join('\t'));
    if(!entry.url)continue;
    try{
      const resp=await fetch(entry.url,{mode:'cors',credentials:'omit',cache:'no-store'});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const blob=await resp.blob();
      anexos.file(entry.name,blob);
      ok++;
    }catch(err){
      console.warn('[JET] Anexo não incluído no ZIP:',entry.name,err);
      failed.push(entry);
    }
  }
  root.file('indice_anexos.txt','\uFEFF'+indexLines.join('\n'));
  if(failed.length)root.file('links_anexos_nao_baixados.txt','\uFEFF'+failed.map(a=>`${a.name}\n${a.url}`).join('\n\n'));
  const blob=await zip.generateAsync({type:'blob'});
  downloadBinaryBlob(blob,`${base}.zip`);
  toast(`Pacote ZIP gerado: ${ok}/${attachments.length} anexo(s) incluído(s).`,'#22c55e');
};
const DESPESA_IMPORT_ALLOWED_EXTS=['pdf','png','jpg','jpeg','webp','gif','doc','docx','xls','xlsx','csv','txt'];
window._despesaImportState={file:null,rawDrafts:[],drafts:[],zipFiles:new Map(),fileName:'',errors:[]};
function despImportTextKey(value=''){
  return stripAccents(String(value||'')).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
function despImportMoney(value){
  if(value==null||value==='')return null;
  if(typeof value==='number'&&Number.isFinite(value))return value;
  const parsed=moneyNumber(value);
  return parsed==null?null:parsed;
}
function despImportISO(value){
  if(!value&&value!==0)return'';
  if(value instanceof Date&&!isNaN(value))return value.toISOString().slice(0,10);
  if(typeof value==='number'&&Number.isFinite(value)){
    const date=new Date(Math.round((value-25569)*86400*1000));
    return isNaN(date)?'':date.toISOString().slice(0,10);
  }
  const text=String(value||'').trim();
  if(!text)return'';
  const iso=text.match(/(20\d{2})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(iso)return`${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  const br=text.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](20\d{2})/);
  if(br)return`${br[3]}-${br[2].padStart(2,'0')}-${br[1].padStart(2,'0')}`;
  const parsed=new Date(text);
  return isNaN(parsed)?'':parsed.toISOString().slice(0,10);
}
function despImportBasename(path=''){
  return String(path||'').replace(/\\/g,'/').split('/').filter(Boolean).pop()||'';
}
function despImportFileKey(path=''){
  return despImportTextKey(despImportBasename(path)).replace(/\s+/g,'');
}
function despImportMime(name=''){
  const ext=getExt(String(name||''));
  if(['jpg','jpeg'].includes(ext))return'image/jpeg';
  if(ext==='png')return'image/png';
  if(ext==='webp')return'image/webp';
  if(ext==='gif')return'image/gif';
  if(ext==='pdf')return'application/pdf';
  if(ext==='xlsx')return'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  if(ext==='xls')return'application/vnd.ms-excel';
  return'application/octet-stream';
}
function despImportCell(row,index){return Array.isArray(row)?(row[index]??''):'';}
function despImportMainSheetName(workbook){
  return workbook.SheetNames.find(name=>!/foto|nf|nota|anexo|comprov/i.test(name))||workbook.SheetNames[0];
}
function despImportPhotoSheetName(workbook){
  return workbook.SheetNames.find(name=>/foto|nf|nota|anexo|comprov/i.test(name))||'';
}
function despImportAOA(workbook,sheetName){
  if(!sheetName||!workbook.Sheets[sheetName])return[];
  return XLSX.utils.sheet_to_json(workbook.Sheets[sheetName],{header:1,defval:'',raw:true,cellDates:true});
}
function despImportFindHeaderRow(rows=[]){
  return rows.findIndex(row=>{
    const norm=despImportTextKey((row||[]).slice(0,8).join(' '));
    return norm.includes('data')&&norm.includes('descricao')&&norm.includes('valor');
  });
}
function despImportSummaryLabel(row=[]){
  const label=despImportTextKey([despImportCell(row,0),despImportCell(row,1)].join(' '));
  return /^(total de despesas|total de creditos|total de créditos|tarifa|abatimento|saldo total|saldo final)$/.test(label)||/total de despesas|total de creditos|total de créditos|tarifa pix|saldo final/.test(label);
}
function despImportAttachmentRows(workbook,zipFiles){
  const sheetName=despImportPhotoSheetName(workbook);
  const rows=despImportAOA(workbook,sheetName);
  const header=rows.findIndex(row=>despImportTextKey((row||[]).join(' ')).includes('arquivo')&&despImportTextKey((row||[]).join(' ')).includes('data'));
  if(header<0)return[];
  return rows.slice(header+1).map(row=>{
    const name=String(despImportCell(row,0)||'').trim();
    if(!name)return null;
    const data=despImportISO(despImportCell(row,1));
    const descricao=String(despImportCell(row,2)||'').trim();
    const valor=despImportMoney(despImportCell(row,3));
    const tipo=/adiant/i.test(String(despImportCell(row,4)||''))?'Adiantamento':'Despesa';
    const file=zipFiles?.get(despImportFileKey(name))||null;
    return{name,data,descricao,valor,tipo,file,keyExact:[data,tipo,valor!=null?valor.toFixed(2):'',despImportTextKey(descricao)].join('|'),keyLoose:[data,tipo,valor!=null?valor.toFixed(2):''].join('|')};
  }).filter(Boolean);
}
function despImportAttachFiles(draft,attachments=[],used=new Set()){
  const value=draft.tipo==='Adiantamento'?(draft.importCredit??draft.valor_adiantamento):draft.valor_conta;
  const exact=[draft.data,draft.tipo,value!=null?Number(value).toFixed(2):'',despImportTextKey(draft.descricao)].join('|');
  const loose=[draft.data,draft.tipo,value!=null?Number(value).toFixed(2):''].join('|');
  let matches=attachments.filter(a=>a.file&&!used.has(a.name)&&a.keyExact===exact);
  if(!matches.length)matches=attachments.filter(a=>a.file&&!used.has(a.name)&&a.keyLoose===loose);
  if(!matches.length){
    const desc=despImportTextKey(draft.descricao);
    matches=attachments.filter(a=>a.file&&!used.has(a.name)&&a.tipo===draft.tipo&&a.valor!=null&&value!=null&&Math.abs(Number(a.valor)-Number(value))<0.01&&despImportTextKey(a.descricao)===desc);
  }
  matches.forEach(a=>used.add(a.name));
  return matches.map(a=>a.file).filter(Boolean);
}
function despImportDuplicateKey(item){
  const value=item.tipo==='Adiantamento'?item.valor_adiantamento:item.valor_conta;
  return[item.obra,item.data,despImportTextKey(item.descricao),despImportTextKey(item.loja),despImportTextKey(item.nfe),item.tipo,value!=null?Number(value).toFixed(2):''].join('|');
}
function despImportBuildDrafts(workbook,zipFiles,obra,responsavel){
  const mainName=despImportMainSheetName(workbook);
  const rows=despImportAOA(workbook,mainName);
  const header=despImportFindHeaderRow(rows);
  if(header<0)throw new Error('Não encontrei o cabeçalho esperado: Data, Descrição e Valor.');
  const attachments=despImportAttachmentRows(workbook,zipFiles);
  const drafts=[];
  const usedFiles=new Set();
  let running=0;
  let lastDate='';
  for(let i=header+1;i<rows.length;i++){
    const row=rows[i]||[];
    if(despImportSummaryLabel(row))break;
    const rawDate=despImportCell(row,0);
    const desc=String(despImportCell(row,1)||'').trim();
    const nfe=String(despImportCell(row,2)||'').trim();
    const loja=String(despImportCell(row,3)||'').trim();
    const valorConta=despImportMoney(despImportCell(row,4));
    const rawSaldo=despImportMoney(despImportCell(row,5));
    const hasCore=!!(rawDate||desc||nfe||loja||valorConta!=null);
    if(!hasCore&&rawSaldo!=null&&drafts.length&&drafts[drafts.length-1].tipo==='Adiantamento'){
      drafts[drafts.length-1].valor_adiantamento=Number(rawSaldo)||0;
      running=Number(rawSaldo)||running;
      continue;
    }
    if(!hasCore)continue;
    const headerLike=despImportTextKey(row.join(' '));
    if(headerLike.includes('conta bancaria')||headerLike==='valor adiantamento')continue;
    let data=despImportISO(rawDate)||lastDate;
    if(!data)continue;
    lastDate=data;
    let tipo=(valorConta!=null&&Math.abs(valorConta)>0.0001)?'Despesa':'Adiantamento';
    let derivedValorConta=valorConta;
    let importCredit=null;
    if(tipo==='Adiantamento'){
      const prevRunning=Number(running)||0;
      const nextRow=rows[i+1]||[];
      const nextSaldo=despImportMoney(despImportCell(nextRow,5));
      const nextHasCore=!!(despImportCell(nextRow,0)||String(despImportCell(nextRow,1)||'').trim()||String(despImportCell(nextRow,2)||'').trim()||String(despImportCell(nextRow,3)||'').trim()||despImportMoney(despImportCell(nextRow,4))!=null);
      const hasBridgeSaldo=!nextHasCore&&nextSaldo!=null;
      if(hasBridgeSaldo){
        // Modelo antigo: a linha do adiantamento traz o crédito e a linha seguinte em branco traz o saldo.
        const saldoAtual=Number(nextSaldo);
        const diff=saldoAtual-prevRunning;
        if(diff<-.005){
          tipo='Despesa';
          derivedValorConta=Math.abs(diff);
          importCredit=null;
          running=saldoAtual;
        }else if(Math.abs(diff)<=.005&&(loja||nfe||isGenericAdiantamentoDesc(desc))){
          i++;
          continue;
        }else{
          importCredit=rawSaldo!=null?Number(rawSaldo):Math.max(0,diff);
          running=saldoAtual||prevRunning+importCredit;
        }
        i++;
      }else{
        // Exportação atual do sistema: a coluna F já é o saldo acumulado.
        const saldoAtual=rawSaldo!=null?Number(rawSaldo):prevRunning;
        const diff=saldoAtual-prevRunning;
        if(diff<-.005){
          tipo='Despesa';
          derivedValorConta=Math.abs(diff);
          importCredit=null;
          running=saldoAtual;
        }else if(Math.abs(diff)<=.005&&(loja||nfe||isGenericAdiantamentoDesc(desc))){
          continue;
        }else{
          importCredit=Math.max(0,diff);
          running=saldoAtual;
        }
      }
    }else{
      running=rawSaldo!=null?Number(rawSaldo):(running-(Number(valorConta)||0));
    }
    const finalDesc=tipo==='Despesa'&&isGenericAdiantamentoDesc(desc)&&(loja||nfe)?`Despesa - ${loja||nfe}`:(desc||'Lançamento importado');
    const draft={
      id:uid(),obra,data,descricao:finalDesc,nfe,loja,
      valor_conta:tipo==='Despesa'?(Number(derivedValorConta)||0):null,
      valor_adiantamento:Number(running)||0,tipo,responsavel:responsavel||despesaExportResponsible(),
      importCredit,sourceRow:i+1,files:[]
    };
    draft.files=despImportAttachFiles(draft,attachments,usedFiles);
    drafts.push(draft);
  }
  return{drafts,attachments,mainName};
}
async function despImportReadPackage(file){
  if(!file)throw new Error('Selecione um arquivo .xlsx ou .zip.');
  if(!window.XLSX)throw new Error('Biblioteca de planilhas ainda não carregou. Atualize a página e tente novamente.');
  const ext=getExt(file.name||'');
  const zipFiles=new Map();
  let workbookBuffer=null;
  if(ext==='zip'){
    if(!window.JSZip)throw new Error('Biblioteca ZIP ainda não carregou. Atualize a página e tente novamente.');
    const zip=await window.JSZip.loadAsync(await file.arrayBuffer());
    const entries=Object.values(zip.files||{});
    const xlsxEntry=entries.find(entry=>!entry.dir&&!/^~\$/.test(despImportBasename(entry.name))&&/\.xlsx?$/i.test(entry.name));
    if(!xlsxEntry)throw new Error('Não encontrei uma planilha .xlsx dentro do ZIP.');
    workbookBuffer=await xlsxEntry.async('arraybuffer');
    for(const entry of entries){
      if(entry.dir||entry===xlsxEntry)continue;
      const name=despImportBasename(entry.name);
      const extName=getExt(name);
      if(!name||!DESPESA_IMPORT_ALLOWED_EXTS.includes(extName))continue;
      const blob=await entry.async('blob');
      const importedFile=new File([blob],name,{type:blob.type||despImportMime(name),lastModified:Date.now()});
      zipFiles.set(despImportFileKey(name),importedFile);
    }
  }else{
    workbookBuffer=await file.arrayBuffer();
  }
  const workbook=XLSX.read(workbookBuffer,{type:'array',cellDates:true,cellFormula:true,cellNF:false,cellText:false});
  return{workbook,zipFiles,fileName:file.name};
}
function despImportMarkDuplicates(rawDrafts=[],obra){
  const existing=new Set((DB.despesas||[]).filter(d=>d.obra===obra).map(d=>despImportDuplicateKey({...d,obra})));
  const seen=new Set();
  return rawDrafts.map(draft=>{
    const row={...draft,obra};
    const key=despImportDuplicateKey(row);
    const duplicateExisting=existing.has(key);
    const duplicateImport=seen.has(key);
    seen.add(key);
    return{...row,duplicateExisting,duplicateImport,duplicate:duplicateExisting||duplicateImport};
  });
}
function despImportPreviewHtml(state=window._despesaImportState){
  const box=document.getElementById('m-desp-import-preview');
  if(!box)return;
  const skipDup=document.getElementById('m-desp-import-skip-duplicates')?.checked!==false;
  const uploadFiles=document.getElementById('m-desp-import-upload-files')?.checked!==false;
  const drafts=state.drafts||[];
  const toImport=drafts.filter(d=>!(skipDup&&d.duplicate));
  const dup=drafts.length-toImport.length;
  const fileCount=uploadFiles?toImport.reduce((sum,d)=>sum+(d.files?.length||0),0):0;
  if(state.errors?.length){box.innerHTML=`<div style="padding:14px;color:#ef4444;font-size:13px">${state.errors.map(esc).join('<br>')}</div>`;return;}
  if(!drafts.length){box.innerHTML='<div style="padding:14px;color:var(--text3);font-size:13px">Nenhum lançamento encontrado para importar.</div>';return;}
  const sample=toImport.slice(0,80).map((d,idx)=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 10px;color:var(--text3);font-size:11px">${d.sourceRow}</td><td style="padding:8px 10px;white-space:nowrap">${fmtD(d.data)}</td><td style="padding:8px 10px;min-width:220px">${esc(d.descricao)}</td><td style="padding:8px 10px">${esc(d.loja||'')}</td><td style="padding:8px 10px;text-align:right;white-space:nowrap">${d.tipo==='Adiantamento'?fmtV(d.importCredit||d.valor_adiantamento):fmtV(d.valor_conta)}</td><td style="padding:8px 10px;text-align:right;white-space:nowrap">${fmtV(d.valor_adiantamento)}</td><td style="padding:8px 10px;text-align:center">${d.files?.length||0}</td><td style="padding:8px 10px"><span class="tag" style="color:${d.duplicate?'#f59e0b':'#22c55e'}">${d.duplicate?'Duplicado':'Novo'}</span></td></tr>`).join('');
  box.innerHTML=`<div style="padding:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap"><span class="tag">${drafts.length} lido(s)</span><span class="tag" style="color:#22c55e">${toImport.length} para importar</span><span class="tag" style="color:#f59e0b">${dup} duplicado(s)</span><span class="tag" style="color:#60a5fa">${fileCount} anexo(s)</span></div><table style="width:100%;border-collapse:collapse;min-width:860px"><thead><tr style="border-bottom:1px solid var(--border)"><th style="padding:8px 10px;text-align:left">Linha</th><th style="padding:8px 10px;text-align:left">Data</th><th style="padding:8px 10px;text-align:left">Descrição</th><th style="padding:8px 10px;text-align:left">Loja</th><th style="padding:8px 10px;text-align:right">Valor</th><th style="padding:8px 10px;text-align:right">Saldo</th><th style="padding:8px 10px;text-align:center">Anexos</th><th style="padding:8px 10px;text-align:left">Status</th></tr></thead><tbody>${sample}</tbody></table>${toImport.length>80?`<div style="padding:10px;color:var(--text3);font-size:12px">Mostrando 80 de ${toImport.length} lançamentos.</div>`:''}`;
}
window._refreshDespesaImportPreview=()=>{
  const state=window._despesaImportState;
  const obra=document.getElementById('m-desp-import-obra')?.value?.trim()||S.obra||'';
  state.drafts=despImportMarkDuplicates(state.rawDrafts||[],obra);
  despImportPreviewHtml(state);
};
window._previewDespesaImportFile=async(file)=>{
  const state=window._despesaImportState={file:null,rawDrafts:[],drafts:[],zipFiles:new Map(),fileName:file?.name||'',errors:[]};
  const box=document.getElementById('m-desp-import-preview');
  if(box)box.innerHTML='<div style="padding:14px;color:var(--text3);font-size:13px">Lendo planilha e anexos...</div>';
  try{
    const obra=document.getElementById('m-desp-import-obra')?.value?.trim()||S.obra||'';
    const responsavel=document.getElementById('m-desp-import-resp')?.value?.trim()||despesaExportResponsible();
    const pack=await despImportReadPackage(file);
    const parsed=despImportBuildDrafts(pack.workbook,pack.zipFiles,obra,responsavel);
    state.file=file;state.rawDrafts=parsed.drafts;state.zipFiles=pack.zipFiles;state.fileName=pack.fileName;state.mainName=parsed.mainName;state.attachments=parsed.attachments;
    window._despesaImportState=state;
    window._refreshDespesaImportPreview();
  }catch(err){
    console.error('[JET] Falha na importação de despesas:',err);
    state.errors=[err?.message||'Erro ao ler a prestação.'];
    despImportPreviewHtml(state);
  }
};
window._importDespesasPrestacao=async(event)=>{
  if(event?.preventDefault)event.preventDefault();
  const file=document.getElementById('m-desp-import-file')?.files?.[0]||window._despesaImportState?.file;
  if(!file){toast('Selecione a planilha ou o ZIP da prestação.','#ef4444');return;}
  if(!window._despesaImportState?.rawDrafts?.length)await window._previewDespesaImportFile(file);
  window._refreshDespesaImportPreview();
  const skipDup=document.getElementById('m-desp-import-skip-duplicates')?.checked!==false;
  const uploadFiles=document.getElementById('m-desp-import-upload-files')?.checked!==false;
  const rows=(window._despesaImportState.drafts||[]).filter(d=>!(skipDup&&d.duplicate));
  if(!rows.length){toast('Nada novo para importar. Os lançamentos parecem duplicados.','#f59e0b');return;}
  const payload=rows.map(d=>({id:d.id,obra:d.obra,data:d.data,descricao:d.descricao,nfe:d.nfe||'',loja:d.loja||'',valor_conta:d.valor_conta==null?null:Number(d.valor_conta),valor_adiantamento:Number(d.valor_adiantamento)||0,tipo:d.tipo||'Despesa',responsavel:d.responsavel||''}));
  toast(`Importando ${payload.length} lançamento(s)...`,'#3b82f6');
  const{error}=await sb.from('despesas').insert(payload);
  if(error){toast('Erro ao importar: '+error.message,'#ef4444');return;}
  DB.despesas.push(...payload);
  DB.despesas.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  let attached=0;
  if(uploadFiles){
    for(const draft of rows){
      if(draft.files?.length){await saveDespesaFilesForId(draft.id,draft.files);attached+=draft.files.length;}
    }
  }
  toast(`Prestação importada: ${payload.length} lançamento(s)${attached?` e ${attached} anexo(s)`:''}.`,'#22c55e');
  _closeModal();
};
window._despExportXLSX=(obra,dt)=>{
  const items=dt==='all'?DB.despesas.filter(d=>d.obra===obra):DB.despesas.filter(d=>d.obra===obra&&d.data===dt);
  const totalConta=items.reduce((s,d)=>s+(Number(d.valor_conta)||0),0);
  const totalAdiant=items.reduce((s,d)=>s+(Number(d.valor_adiantamento)||0),0);
  return exportStyledXLSX({
    sheetName:'Despesas',
    filename:`Despesas_${obra.replace(/\s+/g,'_')}_${dt==='all'?'total':dt}`,
    title:'Adiantamento de Despesas',
    meta:[obra,`Responsável: ${currentUser?.email?.split('@')[0]||''}`,dt==='all'?'Todos os lançamentos':fmtD(dt),`Conta: ${fmtV(totalConta)}   •   Adiantamento: ${fmtV(totalAdiant)}`],
    columns:[{header:'Data',key:'data',width:14},{header:'Descrição',key:'descricao',width:32},{header:'NFe Nº',key:'nfe',width:14},{header:'Loja / Fornecedor',key:'loja',width:24},{header:'Conta Bancária (R$)',key:'valor_conta',width:18,align:'right',type:'currency'},{header:'Adiantamento (R$)',key:'valor_adiantamento',width:18,align:'right',type:'currency'},{header:'Tipo',key:'tipo',width:16,badgeMap:XLSX_DESP_TIPO_MAP}],
    rows:items.map(d=>({data:fmtD(d.data),descricao:d.descricao||'',nfe:d.nfe||'',loja:d.loja||'',valor_conta:d.valor_conta||'',valor_adiantamento:d.valor_adiantamento||'',tipo:d.tipo||'Despesa'}))

};

window._despExportPDF=(obra,dt)=>{
  if(!window.jspdf){toast('Carregando...','#f59e0b');return;}
  const items=dt==='all'?DB.despesas.filter(d=>d.obra===obra):DB.despesas.filter(d=>d.obra===obra&&d.data===dt);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,M=14;
  // Logo circle (JET)
  doc.setFillColor(26,46,107);doc.circle(M+10,18,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  doc.text('JET',M+10,21,{align:'center'});
  // Title
  doc.setFontSize(14);doc.setTextColor(20,20,20);
  doc.text(currentUser?.email?.split('@')[0]||'',M+26,16);
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text(`${obra} · ${dt==='all'?'Todos os lançamentos':fmtD(dt)}`,M+26,22);
  // Summary boxes
  const totalCB=items.reduce((s,d)=>s+(Number(d.valor_conta)||0),0);
  const totalAd=items.reduce((s,d)=>s+(Number(d.valor_adiantamento)||0),0);
  const saldo=totalAd-totalCB;
  [[`CB: ${fmtV(totalCB)}`,30],[`Adiant: ${fmtV(totalAd)}`,90],[`Saldo: ${fmtV(saldo)}`,150]].forEach(([txt,x])=>{
    doc.setFillColor(saldo<0&&txt.includes('Saldo')?60:240,saldo<0&&txt.includes('Saldo')?20:245,saldo<0&&txt.includes('Saldo')?20:255);
    doc.roundedRect(M+x,26,60,8,2,2,'F');
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(saldo<0&&txt.includes('Saldo')?200:50,saldo<0&&txt.includes('Saldo')?50:60,saldo<0&&txt.includes('Saldo')?50:120);
    doc.text(txt,M+x+30,31,{align:'center'});
  });
  // Table
  doc.autoTable({
    startY:37,margin:{left:M,right:M},
    head:[['Data','Descrição','NFe Nº','Loja / Fornecedor','Conta Bancária','Adiantamento']],
    body:[...items.map(d=>[
      d.data?new Date(d.data+'T12:00:00').toLocaleDateString('pt-BR'):'',
      d.descricao||'',d.nfe||'',d.loja||'',
      d.valor_conta?fmtV(d.valor_conta):'',
      d.valor_adiantamento?{content:fmtV(d.valor_adiantamento),styles:{textColor:d.tipo==='Adiantamento'?[0,140,60]:[180,130,0],fontStyle:d.tipo==='Adiantamento'?'bold':'normal'}}:''
    ]),
    ['','','','TOTAL',{content:fmtV(totalCB),styles:{fontStyle:'bold',textColor:[20,80,180]}},{content:fmtV(totalAd),styles:{fontStyle:'bold',textColor:[160,100,0]}}]],
    styles:{fontSize:8,cellPadding:3,textColor:[20,20,20]},
    headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,249,255]},
    columnStyles:{0:{cellWidth:22},2:{cellWidth:20},4:{cellWidth:32,halign:'right'},5:{cellWidth:32,halign:'right'}},
    tableLineColor:[210,215,240],tableLineWidth:.2,
    didDrawPage:(d)=>{doc.setFontSize(7);doc.setTextColor(160,160,160);doc.text(`JET Gestão de Obras · ${obra} · Pág ${d.pageNumber}`,148,207,{align:'center'});}
  });
  doc.save(`Despesas_${obra.replace(/\s+/g,'_')}_${dt==='all'?'total':dt}.pdf`);
  toast('PDF exportado!');
};

window._exportDespCSV=(obra)=>{
  const d=buildDespesaLedger(DB.despesas.filter(x=>x.obra===obra));
  exportCSV(d.map(x=>[x.data,fmtD(x.data),x.descricao||'',x.nfe||'',x.loja||'',x.valor_conta?fmtV(x.valor_conta):'',fmtV(x.saldo),x.tipo||'Despesa']),
    ['Data ISO','Data','Descrição','NFe Nº','Loja','Conta Bancária','Saldo','Tipo'],`Despesas_${obra}`);

window._exportDespXLSX=(obra)=>{

window._exportDespPDF=(obra)=>{
  if(!window.jspdf){toast('Carregando...','#f59e0b');return;}
  const{jsPDF}=window.jspdf;
  const d=buildDespesaLedger(DB.despesas.filter(x=>x.obra===obra));
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,M=14;
  // Header with logo style
  doc.setFillColor(26,46,107);doc.rect(0,0,W,20,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('JET',M+8,13,{align:'center'});
  doc.setFontSize(13);doc.text(`Adiantamento de Despesas — ${obra}`,M+22,13);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text(new Date().toLocaleDateString('pt-BR'),W-M,13,{align:'right'});
  // Table
  const totalConta=d.reduce((s,x)=>s+(Number(x.valor_conta)||0),0);
  const totalAdiant=d.reduce((s,x)=>s+(Number(x.movimento_adiantamento)||0),0);
  const saldoAtual=d.length?d[d.length-1].saldo:0;
  doc.autoTable({
    startY:24,margin:{left:M,right:M},
    head:[['Data','Descrição','NFe Nº','Loja','Conta Bancária','Saldo']],
    body:[...d.map(x=>[fmtD(x.data),x.descricao,x.nfe||'',x.loja||'',x.valor_conta?fmtV(x.valor_conta):'',fmtV(x.saldo)]),
      [{content:'TOTAL',colSpan:4,styles:{fontStyle:'bold',fillColor:[235,239,255]}},{content:fmtV(totalConta),styles:{fontStyle:'bold',halign:'right',fillColor:[235,239,255]}},{content:fmtV(saldoAtual),styles:{fontStyle:'bold',halign:'right',fillColor:[232,255,244],textColor:[15,156,114]}}]
    ],
    styles:{fontSize:9,cellPadding:3,textColor:[20,20,20]},
    headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,249,255]},
    columnStyles:{0:{cellWidth:22},2:{cellWidth:22},4:{cellWidth:32,halign:'right'},5:{cellWidth:32,halign:'right'}},
    tableLineColor:[200,210,240],tableLineWidth:.2,
    didParseCell:(data)=>{if(data.section==='body'&&data.column.index===5&&data.cell.raw&&data.cell.raw.startsWith('R$')&&d[data.row.index]?.tipo==='Adiantamento'){data.cell.styles.textColor=[180,120,0];data.cell.styles.fontStyle='bold';}},
    didDrawPage:(data)=>{doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`JET Gestão de Obras · ${obra} · Pág ${data.pageNumber}`,W/2,205,{align:'center'});}
  });
  doc.save(`Despesas_${obra.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('PDF exportado!');
};

)}" data-field="gerente" onblur="window._saveObraField(this)" onkeydown="if(event.key==='Enter')this.blur()"></div><div class="form-group" style="margin:0"><label>Outras Informações</label><input value="${esc(d.outros||'')}" placeholder="Contrato, prazo..." data-obra="${esc(obra)}" data-field="outros" onblur="window._saveObraField(this)" onkeydown="if(event.key==='Enter')this.blur()"></div></div></div>`;

window._archiveObra=async obra=>{
  if(!obra)return;
  if(!confirm(`Arquivar obra ${obra}? Ela sairá da tela inicial deste navegador.`))return;
  saveArchivedObras(uniqObras([...getArchivedObras(),obra]));
  saveHiddenObras(uniqObras([...getHiddenObras(),obra]));
  toast('Obra arquivada. Para restaurar, adicione a obra novamente pelo gerenciamento.','#f59e0b');
  renderApp();
};
window._addObra=async()=>{const i=document.getElementById('new-obra-input');if(!i)return;const v=i.value.trim();if(!v)return;const cur=getCustomObras();if(getAllObras().includes(v)){toast('Obra já existe.','#f59e0b');return;}saveCustomObras([...cur,v]);saveHiddenObras(getHiddenObras().filter(o=>o!==v));saveArchivedObras(getArchivedObras().filter(o=>o!==v));await saveRemoteObras([...(DB.obraRegistry||[]),v]);i.value='';renderApp();toast(`Obra "${v}" adicionada!`);};
window._saveObraField=el=>{setObraField(el.dataset.obra,el.dataset.field,el.value);};
window._renameObra=async el=>{
  const orig=el.dataset.orig,novo=el.value.trim();
  if(!novo||orig===novo)return;
  if(getAllObras().includes(novo)){toast('Nome já existe.','#f59e0b');el.value=orig;return;}
  await Promise.allSettled(OBRA_LINKED_TABLES.map(table=>sb.from(table).update({obra:novo}).eq('obra',orig)));
  OBRA_LINKED_TABLES.forEach(table=>{DB[table]=DB[table].map(row=>row?.obra===orig?{...row,obra:novo}:row);});
  const custom=getCustomObras().map(o=>o===orig?novo:o);
  const hidden=getHiddenObras().map(o=>o===orig?novo:o);
  const archived=getArchivedObras().map(o=>o===orig?novo:o);
  const obraData=getObrasData().map(o=>o?.nome===orig?{...o,nome:novo}:o);
  saveCustomObras(custom);
  saveHiddenObras(hidden);
  saveArchivedObras(archived);
  saveObrasData(obraData);
  await saveRemoteObras((DB.obraRegistry||[]).map(o=>o===orig?novo:o));
  el.dataset.orig=novo;
  toast('Obra renomeada!');
  renderApp();
};
window._delObra=obra=>{_showDelDialog(obra);};

let _delPendObra=null,_delPendMeta=null,_delTimer=null,_delUndo=null;
function _showDelDialog(obra){
  document.getElementById('del-dlg')?.remove();
  clearInterval(_delTimer);
  const linkedMap=buildObraDeleteMap(obra);
  const rows=Object.entries(linkedMap).filter(([,ids])=>ids.length);
  const total=linkedObraCount(linkedMap);
  let secs=3;
  const el=document.createElement('div');
  el.id='del-dlg';
  el.innerHTML=`<div class="delete-dialog-overlay"><div class="delete-dialog"><div class="delete-dialog-head"><div class="delete-dialog-icon">⚠</div><div class="delete-dialog-copy"><h3>Excluir obra</h3><div class="delete-dialog-name">${esc(obra)}</div><p>${total?`Os registros vinculados serão movidos para <strong>Sem obra</strong>, assim a obra deixa de aparecer na tela inicial sem perder histórico.`:`A obra será removida do gerenciamento e da tela inicial. Você ainda pode desfazer em seguida.`}</p></div></div><div class="delete-dialog-meta"><div class="delete-dialog-chip"><strong>${total}</strong> registro(s) vinculados</div><div class="delete-dialog-chip"><strong>${rows.length}</strong> área(s) afetada(s)</div></div>${rows.length?`<div class="delete-dialog-list">${rows.map(([table,ids])=>`<div class="delete-dialog-row"><span>${LINKED_TABLE_LABELS[table]||table}</span><strong>${ids.length}</strong></div>`).join('')}</div>`:`<div class="delete-dialog-list"><div class="delete-dialog-row"><span>Nenhum vínculo ativo</span><strong>Pronto para remover</strong></div></div>`}<div class="delete-dialog-timer"><div class="delete-dialog-ring"><svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"></circle><circle id="dl-ring" cx="36" cy="36" r="30" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="188.5" stroke-dashoffset="0" stroke-linecap="round"></circle></svg><div class="delete-dialog-ring-value" id="dl-num">${secs}</div></div><div class="delete-dialog-timer-copy"><strong>Confirmação em espera</strong><span id="dl-label">Aguarde ${secs} segundos para liberar a exclusão.</span></div></div><div class="delete-dialog-actions"><button class="btn btn-secondary" onclick="document.getElementById('del-dlg')?.remove();clearInterval(_delTimer)">Cancelar</button><button id="dl-btn" disabled class="btn btn-danger" style="opacity:.5;cursor:not-allowed">Excluir (${secs}s)</button></div></div></div>`;
  document.body.appendChild(el);
  _delPendObra=obra;
  _delPendMeta={linkedMap,total};
  _delTimer=setInterval(()=>{
    secs--;
    const num=document.getElementById('dl-num');
    const ring=document.getElementById('dl-ring');
    const label=document.getElementById('dl-label');
    const btn=document.getElementById('dl-btn');
    if(!num){clearInterval(_delTimer);return;}
    if(secs>0){
      num.textContent=secs;
      if(ring)ring.style.strokeDashoffset=188.5*(1-secs/3);
      if(label)label.textContent=`Aguarde ${secs} segundo${secs!==1?'s':''} para liberar a exclusão.`;
      if(btn)btn.textContent=`Excluir (${secs}s)`;
      return;
    }
    clearInterval(_delTimer);
    num.textContent='✓';
    num.style.color='#22c55e';
    if(ring){ring.style.strokeDashoffset=188.5;ring.style.stroke='#22c55e';}
    if(label)label.textContent='Pronto para confirmar. Você ainda poderá desfazer.';
    if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';btn.textContent='Confirmar exclusão';btn.onclick=()=>_execDel(obra,{linkedMap,total});}
  },1000);
}
async function _execDel(obraArg=null,metaArg=null){
  clearInterval(_delTimer);
  document.getElementById('del-dlg')?.remove();
  const obra=obraArg||_delPendObra;
  const meta=metaArg||_delPendMeta||{};
  if(!obra)return;
  const linkedMap=meta.linkedMap||buildObraDeleteMap(obra);
  const affectedTables=OBRA_LINKED_TABLES.filter(table=>(linkedMap[table]||[]).length);
  const results=await Promise.allSettled(affectedTables.map(table=>sb.from(table).update({obra:'Sem obra'}).in('id',linkedMap[table])));
  const failed=affectedTables.filter((table,index)=>results[index].status==='rejected'||results[index].value?.error);
  if(failed.length){toast('Não foi possível mover todos os vínculos da obra. Tente novamente.','#ef4444');return;}
  _delUndo={obra,linkedMap,wasCustom:getCustomObras().includes(obra),data:getObraData(obra),registryHad:(DB.obraRegistry||[]).includes(obra),hiddenHad:getHiddenObras().includes(obra)};
  OBRA_LINKED_TABLES.forEach(table=>{const ids=linkedMap[table]||[];if(ids.length)DB[table]=DB[table].map(row=>ids.includes(row.id)?{...row,obra:'Sem obra'}:row);});
  saveCustomObras(getCustomObras().filter(o=>o!==obra));
  saveObrasData(getObrasData().filter(o=>o?.nome!==obra));
  saveHiddenObras(uniqObras([...getHiddenObras(),obra]));
  await saveRemoteObras((DB.obraRegistry||[]).filter(o=>o!==obra));
  renderApp();
  _showUndo(obra,linkedObraCount(linkedMap));
}
function _showUndo(obra,total){
  document.getElementById('undo-t')?.remove();
  const el=document.createElement('div');
  el.id='undo-t';
  el.className='toast';
  el.style.cssText='bottom:80px;left:50%;transform:translateX(-50%);min-width:320px;gap:14px';
  el.innerHTML=`<span>Obra "${esc(obra)}" excluída${total?` · ${total} vínculo(s) movido(s) para Sem obra`:''}</span><button onclick="_undoDel()" style="background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;white-space:nowrap">↩ Desfazer</button>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.remove();_delUndo=null;},10000);
}
window._undoDel=async()=>{
  document.getElementById('undo-t')?.remove();
  const u=_delUndo;
  if(!u)return;
  const affectedTables=OBRA_LINKED_TABLES.filter(table=>(u.linkedMap?.[table]||[]).length);
  const results=await Promise.allSettled(affectedTables.map(table=>sb.from(table).update({obra:u.obra}).in('id',u.linkedMap[table])));
  const failed=affectedTables.filter((table,index)=>results[index].status==='rejected'||results[index].value?.error);
  if(failed.length){toast('Não foi possível restaurar todos os vínculos da obra.','#ef4444');return;}
  OBRA_LINKED_TABLES.forEach(table=>{const ids=u.linkedMap?.[table]||[];if(ids.length)DB[table]=DB[table].map(row=>ids.includes(row.id)?{...row,obra:u.obra}:row);});
  saveHiddenObras(getHiddenObras().filter(o=>o!==u.obra));
  saveArchivedObras(getArchivedObras().filter(o=>o!==u.obra));
  if(u.wasCustom)saveCustomObras(uniqObras([...getCustomObras(),u.obra]));
  if(u.data?.nome)saveObrasData([...getObrasData().filter(o=>o?.nome!==u.obra),u.data]);
  if(u.registryHad||u.wasCustom||linkedObraCount(u.linkedMap))await saveRemoteObras([...(DB.obraRegistry||[]),u.obra]);
  toast(`Obra "${u.obra}" restaurada!`);
  renderApp();
};

function exportCSV(rows,headers,filename){
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename+'.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

function xlsxSheetName(name){return String(name||'Dados').replace(/[\\/*?:\[\]]/g,' ').slice(0,31)||'Dados';}
function xlsxFileName(name){return String(name||'Dados').replace(/[<>:"/\\|?*]+/g,'_');}
function xlsxArgb(hex,fallback='1A2E6B'){
  const clean=String(hex||fallback).replace('#','').trim();
  const normalized=clean.length===3?clean.split('').map(c=>c+c).join(''):clean;
  return /^[0-9a-fA-F]{6}$/.test(normalized)?`FF${normalized.toUpperCase()}`:`FF${fallback}`;
}
function xlsxFill(hex){return{type:'pattern',pattern:'solid',fgColor:{argb:xlsxArgb(hex)}};}
function xlsxBorder(color='D7E0EE'){
  const c={argb:`FF${color}`};
  return{top:{style:'thin',color:c},left:{style:'thin',color:c},bottom:{style:'thin',color:c},right:{style:'thin',color:c}};
}
function xlsxDownload(buffer,filename){
  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function xlsxColumnsFromHeaders(headers,rows){
  return headers.map((header,index)=>{
    let max=String(header).length;
    rows.forEach(row=>{const value=String(row[index]!=null?row[index]:'');if(value.length>max)max=value.length;});
    return{header,key:`c${index}`,width:Math.min(Math.max(max+3,10),42)};
  });
}
async function exportStyledXLSX({sheetName='Dados',filename='Dados',title='JET Gestão de Obras',meta=[],columns=[],rows=[],sections=[]}){
  if(window.ExcelJS){
    const workbook=new window.ExcelJS.Workbook();
    workbook.creator='JET Gestão de Obras';
    workbook.created=new Date();
    const ws=workbook.addWorksheet(xlsxSheetName(sheetName));
    ws.properties.defaultRowHeight=22;
    ws.columns=columns.map(col=>({key:col.key,width:col.width||18}));
    const totalCols=Math.max(columns.length,1);
    let rowNumber=1;
    const mergeFullRow=row=>{if(totalCols>1)ws.mergeCells(row,1,row,totalCols);};
    const headerBg='1A2E6B';
    const sectionBg='E8EFFC';
    const bodyBorder='DEE7F2';

    mergeFullRow(rowNumber);
    const titleCell=ws.getCell(rowNumber,1);
    titleCell.value=title;
    titleCell.fill=xlsxFill(`#${headerBg}`);
    titleCell.font={name:'Aptos',size:16,bold:true,color:{argb:'FFFFFFFF'}};
    titleCell.alignment={vertical:'middle',horizontal:'left'};
    ws.getRow(rowNumber).height=26;

    meta.filter(Boolean).forEach(line=>{
      rowNumber++;
      mergeFullRow(rowNumber);
      const cell=ws.getCell(rowNumber,1);
      cell.value=Array.isArray(line)?line.filter(Boolean).join('   •   '):line;
      cell.font={name:'Aptos',size:10,color:{argb:'FF5E6B83'}};
      cell.alignment={vertical:'middle',horizontal:'left'};
    });

    rowNumber++;
    const headerRowNumber=rowNumber;
    const headerRow=ws.getRow(headerRowNumber);
    columns.forEach((col,index)=>{
      const cell=headerRow.getCell(index+1);
      cell.value=col.header;
      cell.fill=xlsxFill(`#${headerBg}`);
      cell.font={name:'Aptos',size:11,bold:true,color:{argb:'FFFFFFFF'}};
      cell.alignment={vertical:'middle',horizontal:col.align||'left'};
      cell.border=xlsxBorder(bodyBorder);
    });
    headerRow.height=22;

    const applyBodyCell=(cell,col,rawValue,rowIndex)=>{
      const value=rawValue==null?'':rawValue;
      if(col.type==='currency'&&value!==''){
        const num=Number(String(value).replace(/[^\d,.-]/g,'').replace(/\.(?=.*\.)/g,'').replace(',','.'));
        cell.value=Number.isFinite(num)?num:value;
        if(Number.isFinite(num))cell.numFmt='"R$" #,##0.00';
      }else{
        cell.value=value;
      }
      cell.font={name:'Aptos',size:10.5,color:{argb:'FF23344D'},bold:false};
      cell.alignment={vertical:'top',horizontal:col.align||'left',wrapText:col.wrap!==false};
      cell.border=xlsxBorder(bodyBorder);
      cell.fill=xlsxFill(rowIndex%2?'#FFFFFF':'#F7FAFF');
      if(col.badgeMap&&value!==''){
        const badge=col.badgeMap[value]||col.badgeMap[String(value)];
        if(badge){
          cell.fill=xlsxFill(badge.bg||'#EFF4FF');
          cell.font={name:'Aptos',size:10.5,bold:true,color:{argb:xlsxArgb(badge.c||'#23344D')}};
        }
      }
      if(col.type==='currency'&&value!==''){
        cell.font={...cell.font,bold:true,color:{argb:'FF14956B'}};
      }
      if(typeof col.style==='function')col.style(cell,value,rowIndex);
    };

    const pushRow=(record,rowIndex)=>{
      rowNumber++;
      const row=ws.getRow(rowNumber);
      columns.forEach((col,index)=>{
        const raw=typeof col.value==='function'?col.value(record,rowIndex):record[col.key];
        applyBodyCell(row.getCell(index+1),col,raw,rowIndex);
      });
      row.commit();
    };

    if(sections.length){
      let count=0;
      sections.forEach(section=>{
        rowNumber++;
        mergeFullRow(rowNumber);
        const sectionCell=ws.getCell(rowNumber,1);
        sectionCell.value=section.label;
        sectionCell.fill=xlsxFill(`#${sectionBg}`);
        sectionCell.font={name:'Aptos',size:11,bold:true,color:{argb:'FF1A2E6B'}};
        sectionCell.alignment={vertical:'middle',horizontal:'left'};
        sectionCell.border=xlsxBorder(bodyBorder);
        (section.rows||[]).forEach(record=>{count++;pushRow(record,count);});
      });
    }else if(rows.length){
      rows.forEach((record,index)=>pushRow(record,index+1));
    }else{
      rowNumber++;
      mergeFullRow(rowNumber);
      const emptyCell=ws.getCell(rowNumber,1);
      emptyCell.value='Nenhum registro encontrado.';
      emptyCell.font={name:'Aptos',size:10,italic:true,color:{argb:'FF73849E'}};
      emptyCell.alignment={vertical:'middle',horizontal:'center'};
      emptyCell.border=xlsxBorder(bodyBorder);
    }

    ws.autoFilter={from:{row:headerRowNumber,column:1},to:{row:headerRowNumber,column:totalCols}};
    ws.views=[{state:'frozen',ySplit:headerRowNumber}];
    const buffer=await workbook.xlsx.writeBuffer();
    xlsxDownload(buffer,`${xlsxFileName(filename)}.xlsx`);
    toast('Excel exportado!');
    return;
  }
  if(!window.XLSX){toast('Biblioteca não carregada.','#f59e0b');return;}
  const headerList=columns.map(col=>col.header);
  const dataRows=rows.map(row=>columns.map(col=>typeof col.value==='function'?col.value(row):row[col.key]));
  const ws=XLSX.utils.aoa_to_sheet([headerList,...dataRows]);
  ws['!cols']=columns.map(col=>({wch:col.width||16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,xlsxSheetName(sheetName));
  XLSX.writeFile(wb,`${xlsxFileName(filename)}.xlsx`);
  toast('Excel exportado!');
}
function exportXLSX(rows,headers,filename){

    columns:xlsxColumnsFromHeaders(headers,rows),
    rows:rows.map(row=>Object.fromEntries(row.map((value,index)=>[`c${index}`,value])))

  function drawStamp(label){
    let y=doc.__lastTableY+16;
    if(y>H-38){doc.addPage('a4','portrait');y=28;}

    doc.setLineWidth(0.45);

    doc.text('Data: '+headerDate,center,y+12,{align:'center'});
  }

  function toLines(value,width){
    const textValue=String(value==null?'':value);
    const lines=doc.splitTextToSize(textValue,width);
    return lines.length?lines:[''];
  }

  function drawMultiline(lines,x,y,width,align='left',lineHeight=3.2){
    const baseX=align==='center'?x+width/2:(align==='right'?x+width-2:x+2);
    lines.forEach((line,index)=>doc.text(line,baseX,y+4+(index*lineHeight),{align:align==='left'?'left':align}));
  }

  function drawManualTable(columns,rows,startY,redrawPage,kind){
    let y=startY;

    const drawTableHead=()=>{
      let x=M;
      doc.setFont('helvetica','bold');
      doc.setFontSize(kind==='req'?7.1:7.4);

    drawTableHead();

      if(y+rowHeight>H-30){

      let x=M;
      cells.forEach((cell,idx)=>{

        if(kind==='req'){
          if(idx===4){
            if(cell.raw==='Cr\u00EDtico'){fill=[255,220,220];textColor=[180,0,0];fontStyle='bold';}
            else if(cell.raw==='Urgente'){fill=[255,243,205];textColor=[140,90,0];fontStyle='bold';}
          }
          if(idx===5){
            if(cell.raw==='Pendente')textColor=[180,120,0];
            else if(cell.raw==='Aprovado'||cell.raw==='Comprado')textColor=[0,130,70];
            else if(cell.raw==='Entregue')textColor=[0,100,180];
          }
          if(idx===6){
            const discColors={'El\u00E9trica':[0,100,200],'Hidr\u00E1ulica':[0,150,100],'Civil':[140,80,0],'EPI':[180,0,60],'Geral':[100,100,120],'L\u00F3gica':[120,50,180]};
            textColor=discColors[cell.raw]||[100,100,120];
            fontStyle='bold';
          }
        }
        doc.setFillColor(...fill);
        doc.setDrawColor(190,198,214);
        doc.setLineWidth(0.2);
        doc.rect(x,y,cell.col.width,rowHeight,'FD');
        doc.setFont('helvetica',fontStyle);
        doc.setFontSize(kind==='req'?7.05:7.8);
        doc.setTextColor(...textColor);
        drawMultiline(cell.lines,x,y,cell.col.width,cell.col.align||'left',3.1);
        x+=cell.col.width;
      });
      y+=rowHeight;
    });
    doc.__lastTableY=y;
    return y;
  }

  const reqColumns=[
    {label:'#',width:8,align:'center'},
    {label:'DESCRI\u00C7\u00C3O',width:48},
    {label:'UNID',width:14,align:'center'},
    {label:'QTD',width:12,align:'center'},
    {label:'URG\u00CANCIA',width:18,align:'center'},
    {label:'STATUS',width:18,align:'center'},
    {label:'DISCIPLINA',width:24,align:'center'},
    {label:'SOLICITANTE',width:20},
    {label:'OBSERVA\u00C7\u00C3O',width:24}
  ];

  const confColumns=[
    {label:'ITEM',width:12,align:'center'},
    {label:'DESCRI\u00C7\u00C3O',width:72},
    {label:'UNIDADE',width:18,align:'center'},
    {label:'QUANTIDADE',width:18,align:'center'},
    {label:'RECEBIMENTO',width:28,align:'center'},
    {label:'OBSERVA\u00C7\u00C3O',width:38}
  ];

  const reqRows=mats.map((m,i)=>[
    String(i+1),
    m.item||'',
    normalizeMaterialUnit(m.unidade||'un'),

  drawSummary([`Obra: ${obraLabel}`,`Solicitante: ${solicitanteLabel}`,`Data: ${headerDate}`,`Itens base: ${mats.length}`]);
  doc.setFont('helvetica','bold');
  doc.setFontSize(24);
  doc.setTextColor(26,46,107);
  doc.text('VIA RASCUNHO',W/2,82,{align:'center'});

         {content:'DATA',styles:{fontStyle:'bold'}},{content:fmtD(r.data),colSpan:3}],
      ],
      styles:{fontSize:8,cellPadding:3,textColor:[20,20,20]},
      tableLineColor:[180,180,180],tableLineWidth:.2,
    });
    y=doc.lastAutoTable.finalY+4;
    // PARALISAÇÃO
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
    doc.text('Paralisação / condições / prazo',M,y+5);y+=8;
    doc.autoTable({startY:y,margin:{left:M,right:M},tableWidth:W-M*2,
      head:[[{content:'PARALISAÇÃO',styles:{fontStyle:'bold'}},{content:'TEMPO',styles:{fontStyle:'bold'}},{content:'MOTIVO',styles:{fontStyle:'bold'}},{content:'Prazo contratual',styles:{fontStyle:'bold'}},{content:'Dias decorridos',styles:{fontStyle:'bold'}}]],
      body:[
        [`Sim ( ) Não (${r.paralisacao?'':' x'})`,`Bom ( ${r.tempo==='Bom'?'X':' '} )\nC/ chuva ( ${r.tempo?.includes('Chuva')?'X':' '} )`,
         '',r.prazo_contratual||'',''],
        [{content:`TURNO\n${r.turno||'Noite'} ( x )`,styles:{fontStyle:'bold'}},{content:'Prorrogação',styles:{fontStyle:'bold'}},'',{content:'Dias restantes',styles:{fontStyle:'bold'}},''],
        [{content:'DURAÇÃO\nDas: '+r.horario_inicio+': '+r.horario_fim,styles:{fontStyle:'bold'}},{content:r.prazo_efetivo||'',styles:{fontStyle:'italic'}},{content:'Prazo efetivo',styles:{fontStyle:'bold'}},{content:'Dias de atraso',styles:{fontStyle:'bold'}},''],
        [{content:'MOTIVO (detalhe):',colSpan:5}],
      ],
      styles:{fontSize:8,cellPadding:3,textColor:[20,20,20]},
      headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
      tableLineColor:[180,180,180],tableLineWidth:.2,
    });
    y=doc.lastAutoTable.finalY+4;
    // EFETIVO MÃO DE OBRA
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Efetivo de obra (mão de obra)',M,y+5);y+=8;
    const efJet=r.efetivo_jet||FUNCOES.map(f=>({funcao:f,jet:'',terceiros:''}));
    const totalMO=efJet.reduce((s,e)=>s+(parseInt(e.jet)||0)+(parseInt(e.terceiros)||0),0);
    doc.autoTable({startY:y,margin:{left:M,right:M},tableWidth:W-M*2,
      head:[['Função','Qtde JET','Qtde terceiros','Efetivo (total)']],
      body:[...efJet.map(e=>{const tot=(parseInt(e.jet||0)+parseInt(e.terceiros||0));return[e.funcao,e.jet||'',e.terceiros||'',tot>0?String(tot):''];}),
            [{content:'TOTAL',styles:{fontStyle:'bold',fillColor:[240,245,255]}},{content:String(efJet.reduce((s,e)=>s+(parseInt(e.jet||0)),0)),styles:{fontStyle:'bold',halign:'center',fillColor:[240,245,255]}},{content:String(efJet.reduce((s,e)=>s+(parseInt(e.terceiros||0)),0)),styles:{fontStyle:'bold',halign:'center',fillColor:[240,245,255]}},{content:String(totalMO),styles:{fontStyle:'bold',halign:'center',fillColor:[230,240,255]}}]],
      styles:{fontSize:8,cellPadding:2.5,textColor:[20,20,20]},
      headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
      columnStyles:{1:{halign:'center',cellWidth:30},2:{halign:'center',cellWidth:30},3:{halign:'center',cellWidth:30}},
      tableLineColor:[200,200,200],tableLineWidth:.15,
    });
    y=doc.lastAutoTable.finalY+4;
    // EFETIVO ADMINISTRATIVO
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Fiscalização / efetivo administrativo',M,y+5);y+=8;
    const efAdm=r.efetivo_admin||ADMIN.map(f=>({cargo:f,qtde:'',obs:''}));
    const totalAdm=efAdm.reduce((s,e)=>s+(parseInt(e.qtde)||0),0);
    doc.autoTable({startY:y,margin:{left:M,right:M},tableWidth:W-M*2,
      head:[['Cargo','Qtde','Observações']],
      body:[...efAdm.map(e=>[e.cargo,e.qtde||'',e.obs||'']),
            [{content:'TOTAL',styles:{fontStyle:'bold',fillColor:[240,245,255]}},{content:String(totalAdm),styles:{fontStyle:'bold',halign:'center',fillColor:[240,245,255]}},{content:`Efetivo total: ${totalAdm}`,styles:{fontStyle:'bold',fillColor:[240,245,255]}}]],
      styles:{fontSize:8,cellPadding:2.5,textColor:[20,20,20]},
      headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
      columnStyles:{1:{halign:'center',cellWidth:25}},
      tableLineColor:[200,200,200],tableLineWidth:.15,
    });
    y=doc.lastAutoTable.finalY+6;
    // ATIVIDADES
    if(r.atividades){
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Atividades (JET Serviços de Engenharia)',M,y+5);y+=8;
      const ativLines=r.atividades.split('\n').filter(Boolean);
      const lines=doc.splitTextToSize(ativLines.map((l,i)=>`${i+1} - ${l.replace(/^\d+\s*[-.]?\s*/,'')}`).join('\n'),W-M*2-4);
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.text(lines,M+4,y);y+=lines.length*4.5+6;
    }
    // OBSERVAÇÕES
    if(r.ocorrencias){
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text('Fiscalização / observações',M,y+5);y+=8;
      const ocLines=doc.splitTextToSize(r.ocorrencias,W-M*2-4);
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(ocLines,M+4,y);y+=ocLines.length*4.5+6;
    }
    // FOOTER
    const pg=doc.getNumberOfPages();
    for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text(`RDO - ${obra} - ${fmtD(r.data)} - ${r.rdo_numero||''}`,105,290,{align:'center'});}
  });
  const photoUrlCandidates=(foto)=>{
    const raw=typeof foto==='string'?foto:(foto?.url||foto?.thumb||foto?.drive_url||foto?.original_url||'');
    const drive=typeof foto==='string'?foto:(foto?.drive_url||foto?.original_url||raw);
    const id=rdoFotoDriveId(drive||raw);
    const urls=[];
    if(id){
      urls.push(`https://lh3.googleusercontent.com/d/${encodeURIComponent(id)}=w1200`);
      urls.push(`https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=w1200`);
    }
    [raw,typeof foto==='string'?'':foto?.thumb,typeof foto==='string'?'':foto?.url].forEach(url=>{if(url)urls.push(url);});
    return[...new Set(urls.filter(Boolean))];
  };
  const imageToDataUrl=async(foto)=>{
    let lastErr=null;
    for(const url of photoUrlCandidates(foto)){
      try{
        const resp=await fetch(url,{mode:'cors',credentials:'omit',cache:'no-store'});
        if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
        const blob=await resp.blob();
        if(!String(blob.type||'').startsWith('image/'))throw new Error('Resposta não é imagem');
        const dataUrl=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.onerror=rej;fr.readAsDataURL(blob);});
        let imgType='JPEG';
        if(String(blob.type).includes('png'))imgType='PNG';
        if(String(blob.type).includes('webp'))imgType='WEBP';
        return{dataUrl,imgType};
      }catch(err){lastErr=err;}
    }
    throw lastErr||new Error('Imagem indisponível');
  };
  const drawPhotoFallback=(foto,x,y,w,h)=>{
    const link=(typeof foto==='string'?foto:(foto?.drive_url||foto?.original_url||foto?.url||foto?.thumb||''));
    doc.setDrawColor(180,190,210);doc.setFillColor(247,250,255);doc.roundedRect(x,y,w,h,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,46,107);
    doc.text('Foto do Google Drive',x+4,y+8);
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(90,100,120);
    const name=typeof foto==='string'?'Foto importada':(foto?.name||'Foto importada');
    doc.text(doc.splitTextToSize(name,w-8).slice(0,2),x+4,y+15);
    if(link){
      doc.setTextColor(37,99,235);doc.setFont('helvetica','bold');
      if(doc.textWithLink)doc.textWithLink('Abrir foto no Drive',x+4,y+h-6,{url:link});
      else doc.text('Abrir foto no Drive',x+4,y+h-6);
    }
  };
  // Embed photos. Google Drive sometimes blocks browser-side capture; in that case we keep clickable placeholders instead of a blank PDF page.
  const _embedFotos=async()=>{
    for(const r of rdos){
      const fotos=r.fotos||[];
      if(!fotos.length)continue;
      doc.addPage();
      doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      doc.text(`Anexos (fotos) - ${fmtD(r.data)} - RDO Nº ${r.rdo_numero||''}`,M,14);
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
      doc.text(`${fotos.length} registro(s) fotográfico(s). Se alguma imagem não aparecer, use o link do Drive no quadro correspondente.`,M,20);
      let fx=M,fy=28,maxH=0,col=0,photoSeq=1;
      for(const foto of fotos){
        const imgW=85,imgH=58,cellH=84;
        const fotoLabel=`FOTO ${String(photoSeq++).padStart(2,'0')}`;
        if(fx+imgW>W-M){fx=M;fy+=maxH+6;maxH=0;col=0;}
        if(fy+cellH>286){doc.addPage();fy=14;doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text(`Anexos (fotos) - ${fmtD(r.data)}`,M,fy);fy+=8;}
        try{
          const img=await imageToDataUrl(foto);
          doc.addImage(img.dataUrl,img.imgType,fx,fy,imgW,imgH);
          const link=typeof foto==='string'?foto:(foto.drive_url||foto.original_url||foto.url||'');
          if(link&&doc.link)doc.link(fx,fy,imgW,imgH,{url:link});
        }catch(e){
          console.warn('Foto error:',e);
          drawPhotoFallback(foto,fx,fy,imgW,imgH);
        }
        const name=typeof foto==='string'?'':(foto.name||'');
        const desc=typeof foto==='string'?'':(foto.desc||foto.descricao||'');
        const caption=[name,desc].filter(Boolean).join(' - ');
        let labelY=fy+imgH+5;
        if(caption){
          doc.setFontSize(6.8);doc.setFont('helvetica','normal');doc.setTextColor(90,90,90);
          const capLines=doc.splitTextToSize(caption,imgW).slice(0,2);
          doc.text(capLines,fx,fy+imgH+4);
          labelY=fy+imgH+5+(capLines.length*3.4);
        }
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(26,46,107);
        doc.text(fotoLabel,fx,labelY);
        fx+=imgW+6;col++;maxH=Math.max(maxH,cellH);
        if(col>=2){fx=M;fy+=maxH+6;maxH=0;col=0;}
      }
    }
    doc.save(`RDO_${obra.replace(/\s+/g,'_')}_${rdos[0]?.rdo_numero||''}.pdf`);toast('PDF com fotos exportado!');
  };
  _embedFotos();
}

function renderExportMenu(type,obra,showCPF=false){

<button class="btn btn-secondary btn-sm" onclick="window._exportFormat('${type}','${obra}','csv')">⬇ CSV</button>

window._exportFormat=(type,obra,fmt)=>{
  const hideDocs=document.getElementById('hide-doc-'+type)?.checked||false;
  if(fmt==='csv')window[type+'CSV'](obra,hideDocs);
  else if(fmt==='xlsx')window[type+'XLSX'](obra,hideDocs);
  else if(fmt==='pdf')window[type+'PDF'](obra,hideDocs);
};

function companyTextRows(company){
  const c=normalizeCommercialCompany(company);

function drawCommercialCompanyPDFBlock(doc,company,x,y,w){
  const c=normalizeCommercialCompany(company);
  if(!c)return 0;
  const address=c.endereco||formatCommercialCompanyAddress(c)||'-';
  const nameLines=doc.splitTextToSize(c.nome||'',w);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(15,23,42);
  doc.text(nameLines,x,y);
  let cy=y+(nameLines.length*6)+3;
  doc.setFont('helvetica','normal');
  doc.setFontSize(9.5);
  doc.setTextColor(45,58,86);
  doc.text(`Email: ${c.email||'-'}`,x,cy);cy+=5.5;
  doc.text(`Telefone: ${c.telefone||'-'}`,x,cy);cy+=5.5;
  const addressLines=doc.splitTextToSize(`Endereço: ${address}`,w);
  doc.text(addressLines,x,cy);
  cy+=addressLines.length*5;
  return Math.max(28,cy-y+2);
}

function drawProposalClientPDFBlock(doc,p,x,y,w){
  const h=48;
  const blue=[26,46,107],muted=[96,108,130];
  doc.setDrawColor(205,216,238);
  doc.setLineWidth(.35);
  doc.roundedRect(x,y,w,h,2,2);
  const hasLogo=!!p.cliente_logo;
  const logoSize=30;
  let textX=x+6;
  if(hasLogo){
    try{
      doc.addImage(p.cliente_logo,'PNG',x+6,y+8,logoSize,logoSize);
      textX=x+43;
    }catch(err){
      textX=x+6;
    }
  }
  const textW=x+w-textX-6;
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(20,27,45);
  const nameLines=doc.splitTextToSize(p.cliente||'-',textW);
  doc.text(nameLines,textX,y+13);
  let cy=y+13+(nameLines.length-1)*5.5+8;
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(0,0,0);
  doc.text(`CNPJ: ${formatCNPJ(p.cnpj)||'-'}`,textX,cy);cy+=6;
  doc.setFontSize(8.5);
  doc.setTextColor(...muted);
  const details=[p.inscricao_estadual?`IE: ${p.inscricao_estadual}`:'',p.contato?`Contato: ${p.contato}`:'',p.telefone?`Telefone: ${p.telefone}`:''].filter(Boolean).join(' · ');
  if(details){doc.text(doc.splitTextToSize(details,textW),textX,cy);cy+=6;}
  if(p.email){doc.text(doc.splitTextToSize(`E-mail: ${p.email}`,textW),textX,cy);}

function getMobileCardLabel(headers,td,index){
  const explicit=td.getAttribute('data-card-label');
  if(explicit)return explicit;
  const header=headers[index]||'';
  if(header)return header;
  const btns=td.querySelectorAll('button,[role="button"],a');
  if(btns.length>1)return'Ações';
  const titleEl=td.querySelector('[title]');
  if(titleEl?.getAttribute('title'))return titleEl.getAttribute('title');
  if(btns.length===1)return'Ação';
  const input=td.querySelector('input[placeholder],textarea[placeholder],select');
  if(input?.getAttribute('placeholder'))return input.getAttribute('placeholder');
  return '';
}

  const isMobile=window.innerWidth<=768;
  document.querySelectorAll('.tbl-wrap').forEach(wrap=>{
    wrap.classList.remove('mobile-cards');
    const table=wrap.firstElementChild&&wrap.firstElementChild.tagName==='TABLE'?wrap.firstElementChild:wrap.querySelector('table');
    if(!table)return;
    const headerCells=Array.from(table.querySelectorAll('thead th'));
    const headers=headerCells.map(th=>(th.textContent||'').replace(/\s+/g,' ').trim());
    const styledMinWidth=(table.style.minWidth||'').match(/(\d+)/);
    const largeTable=headerCells.length>=6||headers.filter(Boolean).length>=5||(styledMinWidth&&Number(styledMinWidth[1])>=680);
    if(!isMobile||!largeTable){
      table.querySelectorAll('td').forEach(td=>{
        td.removeAttribute('data-label');
        const value=td.firstElementChild;
        if(value&&value.classList.contains('mobile-card-value')){
          while(value.firstChild)td.appendChild(value.firstChild);
          value.remove();
        }
      });
      return;
    }
    wrap.classList.add('mobile-cards');
    table.querySelectorAll('tbody > tr').forEach(tr=>{
      const cells=Array.from(tr.children).filter(el=>el.tagName==='TD');
      if(!cells.length)return;
      const singleSpan=cells.length===1&&cells[0].hasAttribute('colspan');
      if(singleSpan)return;
      cells.forEach((td,index)=>{
        const label=getMobileCardLabel(headers,td,index);
        if(label)td.setAttribute('data-label',label);else td.removeAttribute('data-label');
        if(!td.querySelector(':scope > .mobile-card-value')){
          const value=document.createElement('div');
          value.className='mobile-card-value';
          while(td.firstChild)value.appendChild(td.firstChild);
          td.appendChild(value);
        }
      });
    });
  });
}

window._setPropostaLogo=(data='')=>{
  const hidden=document.getElementById('m-prop-logo-data');
  const preview=document.getElementById('m-prop-logo-preview');
  if(hidden)hidden.value=data||'';
  if(preview)preview.innerHTML=proposalLogoPreviewHtml(data||'');

window._clearPropostaLogo=()=>{window._setPropostaLogo('');const input=document.getElementById('m-prop-logo-file');if(input)input.value='';};
window._loadPropostaLogo=(file)=>{
  if(!file)return;
  if(!String(file.type||'').startsWith('image/')){toast('Selecione uma imagem PNG ou JPG.','#ef4444');return;}
  const maxFile=10*1024*1024;
  if(Number(file.size||0)>maxFile){
    toast('Logo muito grande. Use imagem de até 10 MB.','#ef4444');
    const input=document.getElementById('m-prop-logo-file');
    if(input)input.value='';
    return;
  }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=520;
      const scale=Math.min(1,max/Math.max(img.width||max,img.height||max));
      const canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round((img.width||max)*scale));
      canvas.height=Math.max(1,Math.round((img.height||max)*scale));
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      window._setPropostaLogo(canvas.toDataURL('image/png'));
      toast('Logo do cliente anexado.','#22c55e');
    };
    img.onerror=()=>toast('Não consegui ler esse logo. Tente PNG ou JPG.','#ef4444');
    img.src=String(reader.result||'');
  };
  reader.onerror=()=>toast('Falha ao carregar o arquivo do logo.','#ef4444');
  reader.readAsDataURL(file);
};

window._refreshMaterialDuplicateWarning=(prefix='mat')=>{
  const isReq=prefix==='req';
  const rows=Array.from(document.querySelectorAll(isReq?'.req-item-row':'.mat-item-row'));
  const items=rows.map(row=>({item:row.querySelector(isReq?'.req-item-desc':'.mat-item-desc')?.value?.trim()||''})).filter(item=>item.item);
  const dups=findDuplicateMaterialSpecs(items).map(normalizeMaterialSpec);
  const dupSet=new Set(dups);
  rows.forEach(row=>{
    const input=row.querySelector(isReq?'.req-item-desc':'.mat-item-desc');
    if(!input)return;
    const isDup=dupSet.has(normalizeMaterialSpec(input.value));
    input.style.borderColor=isDup?'#f59e0b':'var(--border2)';
    input.style.boxShadow=isDup?'0 0 0 2px rgba(245,158,11,.12)':'';
  });
  const box=document.getElementById(isReq?'req-dup-warning':'mat-dup-warning');
  if(!box)return;
  const labels=findDuplicateMaterialSpecs(items);
  if(labels.length){
    box.style.display='block';
    box.textContent='Atenção: item duplicado na solicitação — '+labels.join(', ');
  }else{
    box.style.display='none';
    box.textContent='';
  }
};

window._previewMatPDF=()=>{
  const items=_getModalMatItems();if(!items.length){toast('Adicione itens primeiro.','#f59e0b');return;}
  if(!window.jspdf){toast('Carregando...','#f59e0b');return;}

  const datareq=document.getElementById('m-datareq')?._flatpickr?.selectedDates[0]?.toLocaleDateString('pt-BR')||new Date().toLocaleDateString('pt-BR');
  const obs=document.getElementById('m-obs')?.value||'';
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  // Title bar
  doc.setFillColor(26,46,107);doc.rect(0,0,297,18,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text(`Planilha de Requisição ${S.obra}`,10,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(datareq,287,12,{align:'right'});
  // Sub header
  doc.setFillColor(235,239,255);doc.rect(0,18,297,10,'F');
  doc.setTextColor(50,60,100);doc.setFontSize(8);
  doc.text(`Solicitante: ${solic}`,10,24);
  if(obs)doc.text(`Obs: ${obs}`,100,24);
  // Group by disciplina
  const byDisc={};
  items.forEach(it=>{const d=it.disc||'Geral';if(!byDisc[d])byDisc[d]=[];byDisc[d].push(it);});
  let startY=30;
  Object.entries(byDisc).forEach(([disc,ditems])=>{
    doc.autoTable({
      startY,
      head:[[{content:disc,colSpan:6,styles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold',fontSize:9}}],
            ['Item','Descrição / Material','Unidade','Quantidade','Obs','']],
      body:ditems.map((it,i)=>[i+1,it.item,it.unidade,it.quantidade||'',it.obs||'','']),
      styles:{fontSize:8,cellPadding:3,textColor:[30,30,30]},
      headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,247,255]},
      columnStyles:{0:{cellWidth:10,halign:'center'},2:{cellWidth:18,halign:'center'},3:{cellWidth:22,halign:'center'},4:{cellWidth:60},5:{cellWidth:8}},
      tableLineColor:[200,210,240],tableLineWidth:.2,
      didDrawPage:(d)=>{doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text(`JET Gestão de Obras · ${S.obra} · Pág ${d.pageNumber}`,148,205,{align:'center'});}
    });
    startY=doc.lastAutoTable.finalY+6;
  });
  doc.save(`Requisicao_${(S.obra||'').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('PDF baixado!');
};

window._saveMaterial=async()=>{
  const rows=Array.from(document.querySelectorAll('.mat-item-row'));
  const items=rows.map(r=>({desc:r.querySelector('.mat-item-desc')?.value?.trim(),qtd:r.querySelector('.mat-item-qtd')?.value,unit:normalizeMaterialUnit(r.querySelector('.mat-item-unit')?.value||'un'),disc:r.querySelector('.mat-item-disc')?.value||'Geral',obs:r.querySelector('.mat-item-obs')?.value||''})).filter(i=>i.desc);
  if(!items.length){toast('Adicione pelo menos um item.','#ef4444');return;}
  if(!confirmMaterialDuplicates(items))return;
  const solic=document.getElementById('m-solic')?.value||'';
  const datareq=document.getElementById('m-datareq')?._flatpickr?.input?.value||new Date().toISOString().slice(0,10);
  const urg=document.getElementById('m-urg')?.value||'Normal';
  const obs=document.getElementById('m-obs')?.value||'';
  const objs=items.map(i=>({id:uid(),obra:S.obra,item:i.desc,quantidade:parseFloat(i.qtd)||null,unidade:i.unit,disciplina:i.disc,observacao_item:i.obs,urgencia:urg,status:'Pendente',solicitante:solic,data_solicitacao:datareq,observacao:obs}));
  const{error}=await sb.from('materiais').insert(objs);
  if(error){toast('Erro: '+error.message,'#ef4444');return;}
  objs.forEach(o=>DB.materiais.unshift(o));
  await saveMaterialReqFilesForKey(getMaterialReqKey(S.obra,datareq),document.getElementById('m-matfiles')?.files||[]);
  toast(`${objs.length} item${objs.length!==1?'s':''} adicionado${objs.length!==1?'s':''}!`);

};

window._editMaterial=async(id)=>{
  const item=document.getElementById('m-eitem')?.value?.trim();
  if(!item){toast('Preencha o nome do item.','#ef4444');return;}
  const current=DB.materiais.find(m=>m.id===id)||{};
  const obj={
    item,
    solicitante:document.getElementById('m-esolic')?.value||'',
    quantidade:parseFloat(document.getElementById('m-eqtd')?.value)||0,
    unidade:normalizeMaterialUnit(document.getElementById('m-eunid')?.value||'un'),
    disciplina:document.getElementById('m-edisc')?.value||'Geral',
    urgencia:document.getElementById('m-eurg')?.value||'Normal',
    status:document.getElementById('m-estatus')?.value||'Pendente',
    data_solicitacao:document.getElementById('m-edata')?.value||null,
    observacao:document.getElementById('m-eobs')?.value||''
  };
  const itemKey=normalizeMaterialSpec(item);
  const hasDuplicate=itemKey&&DB.materiais.some(m=>m.id!==id&&m.obra===current.obra&&(m.data_solicitacao||'')===(obj.data_solicitacao||'')&&normalizeMaterialSpec(m.item)===itemKey);
  if(hasDuplicate&&!confirm(`Atenção: "${item}" já existe nesta solicitação.\n\nDeseja salvar mesmo assim?`))return;
  const{error}=await sb.from('materiais').update(obj).eq('id',id);
  if(error){toast('Erro: '+error.message,'#ef4444');return;}
  DB.materiais=DB.materiais.map(m=>m.id===id?{...m,...obj}:m);
  toast('✓ Material atualizado!');
  _closeModal();renderApp();
};

window._saveRequisicao=async()=>{
  const solic=document.getElementById('m-rsolic')?.value||'';
  const data=document.getElementById('m-rdata')?.value||null;
  const urg=document.getElementById('m-rurg')?.value||'Normal';
  const obs=document.getElementById('m-robs')?.value||'';
  const origMats=(S.modalData?.ids||[]).map(id=>DB.materiais.find(x=>x.id===id)).filter(Boolean);
  const oldReqKey=getMaterialReqKeyFromItems(origMats,S.obra);
  const rows=Array.from(document.querySelectorAll('.req-item-row'));
  const items=rows.map(row=>({
    id:row.dataset.id||'',
    item:row.querySelector('.req-item-desc')?.value?.trim()||'',
    quantidade:parseFloat(row.querySelector('.req-item-qtd')?.value)||0,
    unidade:normalizeMaterialUnit(row.querySelector('.req-item-unit')?.value||'un'),
    disciplina:row.querySelector('.req-item-disc')?.value||'Geral',
    status:row.querySelector('.req-item-status')?.value||'Pendente',
    observacao_item:row.querySelector('.req-item-obs')?.value||'',
  })).filter(item=>item.item);
  if(!items.length){toast('Adicione pelo menos um item.','#ef4444');return;}
  if(!confirmMaterialDuplicates(items))return;
  const btn=document.querySelector('.modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const buildPayload=item=>({
    item:item.item,
    quantidade:item.quantidade,
    unidade:item.unidade,
    disciplina:item.disciplina,
    status:item.status,
    observacao_item:item.observacao_item,
    solicitante:solic,
    data_solicitacao:data,
    urgencia:urg,
    observacao:obs
  });
  const sameMaterial=(prev,next)=>(
    (prev.item||'')===next.item &&
    Number(prev.quantidade||0)===Number(next.quantidade||0) &&
    (prev.unidade||'un')===next.unidade &&
    (prev.disciplina||'Geral')===next.disciplina &&
    (prev.status||'Pendente')===next.status &&
    (prev.observacao_item||'')===next.observacao_item &&
    (prev.solicitante||'')===next.solicitante &&
    (prev.data_solicitacao||null)===next.data_solicitacao &&
    (prev.urgencia||'Normal')===next.urgencia &&
    (prev.observacao||'')===next.observacao
  );
  try{
    const existingById=new Map(DB.materiais.map(m=>[m.id,m]));
    const updates=[];
    const inserts=[];
    items.forEach(item=>{
      const payload=buildPayload(item);
      if(item.id){
        const prev=existingById.get(item.id)||{};
        if(!sameMaterial(prev,payload))updates.push({id:item.id,payload});
      }else{
        inserts.push({id:uid(),obra:S.obra,...payload});
      }
    });
    if(updates.length){
      const results=await Promise.all(updates.map(u=>sb.from('materiais').update(u.payload).eq('id',u.id)));
      const failed=results.find(r=>r.error);
      if(failed){toast('Erro: '+failed.error.message,'#ef4444');return;}
      updates.forEach(u=>{DB.materiais=DB.materiais.map(m=>m.id===u.id?{...m,...u.payload}:m);});
    }
    if(inserts.length){
      const{error}=await sb.from('materiais').insert(inserts);
      if(error){toast('Erro: '+error.message,'#ef4444');return;}
      DB.materiais=[...inserts,...DB.materiais];
    }
    const keepIds=items.map(item=>item.id).filter(Boolean);
    const origIds=(S.modalData?.ids||[]);
    const deleteIds=origIds.filter(id=>!keepIds.includes(id));
    if(deleteIds.length){
      const{error}=await sb.from('materiais').delete().in('id',deleteIds);
      if(error){toast('Erro: '+error.message,'#ef4444');return;}
      DB.materiais=DB.materiais.filter(m=>!deleteIds.includes(m.id));
    }
    const newReqKey=getMaterialReqKey(S.obra,data||'sem-data');
    if(oldReqKey&&newReqKey&&oldReqKey!==newReqKey&&DB.materialReqFiles?.[oldReqKey]){
      const map={...DB.materialReqFiles};
      map[newReqKey]=[...(map[newReqKey]||[]),...(map[oldReqKey]||[])];
      delete map[oldReqKey];
      await saveRemoteMaterialReqFiles(map,{silent:true});
    }
    await saveMaterialReqFilesForKey(newReqKey,document.getElementById('m-rfiles')?.files||[]);
    toast('✓ Requisição atualizada! ('+items.length+' itens)');
    _closeModal();renderApp();
  }finally{
    if(btn&&document.body.contains(btn)){btn.disabled=false;btn.textContent='Salvar';}
  }
};

  const ok=await saveRemoteBaixadas(DB.baixadas||[],{silent:!notify});

};
window._updateBaixadaStatus=(id,status)=>{
  const row=DB.baixadas.find(r=>r.id===id);
  if(!row)return;
  row.status=BAIXADA_STATUS.includes(status)?status:'Solicitado';
  row.updated_at=new Date().toISOString();
  saveLocalBaixadas(DB.baixadas);
  queueBaixadasSync();
  renderApp();
};
window._updateBaixadaDate=(id,field,value)=>{
  const row=DB.baixadas.find(r=>r.id===id);
  if(!row)return;
  const dias=normalizeBaixadaDays(row.dias);
  if(!value){
    row.data_ida='';
    row.data_volta='';
  }else if(field==='data_ida'){
    row.data_ida=value;
    row.data_volta=addDaysISO(value,dias);
  }else{
    row.data_volta=value;
    row.data_ida=addDaysISO(value,-dias);
  }
  row.updated_at=new Date().toISOString();
  saveLocalBaixadas(DB.baixadas);
  queueBaixadasSync();
  renderApp();
};
window._updateBaixadaDays=(id,value)=>{
  const row=DB.baixadas.find(r=>r.id===id);
  if(!row)return;
  row.dias=normalizeBaixadaDays(value);
  if(row.data_ida)row.data_volta=addDaysISO(row.data_ida,row.dias);
  else if(row.data_volta)row.data_ida=addDaysISO(row.data_volta,-row.dias);
  row.updated_at=new Date().toISOString();
  saveLocalBaixadas(DB.baixadas);
  queueBaixadasSync();
  renderApp();
};
window._clearBaixada=(id)=>{
  const row=DB.baixadas.find(r=>r.id===id);
  if(!row)return;
  row.data_ida='';
  row.data_volta='';
  row.status='Solicitado';
  row.updated_at=new Date().toISOString();
  saveLocalBaixadas(DB.baixadas);
  queueBaixadasSync();
  renderApp();
};
