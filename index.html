function exportMateriaisPDF(obra,ids){
  if(!window.jspdf){toast('Biblioteca n\u00E3o carregada.','#f59e0b');return;}
  const{jsPDF}=window.jspdf;
  let mats=DB.materiais.filter(m=>m.obra===obra);
  if(Array.isArray(ids)&&ids.length)mats=mats.filter(m=>ids.includes(m.id));
  if(!mats.length){toast('Nenhum material encontrado.','#f59e0b');return;}

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297,M=12;
  const obraLabel=String(obra||'SEM OBRA').trim().toUpperCase();
  const solicitante=mats[0]?.solicitante||'-';
  const dateSource=mats.find(m=>m?.data_solicitacao)?.data_solicitacao||todayISO();
  const headerDate=/^\d{4}-\d{2}-\d{2}$/.test(String(dateSource||''))?fmtD(dateSource):String(dateSource||new Date().toLocaleDateString('pt-BR'));
  const pend=mats.filter(m=>m.status==='Pendente').length;
  const aprov=mats.filter(m=>m.status==='Aprovado'||m.status==='Comprado').length;
  const upperFirst=v=>{
    const text=String(v||'').trim();
    return text?text.charAt(0).toUpperCase()+text.slice(1):'-';
  };
  const solicitanteLabel=upperFirst(solicitante);

  function drawLogo(){
    doc.setFillColor(26,46,107);
    doc.circle(M+13,20,13,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(255,255,255);
    doc.text('JET',M+13,22,{align:'center'});
  }

  function drawDateBox(){
    doc.setDrawColor(26,46,107);
    doc.setLineWidth(0.65);
    doc.roundedRect(W-M-34,8,34,14,2,2);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.setTextColor(70,80,110);
    doc.text(headerDate,W-M-17,17,{align:'center'});
  }

  function drawHeader(titleText,showDateBox=true){
    drawLogo();
    doc.setFont('helvetica','bold');
    doc.setFontSize(15);
    doc.setTextColor(20,30,70);
    const titleLines=doc.splitTextToSize(titleText,128);
    doc.text(titleLines,M+30,14);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(130,140,170);
    const companyY=titleLines.length>1?29:24;
    doc.text('JET Servi\u00E7os de Engenharia',M+30,companyY);
    doc.setDrawColor(26,46,107);
    doc.setLineWidth(0.55);
    doc.line(M+30,companyY+4,W-M,companyY+4);
    if(showDateBox)drawDateBox();
  }

  function drawSummary(items){
    const top=40;
    const width=(W-M*2)/items.length;
    doc.setFillColor(240,242,248);
    doc.roundedRect(M,top,W-M*2,12,3,3,'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    doc.setTextColor(75,85,105);
    items.forEach((item,index)=>doc.text(String(item),M+4+(index*width),top+7));
    return top+18;
  }

  function drawStamp(label){
    let y=doc.__lastTableY+16;
    if(y>H-38){doc.addPage('a4','portrait');y=28;}
    doc.setDrawColor(60,60,80);
    doc.setLineWidth(0.45);
    doc.line(M+8,y,W/2+28,y);
    const center=(M+8+W/2+28)/2;
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(75,85,105);
    doc.text(label,center,y+6,{align:'center'});
    doc.setFontSize(8);
    doc.setTextColor(120,130,150);
    doc.text('Data: '+headerDate,center,y+12,{align:'center'});
  }

  function toLines(value,width){
    const textValue=String(value==null?'':value);
    const lines=doc.splitTextToSize(textValue,width);
    return lines.length?lines:[''];
  }

  function drawMultiline(lines,x,y,width,align='left',lineHeight=3.2){
    const baseX=align==='center'?x+width/2:(align==='right'?x+width-2:x+2);
    lines.forEach((line,index)=>doc.text(line,baseX,y+4+(index*lineHeight),{align:align==='left'?'left':align}));
  }

  function drawManualTable(columns,rows,startY,redrawPage,kind){
    let y=startY;
    const headerHeight=11;

    const drawTableHead=()=>{
      let x=M;
      doc.setFont('helvetica','bold');
      doc.setFontSize(kind==='req'?7.1:7.4);
      columns.forEach(col=>{
        doc.setFillColor(26,46,107);
        doc.setDrawColor(180,190,220);
        doc.setLineWidth(0.25);
        doc.rect(x,y,col.width,headerHeight,'FD');
        doc.setTextColor(255,255,255);
        const headLines=toLines(col.label,col.width-4);
        drawMultiline(headLines,x,y,col.width,'center',2.9);
        x+=col.width;
      });
      y+=headerHeight;
    };

    drawTableHead();
    rows.forEach((row,rowIndex)=>{
      const cells=columns.map((col,idx)=>({ col, raw:row[idx], lines:toLines(row[idx],col.width-4) }));
      const rowHeight=Math.max(9,...cells.map(cell=>(cell.lines.length*3.15)+4));
      if(y+rowHeight>H-30){
        doc.addPage('a4','portrait');
        y=redrawPage();
        drawTableHead();
      }
      let x=M;
      cells.forEach((cell,idx)=>{
        const zebra=rowIndex%2===0?[248,249,252]:[255,255,255];
        let fill=zebra;
        let textColor=[30,30,30];
        let fontStyle='normal';
        if(kind==='req'){
          if(idx===4){
            if(cell.raw==='Cr\u00EDtico'){fill=[255,220,220];textColor=[180,0,0];fontStyle='bold';}
            else if(cell.raw==='Urgente'){fill=[255,243,205];textColor=[140,90,0];fontStyle='bold';}
          }
          if(idx===5){
            if(cell.raw==='Pendente')textColor=[180,120,0];
            else if(cell.raw==='Aprovado'||cell.raw==='Comprado')textColor=[0,130,70];
            else if(cell.raw==='Entregue')textColor=[0,100,180];
          }
          if(idx===6){
            const discColors={'El\u00E9trica':[0,100,200],'Hidr\u00E1ulica':[0,150,100],'Civil':[140,80,0],'EPI':[180,0,60],'Geral':[100,100,120],'L\u00F3gica':[120,50,180]};
            textColor=discColors[cell.raw]||[100,100,120];
            fontStyle='bold';
          }
        }
        doc.setFillColor(...fill);
        doc.setDrawColor(190,198,214);
        doc.setLineWidth(0.2);
        doc.rect(x,y,cell.col.width,rowHeight,'FD');
        doc.setFont('helvetica',fontStyle);
        doc.setFontSize(kind==='req'?7.05:7.8);
        doc.setTextColor(...textColor);
        drawMultiline(cell.lines,x,y,cell.col.width,cell.col.align||'left',3.1);
        x+=cell.col.width;
      });
      y+=rowHeight;
    });
    doc.__lastTableY=y;
    return y;
  }

  const reqColumns=[
    {label:'#',width:8,align:'center'},
    {label:'DESCRI\u00C7\u00C3O',width:48},
    {label:'UNID',width:14,align:'center'},
    {label:'QTD',width:12,align:'center'},
    {label:'URG\u00CANCIA',width:18,align:'center'},
    {label:'STATUS',width:18,align:'center'},
    {label:'DISCIPLINA',width:24,align:'center'},
    {label:'SOLICITANTE',width:20},
    {label:'OBSERVA\u00C7\u00C3O',width:24}
  ];

  const confColumns=[
    {label:'ITEM',width:12,align:'center'},
    {label:'DESCRI\u00C7\u00C3O',width:72},
    {label:'UNIDADE',width:18,align:'center'},
    {label:'QUANTIDADE',width:18,align:'center'},
    {label:'RECEBIMENTO',width:28,align:'center'},
    {label:'OBSERVA\u00C7\u00C3O',width:38}
  ];

  const reqRows=mats.map((m,i)=>[
    String(i+1),
    m.item||'',
    m.unidade||'un',
    String(m.quantidade||''),
    m.urgencia||'Normal',
    m.status||'Pendente',
    m.disciplina||'Geral',
    upperFirst(m.solicitante||''),
    m.observacao_item||m.observacao||''
  ]);

  const confRows=mats.map((m,i)=>[
    String(i+1),
    m.item||'',
    m.unidade||'un',
    String(m.quantidade||''),
    '',
    ''
  ]);

  function startReqPage(){
    drawHeader('Requisi\u00E7\u00E3o de Materiais - '+obraLabel,false);
    return drawSummary([`Total: ${mats.length} itens`,`Pendentes: ${pend}`,`Aprovados/Comprados: ${aprov}`,`Solicitante: ${solicitanteLabel}`]);
  }

  function startConferencePage(titleText){
    drawHeader(titleText+' - '+obraLabel);
    return drawSummary([`Total: ${mats.length} itens`,`Solicitante: ${solicitanteLabel}`,`Data: ${headerDate}`]);
  }

  let reqStart=startReqPage();
  drawManualTable(reqColumns,reqRows,reqStart,startReqPage,'req');
  drawStamp('Eng. ou Encarregado');

  doc.addPage('a4','portrait');
  let confStart=startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia obra');
  drawManualTable(confColumns,confRows,confStart,()=>startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia obra'),'conf');
  drawStamp('Almoxarife');

  doc.addPage('a4','portrait');
  let almoxStart=startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia via almoxarifado');
  drawManualTable(confColumns,confRows,almoxStart,()=>startConferencePage('Planilha de Materiais \u2014 Confer\u00EAncia via almoxarifado'),'conf');
  drawStamp('Almoxarife');

  const totalPages=doc.getNumberOfPages();
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(150,150,150);
    doc.text('JET Gest\u00E3o de Obras \u00B7 P\u00E1gina '+i+'/'+totalPages,W/2,H-8,{align:'center'});
  }

  doc.save('Requisicao_Materiais_'+obra.replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  toast('PDF exportado!');
}

      doc.text('Anexos (fotos)',M,14);
      let fx=M,fy=20,maxH=0,col=0;
      for(const foto of fotos){
        try{
          const resp=await fetch(foto.url||foto);
          const blob=await resp.blob();
          const b64=await new Promise(res=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.readAsDataURL(blob);});
          const ext=(foto.name||'img').split('.').pop().toUpperCase().replace('JPG','JPEG');
          const imgType=['JPEG','PNG','WEBP'].includes(ext)?ext:'JPEG';
          const imgW=85,imgH=65;

          if(fy+imgH>290){doc.addPage();fy=14;doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Anexos (fotos)',M,fy);fy+=6;}

          if(col>=2){fx=M;fy+=maxH+4;maxH=0;col=0;}

      }
    }

  };

function getMobileCardLabel(headers,td,index){
  const explicit=td.getAttribute('data-card-label');
  if(explicit)return explicit;
  const header=headers[index]||'';
  if(header)return header;
  const btns=td.querySelectorAll('button,[role="button"],a');
  if(btns.length>1)return'Ações';
  const titleEl=td.querySelector('[title]');
  if(titleEl?.getAttribute('title'))return titleEl.getAttribute('title');
  if(btns.length===1)return'Ação';
  const input=td.querySelector('input[placeholder],textarea[placeholder],select');
  if(input?.getAttribute('placeholder'))return input.getAttribute('placeholder');
  return '';
}

function applyMobileTableCards(){
  const isMobile=window.innerWidth<=768;
  document.querySelectorAll('.tbl-wrap').forEach(wrap=>{
    wrap.classList.remove('mobile-cards');
    const table=wrap.firstElementChild&&wrap.firstElementChild.tagName==='TABLE'?wrap.firstElementChild:wrap.querySelector('table');
    if(!table)return;
    const headerCells=Array.from(table.querySelectorAll('thead th'));
    const headers=headerCells.map(th=>(th.textContent||'').replace(/\s+/g,' ').trim());
    const styledMinWidth=(table.style.minWidth||'').match(/(\d+)/);
    const largeTable=headerCells.length>=6||headers.filter(Boolean).length>=5||(styledMinWidth&&Number(styledMinWidth[1])>=680);
    if(!isMobile||!largeTable){
      table.querySelectorAll('td').forEach(td=>{
        td.removeAttribute('data-label');
        const value=td.firstElementChild;
        if(value&&value.classList.contains('mobile-card-value')){
          while(value.firstChild)td.appendChild(value.firstChild);
          value.remove();
        }
      });
      return;
    }
    wrap.classList.add('mobile-cards');
    table.querySelectorAll('tbody > tr').forEach(tr=>{
      const cells=Array.from(tr.children).filter(el=>el.tagName==='TD');
      if(!cells.length)return;
      const singleSpan=cells.length===1&&cells[0].hasAttribute('colspan');
      if(singleSpan)return;
      cells.forEach((td,index)=>{
        const label=getMobileCardLabel(headers,td,index);
        if(label)td.setAttribute('data-label',label);else td.removeAttribute('data-label');
        if(!td.querySelector(':scope > .mobile-card-value')){
          const value=document.createElement('div');
          value.className='mobile-card-value';
          while(td.firstChild)value.appendChild(td.firstChild);
          td.appendChild(value);
        }
      });
    });
  });
}

window._closeModal=()=>{S.modal=null;S.modalData={};renderApp();};

window._getModalMatItems=()=>{
  const rows=Array.from(document.querySelectorAll('.mat-item-row'));
  return rows.map((r,i)=>({item:r.querySelector('.mat-item-desc')?.value?.trim()||'',quantidade:r.querySelector('.mat-item-qtd')?.value||'',unidade:r.querySelector('.mat-item-unit')?.value||'un',disc:r.querySelector('.mat-item-disc')?.value||'Geral',obs:r.querySelector('.mat-item-obs')?.value||''})).filter(i=>i.item);
};

window._previewMatXLSX=()=>{
  const items=_getModalMatItems();if(!items.length){toast('Adicione itens primeiro.','#f59e0b');return;}
  const solic=document.getElementById('m-solic')?.value||'';
  const datareq=document.getElementById('m-datareq')?._flatpickr?.selectedDates[0]?.toLocaleDateString('pt-BR')||new Date().toLocaleDateString('pt-BR');
  const obs=document.getElementById('m-obs')?.value||'';
  const byDisc={};
  items.forEach(it=>{const disc=it.disc||'Geral';if(!byDisc[disc])byDisc[disc]=[];byDisc[disc].push(it);});
  return exportStyledXLSX({
    sheetName:'Requisição',
    filename:`Requisicao_${(S.obra||'').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}`,
    title:'Planilha de Requisição',
    meta:[S.obra||'',`Solicitante: ${solic}`,`Data: ${datareq}`,obs?`Obs: ${obs}`:''],
    columns:[{header:'#',key:'idx',width:8,align:'center'},{header:'Descrição / Material',key:'item',width:40},{header:'Unidade',key:'unidade',width:12,align:'center'},{header:'Quantidade',key:'quantidade',width:12,align:'center'},{header:'Obs',key:'obs',width:28},{header:'Disciplina',key:'disc',width:16,badgeMap:XLSX_DISC_MAP}],
    sections:Object.entries(byDisc).map(([disc,groupItems])=>({label:disc,rows:groupItems.map((it,i)=>({idx:i+1,item:it.item,unidade:it.unidade||'un',quantidade:it.quantidade||'',obs:it.obs||'',disc:it.disc||disc}))}))
  });
};

window._previewMatPDF=()=>{
  const items=_getModalMatItems();if(!items.length){toast('Adicione itens primeiro.','#f59e0b');return;}
  if(!window.jspdf){toast('Carregando...','#f59e0b');return;}
  const solic=document.getElementById('m-solic')?.value||'';
  const datareq=document.getElementById('m-datareq')?._flatpickr?.selectedDates[0]?.toLocaleDateString('pt-BR')||new Date().toLocaleDateString('pt-BR');
  const obs=document.getElementById('m-obs')?.value||'';
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  // Title bar
  doc.setFillColor(26,46,107);doc.rect(0,0,297,18,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text(`Planilha de Requisição ${S.obra}`,10,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(datareq,287,12,{align:'right'});
  // Sub header
  doc.setFillColor(235,239,255);doc.rect(0,18,297,10,'F');
  doc.setTextColor(50,60,100);doc.setFontSize(8);
  doc.text(`Solicitante: ${solic}`,10,24);
  if(obs)doc.text(`Obs: ${obs}`,100,24);
  // Group by disciplina
  const byDisc={};
  items.forEach(it=>{const d=it.disc||'Geral';if(!byDisc[d])byDisc[d]=[];byDisc[d].push(it);});
  let startY=30;
  Object.entries(byDisc).forEach(([disc,ditems])=>{
    doc.autoTable({
      startY,
      head:[[{content:disc,colSpan:6,styles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold',fontSize:9}}],
            ['Item','Descrição / Material','Unidade','Quantidade','Obs','']],
      body:ditems.map((it,i)=>[i+1,it.item,it.unidade,it.quantidade||'',it.obs||'','']),
      styles:{fontSize:8,cellPadding:3,textColor:[30,30,30]},
      headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,247,255]},
      columnStyles:{0:{cellWidth:10,halign:'center'},2:{cellWidth:18,halign:'center'},3:{cellWidth:22,halign:'center'},4:{cellWidth:60},5:{cellWidth:8}},
      tableLineColor:[200,210,240],tableLineWidth:.2,
      didDrawPage:(d)=>{doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text(`JET Gestão de Obras · ${S.obra} · Pág ${d.pageNumber}`,148,205,{align:'center'});}
    });
    startY=doc.lastAutoTable.finalY+6;
  });
  doc.save(`Requisicao_${(S.obra||'').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('PDF baixado!');
};

window._saveAditivo=async(mode,eid)=>{
  const nome=document.getElementById('m-nome')?.value?.trim();if(!nome){toast('Nome obrigatório.','#ef4444');return;}
  const obj={nome,solicitacao:document.getElementById('m-sol')?.value||'',data:document.getElementById('m-data')?.value||null,valor:document.getElementById('m-valor')?.value?parseFloat(document.getElementById('m-valor').value):null,responsavel:document.getElementById('m-resp')?.value||'',obra:S.obra,status:'Em Elaboração',proposta:'EM ANÁLISE'};
  if(mode==='edit-aditivo'){const{error}=await sb.from('aditivos').update(obj).eq('id',eid);if(error){toast('Erro: '+error.message,'#ef4444');return;}DB.aditivos=DB.aditivos.map(a=>a.id===eid?{...a,...obj}:a);}
  else{const num=nextNum(DB.aditivos.filter(a=>a.obra===S.obra),'AD');const item={id:uid(),numero:num,...obj,comentarios:[],arquivos:[],planilha:[]};const{error}=await sb.from('aditivos').insert(item);if(error){toast('Erro: '+error.message,'#ef4444');return;}DB.aditivos.push(item);}
  toast('Aditivo salvo!');_closeModal();
};

window._saveRequisicao=async()=>{
  const solic=document.getElementById('m-rsolic')?.value||'';
  const data=document.getElementById('m-rdata')?.value||null;
  const urg=document.getElementById('m-rurg')?.value||'Normal';
  const obs=document.getElementById('m-robs')?.value||'';
  const rows=Array.from(document.querySelectorAll('.req-item-row'));
  const items=rows.map(row=>({
    id:row.dataset.id||'',
    item:row.querySelector('.req-item-desc')?.value?.trim()||'',
    quantidade:parseFloat(row.querySelector('.req-item-qtd')?.value)||0,
    unidade:row.querySelector('.req-item-unit')?.value||'un',
    disciplina:row.querySelector('.req-item-disc')?.value||'Geral',
    status:row.querySelector('.req-item-status')?.value||'Pendente',
    observacao_item:row.querySelector('.req-item-obs')?.value||'',
  })).filter(item=>item.item);
  if(!items.length){toast('Adicione pelo menos um item.','#ef4444');return;}
  const btn=document.querySelector('.modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const buildPayload=item=>({
    item:item.item,
    quantidade:item.quantidade,
    unidade:item.unidade,
    disciplina:item.disciplina,
    status:item.status,
    observacao_item:item.observacao_item,
    solicitante:solic,
    data_solicitacao:data,
    urgencia:urg,
    observacao:obs
  });
  const sameMaterial=(prev,next)=>(
    (prev.item||'')===next.item &&
    Number(prev.quantidade||0)===Number(next.quantidade||0) &&
    (prev.unidade||'un')===next.unidade &&
    (prev.disciplina||'Geral')===next.disciplina &&
    (prev.status||'Pendente')===next.status &&
    (prev.observacao_item||'')===next.observacao_item &&
    (prev.solicitante||'')===next.solicitante &&
    (prev.data_solicitacao||null)===next.data_solicitacao &&
    (prev.urgencia||'Normal')===next.urgencia &&
    (prev.observacao||'')===next.observacao
  );
  try{
    const existingById=new Map(DB.materiais.map(m=>[m.id,m]));
    const updates=[];
    const inserts=[];
    items.forEach(item=>{
      const payload=buildPayload(item);
      if(item.id){
        const prev=existingById.get(item.id)||{};
        if(!sameMaterial(prev,payload))updates.push({id:item.id,payload});
      }else{
        inserts.push({id:uid(),obra:S.obra,...payload});
      }
    });
    if(updates.length){
      const results=await Promise.all(updates.map(u=>sb.from('materiais').update(u.payload).eq('id',u.id)));
      const failed=results.find(r=>r.error);
      if(failed){toast('Erro: '+failed.error.message,'#ef4444');return;}
      updates.forEach(u=>{DB.materiais=DB.materiais.map(m=>m.id===u.id?{...m,...u.payload}:m);});
    }
    if(inserts.length){
      const{error}=await sb.from('materiais').insert(inserts);
      if(error){toast('Erro: '+error.message,'#ef4444');return;}
      DB.materiais=[...inserts,...DB.materiais];
    }
    const keepIds=items.map(item=>item.id).filter(Boolean);
    const origIds=(S.modalData?.ids||[]);
    const deleteIds=origIds.filter(id=>!keepIds.includes(id));
    if(deleteIds.length){
      const{error}=await sb.from('materiais').delete().in('id',deleteIds);
      if(error){toast('Erro: '+error.message,'#ef4444');return;}
      DB.materiais=DB.materiais.filter(m=>!deleteIds.includes(m.id));
    }
    toast('✓ Requisição atualizada! ('+items.length+' itens)');
    _closeModal();renderApp();
  }finally{
    if(btn&&document.body.contains(btn)){btn.disabled=false;btn.textContent='Salvar';}
  }
};

window._updateBaixadaDate=(id,field,value)=>{
  const row=DB.baixadas.find(r=>r.id===id);
  if(!row)return;
  const dias=normalizeBaixadaDays(row.dias);
  if(!value){
    row.data_ida='';
    row.data_volta='';
  }else if(field==='data_ida'){
    row.data_ida=value;
    row.data_volta=addDaysISO(value,dias);
  }else{
    row.data_volta=value;
    row.data_ida=addDaysISO(value,-dias);
  }
  row.updated_at=new Date().toISOString();
  saveLocalBaixadas(DB.baixadas);
  queueBaixadasSync();
  renderApp();
};
window._updateBaixadaDays=(id,value)=>{
  const row=DB.baixadas.find(r=>r.id===id);
  if(!row)return;
  row.dias=normalizeBaixadaDays(value);
  if(row.data_ida)row.data_volta=addDaysISO(row.data_ida,row.dias);
  else if(row.data_volta)row.data_ida=addDaysISO(row.data_volta,-row.dias);
  row.updated_at=new Date().toISOString();
  saveLocalBaixadas(DB.baixadas);
  queueBaixadasSync();
  renderApp();
};

window._setExpedicaoStatus=(num,status)=>{
  const key=getAlmoxTransferKey(num);
  const group=buildAlmoxExpedicaoGroups().find(item=>item.key===key);
  if(!group)return;
  const nextStatus=normalizeAlmoxTransferStatus(status);
  if(group.status===nextStatus){renderApp();return;}
  if(nextStatus==='Recebido'){
    window._openExpedicaoRecebimento(key);
    return;
  }
  const patch={status:nextStatus};
  if(nextStatus==='Em transito'&&!group.meta.transito_em)patch.transito_em=todayISO();
  if(nextStatus==='Separado'){
    patch.transito_em='';
    patch.recebido_em='';
    patch.recebido_por='';
    patch.recebimento_obs='';
  }
  setAlmoxTransferMeta(key,patch);
  if(nextStatus==='Em transito'&&group.status!=='Em transito'){
    group.items.forEach(item=>logAlmoxMovimento({
      tipo:'Despacho',
      itemId:item.id,
      item:item.item,
      obra_origem:group.meta.obra_origem||'ALMOX CENTRAL',
      obra_destino:item.obra||'',
      qtd:Number(item.qtd||0),
      unidade:item.unidade||'un',
      responsavel:item.responsavel||currentUser?.email?.split('@')[0]||'',
      numero_controle:key,
      saldo_anterior:Number(item.qtd||0),
      saldo_atual:Number(item.qtd||0),
      observacao:`Transferencia ${key} despachada para a obra.`,
      data:patch.transito_em||todayISO(),
      created_at:new Date().toISOString()
    }));
  }
  toast(`Transferencia ${key} atualizada para ${nextStatus}.`,'#22c55e');
  renderApp();
};

window._invExportPDF=(obra)=>{
  if(!window.jspdf){toast('Biblioteca não carregada.','#f59e0b');return;}
  const{jsPDF}=window.jspdf;
  const items=DB.estoque.filter(e=>!isExpedicaoTipo(e.tipo)&&e.obra===obra);
  if(!items.length)return;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,M=14;
  doc.setFillColor(26,46,107);doc.circle(M+10,14,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);doc.text('JET',M+10,16,{align:'center'});
  doc.setFontSize(16);doc.setTextColor(20,20,60);doc.text('Inventário de Estoque',M+26,11);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(80,80,100);doc.text(obra,M+26,17);
  doc.setFontSize(9);doc.setTextColor(130,130,150);doc.text('JET Serviços de Engenharia',M+26,22);
  doc.text(new Date().toLocaleDateString('pt-BR'),W-M,11,{align:'right'});
  const totalQtd=items.reduce((s,e)=>s+Number(e.qtd||0),0);
  doc.setFillColor(240,242,248);doc.roundedRect(M,28,W-M*2,10,2,2,'F');
  doc.setFontSize(8);doc.setTextColor(60,60,80);
  doc.text('Total: '+items.length+' itens',M+4,34);
  doc.text('Quantidade total: '+totalQtd+' unidades',M+60,34);

function mergeStockObservation(base,extra){return[base,extra].map(v=>String(v||'').trim()).filter(Boolean).join(' | ');}
let _almoxActionBusy=false;
async function withAlmoxActionLock(task){
  if(_almoxActionBusy){toast('Aguarde a conclusao da operacao atual.','#f59e0b');return false;}
  _almoxActionBusy=true;
  try{return await task();}finally{_almoxActionBusy=false;}
}
window._syncAlmoxEntradaSelection=()=>{
  const selectedId=document.getElementById('m-ent-item-id')?.value?.trim();
  const item=selectedId?getAlmoxInventario().find(row=>row.id===selectedId):null;
  const saldo=document.getElementById('m-ent-saldo');
  const name=document.getElementById('m-ent-item');
  const unit=document.getElementById('m-ent-unit');
  const obra=document.getElementById('m-ent-obra');
  const min=document.getElementById('m-ent-min');
  const num=document.getElementById('m-ent-num');
  if(saldo)saldo.value=item?`${item.qtd||0} ${item.unidade||'un'}`:'Novo recebimento';
  if(item){
    if(name)name.value=item.item||'';
    if(unit)unit.value=item.unidade||'un';
    if(obra)obra.value=item.obra||'GLOBAL';
    if(min)min.value=getAlmoxMinStock(item);
    if(num&&!num.value.trim())num.value=item.numero_controle||'';
  }else if(min&&!min.value){
    min.value=String(ALMOX_LOW_STOCK_QTD);
  }
};

window._saveAlmoxEntrada=async(id)=>withAlmoxActionLock(async()=>{
  const selectedId=document.getElementById('m-ent-item-id')?.value?.trim()||id||'';
  const selected=selectedId?getAlmoxInventario().find(item=>item.id===selectedId):null;
  const qtd=Number(document.getElementById('m-ent-qtd')?.value||0);
  const min=Math.max(0,Number(document.getElementById('m-ent-min')?.value||0)||0);
  const data=document.getElementById('m-ent-data')?.value;
  const itemName=(document.getElementById('m-ent-item')?.value||selected?.item||'').trim();
  const unidade=(document.getElementById('m-ent-unit')?.value||selected?.unidade||'un').trim()||'un';
  const obra=(document.getElementById('m-ent-obra')?.value||selected?.obra||'GLOBAL').trim()||'GLOBAL';
  const resp=document.getElementById('m-ent-resp')?.value||selected?.responsavel||'';
  const num=document.getElementById('m-ent-num')?.value?.trim()||selected?.numero_controle||'';
  const obs=document.getElementById('m-ent-obs')?.value||'';
  if(!(qtd>0)||!data){toast('Informe quantidade e data da entrada.','#ef4444');return;}
  if(!selected&&!itemName){toast('Informe o nome do material ou selecione um item existente.','#ef4444');return;}
  const target=selected||findAlmoxItemBySignature({obra,item:itemName,unidade});
  if(selectedId&&!selected){toast('Item do estoque nao encontrado.','#ef4444');return;}
  if(target){
    const saldoAnterior=Number(target.qtd)||0;
    const patch={qtd:saldoAnterior+qtd,entrada:data,responsavel:resp,numero_controle:num||target.numero_controle||'',observacao:mergeStockObservation(target.observacao,obs||`Entrada de ${qtd} ${target.unidade||unidade} em ${fmtD(data)}`)};
    const {error}=await sb.from('estoque').update(patch).eq('id',target.id);
    if(error){toast('Erro: '+error.message,'#ef4444');return;}
    DB.estoque=DB.estoque.map(item=>item.id===target.id?{...item,...patch}:item);
    if(min>0)setAlmoxItemMeta(target.id,{estoque_minimo:min});else removeAlmoxItemMeta(target.id);
    logAlmoxMovimento({tipo:'Entrada',itemId:target.id,item:target.item||itemName,obra_origem:'Recebimento',obra_destino:target.obra||obra,qtd,unidade:target.unidade||unidade,responsavel:resp,numero_controle:num,saldo_anterior:saldoAnterior,saldo_atual:saldoAnterior+qtd,observacao:obs||'Entrada registrada no almoxarifado.',data,created_at:new Date().toISOString()});
    toast('Entrada registrada e saldo atualizado.','#22c55e');
  }else{
    const obj={id:uid(),obra,item:itemName,qtd,unidade,tipo:'Inventario',numero_controle:num,responsavel:resp,observacao:obs||'',entrada:data,saida:null,created_at:new Date().toISOString()};
    const {error}=await sb.from('estoque').insert(obj);
    if(error){toast('Erro: '+error.message,'#ef4444');return;}
    DB.estoque.unshift(obj);
    if(min>0)setAlmoxItemMeta(obj.id,{estoque_minimo:min});
    logAlmoxMovimento({tipo:'Entrada',itemId:obj.id,item:obj.item,obra_origem:'Recebimento',obra_destino:obj.obra||obra,qtd,unidade:obj.unidade||unidade,responsavel:resp,numero_controle:num,saldo_anterior:0,saldo_atual:qtd,observacao:obs||'Entrada inicial do material.',data,created_at:new Date().toISOString()});
    toast('Material recebido e cadastrado no inventario.','#22c55e');
  }
  _closeModal();renderApp();
});
window._saveAlmoxSaida=async(id)=>withAlmoxActionLock(async()=>{
  const selectedId=document.getElementById('m-sai-item-id')?.value?.trim()||id||'';
  const est=selectedId?getAlmoxInventario().find(item=>item.id===selectedId):null;
  if(!est){toast('Selecione um item do estoque.','#ef4444');return;}
  const qtd=Number(document.getElementById('m-sai-qtd')?.value||0);
  const data=document.getElementById('m-sai-data')?.value;
  const obra=document.getElementById('m-sai-obra')?.value?.trim();
  const origem=(est.obra||'ALMOX CENTRAL').trim()||'ALMOX CENTRAL';
  const resp=document.getElementById('m-sai-resp')?.value||est.responsavel||'';
  const enteredNum=document.getElementById('m-sai-num')?.value?.trim()||'';
  const num=(enteredNum&&enteredNum!==String(est.numero_controle||''))?enteredNum:('EXP-'+uid().slice(0,6).toUpperCase());
  const obs=document.getElementById('m-sai-obs')?.value||'';
  const saldoAtual=Number(est.qtd)||0;
  if(!(qtd>0)||!data||!obra){toast('Preencha quantidade, data e obra destino.','#ef4444');return;}
  if(qtd>saldoAtual){toast('A saida nao pode ser maior que o saldo disponivel.','#ef4444');return;}
  const stockPatch={qtd:saldoAtual-qtd,saida:data,responsavel:resp,observacao:mergeStockObservation(est.observacao,obs||`Saida de ${qtd} ${est.unidade||'un'} para ${obra} em ${fmtD(data)}`)};
  const previous={qtd:est.qtd,saida:est.saida||null,responsavel:est.responsavel||'',observacao:est.observacao||''};
  const {error:updateError}=await sb.from('estoque').update(stockPatch).eq('id',est.id);
  if(updateError){toast('Erro: '+updateError.message,'#ef4444');return;}
  const mov={id:uid(),obra,item:est.item,qtd,unidade:est.unidade||'un',tipo:'Expedicao',numero_controle:num,responsavel:resp,observacao:obs||'',entrada:est.entrada||data,saida:data,created_at:new Date().toISOString()};
  const {error:insertError}=await sb.from('estoque').insert(mov);
  if(insertError){
    await sb.from('estoque').update(previous).eq('id',est.id);
    toast('Erro ao registrar saida: '+insertError.message,'#ef4444');
    return;
  }
  DB.estoque=DB.estoque.map(item=>item.id===est.id?{...item,...stockPatch}:item);

window._calcPedidoTotal=()=>{
  const rows=Array.from(document.querySelectorAll('.ped-item-row'));

  rows.forEach(r=>{
    const qtd=parseFloat(r.querySelector('.ped-item-qtd')?.value)||1;

async function saveDespesaFilesForId(despId,files){
  const selected=Array.from(files||[]).filter(Boolean);
  if(!selected.length)return true;
  const queue=selected.filter(file=>validateUploadFile(file));
  if(!queue.length)return false;
  const next=[...getDespesaFiles(despId)];
  let uploaded=0;
  for(const file of queue){
    const path=`despesas/${despId}/${uid()}_${sanitizeStorageName(file.name)}`;
    const {error:ue}=await sb.storage.from(BUCKET).upload(path,file);
    if(ue){toast(`Erro ao enviar ${file.name}: ${ue.message}`,'#ef4444');continue;}
    const {data:ud}=sb.storage.from(BUCKET).getPublicUrl(path);
    next.push(cleanDespesaFile({id:uid(),name:file.name,size:file.size||0,path,url:ud.publicUrl}));
    uploaded++;
  }
  await saveRemoteDespesaFiles({...DB.despesaFiles,[despId]:next},{silent:true});
  if(uploaded)toast(`${uploaded} arquivo(s) vinculado(s) ao lançamento.`,'#22c55e');
  return uploaded===queue.length;
}

window._removeDespesaFile=async(id,fileId)=>{
  if(!confirm('Remover arquivo deste lançamento?'))return;
  const current=[...getDespesaFiles(id)];
  const file=current.find(item=>item.id===fileId);
  if(!file)return;
  if(file.path){try{await sb.storage.from(BUCKET).remove([file.path]);}catch(err){console.warn('[JET] Falha ao remover arquivo físico:',err?.message||err);}}
  const next=current.filter(item=>item.id!==fileId);
  const map={...DB.despesaFiles};
  if(next.length)map[id]=next;else delete map[id];
  await saveRemoteDespesaFiles(map,{silent:true});
  toast('Arquivo removido.','#f59e0b');
  renderApp();
};

  const prevDesp=DB.despesas.filter(d=>d.obra===S.obra).sort((a,b)=>a.data?.localeCompare(b.data||'')||0);

  const obj={id:uid(),obra:S.obra,data,descricao:document.getElementById('m-ddesc')?.value||'Adiantamento de despesas (Pix)',

  DB.despesas.push(obj);DB.despesas.sort((a,b)=>(a.data||'').localeCompare(b.data||''));

};

// ─── RENDER APP ───────────────────────────────────────────────────────────
// ─── ONLINE PRESENCE ──────────────────────────────────────────────────────
let _onlineUsers = {};

function setupPresence(){
  if(!currentUser) return;
  const userName = currentUser.email.split('@')[0];
  const channel = sb.channel('online-users', {config:{presence:{key: currentUser.id}}});
  channel
    .on('presence', {event:'sync'}, ()=>{
      const state = channel.presenceState();
      _onlineUsers = {};
      Object.values(state).forEach(presences=>{
        presences.forEach(p=>{if(p.name)_onlineUsers[p.name]=p;});
      });
      // Update online indicator without full re-render
      const el = document.getElementById('online-users-bar');
      if(el) el.innerHTML = renderOnlineUsers();
      const cnt = document.getElementById('online-count-bar');
      const n = Object.keys(_onlineUsers).length;
      if(cnt) cnt.innerHTML = n>0?`<span style="font-size:11px;color:#22c55e;font-weight:600;background:#052014;padding:2px 8px;border-radius:100px;border:1px solid #0a3020">${n} online</span>`:'';
    })
    .subscribe(async status=>{
      if(status === 'SUBSCRIBED'){
        await channel.track({name: userName, at: Date.now()});
      }
    });
}

function renderOnlineUsers(){
  const users = Object.values(_onlineUsers);
  if(!users.length) return '';
  return users.slice(0,5).map(u=>`<div title="${esc(u.name)} (online)" style="width:28px;height:28px;border-radius:50%;background:#1a3a6b;border:2px solid #22c55e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-left:-6px;cursor:default;flex-shrink:0">${u.name.charAt(0).toUpperCase()}</div>`).join('')
  + (users.length>5?`<div style="width:28px;height:28px;border-radius:50%;background:#1a1a1a;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);margin-left:-6px">+${users.length-5}</div>`:'');
}

let _historyBootstrapped=false,_historyApplying=false,_lastHistoryKey='';
function compactModalData(data={}){
  const picked={};
  ['id','obra','ids'].forEach(key=>{if(data&&data[key]!=null)picked[key]=data[key];});
  return picked;
}
function createNavSnapshot(){
  return{
    page:S.page||'home',
    modulo:S.modulo||'obras',
    escritorioTab:S.escritorioTab||'financeiro',
    comprasTab:S.comprasTab||'pedidos',
    obra:S.obra||null,
    obraTab:S.obraTab||'aditivos',
    selectedAditivo:S.selectedAditivo||null,
    detailTab:S.detailTab||'info',
    almoxTab:S.almoxTab||'inventario',
    funcSection:S.funcSection||'equipe',
    modal:S.modal||null,
    modalData:compactModalData(S.modalData||{})
  };
}
function navSnapshotKey(snapshot=createNavSnapshot()){return JSON.stringify(snapshot);}
function applyNavSnapshot(snapshot={}){
  S={
    ...S,
    page:snapshot.page||'home',
    modulo:snapshot.modulo||'obras',
    escritorioTab:snapshot.escritorioTab||'financeiro',
    comprasTab:snapshot.comprasTab||'pedidos',
    obra:snapshot.obra||null,
    obraTab:snapshot.obraTab||'aditivos',
    selectedAditivo:snapshot.selectedAditivo||null,
    detailTab:snapshot.detailTab||'info',
    almoxTab:snapshot.almoxTab||'inventario',
    funcSection:snapshot.funcSection||'equipe',
    modal:snapshot.modal||null,
    modalData:snapshot.modalData||{}
  };
  if(S.page!=='obra'){S.selectedAditivo=null;}
  if(S.page==='dashboard'&&S.modulo!=='compras')S.comprasTab=S.comprasTab||'pedidos';
}
function syncAppHistory({replace=false}={}){
  if(_historyApplying||!currentUser)return;
  const snapshot=createNavSnapshot();
  const key=navSnapshotKey(snapshot);
  if(replace||!_historyBootstrapped){
    history.replaceState({__jet:true,snapshot},'',location.href);
    _historyBootstrapped=true;
    _lastHistoryKey=key;
    return;
  }
  if(key===_lastHistoryKey)return;
  history.pushState({__jet:true,snapshot},'',location.href);
  _lastHistoryKey=key;
}
window.addEventListener('popstate',event=>{
  if(!event.state?.__jet||!currentUser)return;
  _historyApplying=true;
  applyNavSnapshot(event.state.snapshot||{});
  renderApp();
  _historyApplying=false;
});

function renderApp(){
  if(!currentUser){renderAuth();return;}
  let content='';
  if(S.page==='home'){
    document.getElementById('root').innerHTML=renderHome()+renderModal();
    applyMobileTableCards();
    syncAppHistory({replace:!_historyBootstrapped});
    return;
  }
  else if(S.page==='dashboard')content=renderDashboard();
  else if(S.page==='obra')content=renderObraInner();
  else if(S.page==='gerenciar-obras')content=renderGerenciarObras();

  document.getElementById('root').innerHTML=topbarHtml()+content+renderModal();
  applyMobileTableCards();
  syncAppHistory({replace:!_historyBootstrapped});
}

window.addEventListener('resize',()=>{
  clearTimeout(window._mobileTableResize);
  window._mobileTableResize=setTimeout(()=>applyMobileTableCards(),80);
});

// ─── INIT ─────────────────────────────────────────────────────────────────
// Clear stale tab orders from localStorage (old versions had extra tabs)
try{Object.keys(localStorage).filter(k=>k.startsWith('jet-tab-order-')).forEach(k=>localStorage.removeItem(k));}catch{}
try{
  const customRaw=JSON.parse(localStorage.getItem('jet-obras')||'[]');
  const customClean=cleanObraList(customRaw);
  if(customClean.length!==customRaw.length)localStorage.setItem('jet-obras',JSON.stringify(customClean));
  const hiddenRaw=JSON.parse(localStorage.getItem('jet-obras-hidden')||'[]');
  const hiddenClean=cleanObraList(hiddenRaw);
  if(hiddenClean.length!==hiddenRaw.length)localStorage.setItem('jet-obras-hidden',JSON.stringify(hiddenClean));
  const dataRaw=JSON.parse(localStorage.getItem('jet-obras-data')||'[]');
  const dataClean=cleanObraData(dataRaw);
  if(dataClean.length!==dataRaw.length)localStorage.setItem('jet-obras-data',JSON.stringify(dataClean));
}catch{}

(async()=>{
  try{
    // Wait for Supabase to be ready
    if(typeof supabase==='undefined'){
      await new Promise(r=>{const check=()=>typeof supabase!=='undefined'?r():setTimeout(check,100);check();});
    }
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user){currentUser=session.user;await loadAll();setupRT();try{setupPresence();}catch(e){}renderApp();}
    else renderAuth();
    sb.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT'){currentUser=null;renderAuth();}
      else if(event==='SIGNED_IN'&&session?.user&&!currentUser){
        currentUser=session.user;S.page='home';loadAll().then(()=>{setupRT();try{setupPresence();}catch(e){}renderApp();});
      }
    });
  }catch(e){console.warn('[JET] Init error:',e);renderAuth();}
})();
</script>

function applyTheme(theme){
  const html=document.documentElement;
  html.setAttribute('data-theme',theme);
  const themeColor=document.querySelector('meta[name="theme-color"]');
  if(themeColor)themeColor.setAttribute('content',theme==='light'?'#f3f6fb':'#07111f');
}
async function checkForAppUpdate(){
  if(!/^https?:$/i.test(location.protocol))return;
  try{
    const probeUrl=`${window.location.pathname}?jet_build_probe=${Date.now()}`;
    const res=await fetch(probeUrl,{cache:'no-store',headers:{'cache-control':'no-cache'}});
    const html=await res.text();
    const match=html.match(/<meta name="jet-build" content="([^"]+)"/i);
    const remoteBuild=(match?.[1]||'').trim();
    if(!remoteBuild||remoteBuild===APP_BUILD)return;
    const reloadKey=`jet-build-reload:${remoteBuild}`;
    if(sessionStorage.getItem(reloadKey))return;
    sessionStorage.setItem(reloadKey,'1');
    toast('Nova versão encontrada. Atualizando...','#60a5fa');
    setTimeout(()=>window.location.replace(`${window.location.pathname}?build=${encodeURIComponent(remoteBuild)}`),900);
  }catch(err){
    console.warn('[JET] Verificação de atualização falhou:',err?.message||err);
  }
}

window._toggleTheme = () => {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('jet-theme', newTheme);
  renderApp();
};
