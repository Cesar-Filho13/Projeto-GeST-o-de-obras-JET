function renderDashboardCharts(){
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})});}
  const despByMonth={};
  months.forEach(m=>despByMonth[m.key]=0);
  (DB.despesas||[]).forEach(d=>{const k=(d.data||'').slice(0,7);if(despByMonth[k]!==undefined)despByMonth[k]+=(Number(d.valor_conta)||0);});
  const maxDesp=Math.max(...Object.values(despByMonth),1);
  const BAR_H=70;
  const despBars=months.map(m=>{
    const val=despByMonth[m.key]||0;
    const h=val>0?Math.max(Math.round(val/maxDesp*BAR_H),3):0;
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0"><div style="font-size:9px;font-weight:600;color:#60a5fa;text-align:center;min-height:12px;overflow:hidden;white-space:nowrap">${val>0?fmtV(val):''}</div><div style="height:${BAR_H}px;width:100%;display:flex;align-items:flex-end"><div style="width:100%;height:${h}px;background:linear-gradient(to top,#1d4ed8,#3b82f6);border-radius:3px 3px 0 0"></div></div><div style="font-size:9px;color:var(--text3)">${m.label}</div></div>`;
  }).join('');
  const matStatus={};
  const matColors={'Pendente':'#f59e0b','Aprovado':'#3b82f6','Em Análise':'#a855f7','Separado':'#14b8a6','Entregue':'#22c55e','Cancelado':'#ef4444','Aguardando Orçamento':'#f97316'};
  (DB.materiais||[]).forEach(m=>{const s=m.status||'Pendente';matStatus[s]=(matStatus[s]||0)+1;});
  const matTotal=Math.max(DB.materiais.length,1);
  const matBars=Object.entries(matStatus).sort((a,b)=>b[1]-a[1]).map(([st,cnt])=>{
    const pct=Math.max(Math.round(cnt/matTotal*100),cnt>0?1:0);
    const col=matColors[st]||'#555';
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px"><div style="width:82px;font-size:10px;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(st)}">${esc(st)}</div><div style="flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:3px;min-width:${cnt>0?2:0}px"></div></div><div style="width:40px;text-align:right;font-size:10px;font-weight:700;color:${col};white-space:nowrap">${cnt}</div></div>`;
  }).join('');
  const funcByObra={};
  (DB.funcionarios||[]).filter(f=>f.status==='Ativo'&&f.obra).forEach(f=>{funcByObra[f.obra]=(funcByObra[f.obra]||0)+1;});
  const maxFunc=Math.max(...Object.values(funcByObra),1);
  const funcBars=Object.entries(funcByObra).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([ob,cnt])=>{
    const pct=Math.max(Math.round(cnt/maxFunc*100),2);
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px"><div style="width:82px;font-size:10px;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="S.obra='${escJs(ob)}';S.page='obra';S.obraTab='funcionarios';renderApp()" title="${esc(ob)}">${esc(ob)}</div><div style="flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:#a855f7;border-radius:3px;min-width:2px"></div></div><div style="width:20px;text-align:right;font-size:10px;font-weight:700;color:#c084fc">${cnt}</div></div>`;
  }).join('');
  return`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:16px 0 4px">
<div class="card" style="padding:14px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Adiantamentos — últimos 6 meses</div><div style="display:flex;gap:3px">${despBars}</div></div>
<div class="card" style="padding:14px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Materiais por status</div>${matBars||'<div style="color:var(--text3);font-size:12px;padding:8px 0">Nenhum material.</div>'}</div>
<div class="card" style="padding:14px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Funcionários ativos por obra</div>${funcBars||'<div style="color:var(--text3);font-size:12px;padding:8px 0">Nenhum funcionário ativo.</div>'}</div>
</div>`;
}

  const desp=DB.despesas.filter(d=>d.obra===obra);
  const estoque=DB.estoque.filter(e=>e.obra===obra);

${content}

const TH_ICONS={
  nome:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="5" x2="14" y2="5"/><line x1="2" y1="9" x2="10" y2="9"/><line x1="2" y1="13" x2="12" y2="13"/></svg>`,color:'#60a5fa'},
  numero:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"><line x1="5" y1="2" x2="4" y2="14"/><line x1="11" y1="2" x2="10" y2="14"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="2" y1="10" x2="14" y2="10"/></svg>`,color:'#a78bfa'},
  status:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="#34d399" stroke-width="1.8"/><circle cx="8" cy="8" r="2" fill="#34d399"/></svg>`,color:'#34d399'},
  valor:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"><path d="M8 2v12M5 5.5C5 4.1 6.3 3 8 3s3 1 3 2.5S9.7 8 8 8s-3 1.1-3 2.5S6.3 13 8 13s3-1 3-2.5"/></svg>`,color:'#fbbf24'},
  solicitacao:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12V4a1 1 0 011-1h10a1 1 0 011 1v8"/><path d="M2 12l2-2h8l2 2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="9" y2="9"/></svg>`,color:'#f472b6'},
  data:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>`,color:'#2dd4bf'},
  proposta:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L9 2z"/><polyline points="9,2 9,6 13,6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="8" y2="12"/></svg>`,color:'#fb923c'},
  responsavel:{svg:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>`,color:'#c084fc'},
};

function _thCol(field,icon,label,minW){
  const w=window._colWidths&&window._colWidths[field]?`width:${window._colWidths[field]}px;min-width:${window._colWidths[field]}px`:`min-width:${minW}px`;
  const ico=TH_ICONS[field];
  return`<th style="${w}" data-field="${field}" class="sortable" onclick="window._sortBy&&window._sortBy('${field}')">
<div class="th-inner">
  ${ico?`<span class="th-icon" style="color:${ico.color}">${ico.svg}</span>`:`<span class="th-icon">${icon}</span>`}
  <span class="th-label" style="color:${ico?ico.color:'var(--text3)'}">${label}</span>
</div>
<div class="col-resize" onmousedown="window._startResize&&window._startResize(event,'${field}')"></div>
</th>`;
}

function renderAditivos(ads,obra){
  const adSubTab=S.adSubTab||'todos';
  const cntTodos=ads.length;
  const cntAnd=ads.filter(a=>a.status!=='Concluído').length;
  const cntConcl=ads.filter(a=>a.status==='Concluído').length;
  const filtered=adSubTab==='concluidos'?ads.filter(a=>a.status==='Concluído'):adSubTab==='andamento'?ads.filter(a=>a.status!=='Concluído'):ads;
  const val=filtered.reduce((s,a)=>s+(Number(a.valor)||0),0);
  const subNav=`<nav class="obra-nav" style="margin:8px 0 14px;padding:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;gap:3px">
  <button class="obra-nav-btn${adSubTab==='todos'?' active':''}" style="${adSubTab==='todos'?'background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.45);color:#93c5fd':'background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.18)'}" onclick="S.adSubTab='todos';renderApp()">Todos<span class="nav-count" style="background:rgba(59,130,246,.2);color:#93c5fd;border-color:rgba(59,130,246,.3)">${cntTodos}</span></button>
  <button class="obra-nav-btn${adSubTab==='andamento'?' active':''}" style="${adSubTab==='andamento'?'background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#fca5a5':'background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.18)'}" onclick="S.adSubTab='andamento';renderApp()">Em andamento<span class="nav-count" style="background:rgba(239,68,68,.2);color:#fca5a5;border-color:rgba(239,68,68,.3)">${cntAnd}</span></button>
  <button class="obra-nav-btn${adSubTab==='concluidos'?' active':''}" style="${adSubTab==='concluidos'?'background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.45);color:#86efac':'background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.18)'}" onclick="S.adSubTab='concluidos';renderApp()">Concluídos<span class="nav-count" style="background:rgba(34,197,94,.2);color:#86efac;border-color:rgba(34,197,94,.3)">${cntConcl}</span></button>
</nav>`;
  return`<div>
<div class="section-header">
  <div>
    <div class="section-title">Aditivos de Obra</div>
    <div class="section-sub">${filtered.length} aditivos · ${fmtV(val)}</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    ${renderExportMenu('aditivos',obra)}
    <button class="btn btn-primary" onclick="_openModal('new-aditivo')">+ Novo Aditivo</button>
  </div>
</div>
${subNav}
${filtered.length===0?`<div class="empty-state"><p>${adSubTab==='concluidos'?'Nenhum aditivo concluído ainda.':adSubTab==='andamento'?'Nenhum aditivo em andamento.':'Nenhum aditivo cadastrado para esta obra.'}</p>${adSubTab!=='concluidos'?'<button class="btn btn-primary" onclick="_openModal(\'new-aditivo\')">+ Primeiro Aditivo</button>':''}</div>`:
`<div class="tbl-wrap" id="ad-tbl-wrap"><table id="ad-tbl" style="width:100%;border-collapse:collapse;min-width:1000px">
<thead><tr>
${_thCol('nome','Aa','Nome',200)}
${_thCol('numero','#','Número',110)}
${_thCol('status','◉','Status',155)}
${_thCol('valor','R$','Valor',105)}
${_thCol('solicitacao','Aa','Solicitação',155)}
${_thCol('data','◦','Data',110)}
${_thCol('proposta','◉','Proposta',125)}
${_thCol('responsavel','○','Responsável',130)}
<th style="width:60px;text-align:center"><div class="th-inner" style="justify-content:center"><span>↗</span></div></th>
</tr></thead>
<tbody>${filtered.map(a=>`<tr style="border-bottom:1px solid var(--border)">
<td style="padding:5px 8px"><input class="ci" style="font-weight:600;color:var(--text);width:100%" value="${esc(a.nome)}" onclick="event.stopPropagation()" onblur="if(this.value.trim())updateField('aditivos','${a.id}','nome',this.value.trim())" onkeydown="if(event.key==='Enter')this.blur()"></td>
<td style="padding:5px 8px"><input class="ci" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);width:100%" value="${esc(a.numero)}" onclick="event.stopPropagation()" onblur="if(this.value.trim())updateField('aditivos','${a.id}','numero',this.value.trim())" onkeydown="if(event.key==='Enter')this.blur()"></td>
<td style="padding:5px 8px" onclick="event.stopPropagation()">${makeCd(SL,SS,a.status,`updateField('aditivos','${a.id}','status',VAL)`)}</td>
<td style="padding:5px 8px"><input class="ci ci-num" type="number" step="0.01" style="width:100%" value="${a.valor!=null?a.valor:''}" placeholder="—" onclick="event.stopPropagation()" onblur="updateField('aditivos','${a.id}','valor',this.value===''?null:parseFloat(this.value))" onkeydown="if(event.key==='Enter')this.blur()"></td>
<td style="padding:5px 8px"><input class="ci" style="width:100%;color:var(--text3)" list="sols-${a.id}" value="${esc(a.solicitacao||'')}" placeholder="—" onclick="event.stopPropagation()" onblur="updateField('aditivos','${a.id}','solicitacao',this.value)" onkeydown="if(event.key==='Enter')this.blur()"><datalist id="sols-${a.id}"><option value="Definição in loco"><option value="Revisão de Projeto"><option value="Armando Dallari"></datalist></td>
<td style="padding:5px 8px"><input class="ci fp-adit" data-aid="${a.id}" style="width:100%;color:var(--text3)" value="${esc(a.data||'')}" placeholder="dd/mm/aaaa" readonly onclick="event.stopPropagation()"></td>
<td style="padding:5px 8px" onclick="event.stopPropagation()">${makeCd(PL,PS,a.proposta,`updateField('aditivos','${a.id}','proposta',VAL)`)}</td>
<td style="padding:5px 8px"><input class="ci" style="width:100%;color:var(--text3)" value="${esc(a.responsavel||'')}" placeholder="—" onclick="event.stopPropagation()" onblur="updateField('aditivos','${a.id}','responsavel',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
<td style="padding:5px 8px;text-align:center"><button class="btn btn-sm btn-secondary" onclick="S.selectedAditivo='${a.id}';renderApp()" title="Ver detalhe completo">↗</button></td>
</tr>`).join('')}
</tbody></table></div>
<script>
(function(){
  if(window._colWidths){}else window._colWidths={};
  const heads=document.querySelectorAll('#ad-tbl thead th');
  heads.forEach((th,i)=>{
    if(window._colWidths[i]){th.style.width=window._colWidths[i]+'px';th.style.minWidth=window._colWidths[i]+'px';}
    const handle=th.querySelector('.col-resize');
    if(!handle)return;
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const startX=e.clientX,startW=th.getBoundingClientRect().width;
      handle.classList.add('resizing');
      const move=ev=>{const w=Math.max(60,startW+ev.clientX-startX);th.style.width=w+'px';th.style.minWidth=w+'px';window._colWidths[i]=w;};
      const up=()=>{handle.classList.remove('resizing');document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    });
  });
  if(window.flatpickr){document.querySelectorAll('.fp-adit').forEach(el=>{if(el._flatpickr)el._flatpickr.destroy();const aid=el.dataset.aid;flatpickr(el,{locale:'pt',dateFormat:'Y-m-d',altInput:true,altFormat:'d/m/Y',disableMobile:true,onChange:(d,s)=>updateField('aditivos',aid,'data',s||null)});});}
})();
<\/script>`}
</div>`;
}

// ─── ADITIVO DETAIL ───────────────────────────────────────────────────────
function renderAditivoDetail(){
  const a=DB.aditivos.find(x=>x.id===S.selectedAditivo);
  if(!a)return'<div class="loader">Não encontrado.</div>';
  const planTotal=(a.planilha||[]).reduce((s,r)=>s+(Number(r.quantidade||0)*Number(r.valor_unit||0)),0);
  return`<div>
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px">
  <div>
    <button class="btn btn-secondary btn-sm" onclick="S.selectedAditivo=null;renderApp()" style="margin-bottom:12px">← Voltar para lista</button>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:1px">${esc(a.numero)}</div>
    <div style="font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:12px;line-height:1.2">${esc(a.nome)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${makeCd(SL,SS,a.status,`updateField('aditivos','${a.id}','status',VAL)`,true)}
      ${makeCd(PL,PS,a.proposta,`updateField('aditivos','${a.id}','proposta',VAL)`,true)}
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button class="btn btn-secondary btn-sm" onclick="_openModal('edit-aditivo',{id:'${a.id}'})">✎ Editar</button>
    <button class="btn btn-danger btn-sm" onclick="_deleteAditivo('${a.id}')">🗑</button>
  </div>
</div>

<div class="card" style="margin-bottom:14px">
  <div class="card-title">ℹ Informações</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px 24px">
    ${[['Obra',a.obra||'—'],['Responsável',a.responsavel||'—'],['Valor',fmtV(a.valor)],['Solicitação',a.solicitacao||'—'],['Data',fmtD(a.data)]].map(([l,v])=>`<div>
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">${l}</div>
      <div style="font-size:14px;font-weight:600;color:${l==='Valor'&&a.valor?'#34d399':'var(--text)'}">${esc(v)}</div>
    </div>`).join('')}
  </div>
</div>

<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
  <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
    <div class="card-title" style="margin:0">📋 Planilha de Itens <span style="font-size:12px;font-weight:500;color:var(--text3);margin-left:6px">${(a.planilha||[]).length} item${(a.planilha||[]).length!==1?'s':''}</span></div>
    ${planTotal>0?`<span style="font-size:13px;font-weight:700;color:#34d399">Total: ${fmtV(planTotal)}</span>`:''}
  </div>
  ${renderPlanilha(a)}
</div>

<div class="card" style="margin-bottom:14px">
  <div class="card-title">📎 Arquivos e Mídia <span style="font-size:12px;font-weight:500;color:var(--text3);margin-left:6px">${(a.arquivos||[]).length} arquivo${(a.arquivos||[]).length!==1?'s':''}</span></div>
  ${renderArquivos(a)}
</div>

<div class="card">
  <div class="card-title">💬 Comentários <span style="font-size:12px;font-weight:500;color:var(--text3);margin-left:6px">${(a.comentarios||[]).length}</span></div>
  ${renderComentarios(a)}
</div>
</div>`;
}

// ─── PLANILHA ─────────────────────────────────────────────────────────────
function renderPlanilha(a){
  const rows=a.planilha||[];
  const total=rows.reduce((s,r)=>s+(Number(r.quantidade||0)*Number(r.valor_unit||0)),0);
  const ci=(rid,field,ph,w,type='text')=>`<input class="ci" type="${type}" placeholder="${ph}" style="width:${w}" value="${esc(String(rows.find(r=>r.id===rid)?.[field]||''))}" onblur="window._plUp('${a.id}','${rid}','${field}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
  return`<div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
  <span style="font-size:13px;font-weight:600;color:var(--text2)">${rows.length} item${rows.length!==1?'s':''}</span>
  ${total>0?`<span style="font-size:13px;font-weight:700;color:#34d399">Total: ${fmtV(total)}</span>`:''}
</div>
<div class="tbl-wrap"><table>
<thead><tr><th style="min-width:200px">Descrição</th><th style="width:70px">Unid.</th><th style="width:80px">Qtd.</th><th style="width:110px">Valor Unit.</th><th style="width:110px">Subtotal</th><th>Observação</th><th style="width:36px"></th></tr></thead>
<tbody>
${rows.map(r=>{const sub=Number(r.quantidade||0)*Number(r.valor_unit||0);return`<tr>
<td>${ci(r.id,'nome','Item...','100%')}</td>
<td>${ci(r.id,'unidade','un','100%')}</td>
<td>${ci(r.id,'quantidade','0','100%','number')}</td>
<td>${ci(r.id,'valor_unit','0,00','100%','number')}</td>
<td style="text-align:right;font-weight:600;color:${sub>0?'#34d399':'var(--text3)'}">${sub>0?fmtV(sub):'—'}</td>
<td>${ci(r.id,'observacao','Observação...','100%')}</td>
<td><button onclick="window._plDel('${a.id}','${r.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button></td>
</tr>`;}).join('')}
</tbody></table></div>
<button onclick="window._plAdd('${a.id}')" class="btn-pulse"
  style="margin-top:10px;background:linear-gradient(135deg,#1d4ed8,#3b7ef8);border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:700;padding:9px 18px;border-radius:9px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:7px;transition:all .15s"
  onmouseover="this.style.transform='scale(1.03)';this.style.background='linear-gradient(135deg,#1e40af,#2563eb)'"
  onmouseout="this.style.transform='scale(1)';this.style.background='linear-gradient(135deg,#1d4ed8,#3b7ef8)'">
  <span style="font-size:18px;line-height:1">+</span> Adicionar item
</button>
</div>`;
}

window._plAdd=async(aid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=[...(a.planilha||[]),{id:uid(),nome:'',unidade:'',quantidade:'',valor_unit:'',observacao:''}];await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;renderApp();};
window._plDel=async(aid,rid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=(a.planilha||[]).filter(r=>r.id!==rid);await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;renderApp();};
window._plUp=async(aid,rid,field,val)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=(a.planilha||[]).map(r=>r.id===rid?{...r,[field]:val}:r);await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;};

// ─── ARQUIVOS ─────────────────────────────────────────────────────────────
const FC={pdf:{bg:'#3b1515',c:'#f87171',l:'PDF'},png:{bg:'#0a2214',c:'#4ade80',l:'IMG'},jpg:{bg:'#0a2214',c:'#4ade80',l:'IMG'},jpeg:{bg:'#0a2214',c:'#4ade80',l:'IMG'},dwg:{bg:'#0e1f3d',c:'#60a5fa',l:'DWG'},dxf:{bg:'#0e1f3d',c:'#60a5fa',l:'DXF'},xlsx:{bg:'#062018',c:'#34d399',l:'XLS'},docx:{bg:'#1a0f3d',c:'#a78bfa',l:'DOC'}};
function fstyle(n){const e=getExt(n);return FC[e]||{bg:'#1a1a1a',c:'#777',l:e.slice(0,3).toUpperCase()||'?'};}

function renderArquivos(a){
  const files=a.arquivos||[];
  const imgs=files.filter(f=>isImg(f.name));
  const docs=files.filter(f=>!isImg(f.name));
  return`<div>
<div class="upload-zone-outer" id="uz-${a.id}" style="border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .15s" onclick="document.getElementById('fi-${a.id}').click()" onmouseover="if(!this.dataset.drag)this.style.borderColor='var(--blue)'" onmouseout="if(!this.dataset.drag){this.style.borderColor='var(--border2)';this.style.background='transparent'}" ondragover="event.preventDefault();this.dataset.drag='1';this.style.borderColor='var(--blue)';this.style.background='#0e1a30'" ondragleave="delete this.dataset.drag;this.style.borderColor='var(--border2)';this.style.background='transparent'" ondrop="event.preventDefault();delete this.dataset.drag;this.style.borderColor='var(--border2)';this.style.background='transparent';window._uploadDrop(event.dataTransfer.files,'${a.id}')">
<input type="file" id="fi-${a.id}" multiple accept="${UPLOAD_ACCEPT}" style="display:none" onchange="window._upload(event,'${a.id}')">
<div style="font-size:13px;color:var(--text3)">📎 Clique ou arraste arquivos aqui</div>
<div style="font-size:11px;color:var(--text3);margin-top:4px">PDF, DWG, DXF, imagens, planilhas e ZIP até 20 MB</div>
</div>
${imgs.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:10px">${imgs.map(f=>`<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--bg2);border:1px solid var(--border)" class="img-th">
<a href="${esc(f.url)}" target="_blank"><img src="${esc(f.url)}" style="width:100%;height:100%;object-fit:cover;display:block"></a>
<button onclick="window._delFile('${a.id}','${f.id}')" style="position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.75);border:none;color:#f87171;cursor:pointer;font-size:12px;display:none" class="img-del">×</button>
<div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:10px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.8));overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div>
</div>`).join('')}</div>`:''}
<div style="display:flex;flex-direction:column;gap:6px">
${docs.map(f=>{const st=fstyle(f.name);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px">
<div style="width:30px;height:30px;border-radius:6px;background:${st.bg};color:${st.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${st.l}</div>
<span style="flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>

window._upload=async(e,aid)=>{for(const f of e.target.files)await _doUpload(aid,f);e.target.value='';};
window._uploadDrop=async(files,aid)=>{for(const f of Array.from(files))await _doUpload(aid,f);};
window._dropToInput=(files,inputId,listId)=>{const input=document.getElementById(inputId);if(!input||!files?.length)return;try{const dt=new DataTransfer();Array.from(files).forEach(f=>dt.items.add(f));input.files=dt.files;}catch(_){}window._previewDespFiles(input,listId);};
window._dropSingleInput=(files,inputId,fnName)=>{if(!files?.length)return;const inp=document.getElementById(inputId);if(inp){try{const dt=new DataTransfer();Array.from(files).forEach(f=>dt.items.add(f));inp.files=dt.files;}catch(_){}}if(window[fnName])window[fnName](files[0]);};
async function _doUpload(aid,file){
  if(!validateUploadFile(file))return;
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  toast(`Enviando ${file.name}...`,'#60a5fa');
  const path=`${aid}/${uid()}_${sanitizeStorageName(file.name)}`;
  const{error:ue}=await sb.storage.from(BUCKET).upload(path,file);if(ue){toast('Erro: '+ue.message,'#ef4444');return;}
  const{data:ud}=sb.storage.from(BUCKET).getPublicUrl(path);
  const fo={id:uid(),name:file.name,size:file.size,path,url:ud.publicUrl};
  const arqs=[...(a.arquivos||[]),fo];
  await sb.from('aditivos').update({arquivos:arqs}).eq('id',aid);a.arquivos=arqs;
  toast(`${file.name} enviado!`);renderApp();
}
window._delFile=async(aid,fid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const fo=(a.arquivos||[]).find(f=>f.id===fid);if(!confirm(`Remover arquivo "${fo?.name||fid}"?`))return;if(fo)await sb.storage.from(BUCKET).remove([fo.path]);const arqs=(a.arquivos||[]).filter(f=>f.id!==fid);await sb.from('aditivos').update({arquivos:arqs}).eq('id',aid);a.arquivos=arqs;toast('Removido.','#f59e0b');renderApp();};

let _mentionActive=false,_mentionStart=-1,_mentionQuery='',_mentionIdx=0;

function renderComentarios(a){

  return`<div>

</div>`;}).join('')}
<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-top:16px;border-top:1px solid var(--border)">
  <div class="avatar">${autor?getInitials(currentUser?.email):'?'}</div>
  <span style="font-size:12px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:100px;font-weight:500">${esc(autor||'Anônimo')}</span>
</div>
<div style="display:flex;gap:8px;align-items:flex-end">

  <button class="btn btn-primary btn-sm" onclick="window._sendComment('${a.id}')" style="height:42px;flex-shrink:0">Enviar</button>
</div></div>`;
}

window._cInput=(el)=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';const val=el.value,pos=el.selectionStart,before=val.slice(0,pos),atIdx=before.lastIndexOf('@');if(atIdx>=0&&(atIdx===0||/\s/.test(before[atIdx-1]))){const q=before.slice(atIdx+1);if(!/\s/.test(q)){_mentionActive=true;_mentionStart=atIdx;_mentionQuery=q;_mentionIdx=0;_showMentions(getMentionSuggestions(q));return;}}  _mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';};
window._cKey=(e)=>{if(_mentionActive){const ms=getMentionSuggestions(_mentionQuery);if(e.key==='ArrowDown'){e.preventDefault();_mentionIdx=(_mentionIdx+1)%Math.max(ms.length,1);_showMentions(ms);return;}if(e.key==='ArrowUp'){e.preventDefault();_mentionIdx=(_mentionIdx-1+Math.max(ms.length,1))%Math.max(ms.length,1);_showMentions(ms);return;}if(e.key==='Enter'&&ms.length){e.preventDefault();_pickMention(ms[_mentionIdx]);return;}if(e.key==='Escape'){_mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';return;}}if(e.key==='Enter'&&!e.shiftKey&&!_mentionActive){e.preventDefault();window._sendComment(S.selectedAditivo);}};
function _showMentions(ms){const m=document.getElementById('mention-menu');if(!m)return;if(!ms.length){m.style.display='none';return;}m.style.display='block';m.innerHTML=ms.map((n,i)=>`<div class="mention-item${i===_mentionIdx?' active':''}" onmousedown="event.preventDefault();_pickMention('${escJs(n)}')"><div class="m-avatar">${n.charAt(0).toUpperCase()}</div>@${esc(n)}</div>`).join('');}
function _pickMention(name){const el=document.getElementById('c-text');if(!el)return;const val=el.value,after=val.slice(el.selectionStart);el.value=val.slice(0,_mentionStart)+'@'+name+' '+after;_mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';el.focus();}
window._sendComment=async(aid)=>{const el=document.getElementById('c-text');const txt=el?.value?.trim();if(!txt)return;const autor=currentUser?currentUser.email.split('@')[0]:'Anônimo';const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const cs=[...(a.comentarios||[]),{id:uid(),autor,texto:txt,data:new Date().toISOString().slice(0,10)}];await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);a.comentarios=cs;el.value='';el.style.height='auto';_mentionActive=false;renderApp();};

window._deleteComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const c=(a.comentarios||[])[idx];
  if(!confirm(`Excluir comentário de @${c?.autor||'?'}?`))return;
  const cs=[...(a.comentarios||[])];cs.splice(idx,1);
  await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);
  a.comentarios=cs;toast('Comentário excluído.','#f59e0b');renderApp();
};

window._editComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=a.comentarios||[];
  const c=cs[idx];if(!c)return;
  const el=document.getElementById('comment-text-'+idx);
  if(!el)return;
  // Replace text with textarea
  const old=c.texto;
  el.innerHTML=`<textarea id="cedit-${idx}" style="width:100%;min-height:60px;padding:8px 10px;border:2px solid #3b82f6;border-radius:8px;background:#0a0a0f;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:vertical">${esc(old)}</textarea><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="window._saveEditComment('${aid}',${idx})">Salvar</button><button class="btn btn-secondary btn-sm" onclick="renderApp()">Cancelar</button></div>`;
  const ta=document.getElementById('cedit-'+idx);
  if(ta){ta.focus();ta.selectionStart=ta.value.length;}
};

window._saveEditComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=a.comentarios||[];
  const ta=document.getElementById('cedit-'+idx);
  if(!ta||!ta.value.trim())return;
  cs[idx]={...cs[idx],texto:ta.value.trim()};
  await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);
  a.comentarios=cs;toast('Comentário atualizado!');renderApp();
};

// ─── RDO ──────────────────────────────────────────────────────────────────
function getLocalRDOStatuses(){
  try{return JSON.parse(localStorage.getItem('jet-rdo-status')||'{}')||{};}catch(_){return{};}
}
function setLocalRDOStatus(id,status){
  const map=getLocalRDOStatuses();
  map[id]=status;
  localStorage.setItem('jet-rdo-status',JSON.stringify(map));
}
function getRDOStatus(rdo){
  if(!rdo)return'Elaboração';
  return rdo.status||getLocalRDOStatuses()[rdo.id]||'Elaboração';
}
window._setRDOStatus=async(id,status)=>{
  const rdo=(DB.rdo||[]).find(r=>r.id===id);
  if(!rdo)return;
  const oldStatus=rdo.status;
  rdo.status=status;
  setLocalRDOStatus(id,status);
  const{error}=await sb.from('rdo').update({status}).eq('id',id);
  if(error){
    console.warn('[JET] Não foi possível sincronizar status do RDO:',error);
    rdo.status=oldStatus;
    toast('Status salvo neste dispositivo. Se quiser sincronizar entre todos, precisamos liberar a coluna status no Supabase.','#f59e0b');
    return false;
  }
  toast('Status do RDO atualizado.','#22c55e');
  return true;
};
window._rdoEnviar=async(id)=>{S.rdoSubTab='enviados';await window._setRDOStatus(id,'Enviado');};
window._rdoReabrir=async(id)=>{S.rdoSubTab='elaboracao';await window._setRDOStatus(id,'Elaboração');};

window._todoCollapsed={};
window._toggleTodoGroup=(cid)=>{window._todoCollapsed[cid]=window._todoCollapsed[cid]===false?true:false;renderApp();};
window.todoExportPDF=(obra)=>{

  const{jsPDF}=window.jspdf;const todos=DB.todos.filter(t=>t.obra===obra);
  const doc=new jsPDF({unit:'mm',format:'a4'});

  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,120);doc.text(new Date().toLocaleDateString('pt-BR'),32,18);
  doc.autoTable({startY:24,head:[['Tarefa','Responsável','Prioridade','Status','Data']],
    body:todos.map(t=>[t.descricao||'',t.responsavel||'',t.prioridade||'Normal',t.status||'Pendente',t.data?new Date(t.data).toLocaleDateString('pt-BR'):'']),

window.todoExportTXT=(obra)=>{const t=DB.todos.filter(t=>t.obra===obra);exportTXT(t.map(x=>[x.descricao,x.responsavel,x.prioridade,x.status,x.data]),['Tarefa','Responsável','Prioridade','Status','Data'],'AFazer_'+obra);};
window._sortBy=(field)=>{
  if(!window._sortState)window._sortState={field:null,dir:1};
  if(window._sortState.field===field)window._sortState.dir*=-1;
  else{window._sortState.field=field;window._sortState.dir=1;}
  const tbl=document.querySelector('#ad-tbl tbody');
  if(!tbl)return;
  const rows=Array.from(tbl.querySelectorAll('tr'));
  rows.sort((a,b)=>{
    const ai=Array.from(a.closest('table').querySelectorAll('th')).findIndex(th=>th.dataset.field===field);
    if(ai<0)return 0;
    let va=a.cells[ai]?.querySelector('input')?.value||'';
    let vb=b.cells[ai]?.querySelector('input')?.value||'';
    if(field==='valor'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;return(va-vb)*window._sortState.dir;}
    return va.localeCompare(vb,'pt-BR',{numeric:true})*window._sortState.dir;
  });
  rows.forEach(r=>tbl.appendChild(r));
};

window._startResize=(e,field)=>{
  e.preventDefault();e.stopPropagation();
  const th=e.target.closest('th');if(!th)return;
  const startX=e.clientX,startW=th.getBoundingClientRect().width;
  e.target.classList.add('resizing');
  if(!window._colWidths)window._colWidths={};
  const move=ev=>{const w=Math.max(60,startW+ev.clientX-startX);th.style.width=w+'px';th.style.minWidth=w+'px';window._colWidths[field]=w;};
  const up=()=>{e.target.classList.remove('resizing');document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
};

window._toggleTodo=async(id)=>{
  const t=DB.todos.find(x=>x.id===id);if(!t)return;
  const ns=t.status==='Concluído'?'Pendente':'Concluído';
  await updateField('todos',id,'status',ns);
  DB.todos=DB.todos.map(x=>x.id===id?{...x,status:ns}:x);renderApp();
};
window._setTodoStatus=async(id,val)=>{
  await updateField('todos',id,'status',val);
  DB.todos=DB.todos.map(x=>x.id===id?{...x,status:val}:x);renderApp();
};
window._setPrioridade=async(id,val)=>{
  await updateField('todos',id,'prioridade',val);
  DB.todos=DB.todos.map(x=>x.id===id?{...x,prioridade:val}:x);renderApp();
};
window._deleteTodo=async(id)=>{
  const t=DB.todos.find(x=>x.id===id);
  if(!confirm(`Excluir tarefa: "${String(t?.descricao||'').slice(0,60)}"?`))return;
  await sb.from('todos').delete().eq('id',id);
  DB.todos=DB.todos.filter(t=>t.id!==id);renderApp();
};
window._quickTodo=async(el)=>{
  const obra=S.obra;
  const desc=el.value.trim();if(!desc||!obra)return;
  const prior=document.getElementById('todo-quick-prior-wrap')?.dataset?.val||'Normal';
  const resp=document.getElementById('todo-quick-resp')?.value||currentUser?.email?.split('@')[0]||'';
  el.value='';el.disabled=true;
  const obj={id:uid(),obra,descricao:desc,responsavel:resp,status:'Pendente',prioridade:prior,data:new Date().toISOString().slice(0,10)};
  const{error}=await sb.from('todos').insert(obj);
  if(error){toast('Erro: '+error.message,'#ef4444');el.disabled=false;el.value=desc;return;}
  // Add to local state only if not already there (RT may have already added it)
  if(!DB.todos.find(t=>t.id===obj.id))DB.todos.unshift(obj);
  toast('✓ Tarefa adicionada!');
  S.obraTab='todo'; // guarantee we stay on todo tab
  renderApp();
  setTimeout(()=>{const inp=document.getElementById('todo-quick');if(inp){inp.disabled=false;inp.focus();}},80);
};
window._printPedidoPDF=(pedidoId)=>{

  if(!p){toast('Pedido não encontrado','#ef4444');return;}
  if(!window.jspdf){toast('Biblioteca jsPDF não carregada.','#f59e0b');return;}
  const {jsPDF}=window.jspdf;
  const itens=normalizePedidoItems(p.itens||[]);
  const total=(p.total!=null&&p.total!=='')?Number(p.total):calcPedidoTotal(itens);
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=16;
  doc.setFillColor(26,46,107);doc.circle(M+9,16,9,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);doc.text('JET',M+9,18,{align:'center'});
  doc.setTextColor(20,20,60);doc.setFontSize(18);doc.text('Pedido de Compra',M+24,14);

  doc.setFontSize(8.5);doc.setTextColor(120,128,148);doc.text(new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR'),W-M,14,{align:'right'});
  doc.setDrawColor(216,225,238);doc.line(M,28,W-M,28);

  const cards=[
    {label:'Fornecedor',value:p.fornecedor||'—',accent:[20,20,60]},
    {label:'Obra Destinada',value:p.obra||'—',accent:[20,20,60]},
    {label:'Responsável',value:p.responsavel||'—',accent:[20,20,60]},
    {label:'Status',value:p.status||'Pendente',accent:[180,120,0]},
    {label:'Data do Pedido',value:fmtD(p.data),accent:[20,20,60]},
    {label:'Valor Total',value:fmtV(total),accent:[20,149,107]}
  ];
  const cardW=(W-M*2-8)/3;
  cards.forEach((card,index)=>{
    const col=index%3,row=Math.floor(index/3);
    const x=M+(cardW+4)*col,y=34+22*row;
    doc.setFillColor(251,252,254);doc.setDrawColor(220,226,235);doc.roundedRect(x,y,cardW,18,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(110,120,140);doc.text(card.label.toUpperCase(),x+4,y+5);
    doc.setFontSize(card.label==='Valor Total'?15:11);doc.setTextColor(...card.accent);
    doc.text(String(card.value||'—'),x+4,y+12);
  });

  doc.autoTable({
    startY:82,
    head:[['#','Descrição','Qtd','Unid','Valor Un.','Subtotal','Obs']],
    body:itens.map((item,index)=>{
      const subtotal=(Number(item.qtd)||0)*(Number(item.valor)||0);
      return [String(index+1),item.nome||'',item.qtd||'',item.unidade||'un',item.valor!==''?fmtV(item.valor):'—',subtotal?fmtV(subtotal):'—',item.obs||''];
    }),
    styles:{fontSize:9,cellPadding:3,textColor:[30,30,30],lineColor:[220,226,235],lineWidth:.2},
    headStyles:{fillColor:[26,46,107],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,250,253]},
    columnStyles:{0:{cellWidth:10,halign:'center'},2:{cellWidth:16,halign:'center'},3:{cellWidth:16,halign:'center'},4:{cellWidth:24,halign:'right'},5:{cellWidth:24,halign:'right'}}
  });

  let y=doc.lastAutoTable.finalY+8;
  doc.setDrawColor(26,46,107);doc.setLineWidth(0.5);doc.line(M,y,W-M,y);
  y+=8;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(20,20,60);doc.text('TOTAL',W-M-38,y);
  doc.setTextColor(20,149,107);doc.text(fmtV(total),W-M,y,{align:'right'});

  if(p.observacao){
    y+=10;
    doc.setFillColor(249,250,252);doc.setDrawColor(225,230,238);doc.roundedRect(M,y,W-M*2,18,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(110,120,140);doc.text('OBSERVAÇÃO GERAL',M+4,y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(65,74,92);
    const obsLines=doc.splitTextToSize(p.observacao,W-M*2-8);
    doc.text(obsLines,M+4,y+11);
  }

  const pages=doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFontSize(7.5);doc.setTextColor(150,150,150);
    doc.text(`Documento gerado pelo sistema JET Gestão de Obras · Página ${i}/${pages}`,W/2,287,{align:'center'});
  }
  doc.save(`Pedido_${xlsxFileName(p.numero||pedidoId)}.pdf`);
  toast('PDF exportado!');
};

function sortDespesaItems(items=[]){
  return[...(Array.isArray(items)?items:[])].sort((a,b)=>{
    const da=String(a.data||'9999-12-31');
    const db=String(b.data||'9999-12-31');
    if(da!==db)return da.localeCompare(db);
    const ta=String(a.tipo||'Despesa')==='Adiantamento'?0:1;
    const tb=String(b.tipo||'Despesa')==='Adiantamento'?0:1;
    if(ta!==tb)return ta-tb;
    return String(a.created_at||a.id||'').localeCompare(String(b.created_at||b.id||''));
  });
}
function isGenericAdiantamentoDesc(value=''){
  const key=stripAccents(String(value||'')).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  return /^adiantamento de despesas/.test(key)||key==='adiantamento pix'||key==='pix adiantamento';
}
function despesaDisplayDesc(item={}){
  const desc=String(item.descricao||'').trim();
  if(String(item.tipo||'')==='Despesa'&&isGenericAdiantamentoDesc(desc)&&(item.loja||item.nfe)){
    return `Despesa - ${item.loja||item.nfe}`;
  }
  return desc;
}
function despesaCanonicalText(value='',kind='desc'){
  let key=despImportTextKey(value);
  if(kind==='loja'){
    key=key.replace(/\b(s\s*a|sa|s\/a|ltda|me|eireli|epp|mei|comercio|servicos|servico|participacoes|industria)\b/g,' ');
  }else{
    key=key.replace(/\b(de|da|do|das|dos|a|o|os|as|e|para|pela|pelo)\b/g,' ');
  }
  return key.replace(/\s+/g,' ').trim();
}
function despesaDuplicateAmount(item={}){
  const tipo=String(item.tipo||'Despesa');
  const value=tipo==='Adiantamento'
    ?(item.movimento_adiantamento??item.importCredit??item.entrada_adiantamento??item.valor_adiantamento)
    :item.valor_conta;
  const parsed=moneyNumber(value);
  return parsed==null?null:Number(parsed);
}
function despesaDuplicateKey(item={}){
  const tipo=String(item.tipo||'Despesa');
  const amount=despesaDuplicateAmount(item);
  const desc=despesaCanonicalText(despesaDisplayDesc(item)||item.descricao||'','desc');
  const loja=despesaCanonicalText(item.loja||'','loja');
  const nfe=despImportTextKey(item.nfe||'');
  return[
    item.obra||'',
    item.data||'',
    tipo,
    amount!=null?amount.toFixed(2):'',
    desc,
    loja,
    nfe
  ].join('|');
}
function despesaFileSignature(file={}){
  const name=despImportFileKey(file.name||file.path||file.url||'');
  const size=Number(file.size||0)||0;
  return `${name}|${size}`;
}
function getUniqueDespesaFilesForIds(ids=[]){
  const seen=new Set();
  const files=[];
  [...new Set((ids||[]).filter(Boolean))].forEach(ownerId=>{
    getDespesaFiles(ownerId).forEach(file=>{
      const sig=despesaFileSignature(file);
      if(!sig||seen.has(sig))return;
      seen.add(sig);
      files.push({...file,_ownerId:ownerId,_signature:sig});
    });
  });
  return files;
}

function metroReceiptReferenceKey(file={}){
  return despImportBasename(file.name||file.path||file.url||'').replace(/^\d{3}_/,'');
}
function getMetroReceiptReference(file={}){
  return METRO_RECEIPT_REFERENCE[metroReceiptReferenceKey(file)]||null;
}
function isMetroDespesaItem(item={}){
  const key=despImportTextKey([item.descricao,item.loja,item.nfe].filter(Boolean).join(' '));
  return /\b(metro|metr[oô]|autopass|bilhete|transporte)\b/.test(key);
}
function despesaFileDateISO(file={}){
  const raw=String([file.name,file.path,file.url].filter(Boolean).join(' '));
  const iso=raw.match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  if(iso)return`${iso[1]}-${iso[2]}-${iso[3]}`;
  return'';
}
function groupDespesaFilesByDate(files=[]){
  const groups=new Map();
  (files||[]).forEach(file=>{
    const date=despesaFileDateISO(file);
    if(!date)return;
    if(!groups.has(date))groups.set(date,[]);
    groups.get(date).push(file);
  });
  return[...groups.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([date,items])=>({date,files:items}));
}
function canSplitMetroDespesaFiles(item={},files=[]){
  if(String(item.tipo||'Despesa')==='Adiantamento'||!isMetroDespesaItem(item))return false;
  const unique=(files||[]).filter(Boolean);
  if(unique.length<2)return false;
  const groups=groupDespesaFilesByDate(unique);
  if(groups.length<2)return false;
  if(groups.reduce((sum,g)=>sum+g.files.length,0)!==unique.length)return false;
  const amount=Number(despesaDuplicateAmount(item)||0);
  const each=amount/unique.length;
  return amount>0&&Number.isFinite(each)&&each>0.005&&Math.abs(each*unique.length-amount)<0.02;
}
function splitMetroDespesaDraftByFiles(draft={}){
  const files=[...(draft.files||[])];
  if(!canSplitMetroDespesaFiles(draft,files))return[draft];
  const perFile=Number(((Number(draft.valor_conta)||0)/files.length).toFixed(2));
  return groupDespesaFilesByDate(files).map((group,idx)=>({
    ...draft,
    id:idx===0?draft.id:uid(),
    data:group.date,
    valor_conta:Number((perFile*group.files.length).toFixed(2)),
    valor_adiantamento:null,
    files:group.files,
    _split_from:draft.id
  }));
}

function metroReceiptReferenceAmount(ref={}){
  return Number(ref.valor||0)||0;
}
function metroReceiptReferenceDescKey(ref={}){
  return despesaCanonicalText(ref.descricao||'','desc');
}
function metroReceiptRowDescKey(row={}){
  return despesaCanonicalText(despesaDisplayDesc(row)||row.descricao||'','desc');
}
function metroReceiptReferenceMatchesRow(row={},ref={},opts={}){
  if(!row||!ref)return false;
  const sameDate=String(row.data||'').slice(0,10)===String(ref.data||'').slice(0,10);
  const sameDesc=metroReceiptRowDescKey(row)===metroReceiptReferenceDescKey(ref);
  if(!sameDate||!sameDesc)return false;
  if(opts.ignoreAmount)return true;
  const amount=Number(despesaDuplicateAmount(row)||0);
  return Math.abs(amount-metroReceiptReferenceAmount(ref))<0.02;
}
function metroReceiptReferencePatch(ref={},row={}){
  return{
    data:String(ref.data||row.data||todayISO()).slice(0,10),
    descricao:String(ref.descricao||row.descricao||'Metrô').trim(),
    nfe:row.nfe||'',
    loja:row.loja||'AUTOPASS S.A.',
    valor_conta:metroReceiptReferenceAmount(ref),
    valor_adiantamento:null,
    tipo:'Despesa'
  };
}
function metroReceiptReferenceInsert(ref={},base={},obra=''){
  const row={...base,id:uid(),obra:base.obra||obra||S?.obra||'',...metroReceiptReferencePatch(ref,base),responsavel:base.responsavel||despesaExportResponsible(),created_at:new Date().toISOString()};
  ['_source_ids','_duplicate_count','_group_amount_total','movimento_adiantamento','importCredit','sourceRow','files','_split_from'].forEach(k=>delete row[k]);
  return row;
}
function getMetroReceiptReferenceEntries(rows=[]){
  const scopedIds=new Set((Array.isArray(rows)?rows:[]).map(row=>String(row.id||'')).filter(Boolean));
  const entries=[];
  Object.entries(DB.despesaFiles||{}).forEach(([ownerId,files])=>{
    const id=String(ownerId||'');
    if(!scopedIds.has(id))return;
    (Array.isArray(files)?files:[]).forEach(file=>{
      const cleaned=cleanDespesaFile(file);
      const ref=getMetroReceiptReference(cleaned);
      if(!ref)return;
      entries.push({ownerId:id,file:cleaned,ref,fileKey:despesaFileMergeKey(cleaned),refKey:metroReceiptReferenceKey(cleaned)});
    });
  });
  return entries;
}
function findMetroReceiptReferenceIssues(rows=[]){
  const rowMap=new Map((Array.isArray(rows)?rows:[]).map(row=>[String(row.id||''),row]));
  const entries=getMetroReceiptReferenceEntries(rows);
  const byOwner=new Map();
  entries.forEach(entry=>{
    if(!byOwner.has(entry.ownerId))byOwner.set(entry.ownerId,[]);
    byOwner.get(entry.ownerId).push(entry);
  });
  return entries.filter(entry=>{
    const row=rowMap.get(entry.ownerId);
    if(!row)return false;
    const ownerEntries=byOwner.get(entry.ownerId)||[];

async function repairMetroReceiptReferences(obra='',{silent=false}={}){
  if(window._metroReceiptRepairRunning)return 0;
  const scope=(DB.despesas||[]).filter(row=>!obra||row.obra===obra);
  const issues=findMetroReceiptReferenceIssues(scope);
  if(!issues.length)return 0;
  window._metroReceiptRepairRunning=true;
  try{
    const backup={createdAt:new Date().toISOString(),obra,issues:issues.map(e=>({ownerId:e.ownerId,file:e.file,ref:e.ref,owner:(DB.despesas||[]).find(row=>String(row.id)===e.ownerId)||null})),fileMap:DB.despesaFiles||{}};
    try{localStorage.setItem(`jet-metro-receipt-reference-backup-${Date.now()}`,JSON.stringify(backup));}catch{}
    const rowsById=new Map(scope.map(row=>[String(row.id||''),row]));
    const entries=getMetroReceiptReferenceEntries(scope).filter(entry=>issues.some(issue=>issue.ownerId===entry.ownerId));
    const byOwner=new Map();
    entries.forEach(entry=>{
      if(!byOwner.has(entry.ownerId))byOwner.set(entry.ownerId,[]);
      byOwner.get(entry.ownerId).push(entry);
    });
    const ownerHasDescMatch=new Map();
    byOwner.forEach((ownerEntries,ownerId)=>{
      const row=rowsById.get(ownerId);
      ownerHasDescMatch.set(ownerId,ownerEntries.some(entry=>metroReceiptReferenceMatchesRow(row,entry.ref,{ignoreAmount:true})));
    });
    const nextFileMap=cleanDespesaFileMap(DB.despesaFiles||{});
    const changedIds=new Set();
    entries.forEach(entry=>{
      const current=(nextFileMap[entry.ownerId]||[]).filter(file=>despesaFileMergeKey(file)!==entry.fileKey);
      if(current.length)nextFileMap[entry.ownerId]=current;
      else delete nextFileMap[entry.ownerId];
      changedIds.add(entry.ownerId);
    });
    const targetUsed=new Set();
    const ownerAssigned=new Set();
    const updates=new Map();
    const inserts=[];
    const scopedRows=[...rowsById.values()];
    const ordered=[...entries].sort((a,b)=>{
      const ar=rowsById.get(a.ownerId),br=rowsById.get(b.ownerId);
      const ad=metroReceiptReferenceMatchesRow(ar,a.ref,{ignoreAmount:true})?1:0;
      const bd=metroReceiptReferenceMatchesRow(br,b.ref,{ignoreAmount:true})?1:0;
      if(ad!==bd)return bd-ad;
      const ownerCmp=String(a.ownerId).localeCompare(String(b.ownerId));
      if(ownerCmp)return ownerCmp;
      return String(a.ref.descricao||'').localeCompare(String(b.ref.descricao||''))||String(a.file.name||'').localeCompare(String(b.file.name||''));
    });
    const chooseTargetId=(entry)=>{
      const ownerRow=rowsById.get(entry.ownerId);
      const ownerEntries=byOwner.get(entry.ownerId)||[];
      const ownerDescMatch=metroReceiptReferenceMatchesRow(ownerRow,entry.ref,{ignoreAmount:true});
      const ownerCan=ownerRow&&!targetUsed.has(entry.ownerId)&&(ownerDescMatch||ownerEntries.length===1||(!ownerAssigned.has(entry.ownerId)&&ownerHasDescMatch.get(entry.ownerId)===false));
      if(ownerCan)return entry.ownerId;
      const exact=scopedRows.find(row=>{
        const id=String(row.id||'');
        if(!id||targetUsed.has(id))return false;
        if(!metroReceiptReferenceMatchesRow(row,entry.ref))return false;
        const refFiles=(nextFileMap[id]||[]).filter(file=>getMetroReceiptReference(file));
        return refFiles.length===0;
      });
      if(exact)return String(exact.id);
      const loose=scopedRows.find(row=>{
        const id=String(row.id||'');
        return id&&!targetUsed.has(id)&&metroReceiptReferenceMatchesRow(row,entry.ref,{ignoreAmount:true})&&!(nextFileMap[id]||[]).length;
      });
      return loose?String(loose.id):'';
    };
    for(const entry of ordered){
      let targetId=chooseTargetId(entry);
      if(targetId){
        const row=rowsById.get(targetId)||{};
        const patch=metroReceiptReferencePatch(entry.ref,row);
        updates.set(targetId,patch);
        nextFileMap[targetId]=[cleanDespesaFile(entry.file)];
        targetUsed.add(targetId);
        changedIds.add(targetId);
        if(targetId===entry.ownerId)ownerAssigned.add(entry.ownerId);
      }else{
        const base=rowsById.get(entry.ownerId)||{};
        const row=metroReceiptReferenceInsert(entry.ref,base,obra);
        inserts.push(row);
        rowsById.set(String(row.id),row);
        scopedRows.push(row);
        nextFileMap[row.id]=[cleanDespesaFile(entry.file)];
        targetUsed.add(String(row.id));
        changedIds.add(row.id);
      }
    }
    for(const [id,patch] of updates.entries()){
      const {error}=await sb.from('despesas').update(patch).eq('id',id);
      if(error)throw error;
      DB.despesas=(DB.despesas||[]).map(row=>String(row.id)===String(id)?{...row,...patch}:row);
    }
    if(inserts.length){
      const {error}=await sb.from('despesas').insert(inserts);
      if(error)throw error;
      DB.despesas.push(...inserts);
    }
    DB.despesas.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
    await saveRemoteDespesaFiles(nextFileMap,{silent:true,replaceIds:[...changedIds]});
    if(!silent)toast(`Pente-fino concluído: ${entries.length} comprovante(s) de metrô conferido(s) pelo arquivo de referência.`,'#22c55e');
    return entries.length;
  }catch(err){
    console.warn('[JET] Falha no pente-fino de comprovantes de metrô:',err?.message||err);
    if(!silent)toast(`Não consegui concluir o pente-fino dos comprovantes: ${err?.message||err}`,'#ef4444');
    return 0;
  }finally{
    window._metroReceiptRepairRunning=false;
  }
}

function despesaFileSignatureSetForIds(ids=[]){
  return new Set(getUniqueDespesaFilesForIds(ids).map(despesaFileMergeKey).filter(Boolean));
}
function despesaSetsOverlap(a=new Set(),b=new Set()){
  for(const value of a){if(b.has(value))return true;}
  return false;
}
function isSaldoPlanilhaDespesa(item={}){
  if(String(item.tipo||'Despesa')==='Adiantamento')return false;
  const key=despImportTextKey([item.descricao,item.loja,item.nfe].filter(Boolean).join(' '));
  return key.includes('saldo')&&key.includes('planilha')&&key.includes('obra');
}
function saldoPlanilhaDuplicateKey(item={}){
  const amount=despesaDuplicateAmount(item);
  const text=despesaCanonicalText([item.descricao,item.loja].filter(Boolean).join(' '),'desc')
    .replace(/\b(saldo|planilha|obra)\b/g,' ')
    .replace(/\s+/g,' ')
    .trim();
  return [item.obra||'',String(item.data||'').slice(0,10),'saldo-planilha',amount!=null?amount.toFixed(2):'',text].join('|');
}
function metroDespesaPersonKey(item={}){
  if(!isMetroDespesaItem(item))return'';
  let key=despesaCanonicalText(despesaDisplayDesc(item)||item.descricao||'','desc')
    .replace(/\b(metro|metrao|autopass|bilhete|transporte|passagem|comprovante|recarga|cartao|cartão|upload|avulso)\b/g,' ')
    .replace(/\s+/g,' ')
    .trim();
  const aliases={rai:'raionei',ray:'raionei',raionei:'raionei',cesar:'cesar'};
  key=aliases[key]||key;
  if(!key||['casa','pix','saldo','planilha'].includes(key))return'';
  return key;
}
function isMetroSamePersonDuplicateItem(item={}){
  return String(item.tipo||'Despesa')!=='Adiantamento'&&isMetroDespesaItem(item)&&!!metroDespesaPersonKey(item);
}
function metroSamePersonDuplicateKey(item={}){
  return [item.obra||'',String(item.data||'').slice(0,10),'metro-pessoa',metroDespesaPersonKey(item)].join('|');
}
function despesaIdsHaveFiles(ids=[]){
  return getUniqueDespesaFilesForIds(ids).length>0;
}
function collapseDuplicateDespesaItems(items=[]){
  const sorted=sortDespesaItems(items);
  const groups=new Map();
  const output=[];
  const score=item=>(String(item.loja||'').trim()?4:0)+(String(item.nfe||'').trim()?2:0)+(typeof getDespesaFiles==='function'&&getDespesaFiles(item.id).length?16:0)+(String(item.created_at||item.id||'').trim()?1:0);
  const pushAsIndependent=(item,amount,key)=>{
    const row={...item,_source_ids:[item.id].filter(Boolean),_duplicate_count:1,_group_amount_total:amount};
    if(!groups.has(key))groups.set(key,[]);
    groups.get(key).push(row);
    output.push(row);
    return row;
  };
  sorted.forEach(item=>{
    if(String(item.tipo||'Despesa')==='Adiantamento'){
      output.push(item);
      return;
    }
    const amount=despesaDuplicateAmount(item);
    if(amount==null||Math.abs(amount)<=0.005){
      output.push(item);
      return;
    }
    const key=isSaldoPlanilhaDespesa(item)?saldoPlanilhaDuplicateKey(item):(isMetroSamePersonDuplicateItem(item)?metroSamePersonDuplicateKey(item):despesaDuplicateKey(item));
    const itemIds=[item.id].filter(Boolean);
    const itemSigs=despesaFileSignatureSetForIds(itemIds);
    const itemHasFiles=despesaIdsHaveFiles(itemIds);
    const candidates=groups.get(key)||[];
    const existing=candidates.find(row=>{
      if(isSaldoPlanilhaDespesa(item)&&isSaldoPlanilhaDespesa(row))return true;
      const rowIds=row._source_ids||[row.id].filter(Boolean);
      const rowHasFiles=despesaIdsHaveFiles(rowIds);
      if(isMetroSamePersonDuplicateItem(item)&&isMetroSamePersonDuplicateItem(row)&&(!itemHasFiles||!rowHasFiles))return true;
      const existingSigs=despesaFileSignatureSetForIds(rowIds);
      return existingSigs.size>0&&itemSigs.size>0&&despesaSetsOverlap(existingSigs,itemSigs);
    });
    // Financeiro não pode perder valor por semelhança de texto/data/valor.
    // Só agrupamos quando há prova forte: o MESMO arquivo/comprovante já está em outro lançamento.
    // Exceção segura: linhas sintéticas "Saldo da planilha da obra" não são comprovantes reais e podem vir duplicadas da importação.
    if(!existing){
      pushAsIndependent(item,amount,key);
      return;
    }
    const previousIds=(existing._source_ids||[]).filter(Boolean);
    const previousFiles=getUniqueDespesaFilesForIds(previousIds);
    const previousFileCount=previousFiles.length||1;
    const existingTotal=Number(existing._group_amount_total??despesaDuplicateAmount(existing)??amount);
    const perFile=previousFileCount>0?existingTotal/previousFileCount:amount;
    const mergedIds=[...new Set([...previousIds,...itemIds])];
    const uniqueFileCount=getUniqueDespesaFilesForIds(mergedIds).length;
    const samePersonMetro=isMetroSamePersonDuplicateItem(item)&&isMetroSamePersonDuplicateItem(existing);
    const mergedAmount=isSaldoPlanilhaDespesa(item)
      ?Math.max(existingTotal,amount)
      :samePersonMetro
        ?(previousFiles.length&&!itemHasFiles?existingTotal:(itemHasFiles&&!previousFiles.length?amount:Math.max(existingTotal,amount)))
        :(uniqueFileCount>0?Number((perFile*uniqueFileCount).toFixed(2)):Math.max(existingTotal,amount));
    const chosen=score(item)>score(existing)?{...item}:existing;
    Object.assign(existing,chosen,{
      valor_conta:mergedAmount,
      _group_amount_total:mergedAmount,
      _source_ids:mergedIds,
      _duplicate_count:mergedIds.length
    });
  });
  return output;
}

function findSaldoPlanilhaDuplicateGroups(items=[]){
  const groups=new Map();
  (Array.isArray(items)?items:[]).filter(isSaldoPlanilhaDespesa).forEach(row=>{
    const key=saldoPlanilhaDuplicateKey(row);
    if(!groups.has(key))groups.set(key,[]);
    groups.get(key).push(row);
  });
  const score=row=>(getUniqueDespesaFilesForIds([row.id]).length?100:0)+(String(row.loja||'').trim()?8:0)+(String(row.descricao||'').length/100)+(String(row.created_at||row.id||'').trim()?1:0);
  return [...groups.entries()].map(([key,rows])=>{
    if(rows.length<2)return null;
    const sorted=[...rows].sort((a,b)=>score(b)-score(a));
    const keep=sorted[0];
    const remove=sorted.slice(1).filter(row=>getUniqueDespesaFilesForIds([row.id]).length===0);
    if(!remove.length)return null;
    return{key,keep,remove};
  }).filter(Boolean);
}

}
function buildDespesaLedger(items=[]){
  let saldoAtual=0;
  let totalEntradas=0;
  const rows=[];
  const sorted=sortDespesaItems(collapseDuplicateDespesaItems(items));
  const adiantKey=item=>[item.data||'',despImportTextKey(item.descricao||'')].join('|');
  const hasExplicitCredit=item=>moneyNumber(item.movimento_adiantamento??item.importCredit)>0;
  const repScore=item=>(String(item.loja||'').trim()?4:0)+(String(item.nfe||'').trim()?2:0)+(typeof getDespesaFiles==='function'&&getDespesaFiles(item.id).length?8:0);
  for(let i=0;i<sorted.length;i++){
    let item=sorted[i];
    let isAdiant=String(item.tipo||'Despesa')==='Adiantamento';
    let sourceIds=(Array.isArray(item._source_ids)?item._source_ids:[item.id]).filter(Boolean);
    const descKey=despImportTextKey(item.descricao||'');
    if(isAdiant&&/^(saldo|saldo final|saldo total|total de creditos|total de créditos|total de despesas|tarifa|abatimento)/.test(descKey)){
      continue;
    }
    const rawAdiant=item.valor_adiantamento!=null&&item.valor_adiantamento!==''?moneyNumber(item.valor_adiantamento):null;
    let conta=isAdiant?0:(moneyNumber(item.valor_conta)||0);
    let entradaAdiant=0;
    if(isAdiant){
      // Historico: versões antigas salvavam a coluna "Adiantamento" como saldo/credito acumulado.
      // A tela agora reconstrói a entrada real comparando com o total de entradas já reconhecido.
      const explicit=moneyNumber(item.movimento_adiantamento??item.importCredit);
      if(explicit&&explicit>0){
        entradaAdiant=explicit;
      }else{
        const group=[item];
        while(i+1<sorted.length&&String(sorted[i+1].tipo||'Despesa')==='Adiantamento'&&!hasExplicitCredit(sorted[i+1])&&adiantKey(sorted[i+1])===adiantKey(item)){
          group.push(sorted[++i]);
        }
        sourceIds=[...new Set(group.flatMap(x=>Array.isArray(x._source_ids)?x._source_ids:[x.id]).filter(Boolean))];
        const rawMax=Math.max(...group.map(x=>Number(moneyNumber(x.valor_adiantamento)||0)));
        entradaAdiant=rawMax-totalEntradas>0.005?rawMax-totalEntradas:0;
        item=[...group].sort((a,b)=>repScore(b)-repScore(a))[0]||item;
      }
      if(entradaAdiant<=0.005)continue; // ignora duplicatas e linhas espelho de saldo
      totalEntradas+=entradaAdiant;
      saldoAtual+=entradaAdiant;
    }else if(conta>0){
      saldoAtual-=conta;
    }
    const row={...item,tipo:isAdiant?'Adiantamento':'Despesa',valor_conta:conta||null,movimento_adiantamento:entradaAdiant||0,entrada_adiantamento:entradaAdiant||0,saldo:saldoAtual||0,_source_ids:sourceIds,_duplicate_count:sourceIds.length};
    row.descricao=despesaDisplayDesc(row)||row.descricao;
    rows.push(row);
  }
  return rows;
}

function despesaAttachmentEntries(rows=[]){
  const used=new Set();
  const entries=[];
  let seq=1;
  rows.forEach(row=>{
    getDespesaFiles(row.id).forEach(file=>{
      const base=sanitizeStorageName(file.name||`anexo_${seq}`);
      let name=`${String(seq).padStart(3,'0')}_${base}`;
      let guard=1;
      while(used.has(name.toLowerCase()))name=`${String(seq).padStart(3,'0')}_${guard++}_${base}`;
      used.add(name.toLowerCase());
      entries.push({seq:seq++,row,file,name,packagePath:`anexos/${name}`,url:file.url||''});
    });
  });
  return entries;

async function exportDespesaWorkbook(obra,month='all'){
  const rows=despesaRowsForExport(obra,month);
  if(!rows.length){toast('Nenhum lançamento para gerar a planilha.','#f59e0b');return;}
  if(!window.ExcelJS){return window._despExportXLSX(obra,month==='all'?'all':rows[0]?.data||'all');}
  const attachments=despesaAttachmentEntries(rows);
  const result=await buildDespesaPrestacaoWorkbookBuffer(obra,rows,{month,attachments});
  xlsxDownload(result.buffer,result.filename);
  toast(`Planilha gerada com aba de anexos (${attachments.length} arquivo(s)).`);
}
window._exportDespesaPackage=async(obra,month='all')=>{
  const rows=despesaRowsForExport(obra,month);
  if(!rows.length){toast('Nenhum lançamento para gerar a prestação.','#f59e0b');return;}
  const attachments=despesaAttachmentEntries(rows);
  if(!window.ExcelJS){return exportDespesaWorkbook(obra,month);}
  toast('Montando pacote de prestação...','#3b82f6');
  const result=await buildDespesaPrestacaoWorkbookBuffer(obra,rows,{month,attachments});
  if(!window.JSZip){xlsxDownload(result.buffer,result.filename);toast('Planilha gerada. Atualize a página se quiser o pacote ZIP.','#f59e0b');return;}
  const base=result.filename.replace(/\.xlsx$/,'');
  const zip=new window.JSZip();
  const root=zip.folder(base);
  root.file(result.filename,result.buffer);
  const anexos=root.folder('anexos');
  const indexLines=['Arquivo\tData\tDescrição\tValor\tTipo\tLink'];
  let ok=0;
  const failed=[];
  for(const entry of attachments){
    const valor=entry.row.tipo==='Adiantamento'?(Number(entry.row.movimento_adiantamento)||Number(entry.row.saldo)||0):(Number(entry.row.valor_conta)||0);
    indexLines.push([entry.name,fmtD(entry.row.data),entry.row.descricao||'',fmtV(valor),entry.row.tipo||'Despesa',entry.url||''].join('\t'));
    if(!entry.url)continue;
    try{
      const resp=await fetch(entry.url,{mode:'cors',credentials:'omit',cache:'no-store'});
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const blob=await resp.blob();
      anexos.file(entry.name,blob);
      ok++;
    }catch(err){
      console.warn('[JET] Anexo não incluído no ZIP:',entry.name,err);
      failed.push(entry);
    }
  }
  root.file('indice_anexos.txt','\uFEFF'+indexLines.join('\n'));
  if(failed.length)root.file('links_anexos_nao_baixados.txt','\uFEFF'+failed.map(a=>`${a.name}\n${a.url}`).join('\n\n'));
  const blob=await zip.generateAsync({type:'blob'});
  downloadBinaryBlob(blob,`${base}.zip`);
  toast(`Pacote ZIP gerado: ${ok}/${attachments.length} anexo(s) incluído(s).`,'#22c55e');
};

function despImportTextKey(value=''){
  return stripAccents(String(value||'')).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
function despImportMoney(value){
  if(value==null||value==='')return null;
  if(typeof value==='number'&&Number.isFinite(value))return value;
  const parsed=moneyNumber(value);
  return parsed==null?null:parsed;
}
function despImportISO(value){
  if(!value&&value!==0)return'';
  if(value instanceof Date&&!isNaN(value))return value.toISOString().slice(0,10);
  if(typeof value==='number'&&Number.isFinite(value)){
    const date=new Date(Math.round((value-25569)*86400*1000));
    return isNaN(date)?'':date.toISOString().slice(0,10);
  }
  const text=String(value||'').trim();
  if(!text)return'';
  const iso=text.match(/(20\d{2})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(iso)return`${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  const br=text.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](20\d{2})/);
  if(br)return`${br[3]}-${br[2].padStart(2,'0')}-${br[1].padStart(2,'0')}`;
  const parsed=new Date(text);
  return isNaN(parsed)?'':parsed.toISOString().slice(0,10);
}
function despImportBasename(path=''){
  return String(path||'').replace(/\\/g,'/').split('/').filter(Boolean).pop()||'';

function despImportFileKey(path=''){

function despImportMime(name=''){
  const ext=getExt(String(name||''));
  if(['jpg','jpeg'].includes(ext))return'image/jpeg';
  if(ext==='png')return'image/png';
  if(ext==='webp')return'image/webp';
  if(ext==='gif')return'image/gif';
  if(ext==='pdf')return'application/pdf';
  if(ext==='xlsx')return'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  if(ext==='xls')return'application/vnd.ms-excel';
  return'application/octet-stream';
}

    });
  }
  if(!matches.length&&!isMetroDraft)matches=attachments.filter(a=>a.file&&!used.has(a.name)&&a.keyLoose===loose);
  if(!matches.length&&!isMetroDraft){
    const desc=despImportTextKey(draft.descricao);
    matches=attachments.filter(a=>a.file&&!used.has(a.name)&&a.tipo===draft.tipo&&a.valor!=null&&value!=null&&Math.abs(Number(a.valor)-Number(value))<0.01&&despImportTextKey(a.descricao)===desc);
  }
  matches.forEach(a=>used.add(a.name));
  return matches.map(a=>a.file).filter(Boolean);
}

function despImportBuildDrafts(workbook,zipFiles,obra,responsavel){
  const mainName=despImportMainSheetName(workbook);
  const rows=despImportAOA(workbook,mainName);
  const header=despImportFindHeaderRow(rows);
  if(header<0)throw new Error('Não encontrei o cabeçalho esperado: Data, Descrição e Valor.');
  const adiantHeader=despImportTextKey([despImportCell(rows[header]||[],5),despImportCell(rows[header+1]||[],5)].join(' '));
  const adiantColumnIsSaldo=adiantHeader.includes('saldo');
  const attachments=despImportAttachmentRows(workbook,zipFiles);
  const drafts=[];
  const usedFiles=new Set();
  let running=0;
  let creditRunning=0;
  let lastDate='';
  for(let i=header+1;i<rows.length;i++){
    const row=rows[i]||[];
    if(despImportSummaryLabel(row))break;
    const rawDate=despImportCell(row,0);
    const desc=String(despImportCell(row,1)||'').trim();
    const nfe=String(despImportCell(row,2)||'').trim();
    const loja=String(despImportCell(row,3)||'').trim();
    const valorConta=despImportMoney(despImportCell(row,4));
    const rawSaldo=despImportMoney(despImportCell(row,5));
    const hasCore=!!(rawDate||desc||nfe||loja||valorConta!=null);
    if(!hasCore&&rawSaldo!=null&&drafts.length&&drafts[drafts.length-1].tipo==='Adiantamento'){
      if(adiantColumnIsSaldo){
        running=Number(rawSaldo)||running;
      }
      continue;
    }
    if(!hasCore)continue;
    const headerLike=despImportTextKey(row.join(' '));
    if(headerLike.includes('conta bancaria')||headerLike==='valor adiantamento')continue;
    let data=despImportISO(rawDate)||lastDate;
    if(!data)continue;
    lastDate=data;
    let tipo=(valorConta!=null&&Math.abs(valorConta)>0.0001)?'Despesa':'Adiantamento';
    if(tipo==='Adiantamento'&&!/adiant|pix/i.test(despImportTextKey(desc))){
      continue; // linhas auxiliares de saldo/observação não são PIX de adiantamento
    }
    let derivedValorConta=valorConta;
    let importCredit=null;
    if(tipo==='Adiantamento'){
      const prevRunning=Number(running)||0;
      if(!adiantColumnIsSaldo){
        importCredit=Number(rawSaldo)||0;
        if(importCredit<=.005)continue;
        creditRunning+=importCredit;
        running=prevRunning+importCredit;
      }else{
      const nextRow=rows[i+1]||[];
      const nextSaldo=despImportMoney(despImportCell(nextRow,5));
      const nextHasCore=!!(despImportCell(nextRow,0)||String(despImportCell(nextRow,1)||'').trim()||String(despImportCell(nextRow,2)||'').trim()||String(despImportCell(nextRow,3)||'').trim()||despImportMoney(despImportCell(nextRow,4))!=null);
      const hasBridgeSaldo=!nextHasCore&&nextSaldo!=null;
      if(hasBridgeSaldo){
        // Modelo antigo: a linha do adiantamento traz o crédito e a linha seguinte em branco traz o saldo.
        const saldoAtual=Number(nextSaldo);
        const diff=saldoAtual-prevRunning;
        if(diff<-.005){
          tipo='Despesa';
          derivedValorConta=Math.abs(diff);
          importCredit=null;
          running=saldoAtual;
        }else if(Math.abs(diff)<=.005&&(loja||nfe||isGenericAdiantamentoDesc(desc))){
          i++;
          continue;
        }else{
          importCredit=rawSaldo!=null?Number(rawSaldo):Math.max(0,diff);
          creditRunning+=Math.max(0,Number(importCredit)||0);
          running=saldoAtual||prevRunning+importCredit;
        }
        i++;
      }else{
        // Exportação atual do sistema: a coluna F já é o saldo acumulado.
        const saldoAtual=rawSaldo!=null?Number(rawSaldo):prevRunning;
        const diff=saldoAtual-prevRunning;
        if(diff<-.005){
          tipo='Despesa';
          derivedValorConta=Math.abs(diff);
          importCredit=null;
          running=saldoAtual;
        }else if(Math.abs(diff)<=.005&&(loja||nfe||isGenericAdiantamentoDesc(desc))){
          continue;
        }else{
          importCredit=Math.max(0,diff);
          creditRunning+=Math.max(0,Number(importCredit)||0);
          running=saldoAtual;
        }
      }
      }
    }else{
      running=rawSaldo!=null?Number(rawSaldo):(running-(Number(valorConta)||0));
    }
    const finalDesc=tipo==='Despesa'&&isGenericAdiantamentoDesc(desc)&&(loja||nfe)?`Despesa - ${loja||nfe}`:(desc||'Lançamento importado');
    const draft={
      id:uid(),obra,data,descricao:finalDesc,nfe,loja,
      valor_conta:tipo==='Despesa'?(Number(derivedValorConta)||0):null,
      valor_adiantamento:tipo==='Adiantamento'?(Number(creditRunning)||Number(running)||0):(Number(running)||0),
      tipo,responsavel:responsavel||despesaExportResponsible(),
      importCredit,sourceRow:i+1,files:[]
    };
    draft.files=despImportAttachFiles(draft,attachments,usedFiles);
    drafts.push(...splitMetroDespesaDraftByFiles(draft));
  }
  return{drafts,attachments,mainName};
}
async function despImportReadPackage(file){
  if(!file)throw new Error('Selecione um arquivo .xlsx ou .zip.');
  if(!window.XLSX)throw new Error('Biblioteca de planilhas ainda não carregou. Atualize a página e tente novamente.');
  const ext=getExt(file.name||'');
  const zipFiles=new Map();
  let workbookBuffer=null;
  if(ext==='zip'){
    if(!window.JSZip)throw new Error('Biblioteca ZIP ainda não carregou. Atualize a página e tente novamente.');
    const zip=await window.JSZip.loadAsync(await file.arrayBuffer());
    const entries=Object.values(zip.files||{});
    const xlsxEntry=entries.find(entry=>!entry.dir&&!/^~\$/.test(despImportBasename(entry.name))&&/\.xlsx?$/i.test(entry.name));
    if(!xlsxEntry)throw new Error('Não encontrei uma planilha .xlsx dentro do ZIP.');
    workbookBuffer=await xlsxEntry.async('arraybuffer');
    for(const entry of entries){
      if(entry.dir||entry===xlsxEntry)continue;
      const name=despImportBasename(entry.name);
      const extName=getExt(name);
      if(!name||!DESPESA_IMPORT_ALLOWED_EXTS.includes(extName))continue;
      const blob=await entry.async('blob');
      const importedFile=new File([blob],name,{type:blob.type||despImportMime(name),lastModified:Date.now()});
      zipFiles.set(despImportFileKey(name),importedFile);
    }
  }else{
    workbookBuffer=await file.arrayBuffer();
  }
  const workbook=XLSX.read(workbookBuffer,{type:'array',cellDates:true,cellFormula:true,cellNF:false,cellText:false});
  return{workbook,zipFiles,fileName:file.name};
}
function despImportMarkDuplicates(rawDrafts=[],obra){
  const existing=new Set((DB.despesas||[]).filter(d=>d.obra===obra).map(d=>despImportDuplicateKey({...d,obra})));
  const seen=new Set();
  return rawDrafts.map(draft=>{
    const row={...draft,obra};
    const key=despImportDuplicateKey(row);
    const duplicateExisting=existing.has(key);
    const duplicateImport=seen.has(key);
    seen.add(key);
    return{...row,duplicateExisting,duplicateImport,duplicate:duplicateExisting||duplicateImport};
  });
}

window._toggleDespGroup=(cid)=>{if(!window._despCollapsed)window._despCollapsed={};window._despCollapsed[cid]=!window._despCollapsed[cid];renderApp();};
window._addContaValue=(id)=>{const v=parseFloat(prompt('Valor pago pela conta bancária (R$):'));if(v>0)updateField('despesas',id,'valor_conta',v).then(()=>renderApp());};
function despesaCreditBeforeRow(id,obra){
  let total=0;
  const ledger=buildDespesaLedger(DB.despesas.filter(d=>d.obra===obra));
  for(const row of ledger){
    if(row.id===id||(row._source_ids||[]).includes(id))return total;
    total+=Number(row.movimento_adiantamento)||0;
  }
  return total;
}
window._deleteDespesa=async(id,sourceIdsCsv='')=>{
  const ids=[...new Set(String(sourceIdsCsv||id).split(',').map(s=>s.trim()).filter(Boolean))];
  if(!ids.length){toast('Lançamento não encontrado.','#ef4444');return;}
  const row=DB.despesas.find(d=>d.id===id)||DB.despesas.find(d=>ids.includes(d.id));
  const label=`${fmtD(row?.data)} - ${row?.descricao||'lançamento'}`;
  const extra=ids.length>1?`\n\nAtenção: esta linha representa ${ids.length} registros espelhados/duplicados. Todos serão removidos juntos.`:'';
  const typed=prompt(`Exclusão protegida\n\n${label}${extra}\n\nDigite EXCLUIR para confirmar:`);
  if(typed!=='EXCLUIR'){toast('Exclusão cancelada.','#f59e0b');return;}
  const query=ids.length>1?sb.from('despesas').delete().in('id',ids):sb.from('despesas').delete().eq('id',ids[0]);
  const{error}=await query;
  if(error){toast('Erro ao excluir: '+error.message,'#ef4444');return;}
  DB.despesas=DB.despesas.filter(d=>!ids.includes(d.id));
  const files={...(DB.despesaFiles||{})};
  ids.forEach(x=>delete files[x]);
  await saveRemoteDespesaFiles(files,{silent:true,replaceIds:ids});
  toast('Lançamento excluído com segurança.','#22c55e');
  renderApp();
};
