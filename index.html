function normalizePedidoItem(item={}){
  const raw=typeof item==='string'?{nome:item}:item||{};
  return{
    nome:String(raw.nome??raw.item??'').trim(),
    qtd:raw.qtd===''?'':(raw.qtd??''),
    unidade:String(raw.unidade??raw.unid??'un').trim()||'un',
    valor:raw.valor===''?'':(raw.valor??''),
    obs:String(raw.obs??raw.observacao??'').trim()
  };
}
function normalizePedidoItems(items=[]){
  return(Array.isArray(items)?items:[]).map(normalizePedidoItem).filter(item=>item.nome||item.qtd||item.valor||item.obs);
}
function calcPedidoTotal(items=[]){
  return normalizePedidoItems(items).reduce((sum,item)=>sum+(Number(item.qtd)||0)*(Number(item.valor)||0),0);
}
function normalizeCotacaoItem(entry={}){
  const raw=typeof entry==='string'?{fornecedor:entry}:entry||{};
  return{
    fornecedor:String(raw.fornecedor||raw.nome||'').trim(),
    preco:moneyNumber(raw.preco),
    prazo:String(raw.prazo||raw.prazo_dias||'').trim(),
    observacao:String(raw.observacao||raw.obs||'').trim(),
    escolhido:!!raw.escolhido
  };
}
function normalizeCotacaoItems(items=[]){
  return(Array.isArray(items)?items:[]).map(normalizeCotacaoItem).filter(item=>item.fornecedor);
}
function normalizeCotacaoStatus(status){
  if(status==='Pendente')return'Solicitada';
  return COTACAO_STATUS_LIST.includes(status)?status:'Solicitada';
}
function cotacaoMelhorPreco(items=[]){
  const values=normalizeCotacaoItems(items).map(item=>item.preco).filter(v=>v!=null);
  return values.length?Math.min(...values):null;
}
function cotacaoVencedor(items=[]){
  const list=normalizeCotacaoItems(items);
  return list.find(item=>item.escolhido)||null;
}
async function saveCotacaoPatch(id,patch,{silent=false}={}){
  const idx=(DB.cotacoes||[]).findIndex(c=>c.id===id);
  if(idx<0)return false;
  const current=DB.cotacoes[idx];
  const next={...current,...patch};
  if('cotacoes' in patch)next.cotacoes=normalizeCotacaoItems(patch.cotacoes);
  if('status' in patch)next.status=normalizeCotacaoStatus(patch.status);
  DB.cotacoes[idx]=next;
  const payload={...patch};
  if('cotacoes' in payload)payload.cotacoes=next.cotacoes;
  if('status' in payload)payload.status=next.status;
  const {error}=await sb.from('cotacoes').update(payload).eq('id',id);
  if(error){
    DB.cotacoes[idx]=current;
    if(!silent)toast('Erro ao salvar cotação: '+error.message,'#ef4444');
    return false;
  }
  return true;
}
function buildObraDeleteMap(obra){
  return Object.fromEntries(OBRA_LINKED_TABLES.map(table=>[table,(DB[table]||[]).filter(row=>row?.obra===obra).map(row=>row.id)]));
}
function linkedObraCount(map={}){return Object.values(map||{}).reduce((sum,ids)=>sum+(Array.isArray(ids)?ids.length:0),0);}
async function savePedidoPatch(id,patch,{silent=false}={}){
  const idx=(DB.pedidos||[]).findIndex(p=>p.id===id);
  if(idx<0)return false;
  const current=DB.pedidos[idx];
  const next={...current,...patch};
  if('itens' in patch)next.itens=normalizePedidoItems(patch.itens);
  if('itens' in patch&&!'total' in patch)next.total=calcPedidoTotal(next.itens||[]);
  const payload={...patch};
  if('itens' in payload)payload.itens=next.itens;
  if('total' in payload||'itens' in payload)payload.total=next.total;
  DB.pedidos[idx]=next;
  const {error}=await sb.from('pedidos').update(payload).eq('id',id);
  if(error){DB.pedidos[idx]=current;if(!silent)toast('Erro ao salvar pedido: '+error.message,'#ef4444');return false;}
  return true;
}

function makeCd(options,map,currentVal,onSelect,large=false){
  const id='cd-'+(++_cdSeq);

  const t=map[currentVal]||{bg:'#161616',c:'#888'};
  return`<div class="cd-wrap">
<button id="${id}" class="cd-trigger${large?' cd-trigger-lg':''}" style="background:${t.bg};color:${t.c}" data-val="${esc(currentVal)}"

function _openCd(triggerId,onSelect){
  closeCd();
  const trigger=document.getElementById(triggerId);if(!trigger)return;
  const store=_cdStore[triggerId];if(!store)return;
  const{map,options}=store;
  const rect=trigger.getBoundingClientRect();
  const menu=document.createElement('div');menu.className='cd-menu';
  menu.style.left=rect.left+'px';menu.style.top=(rect.bottom+4)+'px';
  let lastGroup='';
  menu.innerHTML=options.map((opt,idx)=>{
    const t=map[opt]||{bg:'#1a1a1a',c:'#888',d:'#555'};
    const isSel=trigger.dataset.val===opt;
    const group=t.group||'';
    const groupHtml=group&&group!==lastGroup?`${idx?'<div class="cd-divider"></div>':''}<div class="cd-group">${esc(group)}</div>`:'';
    lastGroup=group||lastGroup;
    return`${groupHtml}<div class="cd-option" data-opt="${esc(opt)}" style="background:${t.bg};color:${t.c}" onclick="event.stopPropagation();_cdPick('${triggerId}',this)">
<span class="cd-option-dot" style="background:${t.d||t.c}"></span>
<span style="flex:1">${esc(opt)}</span>
${isSel?'<span style="color:#22c55e">✓</span>':''}
</div>`;
  }).join('');
  document.body.appendChild(menu);_cdActive=menu;_cdOnSelectFn=onSelect;
  requestAnimationFrame(()=>{const mr=menu.getBoundingClientRect();if(mr.right>window.innerWidth-8)menu.style.left=(window.innerWidth-mr.width-8)+'px';if(mr.bottom>window.innerHeight-8)menu.style.top=(rect.top-mr.height-4)+'px';});
}

function _cdPick(triggerId,optEl){
  const val=optEl.dataset.opt;
  closeCd();
  const trigger=document.getElementById(triggerId);
  if(trigger){
    const store=_cdStore[triggerId];
    const t=store?.map[val]||{bg:'#161616',c:'#888'};
    trigger.style.background=t.bg;trigger.style.color=t.c;trigger.dataset.val=val;
    const label=trigger.querySelector('.cd-val');if(label)label.textContent=val;
    const svg=trigger.querySelector('svg');if(svg)svg.style.stroke=t.c;
  }
  if(_cdOnSelectFn)_cdOnSelectFn(val);
}

function canUpdateField(table,field){return UPDATE_FIELD_ALLOWLIST[table]?.has(field)===true;}
async function updateField(table,id,field,value){
  if(!canUpdateField(table,field)){
    console.warn('[JET] updateField bloqueado:',{table,field,id});
    toast('Campo não permitido para edição rápida.','#ef4444');
    return false;
  }
  const row=DB[table]?.find(r=>r.id===id);
  const oldVal=row?row[field]:undefined;
  if(row)row[field]=value;
  const{error}=await sb.from(table).update({[field]:value}).eq('id',id);
  if(error){toast('Erro ao salvar: '+error.message,'#ef4444');if(row)row[field]=oldVal;return false;}
  return true;
}

function setupRT(){
  ['aditivos','materiais','funcionarios','rdo','todos','despesas','estoque','pedidos','fornecedores','cotacoes'].forEach(table=>{
    sb.channel('rt-'+table).on('postgres_changes',{event:'*',schema:'public',table},({eventType:et,new:n,old:o})=>{
      if(et==='INSERT'){if(!DB[table].find(r=>r.id===n.id))DB[table].unshift(n);}
      else if(et==='UPDATE'){const i=DB[table].findIndex(r=>r.id===n.id);if(i>=0)DB[table][i]=n;}
      else if(et==='DELETE')DB[table]=DB[table].filter(r=>r.id!==o.id);
      renderApp();
    }).subscribe();
  });
}

function getMentionDirectory(){
  return SUPABASE_MENTION_EMAILS.map(email=>{
    const label=String(email).split('@')[0].trim();
    return {token:normalizeMentionToken(label),label,email};
  }).filter(item=>item.token);
}
function getTeamMembers(){return getMentionDirectory().map(item=>item.label);}
function getHomeNoticeFieldRefs(){
  const inModal=S.modal==='home-notice';
  return{
    inModal,
    textEl:document.getElementById(inModal?'m-home-aviso-text':'home-aviso-text'),
    priorityEl:document.getElementById(inModal?'m-home-aviso-priority':'home-aviso-priority'),
    pinEl:document.getElementById(inModal?'m-home-aviso-pin':'home-aviso-pin'),
    menuEl:document.getElementById(inModal?'home-modal-mention-menu':'home-mention-menu')
  };
}
function isNoticeRead(item,userToken=normalizeMentionToken(getCurrentUserHandle())){return(item.readBy||[]).includes(userToken);}
function isNoticeMention(item,userToken=normalizeMentionToken(getCurrentUserHandle())){return(item.mentions||[]).includes(userToken);}
function sortHomeNotices(list=[]){
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  return cleanNotices(list).sort((a,b)=>
    Number(b.pinned)-Number(a.pinned)
    || Number(isNoticeMention(b,userToken))-Number(isNoticeMention(a,userToken))
    || Number(!isNoticeRead(a,userToken))-Number(!isNoticeRead(b,userToken))
    || noticePriorityRank(b.prioridade)-noticePriorityRank(a.prioridade)
    || String(b.created_at||'').localeCompare(String(a.created_at||''))
  );
}
function renderNoticeText(text=''){
  return esc(text).replace(/\n/g,'<br>').replace(/@([\w.-]+)/g,'<span class="comment-mention">@$1</span>');
}
function getHomeNoticeStats(){
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  const list=DB.avisos||[];
  return{
    unread:list.filter(item=>!isNoticeRead(item,userToken)).length,
    mentions:list.filter(item=>isNoticeMention(item,userToken)).length,
    pinned:list.filter(item=>item.pinned).length
  };
}
function getFilteredHomeNotices(){
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  const filter=S.homeNoticeFilter||'all';
  let list=sortHomeNotices(DB.avisos||[]);
  if(filter==='unread')list=list.filter(item=>!isNoticeRead(item,userToken));
  if(filter==='mentions')list=list.filter(item=>isNoticeMention(item,userToken));
  return list;
}
let _homeMentionActive=false,_homeMentionStart=-1,_homeMentionQuery='',_homeMentionIdx=0;
window._homeNoticeInput=(el)=>{
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,150)+'px';
  const val=el.value,pos=el.selectionStart,before=val.slice(0,pos),atIdx=before.lastIndexOf('@');
  if(atIdx>=0&&(atIdx===0||/\s/.test(before[atIdx-1]))){
    const q=before.slice(atIdx+1);
    if(!/\s/.test(q)){
      _homeMentionActive=true;_homeMentionStart=atIdx;_homeMentionQuery=q;_homeMentionIdx=0;
      _showHomeMentions(getTeamMembers().filter(name=>name.toLowerCase().includes(q.toLowerCase())).slice(0,6));
      return;
    }
  }
  _homeMentionActive=false;
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(menu)menu.style.display='none';
};
window._homeNoticeKey=(e)=>{
  if(_homeMentionActive){
    const items=getTeamMembers().filter(name=>name.toLowerCase().includes(_homeMentionQuery.toLowerCase())).slice(0,6);
    if(e.key==='ArrowDown'){e.preventDefault();_homeMentionIdx=(_homeMentionIdx+1)%Math.max(items.length,1);_showHomeMentions(items);return;}
    if(e.key==='ArrowUp'){e.preventDefault();_homeMentionIdx=(_homeMentionIdx-1+Math.max(items.length,1))%Math.max(items.length,1);_showHomeMentions(items);return;}
    if(e.key==='Enter'&&items.length){e.preventDefault();_pickHomeMention(items[_homeMentionIdx]);return;}
    if(e.key==='Escape'){_homeMentionActive=false;const menu=document.getElementById('home-mention-menu');if(menu)menu.style.display='none';return;}
  }
};
function _showHomeMentions(items){
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(!menu)return;
  if(!items.length){menu.style.display='none';return;}
  menu.style.display='block';
  menu.innerHTML=items.map((name,index)=>`<div class="mention-item${index===_homeMentionIdx?' active':''}" onmousedown="event.preventDefault();_pickHomeMention('${escJs(name)}')"><div class="m-avatar">${esc(name.charAt(0).toUpperCase())}</div>@${esc(name)}</div>`).join('');
}
function _pickHomeMention(name){
  const el=getHomeNoticeFieldRefs().textEl;
  if(!el)return;
  const val=el.value,after=val.slice(el.selectionStart);
  el.value=val.slice(0,_homeMentionStart)+'@'+name+' '+after;
  _homeMentionActive=false;
  const menu=getHomeNoticeFieldRefs().menuEl;
  if(menu)menu.style.display='none';
  el.focus();
  window._homeNoticeInput(el);
}
window._toggleHomeNotices=(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  S.homeNoticeOpen=!S.homeNoticeOpen;
  renderApp();
};
window._openHomeNoticeModal=(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  S.homeNoticeOpen=false;
  S.modal='home-notice';
  S.modalData={};
  renderApp();
  setTimeout(()=>document.getElementById('m-home-aviso-text')?.focus(),0);
};
window._setHomeNoticeFilter=(filter)=>{S.homeNoticeFilter=filter;renderApp();};
window._postHomeNotice=async(event)=>{
  event?.preventDefault?.();
  event?.stopPropagation?.();
  const btn=event?.currentTarget||null;
  if(btn){btn.disabled=true;btn.dataset.originalText=btn.textContent;btn.textContent='Publicando...';}
  try{
    const{textEl,priorityEl,pinEl,inModal}=getHomeNoticeFieldRefs();
    if(!textEl){
      window._openHomeNoticeModal();
      toast('Formulario de aviso reaberto. Tente publicar novamente.','#f59e0b');
      return;
    }
    const texto=textEl.value.trim();
    if(!texto){toast('Escreva um aviso antes de publicar.','#f59e0b');textEl.focus();return;}
    const autorLabel=getCurrentUserHandle();
    const autor=normalizeMentionToken(autorLabel)||'sistema';
    const notice=cleanNotice({
      id:'hv-'+uid(),
      texto,
      autor,
      autorLabel,
      prioridade:priorityEl?.value||'Media',
      pinned:!!pinEl?.checked,
      readBy:[autor],
      mentions:parseMentions(texto),
      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    });
    DB.avisos=cleanNotices([notice,...(DB.avisos||[])]);
    saveLocalHomeNotices(DB.avisos);
    queueHomeNoticesSync(true);
    if(textEl){textEl.value='';textEl.style.height='auto';}
    if(priorityEl)priorityEl.value='Media';
    if(pinEl)pinEl.checked=false;
    if(inModal)S.modal=null;
    S.homeNoticeOpen=true;
    toast('Aviso publicado.','#22c55e');
    renderApp();
  }catch(err){
    console.error('[JET] Erro ao publicar aviso:',err);
    const msg=String(err?.message||err||'erro desconhecido').slice(0,120);
    toast(`Nao consegui publicar o aviso: ${msg}`,'#ef4444');
  }finally{
    if(btn&&document.body.contains(btn)){
      btn.disabled=false;
      btn.textContent=btn.dataset.originalText||'Publicar aviso';
    }
  }
};
window._toggleNoticeRead=(id)=>{
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  DB.avisos=(DB.avisos||[]).map(item=>{
    if(item.id!==id)return item;
    const readBy=new Set((item.readBy||[]).map(normalizeMentionToken));
    if(readBy.has(userToken))readBy.delete(userToken);else readBy.add(userToken);
    return cleanNotice({...item,readBy:[...readBy],updated_at:new Date().toISOString()});
  });
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync();
  renderApp();
};
window._toggleNoticePinned=(id)=>{
  DB.avisos=(DB.avisos||[]).map(item=>item.id===id?cleanNotice({...item,pinned:!item.pinned,updated_at:new Date().toISOString()}):item);
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync();
  renderApp();
};
window._deleteNotice=(id)=>{
  const item=(DB.avisos||[]).find(entry=>entry.id===id);
  if(!item)return;
  if(!confirm(`Remover aviso de @${item.autorLabel||item.autor}?`))return;
  DB.avisos=(DB.avisos||[]).filter(entry=>entry.id!==id);
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync(true);
  renderApp();
};
window._markAllNoticesRead=()=>{
  const userToken=normalizeMentionToken(getCurrentUserHandle());
  DB.avisos=(DB.avisos||[]).map(item=>{
    const readBy=new Set((item.readBy||[]).map(normalizeMentionToken));
    readBy.add(userToken);
    return cleanNotice({...item,readBy:[...readBy]});
  });
  saveLocalHomeNotices(DB.avisos);
  queueHomeNoticesSync(true);
  renderApp();
};

function renderPedidoExpanded(p){
  const pedidoId=escJs(p.id);

function officeAction(title,desc,action,icon){
  return `<button type="button" class="office-action" onclick="window._officeGo('${escJs(action)}')"><div><strong>${esc(title)}</strong><span>${esc(desc)}</span></div><span class="office-action-icon">${esc(icon)}</span></button>`;

window._officeGo=(action)=>{
  const firstObra=getAllObras()[0]||'';
  if(action==='compras'){S.page='dashboard';S.modulo='compras';S.comprasTab='pedidos';S.obra=null;}
  else if(action==='fornecedores'){S.page='dashboard';S.modulo='compras';S.comprasTab='fornecedores';S.obra=null;}
  else if(action==='obras'){S.page='dashboard';S.modulo='obras';S.obra=null;}
  else if(action==='gerenciar'){S.page='gerenciar-obras';S.modulo='obras';S.obra=null;}
  else if(action==='funcionarios'&&firstObra){S.page='obra';S.modulo='obras';S.obra=firstObra;S.obraTab='funcionarios';S.selectedAditivo=null;}
  else if(action==='despesas'&&firstObra){S.page='obra';S.modulo='obras';S.obra=firstObra;S.obraTab='despesas';S.selectedAditivo=null;}
  else if(action==='avisos'){S.page='home';S.homeNoticeOpen=true;}
  else{S.page='dashboard';S.modulo='obras';S.obra=null;}
  renderApp();
};

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px 24px">
    ${[['Obra',a.obra||'—'],['Responsável',a.responsavel||'—'],['Valor',fmtV(a.valor)],['Solicitação',a.solicitacao||'—'],['Data',fmtD(a.data)]].map(([l,v])=>`<div>
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">${l}</div>
      <div style="font-size:14px;font-weight:600;color:${l==='Valor'&&a.valor?'#34d399':'var(--text)'}">${esc(v)}</div>
    </div>`).join('')}
  </div>
</div>

<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
  <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
    <div class="card-title" style="margin:0">📋 Planilha de Itens <span style="font-size:12px;font-weight:500;color:var(--text3);margin-left:6px">${(a.planilha||[]).length} item${(a.planilha||[]).length!==1?'s':''}</span></div>
    ${planTotal>0?`<span style="font-size:13px;font-weight:700;color:#34d399">Total: ${fmtV(planTotal)}</span>`:''}
  </div>
  ${renderPlanilha(a)}
</div>

<div class="card" style="margin-bottom:14px">
  <div class="card-title">📎 Arquivos e Mídia <span style="font-size:12px;font-weight:500;color:var(--text3);margin-left:6px">${(a.arquivos||[]).length} arquivo${(a.arquivos||[]).length!==1?'s':''}</span></div>
  ${renderArquivos(a)}
</div>

<div class="card">
  <div class="card-title">💬 Comentários <span style="font-size:12px;font-weight:500;color:var(--text3);margin-left:6px">${(a.comentarios||[]).length}</span></div>
  ${renderComentarios(a)}
</div>
</div>`;
}

// ─── PLANILHA ─────────────────────────────────────────────────────────────
function renderPlanilha(a){
  const rows=a.planilha||[];
  const total=rows.reduce((s,r)=>s+(Number(r.quantidade||0)*Number(r.valor_unit||0)),0);
  const ci=(rid,field,ph,w,type='text')=>`<input class="ci" type="${type}" placeholder="${ph}" style="width:${w}" value="${esc(String(rows.find(r=>r.id===rid)?.[field]||''))}" onblur="window._plUp('${a.id}','${rid}','${field}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
  return`<div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
  <span style="font-size:13px;font-weight:600;color:var(--text2)">${rows.length} item${rows.length!==1?'s':''}</span>
  ${total>0?`<span style="font-size:13px;font-weight:700;color:#34d399">Total: ${fmtV(total)}</span>`:''}
</div>
<div class="tbl-wrap"><table>
<thead><tr><th style="min-width:200px">Descrição</th><th style="width:70px">Unid.</th><th style="width:80px">Qtd.</th><th style="width:110px">Valor Unit.</th><th style="width:110px">Subtotal</th><th>Observação</th><th style="width:36px"></th></tr></thead>
<tbody>
${rows.map(r=>{const sub=Number(r.quantidade||0)*Number(r.valor_unit||0);return`<tr>
<td>${ci(r.id,'nome','Item...','100%')}</td>
<td>${ci(r.id,'unidade','un','100%')}</td>
<td>${ci(r.id,'quantidade','0','100%','number')}</td>
<td>${ci(r.id,'valor_unit','0,00','100%','number')}</td>
<td style="text-align:right;font-weight:600;color:${sub>0?'#34d399':'var(--text3)'}">${sub>0?fmtV(sub):'—'}</td>
<td>${ci(r.id,'observacao','Observação...','100%')}</td>
<td><button onclick="window._plDel('${a.id}','${r.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button></td>
</tr>`;}).join('')}
</tbody></table></div>
<button onclick="window._plAdd('${a.id}')" class="btn-pulse"
  style="margin-top:10px;background:linear-gradient(135deg,#1d4ed8,#3b7ef8);border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:700;padding:9px 18px;border-radius:9px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:7px;transition:all .15s"
  onmouseover="this.style.transform='scale(1.03)';this.style.background='linear-gradient(135deg,#1e40af,#2563eb)'"
  onmouseout="this.style.transform='scale(1)';this.style.background='linear-gradient(135deg,#1d4ed8,#3b7ef8)'">
  <span style="font-size:18px;line-height:1">+</span> Adicionar item
</button>
</div>`;
}

window._plAdd=async(aid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=[...(a.planilha||[]),{id:uid(),nome:'',unidade:'',quantidade:'',valor_unit:'',observacao:''}];await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;renderApp();};
window._plDel=async(aid,rid)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=(a.planilha||[]).filter(r=>r.id!==rid);await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;renderApp();};
window._plUp=async(aid,rid,field,val)=>{const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const rows=(a.planilha||[]).map(r=>r.id===rid?{...r,[field]:val}:r);await sb.from('aditivos').update({planilha:rows}).eq('id',aid);a.planilha=rows;};

// ─── ARQUIVOS ─────────────────────────────────────────────────────────────
const FC={pdf:{bg:'#3b1515',c:'#f87171',l:'PDF'},png:{bg:'#0a2214',c:'#4ade80',l:'IMG'},jpg:{bg:'#0a2214',c:'#4ade80',l:'IMG'},jpeg:{bg:'#0a2214',c:'#4ade80',l:'IMG'},dwg:{bg:'#0e1f3d',c:'#60a5fa',l:'DWG'},dxf:{bg:'#0e1f3d',c:'#60a5fa',l:'DXF'},xlsx:{bg:'#062018',c:'#34d399',l:'XLS'},docx:{bg:'#1a0f3d',c:'#a78bfa',l:'DOC'}};
function fstyle(n){const e=getExt(n);return FC[e]||{bg:'#1a1a1a',c:'#777',l:e.slice(0,3).toUpperCase()||'?'};}

function renderArquivos(a){
  const files=a.arquivos||[];
  const imgs=files.filter(f=>isImg(f.name));
  const docs=files.filter(f=>!isImg(f.name));
  return`<div>
<div class="upload-zone-outer" id="uz-${a.id}" style="border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .15s" onclick="document.getElementById('fi-${a.id}').click()" onmouseover="this.style.borderColor='var(--blue)';this.style.background='#0e1a30'" onmouseout="this.style.borderColor='var(--border2)';this.style.background='transparent'">
<input type="file" id="fi-${a.id}" multiple accept="${UPLOAD_ACCEPT}" style="display:none" onchange="window._upload(event,'${a.id}')">
<div style="font-size:13px;color:var(--text3)">📎 Clique ou arraste arquivos aqui</div>
<div style="font-size:11px;color:var(--text3);margin-top:4px">PDF, DWG, DXF, imagens, planilhas e ZIP até 20 MB</div>
</div>
${imgs.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:10px">${imgs.map(f=>`<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--bg2);border:1px solid var(--border)" class="img-th">
<a href="${esc(f.url)}" target="_blank"><img src="${esc(f.url)}" style="width:100%;height:100%;object-fit:cover;display:block"></a>
<button onclick="window._delFile('${a.id}','${f.id}')" style="position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.75);border:none;color:#f87171;cursor:pointer;font-size:12px;display:none" class="img-del">×</button>
<div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:10px;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.8));overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div>
</div>`).join('')}</div>`:''}
<div style="display:flex;flex-direction:column;gap:6px">
${docs.map(f=>{const st=fstyle(f.name);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px">
<div style="width:30px;height:30px;border-radius:6px;background:${st.bg};color:${st.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${st.l}</div>
<span style="flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
<span style="font-size:11px;color:var(--text3)">${fmtSz(f.size||0)}</span>
<a href="${esc(f.url)}" target="_blank" class="btn btn-sm btn-secondary" style="text-decoration:none">Abrir</a>
<button onclick="window._delFile('${a.id}','${f.id}')" class="btn btn-sm btn-danger">×</button>
</div>`;}).join('')}
</div></div>`;
}

window._upload=async(e,aid)=>{for(const f of e.target.files)await _doUpload(aid,f);e.target.value='';};
async function _doUpload(aid,file){
  if(!validateUploadFile(file))return;
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  toast(`Enviando ${file.name}...`,'#60a5fa');
  const path=`${aid}/${uid()}_${sanitizeStorageName(file.name)}`;
  const{error:ue}=await sb.storage.from(BUCKET).upload(path,file);if(ue){toast('Erro: '+ue.message,'#ef4444');return;}
  const{data:ud}=sb.storage.from(BUCKET).getPublicUrl(path);
  const fo={id:uid(),name:file.name,size:file.size,path,url:ud.publicUrl};
  const arqs=[...(a.arquivos||[]),fo];
  await sb.from('aditivos').update({arquivos:arqs}).eq('id',aid);a.arquivos=arqs;
  toast(`${file.name} enviado!`);renderApp();
}
window._delFile=async(aid,fid)=>{if(!confirm('Remover arquivo?'))return;const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const fo=(a.arquivos||[]).find(f=>f.id===fid);if(fo)await sb.storage.from(BUCKET).remove([fo.path]);const arqs=(a.arquivos||[]).filter(f=>f.id!==fid);await sb.from('aditivos').update({arquivos:arqs}).eq('id',aid);a.arquivos=arqs;toast('Removido.','#f59e0b');renderApp();};

// ─── COMENTÁRIOS ──────────────────────────────────────────────────────────
let _mentionActive=false,_mentionStart=-1,_mentionQuery='',_mentionIdx=0;

function renderComentarios(a){
  const cs=a.comentarios||[];
  const autor=currentUser?currentUser.email.split('@')[0]:'';
  return`<div>
${cs.length===0?'<p style="font-size:13px;color:var(--text3);margin-bottom:20px;font-style:italic">Nenhum comentário ainda.</p>':''}
${cs.map((c,ci)=>{const parsed=esc(c.texto).replace(/@([\w.]+)/g,'<span class="comment-mention">@$1</span>');const isAuthor=c.autor===(currentUser?.email?.split('@')[0]||'');return`<div class="comment">
<div class="avatar">${esc(c.autor.charAt(0).toUpperCase())}</div>
<div style="flex:1"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px"><span style="font-size:13px;font-weight:600;color:var(--text)">${esc(c.autor)}</span><span style="font-size:11px;color:var(--text3)">${fmtD(c.data?.slice(0,10))}</span><span style="margin-left:auto;display:flex;gap:4px"><button onclick="window._editComment('${a.id}',${ci})" style="background:none;border:none;color:#3b82f6;cursor:pointer;font-size:12px;padding:2px" title="Editar">✏️</button><button onclick="window._deleteComment('${a.id}',${ci})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:2px" title="Excluir">🗑️</button></span></div><p id="comment-text-${ci}" style="font-size:13px;color:var(--text2);line-height:1.6">${parsed}</p></div>
</div>`;}).join('')}
<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-top:16px;border-top:1px solid var(--border)">
  <div class="avatar">${autor?getInitials(currentUser?.email):'?'}</div>
  <span style="font-size:12px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:100px;font-weight:500">${esc(autor||'Anônimo')}</span>
</div>
<div style="display:flex;gap:8px;align-items:flex-end">
  <div class="comment-input-wrap">
    <div id="mention-menu" class="mention-menu"></div>
    <textarea id="c-text" class="comment-input" placeholder="Comentário... @ para mencionar" rows="1" oninput="window._cInput(this)" onkeydown="window._cKey(event)"></textarea>
  </div>
  <button class="btn btn-primary btn-sm" onclick="window._sendComment('${a.id}')" style="height:42px;flex-shrink:0">Enviar</button>
</div></div>`;
}

window._cInput=(el)=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';const val=el.value,pos=el.selectionStart,before=val.slice(0,pos),atIdx=before.lastIndexOf('@');if(atIdx>=0&&(atIdx===0||/\s/.test(before[atIdx-1]))){const q=before.slice(atIdx+1);if(!/\s/.test(q)){_mentionActive=true;_mentionStart=atIdx;_mentionQuery=q;_mentionIdx=0;_showMentions(getTeamMembers().filter(m=>m.toLowerCase().includes(q.toLowerCase())).slice(0,6));return;}}  _mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';};
window._cKey=(e)=>{if(_mentionActive){const ms=getTeamMembers().filter(m=>m.toLowerCase().includes(_mentionQuery.toLowerCase())).slice(0,6);if(e.key==='ArrowDown'){e.preventDefault();_mentionIdx=(_mentionIdx+1)%Math.max(ms.length,1);_showMentions(ms);return;}if(e.key==='ArrowUp'){e.preventDefault();_mentionIdx=(_mentionIdx-1+Math.max(ms.length,1))%Math.max(ms.length,1);_showMentions(ms);return;}if(e.key==='Enter'&&ms.length){e.preventDefault();_pickMention(ms[_mentionIdx]);return;}if(e.key==='Escape'){_mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';return;}}if(e.key==='Enter'&&!e.shiftKey&&!_mentionActive){e.preventDefault();window._sendComment(S.selectedAditivo);}};
function _showMentions(ms){const m=document.getElementById('mention-menu');if(!m)return;if(!ms.length){m.style.display='none';return;}m.style.display='block';m.innerHTML=ms.map((n,i)=>`<div class="mention-item${i===_mentionIdx?' active':''}" onmousedown="event.preventDefault();_pickMention('${escJs(n)}')"><div class="m-avatar">${n.charAt(0).toUpperCase()}</div>@${esc(n)}</div>`).join('');}
function _pickMention(name){const el=document.getElementById('c-text');if(!el)return;const val=el.value,after=val.slice(el.selectionStart);el.value=val.slice(0,_mentionStart)+'@'+name+' '+after;_mentionActive=false;const m=document.getElementById('mention-menu');if(m)m.style.display='none';el.focus();}
window._sendComment=async(aid)=>{const el=document.getElementById('c-text');const txt=el?.value?.trim();if(!txt)return;const autor=currentUser?currentUser.email.split('@')[0]:'Anônimo';const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;const cs=[...(a.comentarios||[]),{id:uid(),autor,texto:txt,data:new Date().toISOString().slice(0,10)}];await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);a.comentarios=cs;el.value='';el.style.height='auto';_mentionActive=false;renderApp();};

window._deleteComment=async(aid,idx)=>{
  if(!confirm('Excluir comentário?'))return;
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=[...(a.comentarios||[])];cs.splice(idx,1);
  await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);
  a.comentarios=cs;toast('Comentário excluído.','#f59e0b');renderApp();
};

window._editComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=a.comentarios||[];
  const c=cs[idx];if(!c)return;
  const el=document.getElementById('comment-text-'+idx);
  if(!el)return;
  // Replace text with textarea
  const old=c.texto;
  el.innerHTML=`<textarea id="cedit-${idx}" style="width:100%;min-height:60px;padding:8px 10px;border:2px solid #3b82f6;border-radius:8px;background:#0a0a0f;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:vertical">${esc(old)}</textarea><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="window._saveEditComment('${aid}',${idx})">Salvar</button><button class="btn btn-secondary btn-sm" onclick="renderApp()">Cancelar</button></div>`;
  const ta=document.getElementById('cedit-'+idx);
  if(ta){ta.focus();ta.selectionStart=ta.value.length;}
};

window._saveEditComment=async(aid,idx)=>{
  const a=DB.aditivos.find(x=>x.id===aid);if(!a)return;
  const cs=a.comentarios||[];
  const ta=document.getElementById('cedit-'+idx);
  if(!ta||!ta.value.trim())return;
  cs[idx]={...cs[idx],texto:ta.value.trim()};
  await sb.from('aditivos').update({comentarios:cs}).eq('id',aid);
  a.comentarios=cs;toast('Comentário atualizado!');renderApp();
};

// ─── MATERIAIS ────────────────────────────────────────────────────────────
function renderMateriais(mat,obra){
  const pend=mat.filter(m=>m.status==='Pendente').length;
  return`<div>
<div class="section-header">
  <div><div class="section-title">Solicitação de Materiais</div><div class="section-sub">${mat.length} solicitações · ${pend} pendentes</div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    ${renderExportMenu('materiais',obra)}
    <button class="btn btn-primary" onclick="_openModal('new-material')">+ Nova Solicitação</button>
  </div>
</div>
${mat.length===0?`<div class="empty-state"><p>Nenhum material solicitado.</p><button class="btn btn-primary" onclick="_openModal('new-material')">+ Primeira Solicitação</button></div>`:
(()=>{
  const DISC_MAP={'Elétrica':{bg:'#0e1f3d',c:'#60a5fa',d:'#3b82f6'},'Hidráulica':{bg:'#062018',c:'#34d399',d:'#10b981'},'EPI':{bg:'#2a1d06',c:'#fbbf24',d:'#f59e0b'},'Geral':{bg:'#161616',c:'#888',d:'#555'},'Civil':{bg:'#1a0f2e',c:'#c084fc',d:'#a855f7'},'Lógica':{bg:'#0f1e20',c:'#2dd4bf',d:'#14b8a6'}};
  const byDate={};
  mat.forEach(m=>{const d=m.data_solicitacao||'9999';if(!byDate[d])byDate[d]=[];byDate[d].push(m);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const collapKey='mat-date-collapsed-'+obra;
  if(!window._matCollapsed)window._matCollapsed={};
  return dates.map((dt,di)=>{
    const items=byDate[dt];
    const pend=items.filter(m=>m.status==='Pendente').length;
    const concl=items.filter(m=>m.status==='Entregue'||m.status==='Cancelado').length;
    const cid=collapKey+dt;
    const collapsed=window._matCollapsed[cid]===false?false:true;
    const totalItens=items.reduce((s,m)=>s+(parseInt(m.quantidade||0)),0);
    return`<div style="margin-bottom:6px;border:1px solid var(--border);border-radius:10px;overflow:hidden">
<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);cursor:pointer" onclick="window._toggleMatGroup('${escJs(cid)}')">
  <svg style="flex-shrink:0;transition:transform .2s;transform:rotate(${collapsed?'0':'90'}deg)" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,2 7,5 2,8"/></svg>
  <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--text)">${dt==='9999'?'Sem data':fmtD(dt)}</span>
  <span class="tag">${items.length} item${items.length!==1?'s':''}</span>
  ${pend>0?`<span style="font-size:11px;color:#fbbf24;background:#2a1d06;padding:1px 8px;border-radius:100px;font-weight:600">⏳ ${pend} pendente${pend!==1?'s':''}</span>`:''}
  ${concl===items.length?`<span style="font-size:11px;color:#34d399;background:#062018;padding:1px 8px;border-radius:100px;font-weight:600">✓ Concluído</span>`:''}
  ${items[0]?.solicitante?`<span style="font-size:11px;color:var(--text3);margin-left:4px">por ${esc(items[0].solicitante)}</span>`:''}
  <span style="margin-left:auto;display:flex;gap:4px;align-items:center"><span style="font-size:11px;color:var(--text3);margin-right:6px">${totalItens>0?totalItens+' un':''}</span><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window._copyMaterialGroup('${escJs(obra)}','${escJs(items.map(i=>i.id).join(','))}')" title="Copiar lista">Copiar</button><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window._openEditReq('${escJs(items.map(i=>i.id).join(','))}')" title="Editar requisição">Editar</button><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window._matReqXLSX('${escJs(obra)}','${escJs(items.map(i=>i.id).join(','))}')" title="Excel desta requisição">Excel</button><button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();window._matReqPDF('${escJs(obra)}','${escJs(items.map(i=>i.id).join(','))}')" title="PDF desta requisição">PDF</button></span>
</div>
${collapsed?'':
`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:900px">
<thead><tr style="background:#0d0d0d;border-bottom:1px solid var(--border)">

function renderBaixadasPanel(obra){
  const sync=syncBaixadasWithFuncionarios(obra);

  const allRows=sync.rows;
  const today=todayISO();
  const statusFilter=S.funcBaixadaFilter||'Todos';
  const visibleRows=statusFilter==='Todos'?allRows:allRows.filter(r=>r.status===statusFilter);
  const nextReturn=allRows.filter(r=>r.data_volta&&r.data_volta>=today).sort((a,b)=>a.data_volta.localeCompare(b.data_volta))[0];
  const filterCount=status=>status==='Todos'?allRows.length:allRows.filter(r=>r.status===status).length;
  const filterBtns=['Todos',...BAIXADA_STATUS].map(status=>`<button class="obra-nav-btn${statusFilter===status?' active':''}" onclick="S.funcBaixadaFilter='${status}';renderApp()" style="padding:7px 14px;font-size:12px">${status} (${filterCount(status)})</button>`).join('');
  const obraSafe=escJs(obra);
  const summary=[
    {label:'Ativos elegíveis',value:allRows.length,note:'Funcionários ativos da obra',accent:'#60a5fa'},
    {label:'Períodos montados',value:allRows.filter(r=>r.data_ida&&r.data_volta).length,note:'Com ida e volta definidas',accent:'#34d399'},
    {label:'Em baixada hoje',value:allRows.filter(r=>isBaixadaLive(r,today)||r.status==='Em baixada').length,note:'No período atual ou marcados',accent:'#c084fc'},
    {label:'Próximo retorno',value:nextReturn?fmtD(nextReturn.data_volta):'—',note:nextReturn?nextReturn.nome:'Sem agenda futura',accent:'#fbbf24'}
  ];
  return`<div class="card baixada-card">
    <div class="baixada-head">
      <div class="baixada-head-copy">
        <div class="card-title" style="margin-bottom:8px">🗓 Planejamento de Baixadas</div>
        <div class="baixada-sub">Painel operacional para organizar a baixada dos funcionários ativos da obra. A ida e a volta ficam em calendário, você pode ajustar a quantidade de dias por pessoa e a data de volta sempre representa o retorno à obra.</div>
      </div>
      <div class="baixada-actions">
        <button class="btn btn-secondary btn-sm" onclick="window._syncBaixadas(true)">↻ Atualizar Ativos</button>
        <button class="btn btn-secondary btn-sm" onclick="window.baixadasCSV('${obraSafe}')">⬇ CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="window.baixadasXLSX('${obraSafe}')">📊 Excel</button>
        <button class="btn btn-secondary btn-sm" onclick="window.baixadasPDF('${obraSafe}')">📑 PDF</button>
      </div>
    </div>
    <div class="baixada-summary-grid">${summary.map(card=>`<div class="baixada-summary-card" style="--accent:${card.accent}"><div class="baixada-summary-label">${card.label}</div><div class="baixada-summary-value">${esc(String(card.value))}</div><div class="baixada-summary-note">${esc(card.note)}</div></div>`).join('')}</div>
    <div class="baixada-policy"><div class="baixada-policy-icon">⏱</div><div><strong>Regra operacional</strong><span>Somente funcionários com status <b>Ativo</b> entram nesta planilha. Ao preencher uma data de ida, o sistema calcula a volta automaticamente com base na quantidade de dias informada. Se você ajustar a volta primeiro, a ida é recalculada para manter o período configurado.</span></div></div>
    <div class="baixada-filter-row">
      <div class="baixada-filter-chips">${filterBtns}</div>
      <div class="section-sub">${allRows.length} funcionário(s) elegíveis · ${visibleRows.length} visível(is) no filtro atual</div>
    </div>
    ${allRows.length===0?`<div class="empty-state baixada-empty"><p>Nenhum funcionário ativo nesta obra para montar a baixada.</p></div>`:`<div class="tbl-wrap"><table><thead><tr><th>Nome do Funcionário</th><th>Função</th><th>Data de Ida</th><th>Dias</th><th>Data de Volta</th><th>Status da Baixada</th><th style="width:48px"></th></tr></thead><tbody>${visibleRows.map(row=>{const live=isBaixadaLive(row,today)||row.status==='Em baixada';const dias=normalizeBaixadaDays(row.dias);return`<tr${live?' class="baixada-live-row"':''}><td><div class="baixada-person"><div class="baixada-person-name">${esc(row.nome||'—')}</div><div class="baixada-person-meta">${row.data_ida?`Saída ${fmtD(row.data_ida)} · retorno ${fmtD(row.data_volta)}`:'Sem período definido'}${live?'<span class="baixada-live-chip">Em período</span>':''}</div></div></td><td><span class="tag">${esc(row.funcao||'—')}</span></td><td><input class="ci baixada-date-input" type="date" value="${esc(row.data_ida||'')}" onchange="window._updateBaixadaDate('${row.id}','data_ida',this.value)" onfocus="this.showPicker&&this.showPicker()"></td><td><input class="baixada-days-input" type="number" min="1" step="1" value="${dias}" onchange="window._updateBaixadaDays('${row.id}',this.value)" onblur="window._updateBaixadaDays('${row.id}',this.value)"></td><td><input class="ci baixada-date-input" type="date" value="${esc(row.data_volta||'')}" onchange="window._updateBaixadaDate('${row.id}','data_volta',this.value)" onfocus="this.showPicker&&this.showPicker()"></td><td style="min-width:168px">${makeCd(BAIXADA_STATUS,BS,row.status||'Solicitado',`window._updateBaixadaStatus('${row.id}',VAL)`)}</td><td><button class="btn btn-secondary btn-sm btn-icon" title="Limpar período" onclick="window._clearBaixada('${row.id}')">↺</button></td></tr>`}).join('')}</tbody></table></div>`}
  </div>`;
}

function renderFuncionarios(func,obra){
  const ativos=func.filter(f=>(f.status||'Ativo')==='Ativo').length;
  const filter=S.funcFilter||'Todos';
  const hideDocs=!!S.funcHideDocs;
  const section=S.funcSection||'equipe';
  let filtered=filter==='Todos'?func:func.filter(f=>(f.status||'Ativo')===filter);
  const sort=S.funcSort;
  if(sort&&sort.col){
    filtered=[...filtered].sort((a,b)=>{
      let va=a[sort.col]||'',vb=b[sort.col]||'';
      if(typeof va==='string')va=va.toLowerCase();
      if(typeof vb==='string')vb=vb.toLowerCase();
      if(va<vb)return sort.asc?-1:1;
      if(va>vb)return sort.asc?1:-1;

    });

  const filterBtns=['Todos','Ativo','Ausente','Afastado','Desligado'].map(s=>`<button class="obra-nav-btn${filter===s?' active':''}" onclick="S.funcFilter='${s}';renderApp()" style="padding:6px 14px;font-size:12px">${s==='Todos'?'Todos ('+func.length+')':s+' ('+func.filter(f=>(f.status||'Ativo')===s).length+')'}</button>`).join('');
  const obraSafe=escJs(obra);

  const subTabs=`<div class="obra-nav" style="margin:0 0 20px;padding-bottom:12px"><button class="obra-nav-btn${section==='equipe'?' active':''}" onclick="S.funcSection='equipe';renderApp()"><span class="nav-icon">👥</span>Equipe<span class="nav-count">${func.length}</span></button><button class="obra-nav-btn${section==='baixadas'?' active':''}" onclick="S.funcSection='baixadas';renderApp()"><span class="nav-icon">🗓</span>Baixadas<span class="nav-count">${getActiveFuncionarios(obra).length}</span></button></div>`;
  return`<div><div class="section-header"><div><div class="section-title">Funcionários</div><div class="section-sub">${func.length} cadastrados · ${ativos} ativos</div></div>${actionBar}</div>${subTabs}${section==='baixadas'?renderBaixadasPanel(obra):`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">${filterBtns}</div>${filtered.length===0?`<div class="empty-state"><p>${filter==='Todos'?'Nenhum funcionário cadastrado.':'Nenhum funcionário com status "'+filter+'".'}</p>${filter==='Todos'?`<button class="btn btn-primary" onclick="_openModal('new-func')">+ Primeiro Funcionário</button>`:''}</div>`:`<div class="tbl-wrap"><table><thead><tr><th style="cursor:pointer" onclick="${sortClick('nome')}">Nome ${sortIcon('nome')}</th><th style="cursor:pointer" onclick="${sortClick('funcao')}">Função ${sortIcon('funcao')}</th><th style="cursor:pointer" onclick="${sortClick('empresa')}">Empresa ${sortIcon('empresa')}</th><th>Telefone</th><th>Documento</th><th style="cursor:pointer" onclick="${sortClick('data_entrada')}">Entrada ${sortIcon('data_entrada')}</th><th style="cursor:pointer" onclick="${sortClick('status')}">Status ${sortIcon('status')}</th><th style="width:60px"></th></tr></thead><tbody>${filtered.map(f=>`<tr><td style="font-weight:600;color:var(--text)">${esc(f.nome)}</td><td><span class="tag">${esc(f.funcao||'—')}</span></td><td style="color:var(--text3)">${esc(f.empresa||'—')}</td><td style="color:var(--text3)">${esc(f.telefone||'—')}</td><td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:11px">${esc(f.documento||'—')}</td><td style="color:var(--text3);white-space:nowrap">${fmtD(f.data_entrada)}</td><td>${makeCd(FUNC_STATUS,FS,f.status||'Ativo',`updateField('funcionarios','${f.id}','status',VAL)`)}</td><td><div class="func-row-actions"><button class="btn btn-secondary btn-sm btn-icon" title="Editar funcionário" onclick="_openModal('edit-func',{id:'${f.id}'})">✎</button><button class="btn btn-danger btn-sm btn-icon" title="Excluir funcionário" onclick="_deleteFuncionario('${f.id}')">🗑</button></div></td></tr>`).join('')}</tbody></table></div>`}`}</div>`;

const TODO_PRIOR={'Crítico':{bg:'#200c0c',c:'#f87171',d:'#ef4444'},'Urgente':{bg:'#2a1d06',c:'#fbbf24',d:'#f59e0b'},'Normal':{bg:'#0e1f3d',c:'#60a5fa',d:'#3b82f6'},'Baixa':{bg:'#161616',c:'#666',d:'#444'}};
const TODO_STATUS_MAP={'Pendente':{bg:'#2a1d06',c:'#fbbf24'},'Em andamento':{bg:'#0e1f3d',c:'#60a5fa'},'Concluído':{bg:'#062018',c:'#34d399'}};

function renderTodo(todos,obra){
  const taskRow=(t)=>{
    const pr=TODO_PRIOR[t.prioridade]||TODO_PRIOR['Normal'];
    return`<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)">
<button onclick="window._toggleTodo('${t.id}')"
  style="width:22px;height:22px;border-radius:6px;border:2px solid ${t.status==='Concluído'?'#22c55e':'var(--border2)'};background:${t.status==='Concluído'?'#22c55e':'transparent'};cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;transition:all .15s">
  ${t.status==='Concluído'?'✓':''}
</button>
<div style="flex:1;min-width:0">
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
    <span style="font-size:13px;font-weight:600;color:${t.status==='Concluído'?'var(--text3)':'#fff'};text-decoration:${t.status==='Concluído'?'line-through':'none'}">${esc(t.descricao)}</span>
    ${makeCd(['Crítico','Urgente','Normal','Baixa'],TODO_PRIOR,t.prioridade||'Normal',`window._setPrioridade('${t.id}',VAL)`)}
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    ${t.responsavel?`<span style="font-size:11px;color:var(--text3)">👤 <input class="ci" style="width:80px;font-size:11px;color:var(--text3);padding:1px 4px" value="${esc(t.responsavel)}" onblur="updateField('todos','${t.id}','responsavel',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></span>`:''}
  </div>
</div>
<div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
  ${makeCd(['Pendente','Em andamento','Concluído'],TODO_STATUS_MAP,t.status||'Pendente',`window._setTodoStatus('${t.id}',VAL)`)}
  <button onclick="window._deleteTodo('${t.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:14px;line-height:1" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button>
</div>
</div>`;
  };

  // Group by date
  if(!window._todoCollapsed)window._todoCollapsed={};
  const byDate={};
  todos.forEach(t=>{const d=t.data||'9999';if(!byDate[d])byDate[d]=[];byDate[d].push(t);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const hoje=new Date().toISOString().slice(0,10);
  const totalPend=todos.filter(t=>t.status!=='Concluído').length;
  const totalConc=todos.filter(t=>t.status==='Concluído').length;

  const groups=dates.map(dt=>{
    const items=byDate[dt].sort((a,b)=>{const o={'Crítico':0,'Urgente':1,'Normal':2,'Baixa':3};return(o[a.prioridade]||2)-(o[b.prioridade]||2);});
    const pend=items.filter(t=>t.status!=='Concluído').length;
    const conc=items.filter(t=>t.status==='Concluído').length;
    const cid='todo-'+obra+'-'+dt;
    const isHoje=dt===hoje;
    const collapsed=window._todoCollapsed[cid]===false?false:true;
    return`<div style="margin-bottom:6px;border:1px solid ${isHoje?'#2563eb':' var(--border)'};border-radius:10px;overflow:hidden">
<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${isHoje?'#0e1f3d':'var(--bg2)'};cursor:pointer" onclick="window._toggleTodoGroup('${escJs(cid)}')">
  <svg style="flex-shrink:0;transition:transform .2s;transform:rotate(${collapsed?'0':'90'}deg)" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="${isHoje?'#60a5fa':'#555'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,2 7,5 2,8"/></svg>

window._sortBy=(field)=>{
  if(!window._sortState)window._sortState={field:null,dir:1};
  if(window._sortState.field===field)window._sortState.dir*=-1;
  else{window._sortState.field=field;window._sortState.dir=1;}
  const tbl=document.querySelector('#ad-tbl tbody');
  if(!tbl)return;
  const rows=Array.from(tbl.querySelectorAll('tr'));
  rows.sort((a,b)=>{
    const ai=Array.from(a.closest('table').querySelectorAll('th')).findIndex(th=>th.dataset.field===field);
    if(ai<0)return 0;
    let va=a.cells[ai]?.querySelector('input')?.value||'';
    let vb=b.cells[ai]?.querySelector('input')?.value||'';
    if(field==='valor'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;return(va-vb)*window._sortState.dir;}
    return va.localeCompare(vb,'pt-BR',{numeric:true})*window._sortState.dir;
  });
  rows.forEach(r=>tbl.appendChild(r));
};

window._startResize=(e,field)=>{
  e.preventDefault();e.stopPropagation();
  const th=e.target.closest('th');if(!th)return;
  const startX=e.clientX,startW=th.getBoundingClientRect().width;
  e.target.classList.add('resizing');
  if(!window._colWidths)window._colWidths={};
  const move=ev=>{const w=Math.max(60,startW+ev.clientX-startX);th.style.width=w+'px';th.style.minWidth=w+'px';window._colWidths[field]=w;};
  const up=()=>{e.target.classList.remove('resizing');document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
};

function sortDespesaItems(items=[]){
  return[...(Array.isArray(items)?items:[])].sort((a,b)=>{
    const da=String(a.data||'9999-12-31');
    const db=String(b.data||'9999-12-31');
    if(da!==db)return da.localeCompare(db);
    return String(a.created_at||a.id||'').localeCompare(String(b.created_at||b.id||''));
  });
}
function buildDespesaLedger(items=[]){
  let saldoAnterior=0;
  return sortDespesaItems(items).map(item=>{
    const isAdiant=String(item.tipo||'Despesa')==='Adiantamento';
    const saldoInformado=item.valor_adiantamento!=null&&item.valor_adiantamento!==''?Number(item.valor_adiantamento):null;
    const conta=moneyNumber(item.valor_conta)||0;
    let movimentoAdiant=0;
    let saldoAtual=saldoAnterior;
    if(isAdiant){
      saldoAtual=saldoInformado!=null?saldoInformado:saldoAnterior;
      movimentoAdiant=saldoAtual-saldoAnterior;
      if(saldoAnterior===0&&saldoAtual>0&&movimentoAdiant<=0)movimentoAdiant=saldoAtual;
      if(movimentoAdiant<0)movimentoAdiant=0;
    }else{
      saldoAtual=saldoInformado!=null?saldoInformado:(saldoAnterior-conta);
    }
    const row={...item,tipo:isAdiant?'Adiantamento':'Despesa',valor_conta:conta||null,movimento_adiantamento:movimentoAdiant||0,saldo:saldoAtual||0};
    saldoAnterior=row.saldo;
    return row;
  });
}
function despesaMonthLabel(ym){
  if(!ym||ym==='9999-99')return'Sem data';
  const [year,month]=ym.split('-');
  const names=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${names[Math.max(0,Number(month)-1)]} ${year}`;
}
async function exportDespesaWorkbook(obra,month='all'){
  const ledger=buildDespesaLedger(DB.despesas.filter(d=>d.obra===obra));
  const grouped={};
  const target=month==='all'?ledger:ledger.filter(item=>(item.data||'').slice(0,7)===month);
  target.forEach(item=>{
    const ym=(item.data||'9999-99').slice(0,7);
    if(!grouped[ym])grouped[ym]=[];
    grouped[ym].push(item);
  });
  const keys=Object.keys(grouped).sort((a,b)=>a.localeCompare(b));
  if(!keys.length){toast('Nenhum lançamento para gerar a planilha.','#f59e0b');return;}
  if(!window.ExcelJS){return window._exportDespXLSX(obra);}
  const workbook=new window.ExcelJS.Workbook();
  workbook.creator='JET Gestão de Obras';
  workbook.created=new Date();
  keys.forEach(ym=>{
    const rows=grouped[ym];
    const totalConta=rows.reduce((sum,row)=>sum+(Number(row.valor_conta)||0),0);
    const totalAdiant=rows.reduce((sum,row)=>sum+(Number(row.movimento_adiantamento)||0),0);
    const saldoFinal=rows.length?rows[rows.length-1].saldo:0;
    const ws=workbook.addWorksheet(xlsxSheetName(month==='all'?despesaMonthLabel(ym):`Prestação ${despesaMonthLabel(ym)}`));
    ws.views=[{state:'frozen',ySplit:4}];
    ws.columns=[{width:13},{width:38},{width:16},{width:24},{width:16},{width:16},{width:18}];
    ws.mergeCells('A1:G1');
    ws.mergeCells('A2:G2');
    ws.getCell('A1').value=`Adiantamento de despesas — ${obra}`;
    ws.getCell('A1').fill=xlsxFill('#1A2E6B');
    ws.getCell('A1').font={name:'Aptos',size:16,bold:true,color:{argb:'FFFFFFFF'}};
    ws.getCell('A1').alignment={horizontal:'center',vertical:'middle'};
    ws.getRow(1).height=24;
    ws.getCell('A2').value=`${despesaMonthLabel(ym)} · Responsável: ${currentUser?.email?.split('@')[0]||''} · Saldo final ${fmtV(saldoFinal)}`;
    ws.getCell('A2').font={name:'Aptos',size:10,color:{argb:'FF5E6B83'}};
    ws.getCell('A2').alignment={horizontal:'center',vertical:'middle'};
    ws.mergeCells('A3:A4');ws.mergeCells('B3:B4');ws.mergeCells('C3:C4');ws.mergeCells('D3:D4');ws.mergeCells('E3:F3');ws.mergeCells('G3:G4');
    [['A3','Data'],['B3','Descrição'],['C3','NFe Nº'],['D3','Loja / Fornecedor'],['E3','Valores'],['E4','Conta Bancária'],['F4','Saldo / Adiantamento'],['G3','Responsável']].forEach(([cell,value])=>{ws.getCell(cell).value=value;});
    ['A3','B3','C3','D3','E3','E4','F4','G3'].forEach(cell=>{ws.getCell(cell).fill=xlsxFill('#EDF3FF');ws.getCell(cell).font={name:'Aptos',size:10,bold:true,color:{argb:'FF1A2E6B'}};ws.getCell(cell).alignment={horizontal:'center',vertical:'middle'};ws.getCell(cell).border=xlsxBorder('D7E0EE');});
    let rowNumber=5;
    rows.forEach((row,index)=>{
      const excelRow=ws.getRow(rowNumber);
      excelRow.getCell(1).value=row.data?new Date(row.data+'T12:00:00'):null;
      excelRow.getCell(1).numFmt='dd/mm/yyyy';
      excelRow.getCell(2).value=row.descricao||'';
      excelRow.getCell(3).value=row.nfe||'';
      excelRow.getCell(4).value=row.loja||'';
      excelRow.getCell(5).value=row.valor_conta||'';
      excelRow.getCell(6).value=row.saldo||'';
      excelRow.getCell(7).value=row.responsavel||'';
      [1,2,3,4,5,6,7].forEach(col=>{
        const cell=excelRow.getCell(col);
        cell.font={name:'Aptos',size:10,color:{argb:'FF23344D'},bold:col===6};
        cell.alignment={vertical:'middle',horizontal:col===1?'center':(col>=5&&col<=6?'right':'left'),wrapText:col===2||col===4};
        cell.border=xlsxBorder('DEE7F2');
        cell.fill=xlsxFill(index%2===0?'#FFFFFF':'#F7FAFF');
      });
      if(row.valor_conta)excelRow.getCell(5).numFmt='"R$" #,##0.00';
      if(row.saldo!=null&&row.saldo!==''){excelRow.getCell(6).numFmt='"R$" #,##0.00';excelRow.getCell(6).font={name:'Aptos',size:10,bold:true,color:{argb:row.tipo==='Adiantamento'?'FFB7791F':'FF14956B'}};}
      rowNumber++;
    });
    const totalRow=ws.getRow(rowNumber);
    totalRow.getCell(1).value='TOTAL';
    totalRow.getCell(1).font={name:'Aptos',size:10,bold:true,color:{argb:'FF1A2E6B'}};
    totalRow.getCell(5).value=totalConta;
    totalRow.getCell(5).numFmt='"R$" #,##0.00';
    totalRow.getCell(6).value=saldoFinal;
    totalRow.getCell(6).numFmt='"R$" #,##0.00';
    totalRow.getCell(7).value=`Adiantado ${fmtV(totalAdiant)}`;
    [1,2,3,4,5,6,7].forEach(col=>{const cell=totalRow.getCell(col);cell.border=xlsxBorder('C8D5E8');cell.fill=xlsxFill('#EDF3FF');});
    ws.getCell(`A${rowNumber+2}`).value=`Gerado em ${new Date().toLocaleString('pt-BR')} · Padrão JET Gestão de Obras`;
    ws.getCell(`A${rowNumber+2}`).font={name:'Aptos',size:9,color:{argb:'FF6B7C93'}};
  });
  const buffer=await workbook.xlsx.writeBuffer();
  xlsxDownload(buffer,`${xlsxFileName(`Adiantamento_${obra}_${month==='all'?'completo':month}`)}.xlsx`);
  toast('Planilha gerada!');
}

<td style="padding:7px 10px"><input class="ci" style="width:100%;color:var(--text2)" value="${esc(item.loja||'')}" placeholder="—" onblur="updateField('despesas','${item.id}','loja',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>

<td style="padding:7px 10px;text-align:center"><button class="btn btn-sm btn-danger" onclick="_deleteDespesa('${item.id}')">?</button></td>

</div>
${collapsed?'':`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:820px"><thead><tr style="border-bottom:1px solid var(--border)"><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;width:100px">Data</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Descrição</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;width:90px">NFe Nº</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Loja</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:right;width:120px">Conta Bancária</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:right;width:120px">Saldo</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:center;width:120px">Anexos</th><th style="width:40px"></th></tr></thead><tbody>${rows(items)}</tbody><tfoot><tr style="border-top:2px solid var(--border2);background:rgba(79,140,255,.04)"><td colspan="4" style="padding:8px 10px;font-size:12px;font-weight:700;color:var(--text3)">TOTAL ${despesaMonthLabel(month)}</td><td style="padding:8px 10px;text-align:right;font-weight:700;color:var(--text)">${fmtV(mTotalConta)}</td><td style="padding:8px 10px;text-align:right;font-weight:700;color:#14956b">${fmtV(mSaldo)}</td><td></td><td></td></tr></tfoot></table></div>`}
</div>`;
  }).join('');
  return`<div><div class="compras-kpi-grid"><div class="stat-card"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#3b82f6;border-radius:10px 0 0 10px"></div><div class="stat-label">Lançamentos</div><div class="stat-value" style="color:#60a5fa">${ledger.length}</div><div class="stat-sub">${docsLancados} com NFe / doc</div></div><div class="stat-card"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#10b981;border-radius:10px 0 0 10px"></div><div class="stat-label">Despesas</div><div class="stat-value" style="color:#34d399">${fmtV(totalConta)}</div><div class="stat-sub">Saídas lançadas</div></div><div class="stat-card"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#f59e0b;border-radius:10px 0 0 10px"></div><div class="stat-label">Adiantado</div><div class="stat-value" style="color:#fbbf24">${fmtV(totalAdiant)}</div><div class="stat-sub">Aportes no período</div></div><div class="stat-card"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#a855f7;border-radius:10px 0 0 10px"></div><div class="stat-label">Saldo Atual</div><div class="stat-value" style="color:#c084fc">${fmtV(saldoAtual)}</div><div class="stat-sub">Disponível para prestação</div></div></div><div class="section-header"><div><div class="section-title">💰 Adiantamento de Despesas</div><div class="section-sub">${ledger.length} lançamentos · controle em formato de prestação com saldo acumulado por mês</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-secondary btn-sm" onclick="window._exportDespCSV('${escJs(obra)}')">⬇ CSV</button><button class="btn btn-secondary btn-sm" onclick="window._exportDespXLSX('${escJs(obra)}')">📊 Excel</button><button class="btn btn-secondary btn-sm" onclick="window._exportDespPDF('${escJs(obra)}')">📑 PDF</button><button class="btn btn-secondary btn-sm" onclick="exportDespesaWorkbook('${escJs(obra)}')">📘 Planilha</button><button class="btn btn-success btn-sm" onclick="_openModal('new-adiantamento')">+ Adiantamento</button><button class="btn btn-primary" onclick="_openModal('new-despesa')">+ Despesa</button></div></div>${ledger.length===0?`<div class="empty-state"><p>Nenhum lançamento registrado.</p><button class="btn btn-primary" onclick="_openModal('new-adiantamento')">+ Primeiro Adiantamento</button></div>`:groups}</div>`;
}

window._addObra=async()=>{const i=document.getElementById('new-obra-input');if(!i)return;const v=i.value.trim();if(!v)return;const cur=getCustomObras();if(getAllObras().includes(v)){toast('Obra já existe.','#f59e0b');return;}saveCustomObras([...cur,v]);saveHiddenObras(getHiddenObras().filter(o=>o!==v));await saveRemoteObras([...(DB.obraRegistry||[]),v]);i.value='';renderApp();toast(`Obra "${v}" adicionada!`);};

window._renameObra=async el=>{
  const orig=el.dataset.orig,novo=el.value.trim();
  if(!novo||orig===novo)return;
  if(getAllObras().includes(novo)){toast('Nome já existe.','#f59e0b');el.value=orig;return;}
  await Promise.allSettled(OBRA_LINKED_TABLES.map(table=>sb.from(table).update({obra:novo}).eq('obra',orig)));
  OBRA_LINKED_TABLES.forEach(table=>{DB[table]=DB[table].map(row=>row?.obra===orig?{...row,obra:novo}:row);});
  const custom=getCustomObras().map(o=>o===orig?novo:o);
  const hidden=getHiddenObras().map(o=>o===orig?novo:o);
  const obraData=getObrasData().map(o=>o?.nome===orig?{...o,nome:novo}:o);
  saveCustomObras(custom);
  saveHiddenObras(hidden);
  saveObrasData(obraData);

};
window._delObra=obra=>{_showDelDialog(obra);};

let _delPendObra=null,_delPendMeta=null,_delTimer=null,_delUndo=null;
function _showDelDialog(obra){
  document.getElementById('del-dlg')?.remove();
  clearInterval(_delTimer);
  const linkedMap=buildObraDeleteMap(obra);
  const rows=Object.entries(linkedMap).filter(([,ids])=>ids.length);
  const total=linkedObraCount(linkedMap);
  let secs=3;
  const el=document.createElement('div');
  el.id='del-dlg';
  el.innerHTML=`<div class="delete-dialog-overlay"><div class="delete-dialog"><div class="delete-dialog-head"><div class="delete-dialog-icon">⚠</div><div class="delete-dialog-copy"><h3>Excluir obra</h3><div class="delete-dialog-name">${esc(obra)}</div><p>${total?`Os registros vinculados serão movidos para <strong>Sem obra</strong>, assim a obra deixa de aparecer na tela inicial sem perder histórico.`:`A obra será removida do gerenciamento e da tela inicial. Você ainda pode desfazer em seguida.`}</p></div></div><div class="delete-dialog-meta"><div class="delete-dialog-chip"><strong>${total}</strong> registro(s) vinculados</div><div class="delete-dialog-chip"><strong>${rows.length}</strong> área(s) afetada(s)</div></div>${rows.length?`<div class="delete-dialog-list">${rows.map(([table,ids])=>`<div class="delete-dialog-row"><span>${LINKED_TABLE_LABELS[table]||table}</span><strong>${ids.length}</strong></div>`).join('')}</div>`:`<div class="delete-dialog-list"><div class="delete-dialog-row"><span>Nenhum vínculo ativo</span><strong>Pronto para remover</strong></div></div>`}<div class="delete-dialog-timer"><div class="delete-dialog-ring"><svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"></circle><circle id="dl-ring" cx="36" cy="36" r="30" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="188.5" stroke-dashoffset="0" stroke-linecap="round"></circle></svg><div class="delete-dialog-ring-value" id="dl-num">${secs}</div></div><div class="delete-dialog-timer-copy"><strong>Confirmação em espera</strong><span id="dl-label">Aguarde ${secs} segundos para liberar a exclusão.</span></div></div><div class="delete-dialog-actions"><button class="btn btn-secondary" onclick="document.getElementById('del-dlg')?.remove();clearInterval(_delTimer)">Cancelar</button><button id="dl-btn" disabled class="btn btn-danger" style="opacity:.5;cursor:not-allowed">Excluir (${secs}s)</button></div></div></div>`;
  document.body.appendChild(el);
  _delPendObra=obra;
  _delPendMeta={linkedMap,total};
  _delTimer=setInterval(()=>{
    secs--;
    const num=document.getElementById('dl-num');
    const ring=document.getElementById('dl-ring');
    const label=document.getElementById('dl-label');
    const btn=document.getElementById('dl-btn');
    if(!num){clearInterval(_delTimer);return;}
    if(secs>0){
      num.textContent=secs;
      if(ring)ring.style.strokeDashoffset=188.5*(1-secs/3);
      if(label)label.textContent=`Aguarde ${secs} segundo${secs!==1?'s':''} para liberar a exclusão.`;
      if(btn)btn.textContent=`Excluir (${secs}s)`;
      return;
    }
    clearInterval(_delTimer);
    num.textContent='✓';
    num.style.color='#22c55e';
    if(ring){ring.style.strokeDashoffset=188.5;ring.style.stroke='#22c55e';}
    if(label)label.textContent='Pronto para confirmar. Você ainda poderá desfazer.';
    if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';btn.textContent='Confirmar exclusão';btn.onclick=_execDel;}
  },1000);
}
async function _execDel(){
  clearInterval(_delTimer);
  document.getElementById('del-dlg')?.remove();
  const obra=_delPendObra;
  const meta=_delPendMeta||{};
  if(!obra)return;
  const linkedMap=meta.linkedMap||buildObraDeleteMap(obra);
  const affectedTables=OBRA_LINKED_TABLES.filter(table=>(linkedMap[table]||[]).length);
  const results=await Promise.allSettled(affectedTables.map(table=>sb.from(table).update({obra:'Sem obra'}).in('id',linkedMap[table])));
  const failed=affectedTables.filter((table,index)=>results[index].status==='rejected'||results[index].value?.error);
  if(failed.length){toast('Não foi possível mover todos os vínculos da obra. Tente novamente.','#ef4444');return;}
  _delUndo={obra,linkedMap,wasCustom:getCustomObras().includes(obra),data:getObraData(obra),registryHad:(DB.obraRegistry||[]).includes(obra),hiddenHad:getHiddenObras().includes(obra)};
  OBRA_LINKED_TABLES.forEach(table=>{const ids=linkedMap[table]||[];if(ids.length)DB[table]=DB[table].map(row=>ids.includes(row.id)?{...row,obra:'Sem obra'}:row);});
  saveCustomObras(getCustomObras().filter(o=>o!==obra));
  saveObrasData(getObrasData().filter(o=>o?.nome!==obra));
  saveHiddenObras(uniqObras([...getHiddenObras(),obra]));
  await saveRemoteObras((DB.obraRegistry||[]).filter(o=>o!==obra));
  renderApp();
  _showUndo(obra,linkedObraCount(linkedMap));
}
function _showUndo(obra,total){
  document.getElementById('undo-t')?.remove();
  const el=document.createElement('div');
  el.id='undo-t';
  el.className='toast';
  el.style.cssText='bottom:80px;left:50%;transform:translateX(-50%);min-width:320px;gap:14px';
  el.innerHTML=`<span>Obra "${esc(obra)}" excluída${total?` · ${total} vínculo(s) movido(s) para Sem obra`:''}</span><button onclick="_undoDel()" style="background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;white-space:nowrap">↩ Desfazer</button>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.remove();_delUndo=null;},10000);
}
window._undoDel=async()=>{
  document.getElementById('undo-t')?.remove();
  const u=_delUndo;
  if(!u)return;
  const affectedTables=OBRA_LINKED_TABLES.filter(table=>(u.linkedMap?.[table]||[]).length);
  const results=await Promise.allSettled(affectedTables.map(table=>sb.from(table).update({obra:u.obra}).in('id',u.linkedMap[table])));
  const failed=affectedTables.filter((table,index)=>results[index].status==='rejected'||results[index].value?.error);
  if(failed.length){toast('Não foi possível restaurar todos os vínculos da obra.','#ef4444');return;}
  OBRA_LINKED_TABLES.forEach(table=>{const ids=u.linkedMap?.[table]||[];if(ids.length)DB[table]=DB[table].map(row=>ids.includes(row.id)?{...row,obra:u.obra}:row);});
  saveHiddenObras(getHiddenObras().filter(o=>o!==u.obra));
  if(u.wasCustom)saveCustomObras(uniqObras([...getCustomObras(),u.obra]));
  if(u.data?.nome)saveObrasData([...getObrasData().filter(o=>o?.nome!==u.obra),u.data]);
  if(u.registryHad||u.wasCustom||linkedObraCount(u.linkedMap))await saveRemoteObras([...(DB.obraRegistry||[]),u.obra]);
  toast(`Obra "${u.obra}" restaurada!`);
  renderApp();
};

// ─── EXPORT FUNCTIONS ─────────────────────────────────────────────────────
function exportCSV(rows,headers,filename){
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename+'.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

function xlsxSheetName(name){return String(name||'Dados').replace(/[\\/*?:\[\]]/g,' ').slice(0,31)||'Dados';}
function xlsxFileName(name){return String(name||'Dados').replace(/[<>:"/\\|?*]+/g,'_');}
function xlsxArgb(hex,fallback='1A2E6B'){
  const clean=String(hex||fallback).replace('#','').trim();
  const normalized=clean.length===3?clean.split('').map(c=>c+c).join(''):clean;
  return /^[0-9a-fA-F]{6}$/.test(normalized)?`FF${normalized.toUpperCase()}`:`FF${fallback}`;
}
function xlsxFill(hex){return{type:'pattern',pattern:'solid',fgColor:{argb:xlsxArgb(hex)}};}
function xlsxBorder(color='D7E0EE'){
  const c={argb:`FF${color}`};
  return{top:{style:'thin',color:c},left:{style:'thin',color:c},bottom:{style:'thin',color:c},right:{style:'thin',color:c}};
}
function xlsxDownload(buffer,filename){
  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function xlsxColumnsFromHeaders(headers,rows){
  return headers.map((header,index)=>{
    let max=String(header).length;
    rows.forEach(row=>{const value=String(row[index]!=null?row[index]:'');if(value.length>max)max=value.length;});
    return{header,key:`c${index}`,width:Math.min(Math.max(max+3,10),42)};
  });
}
async function exportStyledXLSX({sheetName='Dados',filename='Dados',title='JET Gestão de Obras',meta=[],columns=[],rows=[],sections=[]}){
  if(window.ExcelJS){
    const workbook=new window.ExcelJS.Workbook();
    workbook.creator='JET Gestão de Obras';
    workbook.created=new Date();
    const ws=workbook.addWorksheet(xlsxSheetName(sheetName));
    ws.properties.defaultRowHeight=22;
    ws.columns=columns.map(col=>({key:col.key,width:col.width||18}));
    const totalCols=Math.max(columns.length,1);
    let rowNumber=1;
    const mergeFullRow=row=>{if(totalCols>1)ws.mergeCells(row,1,row,totalCols);};
    const headerBg='1A2E6B';
    const sectionBg='E8EFFC';
    const bodyBorder='DEE7F2';

    mergeFullRow(rowNumber);
    const titleCell=ws.getCell(rowNumber,1);
    titleCell.value=title;
    titleCell.fill=xlsxFill(`#${headerBg}`);
    titleCell.font={name:'Aptos',size:16,bold:true,color:{argb:'FFFFFFFF'}};
    titleCell.alignment={vertical:'middle',horizontal:'left'};
    ws.getRow(rowNumber).height=26;

    meta.filter(Boolean).forEach(line=>{
      rowNumber++;
      mergeFullRow(rowNumber);
      const cell=ws.getCell(rowNumber,1);
      cell.value=Array.isArray(line)?line.filter(Boolean).join('   •   '):line;
      cell.font={name:'Aptos',size:10,color:{argb:'FF5E6B83'}};
      cell.alignment={vertical:'middle',horizontal:'left'};
    });

    rowNumber++;
    const headerRowNumber=rowNumber;
    const headerRow=ws.getRow(headerRowNumber);
    columns.forEach((col,index)=>{
      const cell=headerRow.getCell(index+1);
      cell.value=col.header;
      cell.fill=xlsxFill(`#${headerBg}`);
      cell.font={name:'Aptos',size:11,bold:true,color:{argb:'FFFFFFFF'}};
      cell.alignment={vertical:'middle',horizontal:col.align||'left'};
      cell.border=xlsxBorder(bodyBorder);
    });
    headerRow.height=22;

    const applyBodyCell=(cell,col,rawValue,rowIndex)=>{
      const value=rawValue==null?'':rawValue;
      if(col.type==='currency'&&value!==''){
        const num=Number(String(value).replace(/[^\d,.-]/g,'').replace(/\.(?=.*\.)/g,'').replace(',','.'));
        cell.value=Number.isFinite(num)?num:value;
        if(Number.isFinite(num))cell.numFmt='"R$" #,##0.00';
      }else{
        cell.value=value;
      }
      cell.font={name:'Aptos',size:10.5,color:{argb:'FF23344D'},bold:false};
      cell.alignment={vertical:'top',horizontal:col.align||'left',wrapText:col.wrap!==false};
      cell.border=xlsxBorder(bodyBorder);
      cell.fill=xlsxFill(rowIndex%2?'#FFFFFF':'#F7FAFF');
      if(col.badgeMap&&value!==''){
        const badge=col.badgeMap[value]||col.badgeMap[String(value)];
        if(badge){
          cell.fill=xlsxFill(badge.bg||'#EFF4FF');
          cell.font={name:'Aptos',size:10.5,bold:true,color:{argb:xlsxArgb(badge.c||'#23344D')}};
        }
      }
      if(col.type==='currency'&&value!==''){
        cell.font={...cell.font,bold:true,color:{argb:'FF14956B'}};
      }
      if(typeof col.style==='function')col.style(cell,value,rowIndex);
    };

    const pushRow=(record,rowIndex)=>{
      rowNumber++;
      const row=ws.getRow(rowNumber);
      columns.forEach((col,index)=>{
        const raw=typeof col.value==='function'?col.value(record,rowIndex):record[col.key];
        applyBodyCell(row.getCell(index+1),col,raw,rowIndex);
      });
      row.commit();
    };

    if(sections.length){
      let count=0;
      sections.forEach(section=>{
        rowNumber++;
        mergeFullRow(rowNumber);
        const sectionCell=ws.getCell(rowNumber,1);
        sectionCell.value=section.label;
        sectionCell.fill=xlsxFill(`#${sectionBg}`);
        sectionCell.font={name:'Aptos',size:11,bold:true,color:{argb:'FF1A2E6B'}};
        sectionCell.alignment={vertical:'middle',horizontal:'left'};
        sectionCell.border=xlsxBorder(bodyBorder);
        (section.rows||[]).forEach(record=>{count++;pushRow(record,count);});
      });
    }else if(rows.length){
      rows.forEach((record,index)=>pushRow(record,index+1));
    }else{
      rowNumber++;
      mergeFullRow(rowNumber);
      const emptyCell=ws.getCell(rowNumber,1);
      emptyCell.value='Nenhum registro encontrado.';
      emptyCell.font={name:'Aptos',size:10,italic:true,color:{argb:'FF73849E'}};
      emptyCell.alignment={vertical:'middle',horizontal:'center'};
      emptyCell.border=xlsxBorder(bodyBorder);
    }

    ws.autoFilter={from:{row:headerRowNumber,column:1},to:{row:headerRowNumber,column:totalCols}};
    ws.views=[{state:'frozen',ySplit:headerRowNumber}];
    const buffer=await workbook.xlsx.writeBuffer();
    xlsxDownload(buffer,`${xlsxFileName(filename)}.xlsx`);
    toast('Excel exportado!');
    return;
  }
  if(!window.XLSX){toast('Biblioteca não carregada.','#f59e0b');return;}
  const headerList=columns.map(col=>col.header);
  const dataRows=rows.map(row=>columns.map(col=>typeof col.value==='function'?col.value(row):row[col.key]));
  const ws=XLSX.utils.aoa_to_sheet([headerList,...dataRows]);
  ws['!cols']=columns.map(col=>({wch:col.width||16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,xlsxSheetName(sheetName));
  XLSX.writeFile(wb,`${xlsxFileName(filename)}.xlsx`);
  toast('Excel exportado!');
}
