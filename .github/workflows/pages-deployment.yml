name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static bundle
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          BUILD_ID=$(TZ='America/Sao_Paulo' date +%Y%m%d%H%M%S)
          sed -i -E "s/<meta name=\"jet-build\" content=\"[^\"]*\">/<meta name=\"jet-build\" content=\"${BUILD_ID}\">/" dist/index.html
          if [ -d icons ]; then
            cp -R icons dist/icons
          fi

      - name: Deploy
        run: npx wrangler pages deploy dist --project-name=jet-gestao-obras --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
